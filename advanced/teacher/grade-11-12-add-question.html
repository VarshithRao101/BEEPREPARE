<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Question - Class 11/12</title>
    <link rel="stylesheet" href="../../assets/css/style.css">
    <style>
        .input-group {
            margin-bottom: 16px;
        }

        .input-label {
            display: block;
            margin-bottom: 8px;
            font-size: 12px;
            color: #aaa;
            text-transform: uppercase;
        }

        .text-input {
            width: 100%;
            padding: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: #fff;
            font-family: inherit;
        }

        .text-input:focus {
            outline: none;
            border-color: #FFD700;
        }

        .option-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }

        .radio-custom {
            appearance: none;
            width: 20px;
            height: 20px;
            border: 2px solid #555;
            border-radius: 50%;
            cursor: pointer;
            position: relative;
        }

        .radio-custom:checked {
            border-color: #4CAF50;
            background: #4CAF50;
        }

        .submit-btn {
            width: 100%;
            padding: 16px;
            background: #FFD700;
            color: #000;
            font-weight: 800;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            margin-top: 24px;
        }
    </style>
    <!-- PREMIUM ANIMATION STYLES -->
    <link rel="stylesheet" href="../../assets/css/premium-student-ui.css">
</head>

<body style="background: #0a0a0a;">
    <div class="app-container" style="max-width: 600px; margin: 0 auto; padding: 20px;">
        <!-- Header -->
        <div style="display: flex; align-items: center; gap: 16px; margin-bottom: 24px;">
            <button onclick="window.history.back()"
                style="background: none; border: none; color: #fff; font-size: 18px; cursor: pointer;">←</button>
            <h2 style="margin: 0; color: #FFD700;">Add New Question</h2>
        </div>

        <form id="add-q-form" onsubmit="handleSubmit(event)">
            <div class="input-group">
                <label class="input-label">Subject</label>
                <select class="text-input" id="subject" required>
                    <option value="Physics">Physics</option>
                    <option value="Chemistry">Chemistry</option>
                    <option value="Maths">Mathematics</option>
                </select>
            </div>

            <div class="input-group">
                <label class="input-label">Chapter</label>
                <select class="text-input" id="chapter" required>
                    <option value="Chapter 1">Chapter 1</option>
                    <option value="Chapter 2">Chapter 2</option>
                    <option value="Chapter 3">Chapter 3</option>
                </select>
            </div>

            <div class="input-group">
                <label class="input-label">Question Text</label>
                <textarea class="text-input" id="q-text" rows="4" placeholder="Type the question here..."
                    required></textarea>
            </div>

            <div class="input-group">
                <label class="input-label">Options (Select Correct Answer)</label>

                <div class="option-row">
                    <input type="radio" name="correct" value="0" class="radio-custom" required>
                    <input type="text" class="text-input" placeholder="Option A" required>
                </div>
                <div class="option-row">
                    <input type="radio" name="correct" value="1" class="radio-custom">
                    <input type="text" class="text-input" placeholder="Option B" required>
                </div>
                <div class="option-row">
                    <input type="radio" name="correct" value="2" class="radio-custom">
                    <input type="text" class="text-input" placeholder="Option C" required>
                </div>
                <div class="option-row">
                    <input type="radio" name="correct" value="3" class="radio-custom">
                    <input type="text" class="text-input" placeholder="Option D" required>
                </div>
            </div>

            <button type="submit" class="submit-btn">Submit for Verification (+10 Coins)</button>
        </form>
    </div>

    <script src="../../assets/js/grade-11-12-logic.js"></script>
    <script>
        function handleSubmit(e) {
            e.preventDefault();

            const subject = document.getElementById('subject').value;
            const chapter = document.getElementById('chapter').value;
            const text = document.getElementById('q-text').value;

            const optionInputs = document.querySelectorAll('.option-row input[type="text"]');
            const options = Array.from(optionInputs).map(i => i.value);

            const correctRadio = document.querySelector('input[name="correct"]:checked');
            if (!correctRadio) {
                alert('Please select the correct option!');
                return;
            }

            const qData = {
                subject,
                chapter,
                text,
                options,
                correctIndex: parseInt(correctRadio.value),
                author: 'Me (Teacher)' // Mock
            };

            // Add to Mock System
            Grade1112System.addQuestionToQueue(qData);

            // Feedback
            const btn = document.querySelector('.submit-btn');
            btn.innerText = 'Submitted Successfully!';
            btn.style.background = '#4CAF50';

            setTimeout(() => {
                window.history.back();
            }, 1000);
        }
    </script>
    <script src='../../assets/js/beeprepare-security.js'></script>

    <!-- EXTREME UI SCRIPTS (Animations Only) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.8.0/vanilla-tilt.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Apply 3D Tilt to all interactive elements
            const tiltElements = document.querySelectorAll(".subject-card, .class-card, .timeline-card, .req-card, .bank-card, .history-card, .profile-card, .stat-box, .file-item, .action-card, .subject-mini-card, .document-item, .result-card, .request-card, .auth-card, .d-profile-card, .adv-card, .role-card, .dash-card, .paper-card, .stream-card");
            if(tiltElements.length > 0) {
                try {
                    VanillaTilt.init(tiltElements, {
                        max: 8,
                        speed: 400,
                        glare: true,
                        "max-glare": 0.15,
                        scale: 1.02
                    });
                } catch(e) {}
            }

            // Apply Staggered HUD Load-in
            const hudElements = document.querySelectorAll(".subject-card, .class-card, .timeline-item, .req-card, .bank-card, .history-card, .profile-card, .stat-box, .file-item, .action-card, .subject-mini-card, .document-item, .result-card, .request-card, .d-profile-stats, .d-xp-container, .dash-card, .role-card, .paper-card, .stream-card");
            hudElements.forEach((el, index) => {
                el.classList.add('hud-element');
                el.style.animationDelay = `${index * 0.08}s`;
            });
        });
    </script>
</body>

</html>
