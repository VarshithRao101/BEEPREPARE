<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Resource - Class 11/12</title>
    <link rel="stylesheet" href="../../assets/css/style.css">
    <style>
        .input-group {
            margin-bottom: 20px;
        }

        .input-label {
            display: block;
            margin-bottom: 8px;
            font-size: 12px;
            color: #aaa;
            text-transform: uppercase;
        }

        .text-input {
            width: 100%;
            padding: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: #fff;
            font-family: inherit;
        }

        .text-input:focus {
            outline: none;
            border-color: #FFD700;
        }

        .submit-btn {
            width: 100%;
            padding: 16px;
            background: #FFD700;
            color: #000;
            font-weight: 800;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            margin-top: 12px;
            transition: 0.3s;
        }

        .submit-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
        }

        .type-selector {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
        }

        .type-opt {
            flex: 1;
            padding: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            text-align: center;
            cursor: pointer;
            font-weight: 600;
            color: #aaa;
            transition: 0.2s;
        }

        .type-opt.active {
            background: rgba(255, 215, 0, 0.2);
            border-color: #FFD700;
            color: #FFD700;
        }
    </style>
    <!-- PREMIUM ANIMATION STYLES -->
    <link rel="stylesheet" href="../../assets/css/premium-student-ui.css">
</head>

<body style="background: #0a0a0a;">
    <div class="app-container" style="max-width: 600px; margin: 0 auto; padding: 20px;">

        <div style="display: flex; align-items: center; gap: 16px; margin-bottom: 24px;">
            <button onclick="window.history.back()"
                style="background: none; border: none; color: #fff; font-size: 18px; cursor: pointer;">←</button>
            <h2 style="margin: 0; color: #fff;">Add Resource</h2>
        </div>

        <div class="type-selector">
            <div class="type-opt active" onclick="setType('Flashcard')">Flashcard (+10)</div>
            <div class="type-opt" onclick="setType('Note')">Short Note (+20)</div>
            <div class="type-opt" onclick="setType('Formula')">Formula (+20)</div>
        </div>

        <div class="input-group">
            <label class="input-label">Subject</label>
            <select class="text-input" id="subject">
                <option value="Physics">Physics</option>
                <option value="Chemistry">Chemistry</option>
                <option value="Maths">Mathematics</option>
            </select>
        </div>

        <!-- Flashcard Fields -->
        <div id="flashcard-fields">
            <div class="input-group">
                <label class="input-label">Front Side (Question/Term)</label>
                <textarea class="text-input" id="fc-front" rows="3"
                    placeholder="e.g., Define Newton's First Law"></textarea>
            </div>
            <div class="input-group">
                <label class="input-label">Back Side (Answer/Definition)</label>
                <textarea class="text-input" id="fc-back" rows="3"
                    placeholder="e.g., An object remains at rest..."></textarea>
            </div>
        </div>

        <!-- Note Fields (Hidden by default) -->
        <div id="note-fields" style="display: none;">
            <div class="input-group">
                <label class="input-label">Title / Topic</label>
                <input type="text" class="text-input" id="note-title" placeholder="e.g., Integration Formulas">
            </div>
            <div class="input-group">
                <label class="input-label">Content</label>
                <textarea class="text-input" id="note-content" rows="8"
                    placeholder="Type your content here..."></textarea>
            </div>
        </div>

        <button class="submit-btn" onclick="submitResource()">Submit To Queue</button>

    </div>

    <script src="../../assets/js/grade-11-12-logic.js"></script>
    <script>
        let currentType = 'Flashcard';

        function setType(type) {
            currentType = type;

            // UI Toggle
            document.querySelectorAll('.type-opt').forEach(el => {
                if (el.innerText.includes(type)) el.classList.add('active');
                else el.classList.remove('active');
            });

            // Field Toggle
            if (type === 'Flashcard') {
                document.getElementById('flashcard-fields').style.display = 'block';
                document.getElementById('note-fields').style.display = 'none';
            } else {
                document.getElementById('flashcard-fields').style.display = 'none';
                document.getElementById('note-fields').style.display = 'block';
            }
        }

        function submitResource() {
            const subject = document.getElementById('subject').value;
            let data = {
                type: currentType,
                subject: subject,
                author: 'Me (Teacher)'
            };

            if (currentType === 'Flashcard') {
                const front = document.getElementById('fc-front').value;
                const back = document.getElementById('fc-back').value;
                if (!front || !back) {
                    alert('Please fill all fields');
                    return;
                }
                data.content = { front, back };
                data.title = front.substring(0, 20) + '...'; // Auto title
            } else {
                const title = document.getElementById('note-title').value;
                const content = document.getElementById('note-content').value;
                if (!title || !content) {
                    alert('Please fill all fields');
                    return;
                }
                data.title = title;
                data.content = { text: content };
            }

            // Save
            Grade1112System.addResourceToQueue(data);

            // Feedback
            const btn = document.querySelector('.submit-btn');
            btn.innerText = 'Submitted! Coins Added.';
            btn.style.background = '#4CAF50';
            setTimeout(() => {
                window.history.back();
            }, 1000);
        }
    </script>
    <nav class="nav-bottom">
        <a href="grade-11-12-home.html" class="nav-item">
            <svg viewBox="0 0 24 24" fill="currentColor">
                <path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z" />
            </svg>
            <span>Dashboard</span>
        </a>
        <a href="grade-11-12-bank.html" class="nav-item">
            <svg viewBox="0 0 24 24" fill="currentColor">
                <path d="M4 10h16v10H4zM4 6h16v2H4z" />
            </svg>
            <span>Bank</span>
        </a>
        <a href="grade-11-12-take-test.html" class="nav-item">
            <svg viewBox="0 0 24 24" fill="currentColor">
                <path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z" />
            </svg>
            <span>Take Test</span>
        </a>
        <a href="grade-11-12-profile.html" class="nav-item">
            <svg viewBox="0 0 24 24" fill="currentColor">
                <path
                    d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z" />
            </svg>
            <span>Profile</span>
        </a>
    </nav>
    <script src='../../assets/js/beeprepare-security.js'></script>

    <!-- EXTREME UI SCRIPTS (Animations Only) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.8.0/vanilla-tilt.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Apply 3D Tilt to all interactive elements
            const tiltElements = document.querySelectorAll(".subject-card, .class-card, .timeline-card, .req-card, .bank-card, .history-card, .profile-card, .stat-box, .file-item, .action-card, .subject-mini-card, .document-item, .result-card, .request-card, .auth-card, .d-profile-card, .adv-card, .role-card, .dash-card, .paper-card, .stream-card");
            if(tiltElements.length > 0) {
                try {
                    VanillaTilt.init(tiltElements, {
                        max: 8,
                        speed: 400,
                        glare: true,
                        "max-glare": 0.15,
                        scale: 1.02
                    });
                } catch(e) {}
            }

            // Apply Staggered HUD Load-in
            const hudElements = document.querySelectorAll(".subject-card, .class-card, .timeline-item, .req-card, .bank-card, .history-card, .profile-card, .stat-box, .file-item, .action-card, .subject-mini-card, .document-item, .result-card, .request-card, .d-profile-stats, .d-xp-container, .dash-card, .role-card, .paper-card, .stream-card");
            hudElements.forEach((el, index) => {
                el.classList.add('hud-element');
                el.style.animationDelay = `${index * 0.08}s`;
            });
        });
    </script>
</body>

</html>
