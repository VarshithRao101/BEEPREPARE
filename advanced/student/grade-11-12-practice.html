<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Practice Session - BEEPREPARE</title>
    <link rel="stylesheet" href="../../assets/css/style.css">
    <style>
        .question-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 24px;
        }

        .option-btn {
            display: block;
            width: 100%;
            padding: 16px;
            margin-bottom: 12px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #ccc;
            border-radius: 12px;
            text-align: left;
            cursor: pointer;
            transition: 0.2s;
        }

        .option-btn:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .option-btn.selected {
            background: rgba(255, 215, 0, 0.2);
            border-color: #FFD700;
            color: #FFD700;
        }

        .nav-controls {
            display: flex;
            justify-content: space-between;
            margin-top: 24px;
        }

        .nav-btn {
            background: #333;
            color: #fff;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
        }

        .nav-btn.primary {
            background: #FFD700;
            color: #000;
            font-weight: 700;
        }
    </style>
    <!-- PREMIUM ANIMATION STYLES -->
    <link rel="stylesheet" href="../../assets/css/premium-student-ui.css">
</head>

<body style="background: #0a0a0a;">
    <div class="app-container" style="max-width: 600px; margin: 0 auto; padding: 20px;">

        <!-- Header -->
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
            <div style="font-size: 12px; color: #aaa;">
                <span id="subject-lbl">Physics</span> • <span id="chapter-lbl">Ch 1</span>
            </div>
            <div style="background: rgba(255,255,255,0.1); padding: 4px 12px; border-radius: 12px; font-size: 12px;">
                <span id="current-q">1</span> / <span id="total-q">10</span>
            </div>
        </div>

        <!-- Question Area -->
        <div id="quiz-container">
            <div class="question-card">
                <h3 style="margin-top: 0; font-size: 18px; line-height: 1.5;" id="q-text">Loading...</h3>
            </div>

            <div id="options-container">
                <!-- Options injected here -->
            </div>
        </div>

        <!-- Controls -->
        <div class="nav-controls">
            <button class="nav-btn" onclick="prevQuestion()" id="prev-btn" disabled>Previous</button>
            <button class="nav-btn primary" onclick="nextQuestion()" id="next-btn">Next</button>
        </div>

    </div>

    <!-- Result Modal -->
    <div id="result-modal"
        style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 2000; display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center;">
        <div style="font-size: 64px; margin-bottom: 16px;"></div>
        <h2 style="color: #FFD700; font-size: 32px; margin: 0;">Session Complete!</h2>
        <div style="font-size: 18px; color: #fff; margin: 16px 0;">
            Score: <span id="score-val" style="font-weight: 800; font-size: 24px;">0/10</span>
        </div>
        <div id="coin-reward"
            style="background: rgba(255,215,0,0.1); border: 1px solid #FFD700; padding: 12px 24px; border-radius: 20px; color: #FFD700; font-weight: 700; margin-bottom: 32px; display: none;">
            +10 Coins Earned!
        </div>
        <button onclick="window.location.href='grade-11-12-home.html'"
            style="background: #fff; color: #000; padding: 12px 32px; border-radius: 24px; border: none; font-weight: 700; cursor: pointer;">Back
            to Dashboard</button>
    </div>

    <script src="../../assets/js/grade-11-12-logic.js"></script>
    <script>
        let questions = [];
        let currentIndex = 0;
        let userAnswers = {}; // map qId -> optionIndex

        document.addEventListener('DOMContentLoaded', () => {
            const config = JSON.parse(localStorage.getItem('beeprepare_current_practice_config') || '{}');
            if (!config.subject) {
                alert('No practice configuration found.');
                window.history.back();
                return;
            }

            document.getElementById('subject-lbl').innerText = config.subject;
            document.getElementById('chapter-lbl').innerText = config.chapter;

            // Load Questions
            questions = Grade1112System.getPracticeQuestions(config.subject, config.chapter, config.difficulty, 10);

            // Mock empty bank handling
            if (questions.length === 0) {
                // Fallback to random if no specific ones
                questions = Grade1112System.getPracticeQuestions(config.subject, null, null, 10);
            }

            document.getElementById('total-q').innerText = questions.length;
            renderQuestion();
        });

        function renderQuestion() {
            const q = questions[currentIndex];
            document.getElementById('current-q').innerText = currentIndex + 1;
            document.getElementById('q-text').innerText = q.text;

            const container = document.getElementById('options-container');
            container.innerHTML = '';

            q.options.forEach((opt, idx) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = opt;
                if (userAnswers[currentIndex] === idx) {
                    btn.classList.add('selected');
                }
                btn.onclick = () => selectOption(idx);
                container.appendChild(btn);
            });

            // Update buttons
            document.getElementById('prev-btn').disabled = currentIndex === 0;
            const nextBtn = document.getElementById('next-btn');
            if (currentIndex === questions.length - 1) {
                nextBtn.innerText = 'Submit Test';
                nextBtn.onclick = submitTest;
            } else {
                nextBtn.innerText = 'Next';
                nextBtn.onclick = nextQuestion;
            }
        }

        function selectOption(idx) {
            userAnswers[currentIndex] = idx;
            renderQuestion(); // Re-render to show selection
        }

        function nextQuestion() {
            if (currentIndex < questions.length - 1) {
                currentIndex++;
                renderQuestion();
            }
        }

        function prevQuestion() {
            if (currentIndex > 0) {
                currentIndex--;
                renderQuestion();
            }
        }

        function submitTest() {
            // Calculate Score
            let score = 0;
            questions.forEach((q, idx) => {
                if (userAnswers[idx] === q.correctIndex) {
                    score++;
                }
            });

            // Show Result
            document.getElementById('result-modal').style.display = 'flex';
            document.getElementById('score-val').innerText = `${score} / ${questions.length}`;

            // Award Coins
            const earned = Grade1112System.submitTestScore(score, questions.length);
            if (earned > 0) {
                const rewardBadge = document.getElementById('coin-reward');
                rewardBadge.style.display = 'block';
                rewardBadge.innerText = `+${earned} Coins Earned!`;
            }
        }
    </script>
    <script src='../../assets/js/beeprepare-security.js'></script>

    <!-- EXTREME UI SCRIPTS (Animations Only) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.8.0/vanilla-tilt.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Apply 3D Tilt to all interactive elements
            const tiltElements = document.querySelectorAll(".subject-card, .class-card, .timeline-card, .req-card, .bank-card, .history-card, .profile-card, .stat-box, .file-item, .action-card, .subject-mini-card, .document-item, .result-card, .request-card, .auth-card, .d-profile-card, .adv-card, .role-card, .dash-card, .paper-card, .stream-card");
            if(tiltElements.length > 0) {
                try {
                    VanillaTilt.init(tiltElements, {
                        max: 8,
                        speed: 400,
                        glare: true,
                        "max-glare": 0.15,
                        scale: 1.02
                    });
                } catch(e) {}
            }

            // Apply Staggered HUD Load-in
            const hudElements = document.querySelectorAll(".subject-card, .class-card, .timeline-item, .req-card, .bank-card, .history-card, .profile-card, .stat-box, .file-item, .action-card, .subject-mini-card, .document-item, .result-card, .request-card, .d-profile-stats, .d-xp-container, .dash-card, .role-card, .paper-card, .stream-card");
            hudElements.forEach((el, index) => {
                el.classList.add('hud-element');
                el.style.animationDelay = `${index * 0.08}s`;
            });
        });
    </script>
</body>

</html>
