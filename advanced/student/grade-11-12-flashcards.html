<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flashcards - Class 11/12</title>
    <link rel="stylesheet" href="../../assets/css/style.css">
    <style>
        .card-container {
            perspective: 1000px;
            width: 100%;
            height: 300px;
            margin: 40px auto;
            position: relative;
            cursor: pointer;
        }

        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.6s;
            transform-style: preserve-3d;
        }

        .card-container.flipped .card-inner {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            font-size: 20px;
            font-weight: 600;
            line-height: 1.5;
        }

        .card-front {
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.1), rgba(0, 0, 0, 0.8));
            border: 1px solid rgba(255, 215, 0, 0.3);
            color: #FFD700;
        }

        .card-back {
            background: linear-gradient(135deg, #222, #111);
            border: 1px solid #444;
            color: #fff;
            transform: rotateY(180deg);
        }

        .nav-dots {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 24px;
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #444;
            cursor: pointer;
        }

        .dot.active {
            background: #FFD700;
            box-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
        }

        .controls {
            display: flex;
            justify-content: space-between;
            margin-top: 24px;
        }

        .ctrl-btn {
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: #fff;
            padding: 12px 24px;
            border-radius: 24px;
            cursor: pointer;
        }

        .ctrl-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }
    </style>
    <!-- PREMIUM ANIMATION STYLES -->
    <link rel="stylesheet" href="../../assets/css/premium-student-ui.css">
</head>

<body style="background: #0a0a0a;">
    <div class="app-container" style="max-width: 600px; margin: 0 auto; padding: 20px;">

        <div style="display: flex; align-items: center; gap: 16px; margin-bottom: 24px;">
            <button onclick="window.history.back()"
                style="background: none; border: none; color: #fff; font-size: 18px; cursor: pointer;">←</button>
            <h2 style="margin: 0; color: #fff;">Flashcards</h2>
            <select id="sub-filter" onchange="loadCards()"
                style="background: #222; color: #fff; border: 1px solid #444; padding: 4px; border-radius: 4px; margin-left: auto;">
                <option value="">All Subjects</option>
                <option value="Physics">Physics</option>
                <option value="Chemistry">Chemistry</option>
                <option value="Maths">Mathematics</option>
            </select>
        </div>

        <div id="deck-area">
            <div class="card-container" onclick="flipCard()">
                <div class="card-inner">
                    <div class="card-face card-front" id="card-f">
                        Loading...
                    </div>
                    <div class="card-face card-back" id="card-b">
                        ...
                    </div>
                </div>
            </div>

            <div style="text-align: center; color: #aaa; font-size: 12px; margin-top: 12px;">Tap card to flip</div>

            <div class="controls">
                <button class="ctrl-btn" id="prev-btn" onclick="prevCard()">Previous</button>
                <span id="counter" style="color: #aaa; align-self: center;">1 / 5</span>
                <button class="ctrl-btn" id="next-btn" onclick="nextCard()">Next</button>
            </div>
        </div>

    </div>

    <script src="../../assets/js/grade-11-12-logic.js"></script>
    <script>
        let cards = [];
        let currentIndex = 0;

        document.addEventListener('DOMContentLoaded', () => {
            loadCards();
        });

        function loadCards() {
            const subject = document.getElementById('sub-filter').value;
            cards = Grade1112System.getResources('Flashcard', subject || null);

            // Seed mock data if empty
            if (cards.length === 0) {
                cards = [
                    { content: { front: 'Velocity', back: 'Rate of change of displacement' } },
                    { content: { front: 'Acceleration', back: 'Rate of change of velocity' } },
                    { content: { front: 'Isotopes', back: 'Atoms with same protons but different neutrons' } }
                ];
            }

            currentIndex = 0;
            renderCard();
        }

        function renderCard() {
            const card = cards[currentIndex];
            document.getElementById('card-f').innerText = card.content ? card.content.front : card.title;
            document.getElementById('card-b').innerText = card.content ? card.content.back : 'No content';

            document.getElementById('counter').innerText = `${currentIndex + 1} / ${cards.length}`;
            document.getElementById('prev-btn').disabled = currentIndex === 0;
            document.getElementById('next-btn').disabled = currentIndex === cards.length - 1;

            // Reset flip
            document.querySelector('.card-container').classList.remove('flipped');
        }

        function flipCard() {
            document.querySelector('.card-container').classList.toggle('flipped');
        }

        function nextCard() {
            if (currentIndex < cards.length - 1) {
                currentIndex++;
                renderCard();
            }
        }

        function prevCard() {
            if (currentIndex > 0) {
                currentIndex--;
                renderCard();
            }
        }
    </script>
    <script src='../../assets/js/beeprepare-security.js'></script>

    <!-- EXTREME UI SCRIPTS (Animations Only) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.8.0/vanilla-tilt.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Apply 3D Tilt to all interactive elements
            const tiltElements = document.querySelectorAll(".subject-card, .class-card, .timeline-card, .req-card, .bank-card, .history-card, .profile-card, .stat-box, .file-item, .action-card, .subject-mini-card, .document-item, .result-card, .request-card, .auth-card, .d-profile-card, .adv-card, .role-card, .dash-card, .paper-card, .stream-card");
            if(tiltElements.length > 0) {
                try {
                    VanillaTilt.init(tiltElements, {
                        max: 8,
                        speed: 400,
                        glare: true,
                        "max-glare": 0.15,
                        scale: 1.02
                    });
                } catch(e) {}
            }

            // Apply Staggered HUD Load-in
            const hudElements = document.querySelectorAll(".subject-card, .class-card, .timeline-item, .req-card, .bank-card, .history-card, .profile-card, .stat-box, .file-item, .action-card, .subject-mini-card, .document-item, .result-card, .request-card, .d-profile-stats, .d-xp-container, .dash-card, .role-card, .paper-card, .stream-card");
            hudElements.forEach((el, index) => {
                el.classList.add('hud-element');
                el.style.animationDelay = `${index * 0.08}s`;
            });
        });
    </script>
</body>

</html>
