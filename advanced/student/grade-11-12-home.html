<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class 11/12 Dashboard - BEEPREPARE</title>
    <link rel="stylesheet" href="../../assets/css/style.css">
    <link rel="stylesheet" href="../../assets/css/pro-animations.css">
    <style>
        /* Premium Gold Theme for 11/12 */
        :root {
            --gold-primary: #FFD700;
            --gold-secondary: #ffb700;
            /* --dark-bg: #0a0a0a; Removed to use style.css default or lighter override */
            --card-bg: rgba(20, 20, 20, 0.95);
        }

        body {
            /* background-color: var(--dark-bg); Removed to allow style.css background */
            color: #fff;
        }

        .gold-text {
            color: var(--gold-primary);
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.3);
        }

        .premium-card {
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.05), rgba(0, 0, 0, 0.8));
            border: 1px solid rgba(255, 215, 0, 0.2);
            border-radius: 24px;
            padding: 24px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        }

        .premium-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--gold-primary), transparent);
        }

        .stat-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-top: 24px;
        }

        .stat-box {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            padding: 16px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: 0.3s;
        }

        .stat-box:hover {
            transform: translateY(-5px);
            border-color: var(--gold-primary);
            box-shadow: 0 5px 15px rgba(255, 215, 0, 0.1);
        }

        .stat-value {
            font-size: 24px;
            font-weight: 800;
            color: #fff;
        }

        .stat-label {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.5);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 4px;
        }

        /* Practice Area */
        .practice-select {
            width: 100%;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            padding: 14px;
            border-radius: 12px;
            margin-bottom: 12px;
            font-size: 14px;
            outline: none;
        }

        .practice-select:focus {
            border-color: var(--gold-primary);
        }

        .practice-btn {
            background: linear-gradient(135deg, var(--gold-primary), var(--gold-secondary));
            color: #000;
            border: none;
            width: 100%;
            padding: 16px;
            border-radius: 12px;
            font-weight: 800;
            font-size: 16px;
            cursor: pointer;
            transition: 0.2s;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 12px;
        }

        .practice-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.4);
        }

        /* Coin Animation */
        .coin-icon {
            width: 24px;
            height: 24px;
            background: radial-gradient(circle at 30% 30%, #ffd700, #b8860b);
            border-radius: 50%;
            box-shadow: inset -2px -2px 4px rgba(0, 0, 0, 0.4), 0 0 10px rgba(255, 215, 0, 0.5);
            display: inline-block;
            vertical-align: middle;
            margin-right: 6px;
            border: 1px solid #ffe44d;
        }

        /* Leaderboard */
        .leader-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .leader-rank {
            width: 24px;
            height: 24px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            font-size: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            margin-right: 12px;
        }

        .leader-rank.top {
            background: var(--gold-primary);
            color: #000;
        }

        /* Nav */
        .page-nav {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
            overflow-x: auto;
            scrollbar-width: none;
        }

        .nav-pill {
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            font-size: 12px;
            white-space: nowrap;
            color: rgba(255, 255, 255, 0.6);
            transition: 0.2s;
            cursor: pointer;
        }

        .nav-pill.active {
            background: rgba(255, 215, 0, 0.2);
            color: var(--gold-primary);
            border: 1px solid rgba(255, 215, 0, 0.3);
        }
    </style>
    <!-- PREMIUM ANIMATION STYLES -->
    <link rel="stylesheet" href="../../assets/css/premium-student-ui.css">
</head>

<body>
    <div class="background-animation">
        <div class="glow-orb orb-1"></div>
        <div class="glow-orb orb-2"></div>
    </div>

    <div class="app-container">
        <!-- Top Bar -->
        <div class="top-bar"
            style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
            <div>
                <div class="industrial-tag"
                    style="color: var(--primary); border-color: var(--primary); margin-bottom: 4px;">STUDENT</div>
                <h1 style="font-size: 24px; font-weight: 800; margin: 0; color: #fff;">Dashboard</h1>
            </div>
            <div class="earnings-pill" onclick="window.location.href='grade-11-12-profile.html'"
                style="background: rgba(0,0,0,0.6); border: 1px solid var(--primary); padding: 8px 16px; border-radius: 30px; display: flex; align-items: center; gap: 8px; cursor:pointer;">
                <span style="font-size: 14px; color: #aaa;">BALANCE</span>
                <span style="font-weight: 800; color: var(--primary); font-family: monospace; font-size: 16px;"
                    id="coin-balance">0</span>
            </div>
        </div>

        <!-- Hero Stats -->
        <div class="hero-stats"
            style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 24px;">
            <div class="stat-card"
                style="background: linear-gradient(135deg, rgba(255,255,255,0.05), rgba(0,0,0,0.4)); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 20px; position: relative;">
                <div class="stat-value" id="questions-solved" style="font-size: 28px; font-weight: 800; color: #fff;">0
                </div>
                <div class="stat-label" style="font-size: 11px; color: #aaa; text-transform: uppercase;">Questions
                    Solved</div>
                <div
                    style="position: absolute; bottom: 0; left: 0; width: 100%; height: 4px; background: rgba(76, 175, 80, 0.5);">
                </div>
            </div>
            <div class="stat-card"
                style="background: linear-gradient(135deg, rgba(255,255,255,0.05), rgba(0,0,0,0.4)); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 20px; position: relative;">
                <div class="stat-value" id="streak-cnt"
                    style="font-size: 28px; font-weight: 800; color: var(--primary);">0</div>
                <div class="stat-label" style="font-size: 11px; color: #aaa; text-transform: uppercase;">Day Streak
                </div>
                <div
                    style="position: absolute; bottom: 0; left: 0; width: 100%; height: 4px; background: rgba(255, 215, 0, 0.5);">
                </div>
            </div>
        </div>

        <!-- Quick Actions -->
        <h3 style="font-size: 14px; font-weight: 700; color: #888; text-transform: uppercase; margin-bottom: 12px;">
            Quick Start</h3>
        <div class="dashboard-grid" style="grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px;">
            <div class="dash-card" onclick="startPractice()" style="cursor: pointer;">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="2"
                    style="margin-bottom: 12px;">
                    <path
                        d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z">
                    </path>
                </svg>
                <div style="font-weight: 700; color: #fff;">Quick Practice</div>
                <div style="font-size: 11px; color: #888; margin-top: 4px;">Random 10 Questions</div>
            </div>

            <div class="dash-card" onclick="window.location.href='grade-11-12-study.html'" style="cursor: pointer;">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#4CAF50" stroke-width="2"
                    style="margin-bottom: 12px;">
                    <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path>
                    <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path>
                </svg>
                <div style="font-weight: 700; color: #fff;">Study Material</div>
                <div style="font-size: 11px; color: #888; margin-top: 4px;">Notes & Flashcards</div>
            </div>
        </div>

        <!-- Leaderboard Preview -->
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
            <h3 style="font-size: 14px; font-weight: 700; color: #888; text-transform: uppercase; margin: 0;">
                Leaderboard</h3>
            <span style="font-size: 11px; color: var(--primary);">Top 5</span>
        </div>
        <div id="leaderboard-container"
            style="background: rgba(20,20,20,0.6); border-radius: 16px; padding: 0 16px; border: 1px solid rgba(255,255,255,0.05);">
            <!-- Dynamic Leaderboard -->
            <div style="padding: 20px; text-align: center; color: #aaa;">Loading...</div>
        </div>

    </div>

    <!-- Common Nav -->
    <!-- Common Nav -->
    <nav class="nav-bottom">
        <a href="grade-11-12-home.html" class="nav-item active">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                <polyline points="9 22 9 12 15 12 15 22"></polyline>
            </svg>
            <span>Dashboard</span>
        </a>
        <a href="grade-11-12-bank.html" class="nav-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path>
                <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path>
            </svg>
            <span>Bank</span>
        </a>
        <a href="grade-11-12-study.html" class="nav-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path>
                <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path>
            </svg>
            <span>Study</span>
        </a>
        <a href="grade-11-12-take-test.html" class="nav-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                <polyline points="14 2 14 8 20 8"></polyline>
                <line x1="16" y1="13" x2="8" y2="13"></line>
                <line x1="16" y1="17" x2="8" y2="17"></line>
                <polyline points="10 9 9 9 8 9"></polyline>
            </svg>
            <span>Take Test</span>
        </a>
        <a href="grade-11-12-profile.html" class="nav-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                <circle cx="12" cy="7" r="4"></circle>
            </svg>
            <span>Profile</span>
        </a>
    </nav>


    <script src="../../assets/js/grade-11-12-logic.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            updateUI();
            updateLeaderboard();
        });

        function updateUI() {
            const stats = Grade1112System.getStats('student');
            document.getElementById('coin-balance').innerText = stats.coins;
            document.getElementById('streak-cnt').innerText = stats.streak;
            document.getElementById('questions-solved').innerText = stats.solved || 0;
        }

        function updateLeaderboard() {
            const list = Grade1112System.getLeaderboard();
            const container = document.getElementById('leaderboard-container');

            let html = '';
            list.forEach((u, i) => {
                const isTop = i === 0;
                const isMe = u.isMe;
                html += `
                    <div class="leader-item" style="display: flex; align-items: center; justify-content: space-between; padding: 12px; border-bottom: 1px solid rgba(255, 255, 255, 0.05); ${isMe ? 'background: rgba(255,215,0,0.1); border-radius: 8px;' : ''} ${i === list.length - 1 ? 'border: none;' : ''}">
                        <div style="display: flex; align-items: center;">
                            <div class="leader-rank ${isTop ? 'top' : ''}" style="width: 24px; height: 24px; background: ${isTop ? '#FFD700' : 'rgba(255,255,255,0.1)'}; color: ${isTop ? '#000' : '#fff'}; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; margin-right: 12px;">${i + 1}</div>
                            <div style="font-weight: ${isMe ? '800' : '600'}; font-size: 14px; color: #fff;">${u.name} ${isMe ? '(You)' : ''}</div>
                        </div>
                        <div style="font-weight: 700; color: ${isTop || isMe ? '#FFD700' : '#fff'};">${u.coins}</div>
                    </div>
                `;
            });
            container.innerHTML = html;
        }

        function startPractice() {
            // Quick start with defaults
            localStorage.setItem('beeprepare_current_practice_config', JSON.stringify({
                subject: 'Physics',
                chapter: 'Chapter 1',
                difficulty: 'Medium'
            }));
            window.location.href = 'grade-11-12-practice.html';
        }
    </script>
    <script src='../../assets/js/beeprepare-security.js'></script>

    <!-- EXTREME UI SCRIPTS (Animations Only) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.8.0/vanilla-tilt.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Apply 3D Tilt to all interactive elements
            const tiltElements = document.querySelectorAll(".subject-card, .class-card, .timeline-card, .req-card, .bank-card, .history-card, .profile-card, .stat-box, .file-item, .action-card, .subject-mini-card, .document-item, .result-card, .request-card, .auth-card, .d-profile-card, .adv-card, .role-card, .dash-card, .paper-card, .stream-card");
            if(tiltElements.length > 0) {
                try {
                    VanillaTilt.init(tiltElements, {
                        max: 8,
                        speed: 400,
                        glare: true,
                        "max-glare": 0.15,
                        scale: 1.02
                    });
                } catch(e) {}
            }

            // Apply Staggered HUD Load-in
            const hudElements = document.querySelectorAll(".subject-card, .class-card, .timeline-item, .req-card, .bank-card, .history-card, .profile-card, .stat-box, .file-item, .action-card, .subject-mini-card, .document-item, .result-card, .request-card, .d-profile-stats, .d-xp-container, .dash-card, .role-card, .paper-card, .stream-card");
            hudElements.forEach((el, index) => {
                el.classList.add('hud-element');
                el.style.animationDelay = `${index * 0.08}s`;
            });
        });
    </script>
</body>

</html>
