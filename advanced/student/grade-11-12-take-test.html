<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Take Test - Class 11/12</title>
    <link rel="stylesheet" href="../../assets/css/style.css">
    <link rel="stylesheet" href="../../assets/css/pro-animations.css">
    <style>
        .app-container {
            max-width: 1024px;
            margin: 0 auto;
            padding: 20px;
            padding-bottom: 100px;
        }

        .test-config-card {
            background: linear-gradient(145deg, rgba(20, 20, 20, 0.8), rgba(10, 10, 10, 0.9));
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 32px;
            margin-top: 24px;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            font-size: 13px;
            color: #ccc;
            font-weight: 600;
        }

        .form-select {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            padding: 14px;
            border-radius: 12px;
            margin-bottom: 24px;
            outline: none;
            font-size: 15px;
            transition: 0.3s;
        }

        .form-select:focus {
            border-color: #FFD700;
            background: rgba(0, 0, 0, 0.5);
        }

        .mode-toggle {
            display: flex;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 4px;
            margin-bottom: 24px;
        }

        .mode-btn {
            flex: 1;
            padding: 12px;
            border: none;
            background: transparent;
            color: #888;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }

        .mode-btn.active {
            background: #FFD700;
            color: #000;
            box-shadow: 0 4px 10px rgba(255, 215, 0, 0.2);
        }

        .start-btn {
            background: #FFD700;
            color: #000;
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 12px;
            font-weight: 800;
            font-size: 16px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .start-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.4);
        }

        .premium-lock {
            display: none;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 12px;
            color: #FFD700;
            margin-top: 12px;
        }
    </style>
    <!-- PREMIUM ANIMATION STYLES -->
    <link rel="stylesheet" href="../../assets/css/premium-student-ui.css">
</head>

<body>
    <div class="background-animation">
        <div class="glow-orb orb-3"></div>
    </div>

    <div class="app-container">
        <!-- Header -->
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
            <div>
                <h1 style="font-size: 28px; font-weight: 800; color: #fff; margin: 0;">Take Test</h1>
                <p style="color: #888; font-size: 14px; margin-top: 4px;">Customize your practice session</p>
            </div>
            <div
                style="background: rgba(255, 215, 0, 0.1); padding: 8px 16px; border-radius: 20px; border: 1px solid rgba(255, 215, 0, 0.3);">
                <span style="color: #FFD700; font-weight: 700; font-size: 14px;">PRO ACCESS</span>
            </div>
        </div>

        <div class="test-config-card">
            <!-- Mode Selection -->
            <label class="form-label">TEST MODE</label>
            <div class="mode-toggle">
                <button class="mode-btn active" onclick="setMode('practice')">Practice</button>
                <button class="mode-btn" onclick="setMode('exam')">Exam Sim</button>
                <button class="mode-btn" onclick="setMode('challenge')">Challenge</button>
            </div>

            <label class="form-label">SUBJECT</label>
            <select class="form-select" id="subject">
                <option>Physics</option>
                <option>Chemistry</option>
                <option>Mathematics</option>
                <option>Biology</option>
            </select>

            <label class="form-label">CHAPTER / TOPIC</label>
            <select class="form-select" id="chapter">
                <option value="all">Full Syllabus Mock</option>
                <option value="ch1">Rotational Motion</option>
                <option value="ch2">Thermodynamics</option>
                <option value="ch3">Electrostatics</option>
            </select>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
                <div>
                    <label class="form-label">DIFFICULTY</label>
                    <select class="form-select" id="difficulty">
                        <option>Easy</option>
                        <option selected>Medium</option>
                        <option>Hard</option>
                        <option>Olympiad</option>
                    </select>
                </div>
                <div>
                    <label class="form-label">QUESTIONS</label>
                    <select class="form-select" id="q-count">
                        <option>10</option>
                        <option selected>25</option>
                        <option>50</option>
                        <option>90</option>
                    </select>
                </div>
            </div>

            <!-- Start Button -->
            <button class="start-btn" onclick="startTest()">
                <span>Start Session</span>
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                    <polyline points="12 5 19 12 12 19"></polyline>
                </svg>
            </button>

            <div class="premium-lock" id="lock-msg">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                    <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                </svg>
                <span>Requires Premium Membership</span>
            </div>
        </div>

        <!-- Recent Tests -->
        <div style="margin-top: 32px;">
            <h3
                style="font-size: 14px; font-weight: 700; color: #888; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 16px;">
                Recent Performance</h3>

            <div
                style="background: rgba(255,255,255,0.03); border-radius: 12px; padding: 16px; display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.05);">
                <div style="display: flex; align-items: center; gap: 12px;">
                    <div
                        style="width: 40px; height: 40px; background: rgba(76, 175, 80, 0.1); border-radius: 8px; display: flex; align-items: center; justify-content: center; color: #4CAF50; font-weight: 700;">
                        85%</div>
                    <div>
                        <div style="color: #fff; font-weight: 600;">Physics - Mechanics</div>
                        <div style="color: #666; font-size: 12px;">Yesterday • 25 Questions</div>
                    </div>
                </div>
                <button
                    style="background: transparent; border: 1px solid #333; color: #aaa; padding: 6px 12px; border-radius: 8px; font-size: 12px; cursor: pointer;">Review</button>
            </div>
        </div>
    </div>

    <!-- Navigation -->
    <nav class="nav-bottom">
        <a href="grade-11-12-home.html" class="nav-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                <polyline points="9 22 9 12 15 12 15 22"></polyline>
            </svg>
            <span>Dashboard</span>
        </a>
        <a href="grade-11-12-bank.html" class="nav-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path>
                <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path>
            </svg>
            <span>Bank</span>
        </a>
        <a href="grade-11-12-study.html" class="nav-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path>
                <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path>
            </svg>
            <span>Study</span>
        </a>
        <a href="grade-11-12-take-test.html" class="nav-item active">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                <polyline points="14 2 14 8 20 8"></polyline>
                <line x1="16" y1="13" x2="8" y2="13"></line>
                <line x1="16" y1="17" x2="8" y2="17"></line>
                <polyline points="10 9 9 9 8 9"></polyline>
            </svg>
            <span>Take Test</span>
        </a>
        <a href="grade-11-12-profile.html" class="nav-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                <circle cx="12" cy="7" r="4"></circle>
            </svg>
            <span>Profile</span>
        </a>
    </nav>

    <script src="../../assets/js/grade-11-12-logic.js"></script>
    <script>
        function setMode(mode) {
            document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
        }

        function startTest() {
            const sub = document.getElementById('subject').value;
            const diff = document.getElementById('difficulty').value;

            // Save config to storage for the practice engine
            localStorage.setItem('beeprepare_1112_practice_config', JSON.stringify({
                subject: sub,
                difficulty: diff,
                count: document.getElementById('q-count').value
            }));

            // Redirect to actual test engine
            window.location.href = 'grade-11-12-practice.html';
        }
    </script>
    <script src='../../assets/js/beeprepare-security.js'></script>

    <!-- EXTREME UI SCRIPTS (Animations Only) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.8.0/vanilla-tilt.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Apply 3D Tilt to all interactive elements
            const tiltElements = document.querySelectorAll(".subject-card, .class-card, .timeline-card, .req-card, .bank-card, .history-card, .profile-card, .stat-box, .file-item, .action-card, .subject-mini-card, .document-item, .result-card, .request-card, .auth-card, .d-profile-card, .adv-card, .role-card, .dash-card, .paper-card, .stream-card");
            if(tiltElements.length > 0) {
                try {
                    VanillaTilt.init(tiltElements, {
                        max: 8,
                        speed: 400,
                        glare: true,
                        "max-glare": 0.15,
                        scale: 1.02
                    });
                } catch(e) {}
            }

            // Apply Staggered HUD Load-in
            const hudElements = document.querySelectorAll(".subject-card, .class-card, .timeline-item, .req-card, .bank-card, .history-card, .profile-card, .stat-box, .file-item, .action-card, .subject-mini-card, .document-item, .result-card, .request-card, .d-profile-stats, .d-xp-container, .dash-card, .role-card, .paper-card, .stream-card");
            hudElements.forEach((el, index) => {
                el.classList.add('hud-element');
                el.style.animationDelay = `${index * 0.08}s`;
            });
        });
    </script>
</body>

</html>
