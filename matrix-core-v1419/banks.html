<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Question Banks | BEEPREPARE Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000000;
            --surface: rgba(8, 8, 10, 0.2);
            --surface2: rgba(10, 10, 12, 0.15);
            --gold: #FFD700;
            --gold-dim: rgba(255, 215, 0, 0.15);
            --success: #4CAF50;
            --danger: #ff4444;
            --warning: #FFA500;
            --text: #ffffff;
            --muted: #888888;
            --border: rgba(255, 215, 0, 0.2);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background: transparent;
            color: var(--text);
            padding-top: 130px;
            min-height: 100vh;
        }

        .main-bg {
            position: fixed;
            inset: 0;
            background: #000 url('/assets/images/abstract-bg.png') no-repeat center center fixed;
            background-size: cover;
            z-index: -1;
            filter: brightness(1.0);
        }

        .glass {
            background: var(--surface);
            backdrop-filter: blur(25px);
            border: 1px solid var(--border);
            border-radius: 30px;
            padding: 30px;
            box-shadow: 0 40px 100px rgba(0,0,0,0.6);
        }
        
        header {
            position: fixed; top: 20px; left: 20px; right: 20px; height: 80px;
            background: var(--surface); border: 1px solid var(--border);
            backdrop-filter: blur(25px); border-radius: 20px;
            display: flex; align-items: center; padding: 0 30px; z-index: 1000;
            justify-content: space-between;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        .header-left { display: flex; align-items: center; gap: 20px; }
        .back-btn { 
            width: 40px; height: 40px; display: flex; align-items: center; justify-content: center;
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px; color: var(--gold); text-decoration: none; transition: 0.3s;
        }
        .back-btn:hover { background: var(--gold); color: #000; }
        .header-title { font-weight: 900; color: var(--gold); font-size: 20px; letter-spacing: -0.5px; }
        .header-right { display: flex; align-items: center; gap: 25px; }
        .admin-id { font-size: 13px; color: var(--gold); font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
        .logout-btn { 
            background: rgba(255, 68, 68, 0.1); color: var(--danger); border: 1px solid rgba(255,68,68,0.2); 
            padding: 10px 18px; border-radius: 10px; font-size: 11px; font-weight: 800; cursor: pointer; transition: 0.3s;
        }
        .logout-btn:hover { background: var(--danger); color: #000; }

        .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }
        
        .search-box { margin-bottom: 30px; }
        .search-box input { width: 100%; padding: 12px 16px; background: var(--surface); border: 1px solid #333; border-radius: 8px; color: #fff; outline: none; }
        .search-box input:focus { border-color: var(--gold); }

        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 16px; color: var(--muted); font-size: 11px; text-transform: uppercase; border-bottom: 1px solid #333; }
        td { padding: 16px; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 14px; }
        
        .bank-subject { font-weight: 700; color: var(--gold); }
        .count-badge { background: var(--surface2); padding: 2px 8px; border-radius: 4px; font-size: 11px; color: var(--muted); }
        
        .actions { display: flex; gap: 10px; }
        .btn-act { padding: 6px 12px; border-radius: 4px; font-size: 11px; font-weight: 700; cursor: pointer; border: none; }
        .btn-deact { background: var(--warning); color: #000; }
        .btn-del { background: var(--danger); color: #fff; }
    </style>
</head>
<body>

    <div class="main-bg"></div>
    <header>
        <div class="header-left">
            <a href="index.html" class="back-btn">←</a>
            <span class="header-title">Resource Nodes</span>
        </div>
        <div class="header-right">
            <span class="admin-id" id="adminIdDisplay">Admin Hub</span>
            <button class="logout-btn" onclick="logout()">TERMINATE SESSION</button>
        </div>
    </header>

    <div class="container">
        <div class="search-box">
            <input type="text" placeholder="Filter by subject or teacher..." oninput="handleSearch(this.value)">
        </div>

        <div class="glass" style="padding:0; overflow-x:auto;">
            <table>
                <thead>
                    <tr>
                        <th>Subject</th>
                        <th>Class</th>
                        <th>Teacher</th>
                        <th>Questions</th>
                        <th>Students</th>
                        <th>Created</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="bankTableBody">
                    <!-- Data populated by JS -->
                </tbody>
            </table>
        </div>
    </div>

    <script type="module">
        import { adminApi, showToast, showCodeModal } from './matrix-core.js';

        let searchQuery = '';

        async function fetchBanks() {
            const url = searchQuery ? `/banks?search=${encodeURIComponent(searchQuery)}` : '/banks';
            const res = await adminApi(url);
            if (res && res.success) {
                renderTable(res.data);
            }
        }

        function renderTable(banks) {
            const tbody = document.getElementById('bankTableBody');
            if (!banks || banks.length === 0) {
                tbody.innerHTML = '<tr><td colspan="8" style="text-align:center; padding:100px; color:var(--muted); font-weight:700;">NODE_EMPTY: NO BANKS FOUND</td></tr>';
                return;
            }

            tbody.innerHTML = banks.map(bank => `
                <tr>
                    <td class="bank-subject">${bank.subject}</td>
                    <td><span class="count-badge">${bank.class}</span></td>
                    <td>${bank.teacherName || bank.teacherId?.name || 'SYSTEM_CORE'}</td>
                    <td><span class="count-badge">${bank.questionCount || 0} QUESTS</span></td>
                    <td><span class="count-badge" style="color:var(--gold); border-color:var(--gold);">${bank.studentCount || 0} UNITS</span></td>
                    <td>${new Date(bank.createdAt).toLocaleDateString()}</td>
                    <td><span style="color: ${bank.isActive ? 'var(--success)' : 'var(--danger)'}; font-weight:900;">${bank.isActive ? 'LIVE' : 'HALTED'}</span></td>
                    <td>
                        <div class="actions">
                            <button class="btn-act btn-deact" onclick="deactivateBank('${bank._id}')">HALT</button>
                            <button class="btn-act btn-del" onclick="deleteBank('${bank._id}')">PURGE</button>
                        </div>
                    </td>
                </tr>
            `).join('');
        }

        window.handleSearch = (val) => { searchQuery = val; fetchBanks(); };

        window.deactivateBank = async (id) => {
            const code = await showCodeModal("Deactivate Bank", "This stops new access requests and paper generation for this bank.", false);
            if (code) {
                const res = await adminApi(`/banks/${id}/deactivate`, 'POST', { actionCode: code });
                if (res && res.success) { showToast("Bank deactivated", "success"); fetchBanks(); }
            }
        };

        window.deleteBank = async (id) => {
            const code = await showCodeModal("DELETE BANK", "CRITICAL: This permanently purges all questions, notes, and records for this bank. Action is IRREVERSIBLE.", true);
            if (code) {
                const res = await adminApi(`/banks/${id}`, 'DELETE', { actionCode: code });
                if (res && res.success) { showToast("Bank purged", "success"); fetchBanks(); }
            }
        };

        fetchBanks();
    </script>

</body>
</html>
