<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maintenance | BEEPREPARE Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a1a;
            --surface: #111128;
            --surface2: #1a1a3a;
            --gold: #FFD700;
            --gold-dim: rgba(255,215,0,0.15);
            --success: #4CAF50;
            --danger: #ff4444;
            --warning: #FFA500;
            --text: #ffffff;
            --muted: #888888;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        body { background: transparent; color: var(--text); padding-top: 80px; }

        .glass {
            background: rgba(255,255,255,0.03);
            backdrop-filter: blur(10px);
            border: 1px solid var(--gold-dim);
            border-radius: 12px;
            padding: 24px;
        }

        header {
            position: fixed; top: 0; left: 0; right: 0; height: 70px;
            background: var(--surface); border-bottom: 1px solid var(--gold-dim);
            display: flex; align-items: center; padding: 0 24px; z-index: 1000;
            justify-content: space-between;
        }

        .header-left { display: flex; align-items: center; gap: 20px; }
        .back-btn { 
            cursor: pointer; font-size: 20px; color: var(--gold); 
            text-decoration: none; padding: 5px; 
        }
        .header-title { font-weight: 900; color: var(--gold); letter-spacing: 1px; }

        .header-right { display: flex; align-items: center; gap: 20px; }
        .admin-id { font-size: 12px; color: var(--muted); }
        .logout-btn {
            background: var(--surface2); color: var(--danger);
            border: 1px solid #333; padding: 6px 14px; border-radius: 6px;
            font-size: 11px; font-weight: 700; cursor: pointer;
        }

        .container { max-width: 800px; margin: 0 auto; padding: 20px; }
        h1 { margin-bottom: 30px; font-weight: 900; font-size: 24px; }

        .status-card { display: flex; flex-direction: column; align-items: center; text-align: center; gap: 20px; margin-bottom: 30px; }
        .status-indicator { display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: 18px; }
        .status-dot { width: 12px; height: 12px; border-radius: 50%; }
        .dot-green { background: var(--success); box-shadow: 0 0 15px var(--success); }
        .dot-red { background: var(--danger); box-shadow: 0 0 15px var(--danger); }

        .switch { position: relative; display: inline-block; width: 80px; height: 40px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
            background-color: #222; transition: .4s; border-radius: 40px; border: 1px solid #444;
        }
        .slider:before {
            position: absolute; content: ""; height: 32px; width: 32px; left: 4px; bottom: 3px;
            background-color: white; transition: .4s; border-radius: 50%;
        }
        input:checked + .slider { background-color: var(--danger); border-color: var(--danger); }
        input:checked + .slider:before { transform: translateX(40px); }

        textarea {
            width: 100%; height: 120px; background: transparent; border: 1px solid var(--gold-dim);
            border-radius: 8px; color: #fff; padding: 15px; font-size: 14px; resize: none; margin-top: 10px;
        }
        .preview-box {
            margin-top: 20px; padding: 15px; border-radius: 8px; border: 1px dashed #444;
            font-size: 13px; color: var(--muted);
        }

        .save-btn {
            width: 100%; padding: 14px; background: var(--gold); color: #000;
            border: none; border-radius: 8px; font-weight: 900; cursor: pointer;
            margin-top: 20px; text-transform: uppercase; letter-spacing: 1px;
        }
    </style>
<link rel="stylesheet" href="/assets/css/hover-interactions.css">
</head>
<body>

    <header>
        <div class="header-left">
            <a href="index.html" class="back-btn">←</a>
            <span class="header-title">BEEPREPARE Admin</span>
        </div>
        <div class="header-right">
            <span id="pageTitle" style="color:#fff; font-weight:600; font-size:14px; margin-right:20px;">Maintenance Control</span>
            <span class="admin-id" id="adminIdDisplay">Admin ID</span>
            <button class="logout-btn" onclick="terminateSession()">LOGOUT</button>
        </div>
    </header>

    <div class="container">
        <h1>Maintenance Control</h1>

        <div class="status-card glass">
            <div class="status-indicator">
                Current Status: 
                <span id="status-dot" class="status-dot"></span>
                <span id="status-text">Checking...</span>
            </div>
            <label class="switch">
                <input type="checkbox" id="maint-toggle" onchange="handleMaintToggle(this.checked)">
                <span class="slider"></span>
            </label>
        </div>

        <div class="glass">
            <h3 style="margin-bottom: 10px; font-size: 16px;">Maintenance Message</h3>
            <p style="font-size: 12px; color: var(--muted); margin-bottom: 10px;">What users see during downtime</p>
            <textarea id="maint-msg" oninput="updatePreview(this.value)" placeholder="System is undergoing scheduled maintenance..."></textarea>
            
            <div class="preview-box">
                <strong>Preview:</strong>
                <div id="msg-preview" style="margin-top: 10px;"></div>
            </div>

            <button class="save-btn" onclick="updateMessage()">Update Message Payload</button>
        </div>
    </div>

    <!-- SHARED SCRIPT -->
    <script type="module">
        import { adminApi, showToast, showCodeModal } from './matrix-core.js';

        // Page Logic
        let currentStatus = false;

        async function init() {
            const data = await adminApi('/overview');
            if (data && data.success) {
                currentStatus = data.data.maintenanceMode;
                document.getElementById('maint-toggle').checked = currentStatus;
                
                const settings = await adminApi('/settings');
                if (settings && settings.success) {
                    const msg = settings.data.find(s => s.key === 'maintenance_message')?.value || '';
                    document.getElementById('maint-msg').value = msg;
                    updatePreview(msg);
                }
                
                renderStatus();
            }
        }

        function renderStatus() {
            const dot = document.getElementById('status-dot');
            const text = document.getElementById('status-text');
            if (currentStatus) {
                dot.className = 'status-dot dot-red';
                text.textContent = 'MAINTENANCE ACTIVE';
                text.style.color = 'var(--danger)';
            } else {
                dot.className = 'status-dot dot-green';
                text.textContent = 'SYSTEM LIVE';
                text.style.color = 'var(--success)';
            }
        }

        window.updatePreview = (val) => {
            document.getElementById('msg-preview').textContent = val || 'No message set.';
        };

        window.handleMaintToggle = async (enabled) => {
            const code = await showCodeModal(
                enabled ? 'Activate Maintenance' : 'Deactivate Maintenance',
                `Enter ${enabled ? 'CODE_MAINTENANCE_ON' : 'CODE_MAINTENANCE_OFF'} to confirm.`
            );

            if (!code) {
                document.getElementById('maint-toggle').checked = !enabled;
                return;
            }

            const res = await adminApi('/settings/maintenance', 'POST', {
                actionCode: code,
                enabled: enabled,
                message: document.getElementById('maint-msg').value
            });

            if (res && res.success) {
                currentStatus = enabled;
                renderStatus();
                showToast(`Maintenance mode ${enabled ? 'enabled' : 'disabled'}`, 'success');
            } else {
                document.getElementById('maint-toggle').checked = !enabled;
                showToast(res?.message || 'Failed to toggle', 'error');
            }
        };

        window.updateMessage = async () => {
            const msg = document.getElementById('maint-msg').value;
            const code = await showCodeModal(
                'Update Protocol Message',
                'Enter admin secret code to refresh the maintenance payload.',
                false
            );

            if (!code) return;

            const res = await adminApi('/settings/maintenance', 'POST', {
                actionCode: code,
                enabled: currentStatus,
                message: msg
            });

            if (res && res.success) {
                showToast('Maintenance message updated', 'success');
            } else {
                showToast(res?.message || 'Failed to update message', 'error');
            }
        };

        init();
    </script>

<script src="/assets/js/ripple.js"></script>
</body>
</html>
