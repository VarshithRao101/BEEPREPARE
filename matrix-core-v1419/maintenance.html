<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maintenance | BEEPREPARE Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000000;
            --surface: rgba(8, 8, 10, 0.4);
            --surface2: rgba(15, 15, 20, 0.6);
            --gold: #FFD700;
            --gold-dim: rgba(255,215,0,0.15);
            --success: #4CAF50;
            --danger: #ff4444;
            --warning: #FFA500;
            --text: #ffffff;
            --muted: #888888;
            --border: rgba(255, 215, 0, 0.2);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        
        body { 
            background: #000; 
            color: var(--text); 
            min-height: 100vh;
            overflow-x: hidden;
            padding-top: 100px;
        }

        .main-bg {
            position: fixed;
            inset: 0;
            background: #000 url('/assets/images/abstract-bg.png') no-repeat center center fixed;
            background-size: cover;
            z-index: -1;
            filter: brightness(0.6);
        }

        .glass {
            background: var(--surface);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 40px 100px rgba(0,0,0,0.5);
        }

        header {
            position: fixed; top: 0; left: 0; right: 0; height: 80px;
            background: rgba(0,0,0,0.3); backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            display: flex; align-items: center; padding: 0 40px; z-index: 1000;
            justify-content: space-between;
        }

        .header-left { display: flex; align-items: center; gap: 20px; }
        .back-btn { 
            cursor: pointer; font-size: 24px; color: var(--gold); 
            text-decoration: none; padding: 8px; 
            transition: 0.3s;
        }
        .back-btn:hover { transform: translateX(-5px); }
        
        .header-title { 
            font-weight: 900; 
            color: #fff; 
            letter-spacing: 1px;
            font-size: 20px;
        }
        .header-title span { color: var(--gold); }

        .header-right { display: flex; align-items: center; gap: 24px; }
        .admin-id { 
            font-size: 13px; 
            color: var(--gold); 
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .logout-btn {
            background: rgba(255, 68, 68, 0.1); color: var(--danger);
            border: 1px solid rgba(255, 68, 68, 0.2); padding: 10px 20px; border-radius: 10px;
            font-size: 12px; font-weight: 800; cursor: pointer;
            transition: 0.3s;
        }
        .logout-btn:hover { background: var(--danger); color: #000; }

        .container { max-width: 800px; margin: 0 auto; padding: 20px; position: relative; z-index: 1; }
        
        .page-header { margin-bottom: 40px; }
        .page-header h1 { font-weight: 900; font-size: 32px; letter-spacing: -1px; }
        .page-header p { color: var(--muted); font-size: 15px; margin-top: 5px; }

        .status-card { 
            display: flex; 
            justify-content: space-between;
            align-items: center; 
            margin-bottom: 30px; 
            padding: 40px;
        }
        .status-info { display: flex; flex-direction: column; gap: 5px; }
        .status-label { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 2px; font-weight: 700; }
        .status-indicator { display: flex; align-items: center; gap: 12px; font-weight: 900; font-size: 24px; }
        .status-dot { width: 14px; height: 14px; border-radius: 50%; }
        .dot-green { background: var(--success); box-shadow: 0 0 20px var(--success); }
        .dot-red { background: var(--danger); box-shadow: 0 0 20px var(--danger); }

        .switch { position: relative; display: inline-block; width: 90px; height: 46px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(255,255,255,0.05); transition: .4s; border-radius: 46px; border: 1px solid rgba(255,255,255,0.1);
        }
        .slider:before {
            position: absolute; content: ""; height: 36px; width: 36px; left: 4px; bottom: 4px;
            background-color: #fff; transition: .4s; border-radius: 50%;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        input:checked + .slider { background-color: var(--danger); border-color: var(--danger); }
        input:checked + .slider:before { transform: translateX(44px); }

        .config-card { padding: 40px; }
        .config-card h3 { margin-bottom: 8px; font-size: 18px; font-weight: 800; }
        .config-card p { font-size: 14px; color: var(--muted); margin-bottom: 25px; }

        .textarea-wrapper { position: relative; }
        textarea {
            width: 100%; height: 150px; background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px; color: #fff; padding: 20px; font-size: 15px; resize: none; 
            transition: 0.3s; outline: none;
        }
        textarea:focus { border-color: var(--gold); background: rgba(0,0,0,0.3); }

        .preview-box {
            margin-top: 25px; padding: 20px; border-radius: 16px; 
            background: rgba(255,215,0,0.03); border: 1px dashed rgba(255,215,0,0.2);
        }
        .preview-label { font-size: 11px; color: var(--gold); text-transform: uppercase; font-weight: 800; margin-bottom: 10px; display: block; }
        .preview-content { font-size: 14px; color: #fff; line-height: 1.6; opacity: 0.8; }

        .save-btn {
            width: 100%; padding: 18px; background: var(--gold); color: #000;
            border: none; border-radius: 16px; font-weight: 900; cursor: pointer;
            margin-top: 30px; text-transform: uppercase; letter-spacing: 2px;
            font-size: 14px; transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
        .save-btn:hover { transform: translateY(-3px); box-shadow: 0 20px 40px rgba(255,215,0,0.2); }
        .save-btn:active { transform: scale(0.98); }
    </style>
<link rel="stylesheet" href="/assets/css/hover-interactions.css">
</head>
<body>

    <div class="main-bg"></div>

    <header>
        <div class="header-left">
            <a href="index.html" class="back-btn">←</a>
            <span class="header-title"><span>BEE</span>PREPARE Admin</span>
        </div>
        <div class="header-right">
            <span class="admin-id" id="adminIdDisplay">SYSTEM_ROOT</span>
            <button class="logout-btn" onclick="terminateSession()">TERMINATE SESSION</button>
        </div>
    </header>

    <div class="container">
        <div class="page-header">
            <h1>Maintenance Control</h1>
            <p>Override system availability and customize downtime protocols.</p>
        </div>

        <div class="status-card glass">
            <div class="status-info">
                <span class="status-label">Current Node State</span>
                <div class="status-indicator">
                    <span id="status-dot" class="status-dot"></span>
                    <span id="status-text">SYNCING...</span>
                </div>
            </div>
            <label class="switch">
                <input type="checkbox" id="maint-toggle" onchange="handleMaintToggle(this.checked)">
                <span class="slider"></span>
            </label>
        </div>

        <div class="config-card glass">
            <h3>Communication Payload</h3>
            <p>This message will be broadcasted to all active nodes during downtime.</p>
            
            <div class="textarea-wrapper">
                <textarea id="maint-msg" oninput="updatePreview(this.value)" placeholder="Enter maintenance reason or expected duration..."></textarea>
            </div>
            
            <div class="preview-box">
                <span class="preview-label">Live Preview</span>
                <div id="msg-preview" class="preview-content">No message set.</div>
            </div>

            <button class="save-btn" onclick="updateMessage()">Deploy Message Payload</button>
        </div>
    </div>

    <!-- SHARED SCRIPT -->
    <script type="module">
        import { adminApi, showToast } from './matrix-core.js';

        let currentStatus = false;

        async function init() {
            // Set Admin ID
            document.getElementById('adminIdDisplay').textContent = `SYSTEM_ROOT: ${sessionStorage.getItem('admin_id') || 'ADMIN'}`;

            const data = await adminApi('/overview');
            if (data && data.success) {
                currentStatus = data.data.maintenanceMode;
                document.getElementById('maint-toggle').checked = currentStatus;
                
                const settings = await adminApi('/settings');
                if (settings && settings.success) {
                    const msg = settings.data.find(s => s.key === 'maintenance_message')?.value || '';
                    document.getElementById('maint-msg').value = msg;
                    updatePreview(msg);
                }
                
                renderStatus();
            }
        }

        function renderStatus() {
            const dot = document.getElementById('status-dot');
            const text = document.getElementById('status-text');
            if (currentStatus) {
                dot.className = 'status-dot dot-red';
                text.textContent = 'SYSTEM_OFFLINE';
                text.style.color = 'var(--danger)';
            } else {
                dot.className = 'status-dot dot-green';
                text.textContent = 'SYSTEM_OPERATIONAL';
                text.style.color = 'var(--success)';
            }
        }

        window.updatePreview = (val) => {
            document.getElementById('msg-preview').textContent = val || 'The system is undergoing synchronization. Please stand by.';
        };

        window.handleMaintToggle = async (enabled) => {
            // Removed code modal requirement
            const res = await adminApi('/settings/maintenance', 'POST', {
                enabled: enabled,
                message: document.getElementById('maint-msg').value
            });

            if (res && res.success) {
                currentStatus = enabled;
                renderStatus();
                showToast(`Maintenance mode ${enabled ? 'ACTIVATED' : 'DEACTIVATED'}`, 'success');
            } else {
                document.getElementById('maint-toggle').checked = !enabled;
                showToast(res?.message || 'Protocol failure', 'error');
            }
        };

        window.updateMessage = async () => {
            const msg = document.getElementById('maint-msg').value;
            
            // Removed code modal requirement
            const res = await adminApi('/settings/maintenance', 'POST', {
                enabled: currentStatus,
                message: msg
            });

            if (res && res.success) {
                showToast('Payload updated successfully', 'success');
            } else {
                showToast(res?.message || 'Failed to update payload', 'error');
            }
        };

        window.terminateSession = () => {
            sessionStorage.clear();
            window.location.href = 'index.html';
        };

        init();
    </script>

<script src="/assets/js/ripple.js"></script>
</body>
</html>
