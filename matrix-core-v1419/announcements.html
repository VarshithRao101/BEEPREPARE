<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Announcements | BEEPREPARE Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a1a; --surface: #111128; --surface2: #1a1a3a;
            --gold: #FFD700; --gold-dim: rgba(255,215,0,0.15);
            --success: #4CAF50; --danger: #ff4444; --warning: #FFA500;
            --text: #ffffff; --muted: #888888;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        body { background: transparent; color: var(--text); padding-top: 90px; }

        .glass { background: rgba(255,255,255,0.03); backdrop-filter: blur(10px); border: 1px solid var(--gold-dim); border-radius: 12px; padding: 24px; }
        
        header {
            position: fixed; top: 0; left: 0; right: 0; height: 70px;
            background: var(--surface); border-bottom: 1px solid var(--gold-dim);
            display: flex; align-items: center; padding: 0 24px; z-index: 1000;
            justify-content: space-between;
        }
        .header-left { display: flex; align-items: center; gap: 20px; }
        .back-btn { cursor: pointer; font-size: 20px; color: var(--gold); text-decoration: none; }
        .header-title { font-weight: 900; color: var(--gold); }
        .header-right { display: flex; align-items: center; gap: 20px; }
        .admin-id { font-size: 12px; color: var(--muted); }
        .logout-btn { background: var(--surface2); color: var(--danger); border: 1px solid #333; padding: 6px 14px; border-radius: 6px; font-size: 11px; font-weight: 700; cursor: pointer; }

        .container { max-width: 800px; margin: 0 auto; padding: 0 20px; }
        
        .section-title { font-size: 18px; font-weight: 900; margin-bottom: 20px; color: var(--gold); display: flex; align-items: center; gap: 10px; }
        
        .current-ann { margin-bottom: 40px; border-left: 4px solid var(--success); }
        .ann-text { font-size: 15px; line-height: 1.6; margin-bottom: 15px; }
        .ann-meta { font-size: 12px; color: var(--muted); display: flex; gap: 20px; }
        .remove-btn { background: var(--danger); color: #fff; border: none; padding: 8px 16px; border-radius: 6px; font-weight: 700; cursor: pointer; margin-top: 15px; font-size: 12px; }

        .create-form { display: flex; flex-direction: column; gap: 20px; }
        textarea { width: 100%; height: 120px; background: transparent; border: 1px solid var(--gold-dim); border-radius: 8px; color: #fff; padding: 15px; font-size: 14px; resize: none; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .input-group label { display: block; font-size: 11px; color: var(--muted); text-transform: uppercase; margin-bottom: 8px; }
        select, input[type="date"] { width: 100%; padding: 12px; background: transparent; border: 1px solid #333; border-radius: 8px; color: #fff; outline: none; }
        
        .push-btn { background: var(--gold); color: #000; border: none; padding: 16px; border-radius: 8px; font-weight: 900; cursor: pointer; text-transform: uppercase; letter-spacing: 2px; }
    </style>
<link rel="stylesheet" href="/assets/css/hover-interactions.css">
</head>
<body>

    <header>
        <div class="header-left">
            <a href="index.html" class="back-btn">←</a>
            <span class="header-title">System Broadcaster</span>
        </div>
        <div class="header-right">
            <span class="admin-id" id="adminIdDisplay">Admin ID</span>
            <button class="logout-btn" onclick="terminateSession()">LOGOUT</button>
        </div>
    </header>

    <div class="container">
        <h2 class="section-title">Active Announcement</h2>
        <div id="currentAnnContainer">
            <!-- Populated by JS -->
        </div>

        <h2 class="section-title">Push New Message</h2>
        <div class="glass create-form">
            <textarea id="annText" placeholder="Write announcement message here..."></textarea>
            
            <div class="form-row">
                <div class="input-group">
                    <label>Target Audience</label>
                    <select id="annTarget">
                        <option value="all">All Users</option>
                        <option value="teacher">Teachers Only</option>
                        <option value="student">Students Only</option>
                    </select>
                </div>
                <div class="input-group">
                    <label>Expiry Date (Optional)</label>
                    <input type="date" id="annExpiry">
                </div>
            </div>

            <button class="push-btn" onclick="pushAnnouncement()">Push Global Announcement</button>
        </div>
    </div>

    <script type="module">
        import { adminApi, showToast, showCodeModal } from './matrix-core.js';

        async function fetchCurrent() {
            const res = await adminApi('/overview');
            const container = document.getElementById('currentAnnContainer');
            if (res && res.success && res.data.activeAnnouncement) {
                const a = res.data.activeAnnouncement;
                container.innerHTML = `
                    <div class="glass current-ann">
                        <p class="ann-text">${a.text}</p>
                        <div class="ann-meta">
                            <span>Target: <strong style="color:var(--gold); text-transform:uppercase;">${a.target}</strong></span>
                            <span>Created: ${new Date(a.createdAt).toLocaleDateString()}</span>
                            ${a.expiresAt ? `<span>Expires: ${new Date(a.expiresAt).toLocaleDateString()}</span>` : ''}
                        </div>
                        <button class="remove-btn" onclick="removeAnnouncement()">Stop Broadcast</button>
                    </div>
                `;
            } else {
                container.innerHTML = '<div class="glass" style="text-align:center; color:var(--muted); margin-bottom:40px;">No active system announcements.</div>';
            }
        }

        window.pushAnnouncement = async () => {
            const text = document.getElementById('annText').value.trim();
            const target = document.getElementById('annTarget').value;
            const expiry = document.getElementById('annExpiry').value;

            if (!text) return showToast("Enter message text", "warning");

            const code = await showCodeModal("Push Announcement", "Enter action code to push global announcement:", false);
            if (!code) return;

            const res = await adminApi('/settings/announcement', 'POST', {
                text, target, expiresAt: expiry || null, actionCode: code
            });

            if (res && res.success) {
                showToast("Announcement pushed live!", "success");
                document.getElementById('annText').value = '';
                fetchCurrent();
            }
        };

        window.removeAnnouncement = async () => {
            const res = await adminApi('/settings/announcement', 'DELETE');
            if (res && res.success) {
                showToast("Broadcast stopped", "info");
                fetchCurrent();
            }
        };

        fetchCurrent();
    </script>

<script src="/assets/js/ripple.js"></script>
</body>
</html>
