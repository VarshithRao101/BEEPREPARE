<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback | BEEPREPARE Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a1a; --surface: #111128; --surface2: #1a1a3a;
            --gold: #FFD700; --gold-dim: rgba(255,215,0,0.15);
            --success: #4CAF50; --danger: #ff4444; --warning: #FFA500;
            --text: #ffffff; --muted: #888888;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        body { background: transparent; color: var(--text); padding-top: 90px; }

        .glass { background: rgba(255,255,255,0.03); backdrop-filter: blur(10px); border: 1px solid var(--gold-dim); border-radius: 12px; padding: 24px; }
        
        header {
            position: fixed; top: 0; left: 0; right: 0; height: 70px;
            background: var(--surface); border-bottom: 1px solid var(--gold-dim);
            display: flex; align-items: center; padding: 0 24px; z-index: 1000;
            justify-content: space-between;
        }
        .header-left { display: flex; align-items: center; gap: 20px; }
        .back-btn { cursor: pointer; font-size: 20px; color: var(--gold); text-decoration: none; }
        .header-title { font-weight: 900; color: var(--gold); }
        .header-right { display: flex; align-items: center; gap: 20px; }
        .admin-id { font-size: 12px; color: var(--muted); }
        .logout-btn { background: var(--surface2); color: var(--danger); border: 1px solid #333; padding: 6px 14px; border-radius: 6px; font-size: 11px; font-weight: 700; cursor: pointer; }

        .container { max-width: 1000px; margin: 0 auto; padding: 0 20px; }
        
        .filter-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
        .tabs { display: flex; gap: 8px; flex-wrap: wrap; }
        .tab { padding: 8px 16px; border-radius: 6px; background: var(--surface2); color: var(--muted); cursor: pointer; font-size: 12px; font-weight: 600; }
        .tab.active { background: var(--gold-dim); color: var(--gold); }

        .feedback-grid { display: flex; flex-direction: column; gap: 20px; margin-bottom: 50px; }
        .feedback-card { position: relative; border-left: 4px solid var(--gold-dim); transition: 0.3s; }
        .feedback-card:hover { border-left-color: var(--gold); transform: translateX(5px); }
        
        .fb-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 16px; }
        .fb-user { display: flex; align-items: center; gap: 12px; }
        .fb-user .e { font-weight: 600; font-size: 14px; }
        .fb-user .r { font-size: 10px; padding: 2px 6px; background: rgba(0,0,0,0.3); border-radius: 4px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
        
        .fb-type { font-size: 10px; font-weight: 900; padding: 4px 10px; border-radius: 20px; text-transform: uppercase; }
        .type-bug { background: rgba(255, 68, 68, 0.1); color: var(--danger); }
        .type-feature { background: rgba(76, 175, 80, 0.1); color: var(--success); }
        .type-rating { background: rgba(255, 215, 0, 0.1); color: var(--gold); }
        .type-content { background: rgba(136, 136, 136, 0.1); color: var(--muted); }

        .fb-message { font-size: 14px; line-height: 1.6; color: #eee; margin-bottom: 20px; }
        
        .fb-footer { display: flex; justify-content: space-between; align-items: center; padding-top: 15px; border-top: 1px solid rgba(255,255,255,0.05); }
        .fb-date { font-size: 11px; color: var(--muted); }
        .fb-actions { display: flex; gap: 12px; }
        .fb-btn { padding: 6px 14px; border-radius: 6px; font-size: 11px; font-weight: 700; cursor: pointer; border: none; transition: 0.3s; }
        .fb-btn-review { background: var(--surface2); color: var(--gold); }
        .fb-btn-delete { background: rgba(255, 68, 68, 0.1); color: var(--danger); }
        .fb-btn:hover { filter: brightness(0.75); }

        .stars { color: var(--gold); letter-spacing: 2px; }
    </style>
</head>
<body>

    <header>
        <div class="header-left">
            <a href="index.html" class="back-btn">←</a>
            <span class="header-title">Feedback Center</span>
        </div>
        <div class="header-right">
            <span class="admin-id" id="adminIdDisplay">Admin ID</span>
            <button class="logout-btn" onclick="logout()">LOGOUT</button>
        </div>
    </header>

    <div class="container">
        <div class="filter-row">
            <div class="tabs">
                <div class="tab active" onclick="filterType('all', this)">All</div>
                <div class="tab" onclick="filterType('bug', this)">Bugs</div>
                <div class="tab" onclick="filterType('feature', this)">Features</div>
                <div class="tab" onclick="filterType('rating', this)">Ratings</div>
                <div class="tab" onclick="filterType('content', this)">Content</div>
            </div>
        </div>

        <div class="feedback-grid" id="feedbackContainer">
            <!-- Cards populated by JS -->
        </div>
    </div>

    <script type="module">
        import { adminApi, showToast, showCodeModal } from './matrix-core.js';

        let currentType = 'all';

        async function fetchFeedback() {
            const url = currentType === 'all' ? '/feedback' : `/feedback?type=${currentType}`;
            const res = await adminApi(url);
            if (res && res.success) {
                renderFeedback(res.data);
            }
        }

        function renderFeedback(feedbacks) {
            const container = document.getElementById('feedbackContainer');
            if (feedbacks.length === 0) {
                container.innerHTML = '<div class="glass" style="text-align:center; padding:40px; color:var(--muted);">No feedback items found.</div>';
                return;
            }
            container.innerHTML = feedbacks.map(f => {
                const stars = '★'.repeat(f.rating || 0) + '☆'.repeat(5 - (f.rating || 0));
                return `
                    <div class="glass feedback-card">
                        <div class="fb-header">
                            <div class="fb-user">
                                <span class="e">${f.userEmail || f.email || 'Anonymous'}</span>
                                <span class="r">${f.userRole || 'User'}</span>
                            </div>
                            <span class="fb-type type-${f.type || 'content'}">${f.type || 'Feedback'}</span>
                        </div>
                        <div class="fb-message">
                            ${f.type === 'rating' ? `<div class="stars" style="margin-bottom:10px;">${stars}</div>` : ''}
                            ${f.message}
                        </div>
                        <div class="fb-footer">
                            <span class="fb-date">${new Date(f.createdAt).toLocaleString()}</span>
                            <div class="fb-actions">
                                <button class="fb-btn fb-btn-review" onclick="markReviewed('${f._id}')">Mark Reviewed</button>
                                <button class="fb-btn fb-btn-delete" onclick="deleteFeedback('${f._id}')">Delete</button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        window.filterType = (t, el) => {
            document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
            el.classList.add('active');
            currentType = t;
            fetchFeedback();
        };

        window.markReviewed = async (id) => {
            const code = await showCodeModal("Mark Reviewed", "Archive this feedback as reviewed. Needs admin code.", false);
            if (code) {
                const res = await adminApi(`/feedback/${id}/mark-reviewed`, 'POST', { actionCode: code });
                if (res && res.success) { showToast("Feedback archived", "success"); fetchFeedback(); }
            }
        };

        window.deleteFeedback = async (id) => {
            const code = await showCodeModal("Delete Feedback", "Permanently remove this entry. This cannot be undone.", true);
            if (code) {
                const res = await adminApi(`/feedback/${id}`, 'DELETE', { actionCode: code });
                if (res && res.success) { showToast("Feedback deleted", "success"); fetchFeedback(); }
            }
        };

        fetchFeedback();
    </script>

</body>
</html>
