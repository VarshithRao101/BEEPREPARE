<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback | BEEPREPARE Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000000;
            --surface: rgba(8, 8, 10, 0.3);
            --surface2: rgba(10, 10, 12, 0.2);
            --gold: #FFD700;
            --gold-dim: rgba(255, 215, 0, 0.15);
            --success: #4CAF50;
            --danger: #ff4444;
            --warning: #FFA500;
            --text: #ffffff;
            --muted: #888888;
            --border: rgba(255, 215, 0, 0.2);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        
        body { 
            background: transparent; 
            color: var(--text); 
            padding-top: 130px; 
            min-height: 100vh;
            overflow-x: hidden;
        }

        .main-bg {
            position: fixed; inset: 0;
            background: #000 url('/assets/images/abstract-bg.png') no-repeat center center fixed;
            background-size: cover; z-index: -1;
            filter: brightness(1.0);
        }

        .glass { 
            background: var(--surface); 
            backdrop-filter: blur(25px); 
            border: 1px solid var(--border); 
            border-radius: 25px; 
            padding: 30px;
            box-shadow: 0 40px 100px rgba(0,0,0,0.6);
        }
        
        header {
            position: fixed; top: 20px; left: 20px; right: 20px; height: 80px;
            background: var(--surface); border: 1px solid var(--border);
            backdrop-filter: blur(25px); border-radius: 20px;
            display: flex; align-items: center; padding: 0 30px; z-index: 1000;
            justify-content: space-between;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .header-left { display: flex; align-items: center; gap: 20px; }
        .back-btn { 
            width: 40px; height: 40px; display: flex; align-items: center; justify-content: center;
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px; color: var(--gold); text-decoration: none; transition: 0.3s;
        }
        .back-btn:hover { background: var(--gold); color: #000; }
        .header-title { font-weight: 900; color: var(--gold); font-size: 20px; letter-spacing: -0.5px; }

        .container { max-width: 1000px; margin: 0 auto; padding: 0 20px; }
        
        .filter-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .tabs { display: flex; gap: 10px; flex-wrap: wrap; }
        .tab { 
            padding: 10px 20px; border-radius: 12px; background: rgba(255,255,255,0.05); 
            color: var(--muted); cursor: pointer; font-size: 12px; font-weight: 800;
            border: 1px solid rgba(255,255,255,0.05); transition: 0.3s;
            text-transform: uppercase; letter-spacing: 1px;
        }
        .tab.active { background: var(--gold-dim); color: var(--gold); border-color: var(--gold); }

        .feedback-grid { display: flex; flex-direction: column; gap: 25px; margin-bottom: 80px; }
        .feedback-card { 
            position: relative; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            background: rgba(255,255,255,0.02);
        }
        .feedback-card:hover { transform: translateX(10px); background: rgba(255,255,255,0.04); }
        
        .fb-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px; }
        .fb-user { display: flex; align-items: center; gap: 15px; }
        .fb-user .e { font-weight: 800; font-size: 15px; color: var(--gold); }
        .fb-user .r { 
            font-size: 10px; padding: 4px 10px; background: rgba(0,0,0,0.3); 
            border-radius: 6px; color: var(--muted); text-transform: uppercase; 
            letter-spacing: 1.5px; font-weight: 900; border: 1px solid rgba(255,255,255,0.05);
        }
        
        .fb-type { 
            font-size: 10px; font-weight: 900; padding: 5px 12px; border-radius: 20px; 
            text-transform: uppercase; letter-spacing: 1px;
        }
        .type-bug { background: rgba(255, 68, 68, 0.1); color: var(--danger); border: 1px solid rgba(255,68,68,0.2); }
        .type-feature { background: rgba(76, 175, 80, 0.1); color: var(--success); border: 1px solid rgba(76,175,80,0.2); }
        .type-rating { background: rgba(255, 215, 0, 0.1); color: var(--gold); border: 1px solid rgba(255,215,0,0.2); }
        .type-content { background: rgba(255,255,255,0.05); color: var(--muted); border: 1px solid rgba(255,255,255,0.1); }

        .fb-message { 
            font-size: 15px; line-height: 1.7; color: #eee; margin-bottom: 25px; 
            background: rgba(0,0,0,0.2); padding: 20px; border-radius: 15px;
        }
        
        .fb-footer { 
            display: flex; justify-content: space-between; align-items: center; 
            padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.05); 
        }
        .fb-date { font-size: 11px; color: var(--muted); font-weight: 600; text-transform: uppercase; }
        .fb-actions { display: flex; gap: 15px; }
        .fb-btn { 
            padding: 10px 20px; border-radius: 10px; font-size: 11px; font-weight: 900; 
            cursor: pointer; border: none; transition: 0.3s; text-transform: uppercase; letter-spacing: 1px;
        }
        .fb-btn-review { background: rgba(255,255,255,0.05); color: var(--gold); border: 1px solid rgba(255,215,0,0.2); }
        .fb-btn-delete { background: rgba(255, 68, 68, 0.1); color: var(--danger); border: 1px solid rgba(255,68,68,0.2); }
        .fb-btn:hover { filter: brightness(1.3); transform: translateY(-2px); }

        .stars { color: var(--gold); letter-spacing: 4px; font-size: 18px; }
    </style>
<link rel="stylesheet" href="/assets/css/hover-interactions.css">
</head>
<body>

    <div class="main-bg"></div>
    <header>
        <div class="header-left">
            <a href="index.html" class="back-btn">←</a>
            <span class="header-title">Neural Feedback Cluster</span>
        </div>
        <div class="header-right">
            <span id="adminIdDisplay" style="font-size: 13px; color: var(--gold); font-weight: 700; text-transform: uppercase; letter-spacing: 1px;">Admin Hub</span>
            <button class="logout-btn" style="background: rgba(255, 68, 68, 0.1); color: var(--danger); border: 1px solid rgba(255,68,68,0.2); padding: 10px 18px; border-radius: 10px; font-size: 11px; font-weight: 800; cursor: pointer; transition: 0.3s;" onclick="terminateSession()">TERMINATE</button>
        </div>
    </header>

    <div class="container">
        <div class="filter-row">
            <div class="tabs">
                <div class="tab active" onclick="filterType('all', this)">All</div>
                <div class="tab" onclick="filterType('bug', this)">Bugs</div>
                <div class="tab" onclick="filterType('feature', this)">Features</div>
                <div class="tab" onclick="filterType('rating', this)">Ratings</div>
                <div class="tab" onclick="filterType('content', this)">Content</div>
            </div>
        </div>

        <div class="feedback-grid" id="feedbackContainer">
            <!-- Cards populated by JS -->
        </div>
    </div>

    <script type="module">
        import { adminApi, showToast, showCodeModal } from './matrix-core.js';

        let currentType = 'all';

        async function fetchFeedback() {
            const url = currentType === 'all' ? '/feedback' : `/feedback?type=${currentType}`;
            const res = await adminApi(url);
            if (res && res.success) {
                renderFeedback(res.data);
            }
        }

        function renderFeedback(feedbacks) {
            const container = document.getElementById('feedbackContainer');
            if (feedbacks.length === 0) {
                container.innerHTML = '<div class="glass" style="text-align:center; padding:40px; color:var(--muted);">No feedback items found.</div>';
                return;
            }
            container.innerHTML = feedbacks.map(f => {
                const stars = '★'.repeat(f.rating || 0) + '☆'.repeat(5 - (f.rating || 0));
                return `
                    <div class="glass feedback-card">
                        <div class="fb-header">
                            <div class="fb-user">
                                <span class="e">${f.userEmail || f.email || 'Anonymous'}</span>
                                <span class="r">${f.userRole || 'User'}</span>
                            </div>
                            <span class="fb-type type-${f.type || 'content'}">${f.type || 'Feedback'}</span>
                        </div>
                        <div class="fb-message">
                            ${f.type === 'rating' ? `<div class="stars" style="margin-bottom:10px;">${stars}</div>` : ''}
                            ${f.message}
                        </div>
                        <div class="fb-footer">
                            <span class="fb-date">${new Date(f.createdAt).toLocaleString()}</span>
                            <div class="fb-actions">
                                <button class="fb-btn fb-btn-review" onclick="markReviewed('${f._id}')">Mark Reviewed</button>
                                <button class="fb-btn fb-btn-delete" onclick="deleteFeedback('${f._id}')">Delete</button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        window.filterType = (t, el) => {
            document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
            el.classList.add('active');
            currentType = t;
            fetchFeedback();
        };

        window.markReviewed = async (id) => {
            const code = await showCodeModal("Mark Reviewed", "Archive this feedback as reviewed. Needs admin code.", false);
            if (code) {
                const res = await adminApi(`/feedback/${id}/mark-reviewed`, 'POST', { actionCode: code });
                if (res && res.success) { showToast("Feedback archived", "success"); fetchFeedback(); }
            }
        };

        window.deleteFeedback = async (id) => {
            const code = await showCodeModal("Delete Feedback", "Permanently remove this entry. This cannot be undone.", true);
            if (code) {
                const res = await adminApi(`/feedback/${id}`, 'DELETE', { actionCode: code });
                if (res && res.success) { showToast("Feedback deleted", "success"); fetchFeedback(); }
            }
        };

        fetchFeedback();
    </script>

<script src="/assets/js/ripple.js"></script>
</body>
</html>
