<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Logs | BEEPREPARE Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000000;
            --surface: rgba(8, 8, 10, 0.3);
            --surface2: rgba(10, 10, 12, 0.2);
            --gold: #FFD700;
            --gold-dim: rgba(255, 215, 0, 0.15);
            --success: #4CAF50;
            --danger: #ff4444;
            --warning: #FFA500;
            --text: #ffffff;
            --muted: #888888;
            --border: rgba(255, 215, 0, 0.2);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        
        body { 
            background: transparent; 
            color: var(--text); 
            padding-top: 130px; 
            min-height: 100vh;
            overflow-x: hidden;
        }

        .main-bg {
            position: fixed; inset: 0;
            background: #000 url('/assets/images/abstract-bg.png') no-repeat center center fixed;
            background-size: cover; z-index: -1;
            filter: brightness(1.0);
        }

        .glass { 
            background: var(--surface); 
            backdrop-filter: blur(25px); 
            border: 1px solid var(--border); 
            border-radius: 25px; 
            padding: 30px;
            box-shadow: 0 40px 100px rgba(0,0,0,0.6);
        }
        
        header {
            position: fixed; top: 20px; left: 20px; right: 20px; height: 80px;
            background: var(--surface); border: 1px solid var(--border);
            backdrop-filter: blur(25px); border-radius: 20px;
            display: flex; align-items: center; padding: 0 30px; z-index: 1000;
            justify-content: space-between;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .header-left { display: flex; align-items: center; gap: 20px; }
        .back-btn { 
            width: 40px; height: 40px; display: flex; align-items: center; justify-content: center;
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px; color: var(--gold); text-decoration: none; transition: 0.3s;
        }
        .back-btn:hover { background: var(--gold); color: #000; }
        .header-title { font-weight: 900; color: var(--gold); font-size: 20px; letter-spacing: -0.5px; }

        .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; height: calc(100vh - 150px); display: flex; flex-direction: column; }
        
        .controls { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; gap: 20px; }
        .filter-group { display: flex; gap: 10px; }
        .log-btn { 
            padding: 10px 20px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); 
            color: var(--text); border-radius: 10px; cursor: pointer; font-size: 11px; 
            font-weight: 800; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s;
        }
        .log-btn.active { background: var(--gold-dim); color: var(--gold); border-color: var(--gold); }
        .log-btn:hover:not(.active) { background: rgba(255,255,255,0.1); }
        
        .log-viewer {
            flex: 1; background: rgba(0,0,0,0.4); border: 1px solid var(--border); border-radius: 20px;
            padding: 30px; overflow-y: auto; font-family: 'Fira Code', monospace; font-size: 13px; line-height: 1.6;
            box-shadow: inset 0 0 50px rgba(0,0,0,0.5); backdrop-filter: blur(10px);
        }
        .log-line { margin-bottom: 6px; white-space: pre-wrap; padding: 5px 10px; border-radius: 6px; }
        .log-line:hover { background: rgba(255,255,255,0.02); }
        .level-ERROR { color: var(--danger); font-weight: 800; }
        .level-WARN { color: var(--warning); font-weight: 800; }
        .level-INFO { color: #64B5F6; font-weight: 800; }
        .level-TIME { color: var(--muted); margin-right: 12px; font-weight: 500; font-size: 11px; }
        
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
    </style>
<link rel="stylesheet" href="/assets/css/hover-interactions.css">
</head>
<body>

    <div class="main-bg"></div>
    <header>
        <div class="header-left">
            <a href="index.html" class="back-btn">←</a>
            <span class="header-title">Core Event Stream</span>
        </div>
        <div class="header-right">
            <span id="adminIdDisplay" style="font-size: 13px; color: var(--gold); font-weight: 700; text-transform: uppercase; letter-spacing: 1px;">Admin Hub</span>
            <button class="logout-btn" style="background: rgba(255, 68, 68, 0.1); color: var(--danger); border: 1px solid rgba(255,68,68,0.2); padding: 10px 18px; border-radius: 10px; font-size: 11px; font-weight: 800; cursor: pointer; transition: 0.3s;" onclick="terminateSession()">TERMINATE</button>
        </div>
    </header>

    <div class="container">
        <div class="controls">
            <div class="filter-group">
                <button class="log-btn active" onclick="filterLogs('all', this)">All Logs</button>
                <button class="log-btn" onclick="filterLogs('error', this)">Errors</button>
                <button class="log-btn" onclick="filterLogs('warn', this)">Warnings</button>
            </div>
            <div class="filter-group">
                <button class="log-btn" style="background:#222;" onclick="fetchLogs()">Refresh Logs</button>
                <button class="log-btn" style="background:var(--danger); border:none; color:#fff;" onclick="clearLogs()">Purge All Logs</button>
                <button class="log-btn" style="background:var(--success); border:none; color:#000;" onclick="exportLogs()">Download .txt</button>
            </div>
        </div>

        <div class="log-viewer" id="logViewer">
            <div style="color:#555; text-align:center; margin-top:100px;">Connecting to system log stream...</div>
        </div>
    </div>

    <script type="module">
        import { adminApi, showToast, showCodeModal } from './matrix-core.js';

        let currentFilter = 'all';

        async function fetchLogs() {
            const url = `/logs?limit=200&level=${currentFilter}`;
            const res = await adminApi(url);
            if (res && res.success) {
                renderLogs(res.data);
            }
        }

        function renderLogs(lines) {
            const viewer = document.getElementById('logViewer');
            if (lines.length === 0) {
                viewer.innerHTML = '<div style="color:#555; text-align:center; margin-top:100px;">Log terminal is empty.</div>';
                return;
            }
            
            viewer.innerHTML = lines.map(line => {
                let level = 'INFO';
                if (line.includes('error') || line.includes('ERROR')) level = 'ERROR';
                if (line.includes('warn') || line.includes('WARN')) level = 'WARN';
                
                // Try to extract time [2026-04-16T...]
                const timeMatch = line.match(/\[(.*?)\]/);
                const time = timeMatch ? timeMatch[0] : '';
                const rest = line.replace(time, '').trim();
                
                return `<div class="log-line"><span class="level-TIME">${time}</span><span class="level-${level}">${level}</span> ${rest}</div>`;
            }).join('');
            
            viewer.scrollTop = viewer.scrollHeight;
        }

        window.filterLogs = (f, el) => {
            document.querySelectorAll('.filter-group .log-btn').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
            currentFilter = f;
            fetchLogs();
        };

        window.clearLogs = async () => {
            const code = await showCodeModal("Clear System Logs", "THIS DELETES ALL LOG HISTORY. Enter CODE_CLEAR_LOGS.", true);
            if (code) {
                const res = await adminApi('/logs', 'DELETE', { actionCode: code });
                if (res && res.success) { showToast("Logs cleared", "success"); fetchLogs(); }
            }
        };

        window.exportLogs = () => {
            const content = document.getElementById('logViewer').innerText;
            const blob = new Blob([content], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `beeprepare_logs_${new Date().getTime()}.txt`;
            a.click();
        };

        fetchLogs();
    </script>

<script src="/assets/js/ripple.js"></script>
</body>
</html>
