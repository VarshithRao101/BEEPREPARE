<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Settings | BEEPREPARE Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000000;
            --surface: rgba(8, 8, 10, 0.3);
            --surface2: rgba(10, 10, 12, 0.2);
            --gold: #FFD700;
            --gold-dim: rgba(255, 215, 0, 0.15);
            --success: #4CAF50;
            --danger: #ff4444;
            --warning: #FFA500;
            --text: #ffffff;
            --muted: #888888;
            --border: rgba(255, 215, 0, 0.2);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        
        body { 
            background: transparent; 
            color: var(--text); 
            padding-top: 130px; 
            min-height: 100vh;
            overflow-x: hidden;
        }

        .main-bg {
            position: fixed; inset: 0;
            background: #000 url('/assets/images/abstract-bg.png') no-repeat center center fixed;
            background-size: cover; z-index: -1;
            filter: brightness(1.0);
        }

        .glass { 
            background: var(--surface); 
            backdrop-filter: blur(25px); 
            border: 1px solid var(--border); 
            border-radius: 30px; 
            padding: 35px;
            box-shadow: 0 40px 100px rgba(0,0,0,0.6);
        }
        
        header {
            position: fixed; top: 20px; left: 20px; right: 20px; height: 80px;
            background: var(--surface); border: 1px solid var(--border);
            backdrop-filter: blur(25px); border-radius: 20px;
            display: flex; align-items: center; padding: 0 30px; z-index: 1000;
            justify-content: space-between;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .header-left { display: flex; align-items: center; gap: 20px; }
        .back-btn { 
            width: 40px; height: 40px; display: flex; align-items: center; justify-content: center;
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px; color: var(--gold); text-decoration: none; transition: 0.3s;
        }
        .back-btn:hover { background: var(--gold); color: #000; }
        .header-title { font-weight: 900; color: var(--gold); font-size: 20px; letter-spacing: -0.5px; }

        .container { max-width: 900px; margin: 0 auto; padding: 0 20px 60px; }
        
        .settings-grid { display: flex; flex-direction: column; gap: 20px; margin-bottom: 50px; }
        .setting-card { 
            display: flex; justify-content: space-between; align-items: center; gap: 20px; 
            background: rgba(255,255,255,0.02); transition: 0.3s;
        }
        .setting-card:hover { background: rgba(255,255,255,0.04); transform: translateX(5px); }

        .setting-info { flex: 1; }
        .setting-key { font-family: 'Fira Code', monospace; color: var(--gold); font-size: 12px; font-weight: 700; text-transform: uppercase; margin-bottom: 8px; letter-spacing: 1px; }
        .setting-desc { font-size: 15px; color: #eee; font-weight: 600; }
        
        .setting-action { display: flex; gap: 15px; width: 350px; }
        input { 
            flex: 1; padding: 12px 18px; background: rgba(0,0,0,0.3); 
            border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; 
            color: #fff; font-size: 14px; outline: none; transition: 0.3s;
        }
        input:focus { border-color: var(--gold); background: rgba(0,0,0,0.5); }
        
        .update-btn { 
            padding: 12px 20px; background: var(--gold-dim); color: var(--gold); 
            border: 1px solid var(--border); border-radius: 10px; font-weight: 900; 
            cursor: pointer; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s;
        }
        .update-btn:hover { background: var(--gold); color: #000; }
        
        .refresh-btn { 
            background: rgba(255,255,255,0.05); color: #fff; border: 1px solid rgba(255,255,255,0.1); 
            padding: 12px 24px; border-radius: 12px; font-weight: 800; cursor: pointer; 
            transition: 0.3s; text-transform: uppercase; letter-spacing: 1px; font-size: 12px;
        }
        .refresh-btn:hover { background: var(--gold-dim); color: var(--gold); border-color: var(--gold); }
    </style>
<link rel="stylesheet" href="/assets/css/hover-interactions.css">
</head>
<body>

    <div class="main-bg"></div>
    <header>
        <div class="header-left">
            <a href="index.html" class="back-btn">←</a>
            <span class="header-title">System Registry Control</span>
        </div>
        <div class="header-right">
            <span id="adminIdDisplay" style="font-size: 13px; color: var(--gold); font-weight: 700; text-transform: uppercase; letter-spacing: 1px;">Admin Hub</span>
            <button class="logout-btn" style="background: rgba(255, 68, 68, 0.1); color: var(--danger); border: 1px solid rgba(255,68,68,0.2); padding: 10px 18px; border-radius: 10px; font-size: 11px; font-weight: 800; cursor: pointer; transition: 0.3s;" onclick="terminateSession()">TERMINATE</button>
        </div>
    </header>

    <div class="container">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <p style="color: var(--muted); font-size: 13px; font-weight: 600;">PLATFORM RUNTIME CONSTANTS</p>
            <button class="refresh-btn" onclick="fetchSettings()">Refresh Registry</button>
        </div>

        <div class="settings-grid" id="settingsContainer">
            <!-- Populated by JS -->
            <div style="color: #444; text-align: center; padding: 50px;">Polling system registry...</div>
        </div>
    </div>

    <script type="module">
        import { adminApi, showToast, showCodeModal } from './matrix-core.js';

        async function fetchSettings() {
            const res = await adminApi('/settings');
            if (res && res.success) {
                renderSettings(res.data);
            }
        }

        const friendlyNames = {
            'maintenance_mode': 'Maintenance Lockout',
            'maintenance_message': 'Downtime Notification Payload',
            'firestore_reads_today': 'Daily Firestore Consumption',
            'global_announcement': 'Active Broadcast Content',
            'admin_secret_code': 'Root Authorization Key',
            'service_fee_percent': 'Platform Service Commission'
        };

        const sensitiveKeys = ['service_fee_percent', 'admin_secret_code'];

        function renderSettings(list) {
            const container = document.getElementById('settingsContainer');
            if (list.length === 0) {
                container.innerHTML = '<div class="glass" style="text-align:center; padding:40px;">No registry entries found.</div>';
                return;
            }

            container.innerHTML = list
                .filter(s => !sensitiveKeys.includes(s.key))
                .map(s => `
                <div class="glass setting-card">
                    <div class="setting-info">
                        <div class="setting-key">${s.key}</div>
                        <div class="setting-desc">${friendlyNames[s.key] || 'System Parameter'}</div>
                    </div>
                    <div class="setting-action">
                        <input type="text" value="${s.value}" id="input-${s.key}">
                        <button class="update-btn" onclick="updateSetting('${s.key}')">COMMIT</button>
                    </div>
                </div>
            `).join('');
        }

        window.updateSetting = async (key) => {
            const val = document.getElementById(`input-${key}`).value;
            const code = await showCodeModal(
                "Modify Registry", 
                `Deploy change to ${key}? THIS AFFECTS ALL NODES. Master Code required.`, 
                false
            );

            if (!code) return;

            let res = null;

            // Route to the correct backend endpoint based on the key
            if (key === 'maintenance_mode' || key === 'maintenance_message') {
                const enabled = key === 'maintenance_mode' 
                    ? (val === 'true' || val === '1') 
                    : undefined;
                const body = { actionCode: code };
                if (key === 'maintenance_mode') body.enabled = enabled;
                if (key === 'maintenance_message') {
                    // Need current maintenance state — get it from toggle or default false
                    const overviewData = await adminApi('/overview');
                    body.enabled = overviewData?.data?.maintenanceMode ?? false;
                    body.message = val;
                }
                res = await adminApi('/settings/maintenance', 'POST', body);
            } else if (key.startsWith('announcement')) {
                showToast('Use the Announcements page to modify broadcast settings.', 'info');
                return;
            } else {
                showToast(`Setting "${key}" cannot be modified directly from this panel.`, 'warning');
                return;
            }

            if (res && res.success) {
                showToast("Registry updated successfully", "success");
                fetchSettings();
            } else {
                showToast(res?.message || "Modification failed", "error");
            }
        };

        fetchSettings();
    </script>
<script src="/assets/js/ripple.js"></script>
</body>
</html>
