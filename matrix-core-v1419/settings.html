<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Settings | BEEPREPARE Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a1a; --surface: #111128; --surface2: #1a1a3a;
            --gold: #FFD700; --gold-dim: rgba(255,215,0,0.15);
            --success: #4CAF50; --danger: #ff4444; --warning: #FFA500;
            --text: #ffffff; --muted: #888888;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        body { 
            background: transparent; color: var(--text); padding-top: 90px;
            background: url('/assets/images/abstract-bg.png') no-repeat center center fixed;
            background-size: cover;
        }
        body::before { content: ''; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: -1; }

        .glass { background: rgba(255,255,255,0.03); backdrop-filter: blur(10px); border: 1px solid var(--gold-dim); border-radius: 12px; padding: 24px; }
        
        header {
            position: fixed; top: 0; left: 0; right: 0; height: 70px;
            background: var(--surface); border-bottom: 1px solid var(--gold-dim);
            display: flex; align-items: center; padding: 0 24px; z-index: 1000;
            justify-content: space-between;
        }
        .header-left { display: flex; align-items: center; gap: 20px; }
        .back-btn { cursor: pointer; font-size: 20px; color: var(--gold); text-decoration: none; }
        .header-title { font-weight: 900; color: var(--gold); }
        .header-right { display: flex; align-items: center; gap: 20px; }
        .admin-id { font-size: 12px; color: var(--muted); }
        .logout-btn { background: var(--surface2); color: var(--danger); border: 1px solid #333; padding: 6px 14px; border-radius: 6px; font-size: 11px; font-weight: 700; cursor: pointer; }

        .container { max-width: 900px; margin: 0 auto; padding: 0 20px; }
        
        .settings-grid { display: flex; flex-direction: column; gap: 20px; margin-bottom: 50px; }
        .setting-card { display: flex; justify-content: space-between; align-items: center; gap: 20px; }
        .setting-info { flex: 1; }
        .setting-key { font-family: monospace; color: var(--gold); font-size: 13px; font-weight: 700; text-transform: uppercase; margin-bottom: 4px; }
        .setting-desc { font-size: 14px; color: #ccc; }
        
        .setting-action { display: flex; gap: 10px; width: 300px; }
        input { flex: 1; padding: 10px 15px; background: rgba(0,0,0,0.3); border: 1px solid #333; border-radius: 8px; color: #fff; font-size: 14px; outline: none; }
        input:focus { border-color: var(--gold); }
        .update-btn { padding: 10px 15px; background: var(--gold); color: #000; border: none; border-radius: 8px; font-weight: 900; cursor: pointer; font-size: 12px; }
        
        .refresh-btn { background: var(--surface2); color: #fff; border: 1px solid #333; padding: 10px 20px; border-radius: 8px; font-weight: 700; cursor: pointer; margin-bottom: 20px; }
    </style>
<link rel="stylesheet" href="/assets/css/hover-interactions.css">
</head>
<body>

    <header>
        <div class="header-left">
            <a href="index.html" class="back-btn">←</a>
            <span class="header-title">System Configuration</span>
        </div>
        <div class="header-right">
            <span class="admin-id" id="adminIdDisplay">Admin ID</span>
            <button class="logout-btn" onclick="terminateSession()">LOGOUT</button>
        </div>
    </header>

    <div class="container">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <p style="color: var(--muted); font-size: 13px; font-weight: 600;">PLATFORM RUNTIME CONSTANTS</p>
            <button class="refresh-btn" onclick="fetchSettings()">Refresh Registry</button>
        </div>

        <div class="settings-grid" id="settingsContainer">
            <!-- Populated by JS -->
            <div style="color: #444; text-align: center; padding: 50px;">Polling system registry...</div>
        </div>
    </div>

    <script type="module">
        import { adminApi, showToast, showCodeModal } from './matrix-core.js';

        async function fetchSettings() {
            const res = await adminApi('/settings');
            if (res && res.success) {
                renderSettings(res.data);
            }
        }

        const friendlyNames = {
            'maintenance_mode': 'Maintenance Lockout',
            'maintenance_message': 'Downtime Notification Payload',
            'firestore_reads_today': 'Daily Firestore Consumption',
            'global_announcement': 'Active Broadcast Content',
            'admin_secret_code': 'Root Authorization Key',
            'service_fee_percent': 'Platform Service Commission'
        };

        const sensitiveKeys = ['service_fee_percent', 'admin_secret_code'];

        function renderSettings(list) {
            const container = document.getElementById('settingsContainer');
            if (list.length === 0) {
                container.innerHTML = '<div class="glass" style="text-align:center; padding:40px;">No registry entries found.</div>';
                return;
            }

            container.innerHTML = list
                .filter(s => !sensitiveKeys.includes(s.key))
                .map(s => `
                <div class="glass setting-card">
                    <div class="setting-info">
                        <div class="setting-key">${s.key}</div>
                        <div class="setting-desc">${friendlyNames[s.key] || 'System Parameter'}</div>
                    </div>
                    <div class="setting-action">
                        <input type="text" value="${s.value}" id="input-${s.key}">
                        <button class="update-btn" onclick="updateSetting('${s.key}')">COMMIT</button>
                    </div>
                </div>
            `).join('');
        }

        window.updateSetting = async (key) => {
            const val = document.getElementById(`input-${key}`).value;
            const code = await showCodeModal(
                "Modify Registry", 
                `Deploy change to ${key}? THIS AFFECTS ALL NODES. Master Code required.`, 
                false
            );

            if (!code) return;

            let res = null;

            // Route to the correct backend endpoint based on the key
            if (key === 'maintenance_mode' || key === 'maintenance_message') {
                const enabled = key === 'maintenance_mode' 
                    ? (val === 'true' || val === '1') 
                    : undefined;
                const body = { actionCode: code };
                if (key === 'maintenance_mode') body.enabled = enabled;
                if (key === 'maintenance_message') {
                    // Need current maintenance state — get it from toggle or default false
                    const overviewData = await adminApi('/overview');
                    body.enabled = overviewData?.data?.maintenanceMode ?? false;
                    body.message = val;
                }
                res = await adminApi('/settings/maintenance', 'POST', body);
            } else if (key.startsWith('announcement')) {
                showToast('Use the Announcements page to modify broadcast settings.', 'info');
                return;
            } else {
                showToast(`Setting "${key}" cannot be modified directly from this panel.`, 'warning');
                return;
            }

            if (res && res.success) {
                showToast("Registry updated successfully", "success");
                fetchSettings();
            } else {
                showToast(res?.message || "Modification failed", "error");
            }
        };

        fetchSettings();
    </script>
<script src="/assets/js/ripple.js"></script>
</body>
</html>
