<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Block List | BEEPREPARE Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000000;
            --surface: rgba(8, 8, 10, 0.3);
            --surface2: rgba(10, 10, 12, 0.2);
            --gold: #FFD700;
            --gold-dim: rgba(255, 215, 0, 0.15);
            --success: #4CAF50;
            --danger: #ff4444;
            --warning: #FFA500;
            --text: #ffffff;
            --muted: #888888;
            --border: rgba(255, 215, 0, 0.2);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        
        body { 
            background: transparent; 
            color: var(--text); 
            padding-top: 130px; 
            min-height: 100vh;
            overflow-x: hidden;
        }

        .main-bg {
            position: fixed; inset: 0;
            background: #000 url('/assets/images/abstract-bg.png') no-repeat center center fixed;
            background-size: cover; z-index: -1;
            filter: brightness(1.0);
        }

        .glass { 
            background: var(--surface); 
            backdrop-filter: blur(25px); 
            border: 1px solid var(--border); 
            border-radius: 30px; 
            padding: 35px;
            box-shadow: 0 40px 100px rgba(0,0,0,0.6);
        }
        
        header {
            position: fixed; top: 20px; left: 20px; right: 20px; height: 80px;
            background: var(--surface); border: 1px solid var(--border);
            backdrop-filter: blur(25px); border-radius: 20px;
            display: flex; align-items: center; padding: 0 30px; z-index: 1000;
            justify-content: space-between;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .header-left { display: flex; align-items: center; gap: 20px; }
        .back-btn { 
            width: 40px; height: 40px; display: flex; align-items: center; justify-content: center;
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px; color: var(--gold); text-decoration: none; transition: 0.3s;
        }
        .back-btn:hover { background: var(--gold); color: #000; }
        .header-title { font-weight: 900; color: var(--gold); font-size: 20px; letter-spacing: -0.5px; }

        .container { max-width: 1000px; margin: 0 auto; padding: 0 20px 60px; }
        
        .add-card { 
            margin-bottom: 40px; display: grid; grid-template-columns: 2fr 2fr 1fr; gap: 20px; align-items: end; 
            background: rgba(255, 68, 68, 0.05); border-color: rgba(255, 68, 68, 0.2);
        }
        .input-group label { display: block; font-size: 11px; color: var(--muted); text-transform: uppercase; margin-bottom: 12px; font-weight: 800; letter-spacing: 1px; }
        input { 
            width: 100%; padding: 14px 18px; background: rgba(0,0,0,0.3); 
            border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; 
            color: #fff; outline: none; transition: 0.3s; font-size: 14px;
        }
        input:focus { border-color: var(--danger); background: rgba(0,0,0,0.5); }
        
        .btn-add { 
            background: var(--danger); color: #fff; border: none; padding: 14px; 
            border-radius: 12px; font-weight: 900; cursor: pointer; 
            text-transform: uppercase; letter-spacing: 1px; transition: 0.3s;
        }
        .btn-add:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(255,68,68,0.2); }

        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 20px; color: var(--muted); font-size: 11px; text-transform: uppercase; border-bottom: 1px solid rgba(255,255,255,0.1); letter-spacing: 1px; }
        td { padding: 20px; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 14px; }
        
        .btn-remove { 
            background: none; border: 1px solid rgba(76, 175, 80, 0.3); color: var(--success); 
            padding: 6px 14px; border-radius: 8px; cursor: pointer; font-size: 11px; 
            font-weight: 800; text-transform: uppercase; transition: 0.3s;
        }
        .btn-remove:hover { background: var(--success); color: #000; }
    </style>
<link rel="stylesheet" href="/assets/css/hover-interactions.css">
</head>
<body>

    <div class="main-bg"></div>
    <header>
        <div class="header-left">
            <a href="index.html" class="back-btn">←</a>
            <span class="header-title">Identity Quarantine Hub</span>
        </div>
        <div class="header-right">
            <span id="adminIdDisplay" style="font-size: 13px; color: var(--gold); font-weight: 700; text-transform: uppercase; letter-spacing: 1px;">Admin Hub</span>
            <button class="logout-btn" style="background: rgba(255, 68, 68, 0.1); color: var(--danger); border: 1px solid rgba(255,68,68,0.2); padding: 10px 18px; border-radius: 10px; font-size: 11px; font-weight: 800; cursor: pointer; transition: 0.3s;" onclick="terminateSession()">TERMINATE</button>
        </div>
    </header>

    <div class="container">
        <h2 style="font-size:18px; font-weight:900; color:var(--danger); margin-bottom:20px;">Blacklist Identity</h2>
        <div class="glass add-card">
            <div class="input-group">
                <label>Target Email</label>
                <input type="email" id="blockEmail" placeholder="user@example.com">
            </div>
            <div class="input-group">
                <label>Reason for Block</label>
                <input type="text" id="blockReason" placeholder="Fraudulent activity...">
            </div>
            <button class="btn-add" onclick="addToBlocklist()">COMMIT BLOCK</button>
        </div>

        <div class="glass" style="padding:0; overflow-x:auto;">
            <table>
                <thead>
                    <tr>
                        <th>Identity Email</th>
                        <th>Reason</th>
                        <th>Added By</th>
                        <th>Date</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="blockTableBody">
                    <!-- Data populated by JS -->
                </tbody>
            </table>
        </div>
    </div>

    <script type="module">
        import { adminApi, showToast, showCodeModal } from './matrix-core.js';

        async function fetchBlocklist() {
            const res = await adminApi('/blacklist');
            if (res && res.success) {
                renderTable(res.data);
            }
        }



        function renderTable(list) {
            const tbody = document.getElementById('blockTableBody');
            if (list.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" style="text-align:center; padding:40px; color:var(--muted);">Block list is currently empty.</td></tr>';
                return;
            }
            tbody.innerHTML = list.map(item => `
                <tr>
                    <td style="font-weight:600;">${item.email}</td>
                    <td style="color:var(--muted); font-size:12px;">${item.reason || 'No reason specified'}</td>
                    <td style="font-size:12px;">${item.blockedBy || 'System'}</td>
                    <td style="font-size:12px; color:var(--muted);">${new Date(item.createdAt).toLocaleDateString()}</td>
                    <td>
                        <button class="btn-remove" onclick="removeFromBlocklist('${item.email}')">Lift Block</button>
                    </td>
                </tr>
            `).join('');
        }

        window.addToBlocklist = async () => {
            const email = document.getElementById('blockEmail').value.trim();
            const reason = document.getElementById('blockReason').value.trim();
            if (!email) return showToast("Email required", "warning");

            const code = await showCodeModal("COMMIT HARD BLOCK", "This identity will be immediately purged and banned from the platform.", true);
            if (code) {
                const res = await adminApi('/blacklist', 'POST', { email, reason, actionCode: code });
                if (res && res.success) {
                    showToast("Identity purged.", "success");
                    document.getElementById('blockEmail').value = '';
                    document.getElementById('blockReason').value = '';
                    fetchBlocklist();
                } else showToast(res?.message || "Block failed", "error");
            }
        };

        window.removeFromBlocklist = async (email) => {
            const code = await showCodeModal("Lift Block", "Allow access for this identity again?", false);
            if (code) {
                const res = await adminApi('/blacklist', 'DELETE', { email, actionCode: code });
                if (res && res.success) {
                    showToast("Block lifted", "success");
                    fetchBlocklist();
                }
            }
        };

        fetchBlocklist();
    </script>

<script src="/assets/js/ripple.js"></script>
</body>
</html>
