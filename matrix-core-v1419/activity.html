<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Activity Feed | BEEPREPARE Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000000;
            --surface: rgba(8, 8, 10, 0.3);
            --surface2: rgba(10, 10, 12, 0.2);
            --gold: #FFD700;
            --gold-dim: rgba(255, 215, 0, 0.15);
            --success: #4CAF50;
            --danger: #ff4444;
            --warning: #FFA500;
            --text: #ffffff;
            --muted: #888888;
            --border: rgba(255, 215, 0, 0.2);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        
        body { 
            background: transparent; 
            color: var(--text); 
            padding-top: 130px; 
            min-height: 100vh;
            overflow-x: hidden;
        }

        .main-bg {
            position: fixed; inset: 0;
            background: #000 url('/assets/images/abstract-bg.png') no-repeat center center fixed;
            background-size: cover; z-index: -1;
            filter: brightness(1.0);
        }

        .glass { 
            background: var(--surface); 
            backdrop-filter: blur(25px); 
            border: 1px solid var(--border); 
            border-radius: 25px; 
            padding: 30px;
            box-shadow: 0 40px 100px rgba(0,0,0,0.6);
        }
        
        header {
            position: fixed; top: 20px; left: 20px; right: 20px; height: 80px;
            background: var(--surface); border: 1px solid var(--border);
            backdrop-filter: blur(25px); border-radius: 20px;
            display: flex; align-items: center; padding: 0 30px; z-index: 1000;
            justify-content: space-between;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .header-left { display: flex; align-items: center; gap: 20px; }
        .back-btn { 
            width: 40px; height: 40px; display: flex; align-items: center; justify-content: center;
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px; color: var(--gold); text-decoration: none; transition: 0.3s;
        }
        .back-btn:hover { background: var(--gold); color: #000; }
        .header-title { font-weight: 900; color: var(--gold); font-size: 20px; letter-spacing: -0.5px; }

        .container { max-width: 900px; margin: 0 auto; padding: 0 20px 50px; }
        
        .timeline { position: relative; padding-left: 30px; border-left: 2px solid var(--border); margin-top: 40px; }
        .activity-item { 
            position: relative; margin-bottom: 30px; transform-origin: left; 
            animation: slideIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            background: rgba(255,255,255,0.02); transition: 0.3s;
        }
        .activity-item:hover { transform: translateX(5px); background: rgba(255,255,255,0.04); }

        .activity-dot { 
            position: absolute; left: -41px; top: 25px; width: 18px; height: 18px; 
            border-radius: 50%; border: 4px solid #000; z-index: 10; 
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
        }
        
        .type-question_added { background: #FFD700; box-shadow: 0 0 15px rgba(255,215,0,0.4); }
        .type-paper_generated { background: #2196F3; box-shadow: 0 0 15px rgba(33,150,243,0.4); }
        .type-student_approved { background: #4CAF50; box-shadow: 0 0 15px rgba(76,175,80,0.4); }
        .type-test_completed { background: #9C27B0; box-shadow: 0 0 15px rgba(156,39,176,0.4); }
        .type-doubt_replied { background: #FFA500; box-shadow: 0 0 15px rgba(255,165,0,0.4); }
        .type-bank_joined { background: #009688; box-shadow: 0 0 15px rgba(0,150,136,0.4); }
        .type-default { background: #888; }

        .act-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .act-title { font-weight: 800; font-size: 15px; }
        .act-time { font-size: 11px; color: var(--muted); font-weight: 700; text-transform: uppercase; }
        .act-desc { font-size: 14px; color: #eee; line-height: 1.5; background: rgba(0,0,0,0.2); padding: 15px; border-radius: 12px; }

        .role-badge { 
            font-size: 10px; font-weight: 900; text-transform: uppercase; 
            padding: 3px 8px; border-radius: 6px; margin-right: 10px;
            letter-spacing: 1px; border: 1px solid rgba(255,255,255,0.1);
        }
        .role-teacher { background: var(--gold-dim); color: var(--gold); border-color: var(--gold); }
        .role-student { background: rgba(33,150,243,0.1); color: #2196F3; border-color: #2196F3; }
        .role-unknown { background: rgba(255,255,255,0.05); color: var(--muted); }

        @keyframes slideIn { from { opacity:0; transform: translateX(-20px); } to { opacity:1; transform: translateX(0); } }
    </style>
<link rel="stylesheet" href="/assets/css/hover-interactions.css">
</head>
<body>

    <div class="main-bg"></div>
    <header>
        <div class="header-left">
            <a href="index.html" class="back-btn">←</a>
            <span class="header-title">Neural Activity Link</span>
        </div>
        <div class="header-right">
            <span id="adminIdDisplay" style="font-size: 13px; color: var(--gold); font-weight: 700; text-transform: uppercase; letter-spacing: 1px;">Admin Hub</span>
            <button class="logout-btn" style="background: rgba(255, 68, 68, 0.1); color: var(--danger); border: 1px solid rgba(255,68,68,0.2); padding: 10px 18px; border-radius: 10px; font-size: 11px; font-weight: 800; cursor: pointer; transition: 0.3s;" onclick="terminateSession()">TERMINATE</button>
        </div>
    </header>

    <div class="container">
        <div class="timeline" id="activityTimeline">
            <!-- Items populated by JS -->
            <div style="color:#555; text-align:center; padding-top:100px;">Synchronizing with BEE activity stream...</div>
        </div>
    </div>

    <script type="module">
        import { adminApi, showToast } from './matrix-core.js';

        async function fetchActivity() {
            const res = await adminApi('/activity?limit=50');
            if (res && res.success) {
                renderActivity(res.data);
            }
        }

        function renderActivity(list) {
            const container = document.getElementById('activityTimeline');
            if (list.length === 0) {
                container.innerHTML = '<div style="color:#555; text-align:center; padding-top:100px;">No platform activity recorded yet.</div>';
                return;
            }
            container.innerHTML = list.map(item => `
                <div class="glass activity-item">
                    <div class="activity-dot type-${item.type || 'default'}"></div>
                    <div class="act-header">
                        <span class="act-title">
                            <span class="role-badge role-${item.userRole}">${item.userRole}</span>
                            <span style="color:var(--gold)">${item.userEmail}</span> 
                            <span style="color:var(--muted); font-size:12px; margin-left:8px;">${(item.type || 'Action').replace(/_/g, ' ')}</span>
                        </span>
                        <span class="act-time">${timeAgo(new Date(item.createdAt))}</span>
                    </div>
                    <p class="act-desc"><b>${item.title || ''}</b> ${item.description || ''}</p>
                </div>
            `).join('');
        }

        function timeAgo(date) {
            const seconds = Math.floor((new Date() - date) / 1000);
            let interval = seconds / 31536000;
            if (interval > 1) return Math.floor(interval) + " years ago";
            interval = seconds / 2592000;
            if (interval > 1) return Math.floor(interval) + " months ago";
            interval = seconds / 86400;
            if (interval > 1) return Math.floor(interval) + " days ago";
            interval = seconds / 3600;
            if (interval > 1) return Math.floor(interval) + " hours ago";
            interval = seconds / 60;
            if (interval > 1) return Math.floor(interval) + " minutes ago";
            return Math.floor(seconds) + " seconds ago";
        }

        setInterval(fetchActivity, 60000);
        fetchActivity();
    </script>
<script src="/assets/js/ripple.js"></script>
</body>
</html>
