<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payments | BEEPREPARE Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000000;
            --surface: rgba(8, 8, 10, 0.2);
            --surface2: rgba(10, 10, 12, 0.15);
            --gold: #FFD700;
            --gold-dim: rgba(255, 215, 0, 0.15);
            --success: #4CAF50;
            --danger: #ff4444;
            --warning: #FFA500;
            --text: #ffffff;
            --muted: #888888;
            --border: rgba(255, 215, 0, 0.2);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background: transparent;
            color: var(--text);
            padding-top: 130px;
            min-height: 100vh;
        }

        .main-bg {
            position: fixed;
            inset: 0;
            background: #000 url('/assets/images/abstract-bg.png') no-repeat center center fixed;
            background-size: cover;
            z-index: -1;
            filter: brightness(1.0);
        }

        .glass {
            background: var(--surface);
            backdrop-filter: blur(25px);
            border: 1px solid var(--border);
            border-radius: 30px;
            padding: 30px;
            box-shadow: 0 40px 100px rgba(0,0,0,0.6);
        }
        
        header {
            position: fixed; top: 20px; left: 20px; right: 20px; height: 80px;
            background: var(--surface); border: 1px solid var(--border);
            backdrop-filter: blur(25px); border-radius: 20px;
            display: flex; align-items: center; padding: 0 30px; z-index: 1000;
            justify-content: space-between;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        .header-left { display: flex; align-items: center; gap: 20px; }
        .back-btn { 
            width: 40px; height: 40px; display: flex; align-items: center; justify-content: center;
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px; color: var(--gold); text-decoration: none; transition: 0.3s;
        }
        .back-btn:hover { background: var(--gold); color: #000; }
        .header-title { font-weight: 900; color: var(--gold); font-size: 20px; letter-spacing: -0.5px; }
        .header-right { display: flex; align-items: center; gap: 25px; }
        .admin-id { font-size: 13px; color: var(--gold); font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
        .logout-btn { 
            background: rgba(255, 68, 68, 0.1); color: var(--danger); border: 1px solid rgba(255,68,68,0.2); 
            padding: 10px 18px; border-radius: 10px; font-size: 11px; font-weight: 800; cursor: pointer; transition: 0.3s;
        }
        .logout-btn:hover { background: var(--danger); color: #000; }

        .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }
        
        .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px; }
        .stat-card { text-align: center; }
        .stat-card .val { font-size: 32px; font-weight: 900; display: block; }
        .stat-card .lbl { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }

        .filter-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
        .tabs { display: flex; gap: 10px; }
        .tab { padding: 10px 20px; border-radius: 8px; background: var(--surface2); border: 1px solid #333; color: var(--muted); cursor: pointer; font-weight: 600; font-size: 13px; }
        .tab.active { background: var(--gold-dim); color: var(--gold); border-color: var(--gold); }

        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 16px; color: var(--muted); font-size: 12px; text-transform: uppercase; border-bottom: 1px solid #333; }
        td { padding: 16px; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 14px; }

        .amount { font-weight: 900; color: var(--gold); }
        .utr { font-family: monospace; background: rgba(0,0,0,0.3); padding: 4px 8px; border-radius: 4px; font-size: 12px; }
        
        .status-pill { padding: 4px 10px; border-radius: 4px; font-size: 11px; font-weight: 800; text-transform: uppercase; }
        .status-pending { background: rgba(255, 165, 0, 0.1); color: var(--warning); }
        .status-approved { background: rgba(76, 175, 80, 0.1); color: var(--success); }
        .status-rejected { background: rgba(255, 68, 68, 0.1); color: var(--danger); }

        .actions { display: flex; gap: 8px; }
        .btn-approve { background: var(--success); color: #000; border: none; padding: 6px 12px; border-radius: 6px; font-weight: 700; cursor: pointer; font-size: 12px; }
        .btn-reject { background: var(--danger); color: #fff; border: none; padding: 6px 12px; border-radius: 6px; font-weight: 700; cursor: pointer; font-size: 12px; }
        
        .row-approved { background: rgba(76, 175, 80, 0.03); }
        .row-rejected { background: rgba(255, 68, 68, 0.03); }
    </style>
</head>
<body>

    <div class="main-bg"></div>
    <header>
        <div class="header-left">
            <a href="index.html" class="back-btn">←</a>
            <span class="header-title"><span style="color: #FFD700;">BEE</span><span style="color: #e0e0e0;">PREPARE</span> Payment Vault</span>
        </div>
        <div class="header-right">
            <span class="admin-id" id="adminIdDisplay">Admin Hub</span>
            <button class="logout-btn" onclick="logout()">TERMINATE SESSION</button>
        </div>
    </header>

    <div class="container">
        <div class="stats-row">
            <div class="stat-card glass">
                <span class="val" id="stat-pending" style="color:var(--warning);">0</span>
                <span class="lbl">Pending Requests</span>
            </div>
            <div class="stat-card glass">
                <span class="val" id="stat-approved" style="color:var(--success);">0</span>
                <span class="lbl">Approved Today</span>
            </div>
            <div class="stat-card glass">
                <span class="val" id="stat-revenue" style="color:var(--gold);">₹0</span>
                <span class="lbl">Total Revenue</span>
            </div>
        </div>

        <div class="filter-row">
            <div class="tabs">
                <div class="tab active" onclick="filterStatus('all', this)">All</div>
                <div class="tab" onclick="filterStatus('pending', this)">Pending</div>
                <div class="tab" onclick="filterStatus('approved', this)">Approved</div>
                <div class="tab" onclick="filterStatus('rejected', this)">Rejected</div>
            </div>
        </div>

        <div class="glass" style="padding: 0; overflow-x: auto;">
            <table>
                <thead>
                    <tr>
                        <th>User Email</th>
                        <th>UTR Number</th>
                        <th>Type</th>
                        <th>Amount</th>
                        <th>Submitted</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="paymentTableBody">
                    <!-- Rows populated by JS -->
                </tbody>
            </table>
        </div>
    </div>

    <script type="module">
        import { adminApi, showToast, showCodeModal } from './matrix-core.js';

        let currentStatus = 'all';

        async function fetchPayments() {
            const url = currentStatus === 'all' ? '/payments' : `/payments?status=${currentStatus}`;
            const res = await adminApi(url);
            if (res && res.success) {
                renderTable(res.data.payments);
            }
            
            const statsRes = await adminApi('/payments/stats');
            if (statsRes && statsRes.success) {
                const s = statsRes.data;
                document.getElementById('stat-pending').textContent = s.pendingCount;
                document.getElementById('stat-approved').textContent = s.approvedCount;
                document.getElementById('stat-revenue').textContent = `₹${s.totalRevenue}`;
            }
        }

        function renderTable(payments) {
            const tbody = document.getElementById('paymentTableBody');
            if (payments.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" style="text-align:center; padding: 40px; color: var(--muted);">No payment requests found.</td></tr>';
                return;
            }
            tbody.innerHTML = payments.map(p => `
                <tr class="row-${p.status}" id="row-${p._id}">
                    <td>${p.email}</td>
                    <td><span class="utr">${p.utrNumber}</span></td>
                    <td style="text-transform:capitalize;">${p.paymentType}</td>
                    <td><span class="amount">₹${p.amount}</span></td>
                    <td style="font-size:12px; color:var(--muted);">${new Date(p.createdAt).toLocaleString()}</td>
                    <td><span class="status-pill status-${p.status}">${p.status}</span></td>
                    <td class="actions">
                        ${p.status === 'pending' ? `
                            <button class="btn-approve" onclick="approvePayment('${p._id.toString()}')">Approve</button>
                            <button class="btn-reject" onclick="rejectPayment('${p._id.toString()}')">Reject</button>
                        ` : ''}
                        <button class="btn-reject" style="background:#444;" onclick="deletePayment('${p._id.toString()}')">Delete</button>
                    </td>
                </tr>
            `).join('');
        }

        window.filterStatus = (status, el) => {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
            currentStatus = status;
            fetchPayments();
        };

        window.deletePayment = async (id) => {
            const confirmed = confirm("Are you sure you want to permanently delete this payment request?");
            if (!confirmed) return;
            const code = await showCodeModal("Delete Payment", "Enter CODE_DELETE_PAYMENT.", true);
            if (code) {
                const res = await adminApi(`/payments/${id}`, 'DELETE', { actionCode: code });
                if (res && res.success) {
                    showToast("Payment request deleted", "success");
                    fetchPayments();
                } else showToast(res?.message || "Delete failed", "error");
            }
        };

        window.approvePayment = async (id) => {
            const code = await showCodeModal("Approve Payment", "Verify UTR with bank statement. Enter CODE_APPROVE_PAYMENT.", false);
            if (code) {
                const res = await adminApi(`/payments/${id}/approve`, 'POST', { actionCode: code });
                if (res && res.success) {
                    showToast("Payment approved! Key sent.", "success");
                    fetchPayments();
                } else showToast(res?.message || "Approve failed", "error");
            }
        };

        window.rejectPayment = async (id) => {
            const reason = prompt("Enter rejection reason:");
            if (!reason) return;
            const code = await showCodeModal("Reject Payment", "This will notify user via email. Enter CODE_REJECT_PAYMENT.", true);
            if (code) {
                const res = await adminApi(`/payments/${id}/reject`, 'POST', { actionCode: code, reason });
                if (res && res.success) {
                    showToast("Payment rejected.", "success");
                    fetchPayments();
                } else showToast(res?.message || "Reject failed", "error");
            }
        };

        fetchPayments();
    </script>

</body>
</html>
