<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bank Inventory - BEEPREPARE</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../assets/css/student-theme.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        .section-divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 35px 0 15px 0;
        }

        .divider-line {
            height: 2px;
            flex: 1;
            background: linear-gradient(90deg, var(--border), transparent);
            border-radius: 2px;
        }

        .section-label {
            font-size: 11px;
            font-weight: 800;
            color: var(--primary);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* Hero - Match Teacher Header Styles but for Inventory */
        .inventory-hero {
            background: rgba(18, 18, 18, 0.8);
            border: 1px solid var(--border);
            border-radius: 30px;
            padding: 40px;
            text-align: center;
            margin-bottom: 40px;
            backdrop-filter: blur(25px);
        }

        .inventory-title {
            font-size: 28px;
            font-weight: 800;
            color: #fff;
            margin-bottom: 10px;
        }

        .search-box {
            max-width: 500px;
            margin: 20px auto 0;
            display: flex;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--border);
            border-radius: 15px;
            padding: 5px;
            transition: 0.3s;
        }

        .search-input { 
            flex: 1; 
            background: none; 
            border: none; 
            color: #fff; 
            font-size: 14px; 
            outline: none; 
            padding: 12px 15px; 
            font-weight: 600; 
        }

        .search-btn { 
            width: 44px; 
            height: 44px; 
            background: var(--primary); 
            border: none; 
            border-radius: 12px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            cursor: pointer; 
            color: #000; 
        }

        /* Bank Cards - Match Teacher Subject Cards */
        .banks-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .bank-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid transparent;
            border-radius: 24px;
            padding: 24px;
            cursor: pointer;
            transition: 0.3s;
            position: relative;
        }

        .bank-card:hover {
            background: rgba(255, 215, 0, 0.05);
            border-color: var(--primary);
            transform: translateY(-5px);
        }

        .bank-icon-box {
            width: 50px;
            height: 50px;
            border-radius: 14px;
            background: rgba(255, 215, 0, 0.05);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 15px;
            border: 1px solid var(--border);
        }

        .bank-name { font-size: 18px; font-weight: 800; color: #fff; margin-bottom: 4px; }
        .bank-meta { font-size: 11px; color: var(--text-muted); font-weight: 700; text-transform: uppercase; }

        .bank-status {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .status-pill {
            font-size: 9px;
            font-weight: 900;
            padding: 5px 10px;
            border-radius: 6px;
            text-transform: uppercase;
        }

        /* Detail View Styles */
        .chapter-node {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            border-radius: 24px;
            margin-bottom: 20px;
            overflow: hidden;
        }

        .chapter-node-header {
            padding: 15px 20px;
            background: rgba(255, 255, 255, 0.02);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            align-items: center;
            justify-content: space-between;
            /* Premium Notes Architecture (Synced from Notebook Hub) */
            --primary-glow: rgba(255, 215, 0, 0.15);
            --card-bg: rgba(15, 15, 15, 0.7);
        }

        .chapter-node {
            background: rgba(15, 15, 15, 0.6);
            backdrop-filter: blur(30px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 25px;
            margin-bottom: 25px;
            position: relative;
            overflow: hidden;
            animation: slideIn 0.5s ease-out;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .chapter-title-row {
            font-size: 18px;
            font-weight: 900;
            color: #fff;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            letter-spacing: -0.5px;
        }

        .chapter-indicator {
            width: 5px;
            height: 24px;
            background: var(--primary);
            border-radius: 3px;
            box-shadow: 0 0 10px rgba(255, 215, 0, 0.4);
            margin-right: 12px;
        }

        .notebook-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
        }

        .notebook-card {
            background: rgba(25, 25, 25, 0.4);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 20px;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            flex-direction: column;
            gap: 15px;
            position: relative;
        }

        .notebook-card:hover {
            transform: translateY(-5px);
            border-color: var(--primary);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.5);
            background: rgba(255, 215, 0, 0.02);
        }

        .card-type {
            font-size: 9px;
            font-weight: 950;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .note-header {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .note-icon-box {
            width: 48px;
            height: 48px;
            background: rgba(255, 215, 0, 0.08);
            border: 1px solid rgba(255, 215, 0, 0.2);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary);
            transition: 0.3s;
        }

        .notebook-card:hover .note-icon-box {
            background: var(--primary);
            color: #000;
            transform: scale(1.05) rotate(3deg);
        }

        /* Documentation & Action */
        .document-item {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 5px;
        }

        .doc-actions {
            display: grid;
            grid-template-columns: 1fr;
            gap: 8px;
        }

        .act-btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 10px;
            color: #ddd;
            font-size: 10px;
            font-weight: 800;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            cursor: pointer;
            transition: 0.2s;
            text-transform: uppercase;
        }

        .act-btn:hover {
            background: var(--primary);
            color: #000;
            border-color: var(--primary);
            box-shadow: 0 5px 15px rgba(255, 215, 0, 0.3);
        }

        .empty-zone {
            padding: 20px;
            background: rgba(0,0,0,0.2);
            border: 1px dashed rgba(255,255,255,0.05);
            border-radius: 14px;
            text-align: center;
            color: rgba(255,255,255,0.2);
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .material-item {
            background: rgba(0,0,0,0.1);
            border: 1px solid transparent;
            border-radius: 15px;
            padding: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
            cursor: pointer;
            transition: 0.2s;
        }

        .material-item:hover {
            border-color: var(--primary);
            background: rgba(255, 215, 0, 0.05);
        }

        .dl-btn {
            width: 34px;
            height: 34px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary);
            transition: 0.2s;
        }

        .dl-btn:hover { background: var(--primary); color: #000; }

        /* Raise Doubt Button - Match Teacher Action Style */
        .doubt-btn {
            width: 100%;
            padding: 16px;
            background: rgba(255, 109, 0, 0.05);
            border: 1px solid rgba(255, 109, 0, 0.2);
            border-radius: 15px;
            color: #ff6d00;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: 0.3s;
        }

        .doubt-btn:hover {
            background: #ff6d00;
            color: #000;
            box-shadow: 0 5px 15px rgba(255, 109, 0, 0.2);
        }
    </style>
</head>

                        <canvas id="streak-canvas" width="16" height="16" style="width: 24px; height: 24px; image-rendering: pixelated;"></canvas>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
        import { getAuth } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js';
        import { 
          firebaseConfig, 
          apiCall, 
          guardStudent, 
          BP 
        } from '../../assets/js/bee-core.js';

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        async function loadMyBanks() {
            BP.showSkeleton('joined-banks-list', 'card', 3);
            const result = await apiCall('/student/banks');
            if (result && result.success) {
                renderBankCards(result.data);
            }
        }

        function renderBankCards(banks) {
            const grid = document.querySelector('.banks-grid');
            grid.innerHTML = '';

            if (banks.length === 0) {
                grid.innerHTML = '<div style="grid-column: 1/-1; text-align: center; color: var(--text-muted); padding: 40px;">No synced hubs yet. Enter a teacher protocol key above.</div>';
                return;
            }

            banks.forEach(bank => {
                const card = document.createElement('div');
                card.className = 'bank-card adv-card';
                card.dataset.bankId = bank.bankId;

                let statusColor = '#00E676'; // Active
                let statusBg = 'rgba(0,230,118,0.1)';
                let statusLabel = 'Active';

                if (bank.status === 'pending') {
                    statusColor = '#FFB300';
                    statusBg = 'rgba(255,179,0,0.1)';
                    statusLabel = 'Awaiting Teacher';
                } else if (bank.status === 'approved') {
                    statusColor = '#FFD700';
                    statusBg = 'rgba(255,215,0,0.2)';
                    statusLabel = 'Authorization Ready';
                } else if (bank.status === 'rejected') {
                    statusColor = '#FF5252';
                    statusBg = 'rgba(255,82,82,0.1)';
                    statusLabel = 'Rejected';
                }

                card.innerHTML = `
                    <div style="position: absolute; top: 15px; right: 15px; cursor: pointer; opacity: 0.3;" onclick="event.stopPropagation(); deleteBank('${bank.bankId}')">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5"><path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                    </div>
                    <div class="bank-icon-box">
                        <img src="../../assets/images/subjects/${bank.subject.toLowerCase()}.svg" width="25" onerror="this.src='../../assets/images/subjects/default.svg'">
                    </div>
                    <div class="bank-name">${bank.subject} Matrix</div>
                    <div class="bank-meta">Class ${bank.class} • ${bank.teacherName}</div>
                    <div class="bank-status">
                        <span class="status-pill" style="background:${statusBg}; color:${statusColor};">${statusLabel}</span>
                        <span style="font-size: 10px; font-weight: 800; color: var(--text-muted);">${bank.totalQuestions || 0} Qs</span>
                    </div>
                    ${bank.status === 'approved' ? `
                    <button class="unlock-btn" style="width:100%; margin-top:15px; padding:12px; background:var(--primary); border:none; border-radius:12px; color:#000; font-weight:900; font-size:11px; cursor:pointer; text-transform:uppercase; letter-spacing:1px;">
                        Unlock Hub &rarr;
                    </button>` : ''}
                `;

                card.onclick = () => {
                    if (bank.status === 'active') {
                        localStorage.setItem('bp_current_bank_id', bank.bankId);
                        openBank(bank.subject + ' Matrix');
                    } else if (bank.status === 'approved') {
                        localStorage.setItem('bp_otp_request_id', bank.requestId);
                        window.location.href = 'student-bank-auth.html';
                    } else if (bank.status === 'pending') {
                        Swal.fire({
                            icon: 'info',
                            title: 'Authorization Pending',
                            text: 'Ask your teacher to approve your terminal entry in their Command Center.',
                            background: '#0a0a1a',
                            color: '#ffffff'
                        });
                    }
                };
                grid.appendChild(card);
            });
        }

        window.searchBank = async function() {
            const bankCode = document.querySelector('#bank-id-input').value.trim().toUpperCase();

            if (!bankCode || bankCode.length < 3) {
                Swal.fire({
                    icon: 'warning',
                    title: 'Enter a Bank Code',
                    text: 'Please enter a valid TRNT- sync code.',
                    toast: true,
                    position: 'top-end',
                    showConfirmButton: false,
                    timer: 2500,
                    background: '#0a0a1a',
                    color: '#ffffff'
                });
                return;
            }

            const result = await apiCall('/student/banks/search', 'POST', { bankCode });

            if (result && result.success) {
                const bank = result.data;
                localStorage.setItem('bp_search_bank_id', bank.bankId);

                let btnText = 'REQUEST ACCESS';
                let btnDisabled = false;

                if (bank.alreadyActive) {
                    btnText = 'ALREADY ACTIVE';
                    btnDisabled = true;
                } else if (bank.alreadyRequested) {
                    btnText = 'PENDING APPROVAL';
                    btnDisabled = true;
                }

                Swal.fire({
                    html: `
                        <div style="padding: 20px 0;">
                            <div style="width: 80px; height: 80px; background: rgba(255, 215, 0, 0.1); border: 1px solid rgba(255, 215, 0, 0.3); border-radius: 24px; display: flex; align-items: center; justify-content: center; margin: 0 auto 24px auto; color: var(--primary);">
                                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path></svg>
                            </div>
                            <h2 style="color: #fff; font-size: 24px; font-weight: 800; margin-bottom: 8px;">${bank.subject} Hub</h2>
                            <p style="color: var(--text-muted); font-size: 14px; margin-bottom: 24px;">Academic node identified successfully.</p>
                            
                            <div style="background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); border-radius: 20px; padding: 20px; text-align: left; margin-bottom: 24px;">
                                <div style="display: flex; justify-content: space-between; margin-bottom: 12px; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 8px;">
                                    <span style="color: #888; font-size: 12px; font-weight: 600; text-transform: uppercase;">Teacher</span>
                                    <span style="color: #fff; font-size: 13px; font-weight: 700;">${bank.teacherName}</span>
                                </div>
                                <div style="display: flex; justify-content: space-between; margin-bottom: 12px; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 8px;">
                                    <span style="color: #888; font-size: 12px; font-weight: 600; text-transform: uppercase;">Class Level</span>
                                    <span style="color: #fff; font-size: 13px; font-weight: 700;">${bank.class}</span>
                                </div>
                                <div style="display: flex; justify-content: space-between;">
                                    <span style="color: #888; font-size: 12px; font-weight: 600; text-transform: uppercase;">Stored Data</span>
                                    <span style="color: var(--primary); font-size: 13px; font-weight: 800;">${bank.totalQuestions || 0} Questions</span>
                                </div>
                            </div>
                            <p style="color: #555; font-size: 11px; font-weight: 600; font-style: italic;">Node last synchronized ${timeAgo(bank.updatedAt)}</p>
                        </div>
                    `,
                    showCancelButton: !btnDisabled,
                    cancelButtonText: 'ABORT',
                    confirmButtonText: btnText === 'REQUEST ACCESS' ? 'SEND ACCESS REQUEST' : btnText,
                    confirmButtonColor: '#FFD700',
                    background: '#0a0a1a',
                    color: '#ffffff',
                    padding: '2rem',
                    width: '400px',
                    customClass: {
                        popup: 'adv-card',
                        confirmButton: 'unlock-btn',
                        cancelButton: 'dl-btn'
                    },
                    preConfirm: () => {
                        if (btnDisabled) return false;
                        return requestBankAccess();
                    }
                });

            } else {
                Swal.fire({
                    icon: 'error',
                    title: 'Node Not Found',
                    text: 'No academic node found with that sync code.',
                    toast: true,
                    position: 'top-end',
                    showConfirmButton: false,
                    timer: 2500,
                    background: '#0a0a1a',
                    color: '#ffffff'
                });
            }
        };

        async function requestBankAccess() {
            const bankId = localStorage.getItem('bp_search_bank_id');
            if (!bankId) return;

            const result = await apiCall('/student/banks/request', 'POST', { bankId });

            if (result && result.success) {
                Swal.fire({
                    html: `
                        <div style="padding: 20px 0;">
                            <div style="width: 80px; height: 80px; background: rgba(0, 230, 118, 0.1); border: 1px solid rgba(0, 230, 118, 0.3); border-radius: 24px; display: flex; align-items: center; justify-content: center; margin: 0 auto 24px auto; color: #00E676;">
                                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
                            </div>
                            <h2 style="color: #fff; font-size: 24px; font-weight: 800; margin-bottom: 8px;">Request Sent</h2>
                            <p style="color: var(--text-muted); font-size: 14px; line-height: 1.6;">Your authorization request is now in the teacher's <b style="color: #fff;">Command Center</b>. Once approved, you can activate this node using the OTP in your profile.</p>
                        </div>
                    `,
                    background: '#0a0a1a',
                    color: '#ffffff',
                    confirmButtonText: 'PROCEED',
                    confirmButtonColor: '#FFD700',
                    customClass: {
                        popup: 'adv-card',
                        confirmButton: 'unlock-btn'
                    }
                });
                localStorage.setItem('bp_pending_otp', 'true');
                setTimeout(() => loadMyBanks(), 1500);
            } else if (result?.error?.code === 'ALREADY_REQUESTED') {
                Swal.fire({
                    icon: 'info',
                    title: 'Already Requested',
                    text: 'You have already requested this bank.',
                    background: '#0a0a1a',
                    color: '#ffffff'
                });
            }
        }

        window.deleteBank = async function(bankId) {
            const confirm = await Swal.fire({
                title: 'Remove Hub?',
                text: 'You will lose access to all repository content.',
                icon: 'warning',
                showCancelButton: true,
                confirmButtonText: 'Remove',
                cancelButtonText: 'Cancel',
                background: '#0a0a1a',
                color: '#ffffff',
                confirmButtonColor: '#ff4444'
            });

            if (confirm.isConfirmed) {
                const result = await apiCall('/student/banks/' + bankId, 'DELETE');
                if (result && result.success) {
                    loadMyBanks();
                }
            }
        };

        function timeAgo(date) {
            if (!date) return 'Recently';
            const parsedDate = new Date(date);
            if (isNaN(parsedDate.getTime())) return 'Recently';
            const seconds = Math.floor((new Date() - parsedDate) / 1000);
            if (seconds < 10) return 'Just now';
            let interval = seconds / 31536000;
            if (interval > 1) return Math.floor(interval) + "y ago";
            interval = seconds / 2592000;
            if (interval > 1) return Math.floor(interval) + "mo ago";
            interval = seconds / 86400;
            if (interval > 1) return Math.floor(interval) + "d ago";
            interval = seconds / 3600;
            if (interval > 1) return Math.floor(interval) + "h ago";
            interval = seconds / 60;
            if (interval > 1) return Math.floor(interval) + "m ago";
            return Math.floor(seconds) + "s ago";
        }

        window.openBank = function(name) {
            document.getElementById('bank-list-view').style.display = 'none';
            document.getElementById('bank-detail-view').style.display = 'block';
            document.getElementById('back-btn').style.display = 'flex';
            document.getElementById('page-title').innerText = name;
            loadChapters();
        }

        async function loadChapters() {
            const bankId = localStorage.getItem('bp_current_bank_id');
            const result = await apiCall(`/student/banks/${bankId}/chapters`);
            const notesResult = await apiCall(`/student/notes?bankId=${bankId}`);

            if (result && result.success) {
                const container = document.getElementById('chapter-nodes-container');
                container.innerHTML = '';
                
                const allNotesGrouped = notesResult?.success ? notesResult.data.chapters : [];

                result.data.chapters.forEach(chap => {
                    const chapterData = allNotesGrouped.find(n => n.chapterId === chap.chapterId);
                    const chapterNotes = chapterData?.notes || [];
                    
                    const node = document.createElement('div');
                    node.className = 'chapter-node';

                    // Group notes by type (Complete vs Flash)
                    const completeNotes = chapterNotes.filter(n => n.noteType === 'complete');
                    const flashNotes = chapterNotes.filter(n => n.noteType === 'flash');

                    node.innerHTML = `
                        <div class="chapter-title-row">
                            <div style="display:flex; align-items:center;">
                                <div class="chapter-indicator"></div>
                                <span>${chap.chapterName}</span>
                            </div>
                            <span style="font-size: 10px; font-weight: 900; color: var(--primary); opacity:0.6;">${chapterNotes.length} RESOURCES</span>
                        </div>
                        <div class="notebook-grid">
                            ${renderNoteNode(completeNotes, 'complete', 'Master Blueprint', 'DETAILED NOTES')}
                            ${renderNoteNode(flashNotes, 'flash', 'Short Memo', 'QUICK REVISION')}
                        </div>
                    `;
                    container.appendChild(node);
                });
            }
        }

        function renderNoteNode(notes, type, title, subtitle) {
            const icon = type === 'complete' 
                ? `<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>`
                : `<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon></svg>`;
            
            const label = type === 'complete' ? 'COMPREHENSIVE NODE' : 'FLASH NODE';

            if (notes.length === 0) {
                return `
                    <div class="notebook-card" style="opacity: 0.5;">
                        <div class="card-type">${label}</div>
                        <div class="note-header">
                            <div class="note-icon-box">${icon}</div>
                            <div>
                                <div style="font-weight: 800; color: #fff; font-size: 14px;">${title}</div>
                                <div style="font-size: 9px; color: var(--primary); font-weight: 800; opacity: 0.7;">NO DATA SYNCED</div>
                            </div>
                        </div>
                        <div class="empty-zone">WAITING FOR REPOSITORY PULSE...</div>
                    </div>
                `;
            }

            return `
                <div class="notebook-card">
                    <div class="card-type">${label}</div>
                    <div class="note-header">
                        <div class="note-icon-box">${icon}</div>
                        <div>
                            <div style="font-weight: 800; color: #fff; font-size: 14px;">${title}</div>
                            <div style="font-size: 9px; color: var(--primary); font-weight: 800; opacity: 0.7;">${subtitle}</div>
                        </div>
                    </div>
                    ${notes.map(note => `
                        <div class="document-item">
                            <div style="font-weight: 700; color: #fff; font-size: 12px; margin-bottom:5px;">${note.fileName}</div>
                            <div class="doc-actions">
                                <button class="act-btn" onclick="window.downloadNote('${note.fileUrl}', '${note.fileName}')">
                                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                                    SYNC & VIEW
                                </button>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        window.downloadNote = async (url) => {
            window.open(url, '_blank');
            const res = await apiCall('/student/streak/activity', 'POST');
            if (res && res.success) {
                const streakVal = document.getElementById('streak-val-header');
                if (streakVal) streakVal.textContent = res.data.currentStreak || 0;
                BP.initStreakFlame('streak-canvas');
            }
        };

        window.showBankList = function() {
            document.getElementById('bank-list-view').style.display = 'block';
            document.getElementById('bank-detail-view').style.display = 'none';
            document.getElementById('back-btn').style.display = 'none';
            document.getElementById('page-title').innerText = 'Bank Inventory';
        }

        window.addEventListener('load', async () => {
            if (!(await guardStudent())) return;
            
            // Set profile icon & refresh from API
            const cachedName = localStorage.getItem(BP.NAME) || 'Student';
            const initials = (name) => name[0].toUpperCase() + (name.split(' ')[1]?.[0] || name[1] || '').toUpperCase();
            document.querySelector('.profile-icon').textContent = initials(cachedName);

            apiCall('/student/profile').then(res => {
                if (res.success) {
                    document.querySelector('.profile-icon').textContent = initials(res.data.displayName);
                    localStorage.setItem(BP.NAME, res.data.displayName);
                }
            });

            loadMyBanks();
            setInterval(loadMyBanks, 10000); // 10s auto-sync
            
            // Load streak
            const streakRes = await apiCall('/student/streak');
            if (streakRes && streakRes.success) {
                document.getElementById('streak-val-header').textContent = streakRes.data.currentStreak || 0;
                BP.initStreakFlame('streak-canvas');
            }

            // Override search button click
            document.querySelector('.search-btn').onclick = searchBank;
        });
    </script>
</body>

</html>
