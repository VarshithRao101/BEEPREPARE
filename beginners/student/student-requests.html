<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authorization Node - BEEPREPARE</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../assets/css/student-theme.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #050505;
            font-family: 'Outfit', sans-serif;
            overflow-x: hidden;
        }

        .node-overlay {
            width: 95%;
            max-width: 900px;
            height: 90vh;
            background: rgba(15, 15, 18, 0.85);
            backdrop-filter: blur(50px);
            border: 2px solid var(--primary);
            border-radius: 44px;
            padding: clamp(20px, 5vw, 50px);
            position: relative;
            box-shadow: 0 50px 100px rgba(0,0,0,0.8), 0 0 50px rgba(255, 215, 0, 0.08);
            display: flex;
            flex-direction: column;
            animation: nodeEntry 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            overflow: hidden;
        }

        @keyframes nodeEntry {
            from { opacity: 0; transform: translateY(40px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .close-btn {
            position: absolute;
            top: 30px;
            right: 30px;
            width: 44px;
            height: 44px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            cursor: pointer;
            transition: 0.3s;
            z-index: 10;
        }

        .close-btn:hover {
            background: rgba(255, 77, 77, 0.2);
            color: #fff;
            border-color: #ff4d4d;
            transform: scale(1.1) rotate(90deg);
        }

        .header-area {
            text-align: left;
            margin-bottom: 30px;
            padding-bottom: 25px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        .title-glow {
            font-size: clamp(28px, 6vw, 42px);
            font-weight: 900;
            color: #fff;
            margin: 0;
            letter-spacing: -2px;
        }

        .subtitle {
            color: var(--primary);
            font-size: clamp(9px, 2vw, 11px);
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-top: 10px;
            display: block;
        }

        .scroll-area {
            flex: 1;
            overflow-y: auto;
            padding-right: 5px;
            scrollbar-width: none;
        }

        .scroll-area::-webkit-scrollbar { display: none; }

        /* Signal Card - Premium Style */
        .signal-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border);
            border-radius: 30px;
            padding: clamp(20px, 4vw, 35px);
            margin-bottom: 20px;
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
        }

        .signal-card:hover {
            background: rgba(255, 255, 255, 0.04);
            border-color: rgba(255, 215, 0, 0.3);
            transform: scale(1.01);
        }

        .signal-meta {
            display: flex;
            align-items: center;
            gap: 20px;
            flex: 1;
        }

        .hub-icon {
            width: clamp(50px, 10vw, 70px);
            height: clamp(50px, 10vw, 70px);
            min-width: clamp(50px, 10vw, 70px);
            background: rgba(255, 215, 0, 0.05);
            border: 1px solid rgba(255, 215, 0, 0.1);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .hub-info h3 {
            font-size: clamp(16px, 4vw, 22px);
            font-weight: 800;
            color: #fff;
            margin: 0 0 4px 0;
        }

        .hub-info p {
            font-size: clamp(11px, 3vw, 14px);
            color: var(--text-muted);
            margin: 0;
            font-weight: 500;
        }

        .status-pill {
            font-size: clamp(8px, 2vw, 10px);
            font-weight: 900;
            padding: 4px 12px;
            border-radius: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
            display: inline-block;
        }

        .action-cluster {
            display: flex;
            gap: 10px;
        }

        .btn {
            padding: clamp(12px, 3vw, 16px) clamp(15px, 4vw, 28px);
            border-radius: 16px;
            font-weight: 800;
            font-size: clamp(10px, 2.5vw, 13px);
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 8px;
            white-space: nowrap;
        }

        .btn-deny {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            color: #888;
        }

        .btn-deny:hover {
            background: rgba(255, 77, 77, 0.1);
            color: #ff4d4d;
            border-color: #ff4d4d;
        }

        .btn-auth {
            background: var(--primary);
            border: none;
            color: #000;
            box-shadow: 0 10px 20px rgba(255, 215, 0, 0.2);
        }

        .btn-auth:hover {
            transform: scale(1.03);
            box-shadow: 0 15px 30px rgba(255, 215, 0, 0.4);
        }

        /* Responsive Fixes */
        @media (max-width: 900px) {
            .node-overlay { width: 100%; height: 100vh; border-radius: 0; padding: 20px; border: none; }
            .header-area { padding-bottom: 20px; }
            .scroll-area { padding-right: 0; }
            .close-btn { top: 20px; right: 20px; }
        }

        @media (max-width: 600px) {
            .signal-card { flex-direction: column; align-items: stretch; text-align: center; }
            .signal-meta { flex-direction: column; gap: 15px; }
            .hub-icon { margin: 0 auto; }
            .action-cluster { flex-direction: column; }
            .btn { justify-content: center; width: 100%; }
        }
    </style>
</head>

<body>
    <div class="node-overlay">
        <button class="close-btn" onclick="window.location.href='student-profile.html'">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        </button>

        <div class="header-area" style="display: flex; justify-content: space-between; align-items: flex-end;">
            <div>
                <span class="subtitle">Subject Access Hub</span>
                <h1 class="title-glow">Bank Authorization</h1>
            </div>
            <div id="streak-fire-container" style="display: flex; align-items: center; gap: 8px; background: rgba(255, 69, 0, 0.1); padding: 5px 12px; border-radius: 20px; border: 1px solid rgba(255, 69, 0, 0.2); cursor: default; margin-bottom: 5px;" title="Learning Streak">
                <canvas id="streak-canvas" width="16" height="16" style="width: 24px; height: 24px; image-rendering: pixelated;"></canvas>
                <span id="streak-val-header" style="font-weight: 900; color: #FF4500; font-size: 14px;">0</span>
            </div>
        </div>

        <div class="scroll-area" id="requests-list">
            <!-- Dynamic Cards -->
        </div>

        <div id="zero-state" style="display: none; text-align: center; padding: 60px 0;">
            <div style="font-size: 50px; margin-bottom: 20px; filter: grayscale(1);">🛡️</div>
            <h3 style="color: #fff; font-size: 20px; margin-bottom: 8px;">No Pending Requests</h3>
            <p style="color: var(--text-muted); font-size: 14px;">Connect with an academic hub in the Bank Inventory to begin synchronization.</p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
        import { getAuth } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js';
        import { 
          firebaseConfig, 
          apiCall, 
          guardStudent, 
          BP 
        } from '../../assets/js/bee-core.js';

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        async function loadRequests() {
            const list = document.getElementById('requests-list');
            const zeroState = document.getElementById('zero-state');
            
            list.innerHTML = '<div style="text-align: center; color: var(--text-muted); padding: 40px; font-weight: 800; letter-spacing: 1px;">Requests Loading...</div>';

            try {
                const result = await apiCall('/student/banks');
                console.log('Hub Data:', result);

                if (result && result.success && Array.isArray(result.data)) {
                    // Filter pending or approved. Ensure bank data exists via subject check.
                    const requests = result.data.filter(b => (b.status === 'pending' || b.status === 'approved') && b.subject);
                    list.innerHTML = '';

                    if (requests.length === 0) {
                        list.style.display = 'none';
                        zeroState.style.display = 'block';
                    } else {
                        list.style.display = 'block';
                        zeroState.style.display = 'none';

                        requests.forEach(req => {
                            const card = document.createElement('div');
                            card.className = 'signal-card';
                            
                            const isApproved = req.status === 'approved';
                            const statusColor = isApproved ? '#00FF9D' : '#FFD700';
                            const statusBg = isApproved ? 'rgba(0, 255, 157, 0.1)' : 'rgba(255, 215, 0, 0.1)';
                            const statusLabel = isApproved ? 'Authorization Verified' : 'Awaiting Connection';

                            card.innerHTML = `
                                <div class="signal-meta">
                                    <div class="hub-icon">
                                        <img src="../../assets/images/subjects/${String(req.subject).toLowerCase()}.svg" width="34" onerror="this.src='../../assets/images/subjects/default.svg'">
                                    </div>
                                    <div class="hub-info">
                                        <span class="status-pill" style="background: ${statusBg}; color: ${statusColor};">${statusLabel}</span>
                                        <h3>${req.subject} Bank</h3>
                                        <p>Teacher: ${req.teacherName || 'BEE Mentor'} • ${timeAgo(req.requestedAt)}</p>
                                    </div>
                                </div>

                                <div class="action-cluster">
                                    <button class="btn btn-deny" onclick="window.cancelRequest('${req.bankId}')">Withdraw</button>
                                    ${isApproved ? `
                                        <button class="btn btn-auth" onclick="window.enterOTP('${req.requestId}')">
                                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                                            Unlock Hub
                                        </button>
                                    ` : `
                                        <button class="btn btn-deny" style="opacity: 0.5; cursor: not-allowed;" disabled>
                                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                                            Locked Node
                                        </button>
                                    `}
                                </div>
                            `;
                            list.appendChild(card);
                        });
                    }
                } else {
                    const errorMsg = result?.message || 'HUB RESPONSE ERROR';
                    list.innerHTML = `<div style="text-align: center; color: #ff4d4d; padding: 40px; font-weight: 800;">${errorMsg}</div>`;
                    zeroState.style.display = 'block';
                }
            } catch (err) {
                console.error('Request Load Error:', err);
                const isBusy = err.message === 'SERVER_BUSY';
                list.innerHTML = `
                    <div style="text-align: center; color: #ff4d4d; padding: 40px; font-weight: 800;">
                        ${isBusy ? 'SYSTEM BUSY (RETRYING...)' : 'SIGNAL INTERFERENCE (OFFLINE)'}
                    </div>
                `;
            }
        }

        function timeAgo(date) {
            if (!date) return 'Recently';
            const seconds = Math.floor((new Date() - new Date(date)) / 1000);
            if (seconds < 60) return 'Just now';
            let interval = Math.floor(seconds / 3600);
            if (interval >= 1) return interval + "h ago";
            interval = Math.floor(seconds / 60);
            if (interval >= 1) return interval + "m ago";
            return seconds + "s ago";
        }

        window.enterOTP = function(requestId) {
            localStorage.setItem('bp_otp_request_id', requestId);
            window.location.href = 'student-bank-auth.html';
        };

        window.cancelRequest = async function(bankId) {
            const confirm = await Swal.fire({
                title: 'Withdraw Signal?',
                text: 'This nodal connection request will be terminated.',
                icon: 'warning',
                showCancelButton: true,
                confirmButtonText: 'Terminate Link',
                cancelButtonText: 'Maintain Signal',
                background: '#0a0a1a',
                color: '#ffffff',
                confirmButtonColor: '#ff4d4d'
            });

            if (confirm.isConfirmed) {
                const result = await apiCall('/student/banks/' + bankId, 'DELETE');
                if (result && result.success) {
                    loadRequests();
                }
            }
        };

        window.addEventListener('load', async () => {
            if (!(await guardStudent())) return;
            loadRequests();
            
            // Auto-refresh requests every 5 seconds
            setInterval(loadRequests, 5000);
            
            // Unify Streak Sync
            apiCall('/student/streak').then(res => {
                if (res && res.success) {
                    const streakVal = document.getElementById('streak-val-header');
                    if (streakVal) streakVal.textContent = res.data.currentStreak || 0;
                    BP.initStreakFlame('streak-canvas');
                }
            });
        });
    </script>
</body>

</html>
