<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Requests - Student Dashboard</title>
    <link rel="stylesheet" href="../../assets/css/style.css">
    <style>
        .app-container {
            padding-bottom: 90px;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            color: var(--text-muted);
            padding: 40px 20px;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* Request Card */
        .request-card {
            background: linear-gradient(145deg, rgba(30, 30, 30, 0.8), rgba(20, 20, 20, 0.95));
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 16px;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        /* Status Badge */
        .status-badge {
            position: absolute;
            top: 12px;
            right: 12px;
            background: rgba(255, 165, 0, 0.15);
            color: #ffa500;
            font-size: 10px;
            font-weight: 800;
            padding: 4px 8px;
            border-radius: 20px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border: 1px solid rgba(255, 165, 0, 0.3);
        }

        .bank-info {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 16px;
        }

        .bank-icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            background: rgba(255, 215, 0, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: var(--primary);
            border: 1px solid rgba(255, 215, 0, 0.2);
        }

        .req-details {
            flex: 1;
        }

        .bank-name {
            font-size: 16px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 4px;
        }

        .req-meta {
            font-size: 13px;
            color: #aaa;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* Actions Row */
        .action-row {
            display: flex;
            gap: 12px;
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn-action {
            flex: 1;
            padding: 12px;
            border-radius: 10px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .btn-enter-otp {
            background: var(--primary);
            color: #000;
            box-shadow: 0 4px 10px rgba(255, 215, 0, 0.3);
        }

        .btn-enter-otp:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(255, 215, 0, 0.4);
            background: #e5c100;
        }

        .btn-cancel {
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn-cancel:hover {
            background: rgba(255, 255, 255, 0.1);
        }
    </style>
    <link rel="stylesheet" href="../../assets/css/student-theme.css">
    <link rel="stylesheet" href="../../assets/css/premium-student-ui.css">
</head>

<body>
    <div class="background-animation">
        <div class="glow-orb orb-1"></div>
        <div class="glow-orb orb-3"></div>
    </div>

    <div class="app-container">

        <!-- Header -->
        <div class="top-header"
            style="display: flex; align-items: center; justify-content: center; position: relative; margin-bottom: 24px;">
            <div style="position: absolute; left: 0; cursor: pointer; padding: 8px;" onclick="window.history.back()">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.7)"
                    stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="19" y1="12" x2="5" y2="12"></line>
                    <polyline points="12 19 5 12 12 5"></polyline>
                </svg>
            </div>
            <div class="header-title text-gold-glow"
                style="color: var(--primary); font-weight: 700; font-size: 18px; letter-spacing: 1px;">MY REQUESTS
            </div>
        </div>

        <!-- Filter/Tabs -->
        <div style="display: flex; gap: 12px; margin-bottom: 24px; overflow-x: auto; padding-bottom: 4px;">
            <div
                style="background: var(--primary); color: #000; padding: 6px 16px; border-radius: 20px; font-size: 12px; font-weight: 700;">
                Pending</div>
            <div
                style="background: rgba(255,255,255,0.1); color: #aaa; padding: 6px 16px; border-radius: 20px; font-size: 12px; font-weight: 600;">
                History</div>
        </div>

        <!-- Requests List -->
        <div id="requests-list">
            <!-- Populated by JS -->
        </div>

        <div class="empty-state" id="empty-msg">
            <svg width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="#333" stroke-width="1.5"
                style="margin-bottom: 16px;">
                <circle cx="12" cy="12" r="10"></circle>
                <line x1="12" y1="8" x2="12" y2="12"></line>
                <line x1="12" y1="16" x2="12.01" y2="16"></line>
            </svg>
            <div>No Pending Requests</div>
        </div>

    </div>

    <!-- Bottom Nav -->
    <nav class="nav-bottom">
        <a href="student-home.html" class="nav-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                stroke-linejoin="round">
                <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                <polyline points="9 22 9 12 15 12 15 22"></polyline>
            </svg>
            <span>Home</span>
        </a>
        <a href="student-generate.html" class="nav-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                stroke-linejoin="round">
                <path d="M12 20h9"></path>
                <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path>
            </svg>
            <span>Test</span>
        </a>
        <!-- UNIFIED BEE AI NAV -->
        <a href="../ai-chat.html" class="nav-item ai-nav">
             <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 3l1.8 4.2a2 2 0 0 0 1 1L19 10l-4.2 1.8a2 2 0 0 0-1 1L12 17l-1.8-4.2a2 2 0 0 0-1-1L5 10l4.2-1.8a2 2 0 0 0 1-1L12 3z"></path>
                <path d="M18 3l.6 1.4a1 1 0 0 0 .5.5L20.5 5.5l-1.4.6a1 1 0 0 0-.5.5L18 8l-.6-1.4a1 1 0 0 0-.5-.5L15.5 5.5l1.4-.6a1 1 0 0 0 .5-.5L18 3z"></path>
                <path d="M6 16l.6 1.4a1 1 0 0 0 .5.5L8.5 18.5l-1.4.6a1 1 0 0 0-.5.5L6 21l-.6-1.4a1 1 0 0 0-.5-.5L3.5 18.5l1.4-.6a1 1 0 0 0 .5-.5L6 16z"></path>
            </svg>
            <span>BEE AI</span>
        </a>
        <a href="student-bank.html" class="nav-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                stroke-linejoin="round">
                <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path>
                <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path>
            </svg>
            <span>Banks</span>
        </a>
        <a href="student-profile.html" class="nav-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                stroke-linejoin="round">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                <circle cx="12" cy="7" r="4"></circle>
            </svg>
            <span>Profile</span>
        </a>
    </nav>

    <script>
        const list = document.getElementById('requests-list');
        const emptyMsg = document.getElementById('empty-msg');
        const pendingOTP = localStorage.getItem('pendingBankOTP');

        if (pendingOTP === 'true') {
            list.innerHTML = `
                <div class="request-card">
                    <div class="status-badge">Action Required</div>
                    <div class="bank-info">
                        <div class="bank-icon"></div>
                        <div class="req-details">
                            <div class="bank-name">Mathematics - Class 10</div>
                            <div class="req-meta">
                                <span>Question Bank Access</span>
                            </div>
                        </div>
                    </div>

                    <div class="action-row">
                        <button class="btn-action btn-cancel" onclick="cancelRequest()">Cancel</button>
                        <button class="btn-action btn-enter-otp" onclick="window.location.href='student-bank-auth.html'">
                            Enter OTP
                        </button>
                    </div>
                </div>
            `;
            emptyMsg.style.display = 'none';
        } else {
            list.style.display = 'none';
            emptyMsg.style.display = 'flex';
        }

        function cancelRequest() {
            if (confirm('Are you sure you want to cancel this request?')) {
                localStorage.removeItem('pendingBankOTP');
                window.location.reload();
            }
        }
    </script>

    <!-- EXTREME UI SCRIPTS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.8.0/vanilla-tilt.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Apply 3D Tilt
            VanillaTilt.init(document.querySelectorAll(".action-card, .subject-mini-card, .timeline-card, .chapter-box, .document-item, .result-card, .request-card, .auth-card, .d-profile-card, .adv-card"), {
                max: 8,
                speed: 400,
                glare: true,
                "max-glare": 0.15,
                scale: 1.02
            });

            // Apply Staggered HUD Load-in
            const elements = document.querySelectorAll(".action-card, .subject-mini-card, .timeline-item, .chapter-box, .document-item, .result-card, .request-card, .d-profile-stats, .d-xp-container");
            elements.forEach((el, index) => {
                el.classList.add('hud-element');
                el.style.animationDelay = `${index * 0.08}s`;
            });
        });
    </script>
</body>

</html>
