<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback Hub - BEEPREPARE</title>
    <link rel="stylesheet" href="../../assets/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #FFD700;
            --obsidian: #080808;
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            background: #050505 !important;
            color: #fff;
            font-family: 'Outfit', sans-serif;
            margin: 0;
            overflow-x: hidden;
            display: flex;
            min-height: 100vh;
        }

        .app-container {
            padding: 40px 24px 120px;
            max-width: 600px;
            margin: 0 auto;
            width: 100%;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 45px;
        }

        .back-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            width: 48px;
            height: 48px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            color: var(--primary);
        }

        .back-btn:hover {
            background: rgba(255, 215, 0, 0.1);
            transform: translateX(-4px);
            border-color: var(--primary);
        }

        h1 {
            font-size: 32px;
            font-weight: 900;
            margin: 0;
            letter-spacing: -1.5px;
        }

        .diagnostic-card {
            background: rgba(10, 10, 10, 0.9);
            backdrop-filter: blur(50px);
            border: 2.5px solid var(--primary);
            border-radius: 40px;
            padding: 50px;
            box-shadow: 0 40px 100px rgba(0,0,0,0.9), 0 0 40px rgba(255, 215, 0, 0.15);
            position: relative;
        }

        .form-group {
            margin-bottom: 30px;
        }

        label {
            display: block;
            font-size: 11px;
            font-weight: 900;
            color: var(--primary);
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        select {
            width: 100%;
            background: rgba(0, 0, 0, 0.4);
            border: 2.5px solid var(--primary);
            border-radius: 18px;
            padding: 18px;
            color: #fff;
            font-size: 15px;
            font-weight: 700;
            appearance: none;
            cursor: pointer;
            outline: none;
            transition: 0.3s;
        }

        select:focus {
            border-color: var(--primary);
            background: rgba(255, 215, 0, 0.05);
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.1);
        }

        textarea {
            width: 100%;
            background: rgba(0, 0, 0, 0.4);
            border: 2.5px solid var(--primary);
            border-radius: 18px;
            padding: 18px;
            color: #fff;
            font-size: 15px;
            font-weight: 600;
            min-height: 150px;
            resize: none;
            outline: none;
            transition: 0.3s;
            font-family: inherit;
        }

        textarea:focus {
            border-color: var(--primary);
            background: rgba(255, 215, 0, 0.05);
        }

        .rating-matrix {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 10px;
        }

        .rating-node {
            font-size: 42px;
            color: transparent;
            -webkit-text-stroke: 1.5px rgba(255, 215, 0, 0.3);
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .rating-node:hover {
            transform: scale(1.3);
            -webkit-text-stroke-color: var(--primary);
        }

        .rating-node.active {
            color: var(--primary);
            -webkit-text-stroke-color: var(--primary);
            filter: drop-shadow(0 0 15px rgba(255, 215, 0, 0.5));
            transform: scale(1.15);
        }

        .transmit-btn {
            width: 100%;
            background: var(--primary);
            color: #000;
            border: none;
            border-radius: 20px;
            padding: 22px;
            font-size: 16px;
            font-weight: 900;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            margin-top: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.2);
        }

        .transmit-btn:hover {
            transform: translateY(-4px);
            box-shadow: 0 15px 40px rgba(255, 215, 0, 0.4);
        }

        .nexus-tag {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: rgba(255, 215, 0, 0.08);
            padding: 8px 16px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 800;
            color: var(--primary);
            margin-top: 15px;
            border: 1px solid rgba(255, 215, 0, 0.2);
        }

        /* Signal Transmitted Overlay */
        .signal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            z-index: 5000;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 40px;
        }

        .signal-pulse {
            width: 100px;
            height: 100px;
            background: var(--primary);
            color: #000;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            margin-bottom: 30px;
            box-shadow: 0 0 50px rgba(255, 215, 0, 0.5);
            animation: luxeSignal 1.5s infinite;
        }

        @keyframes luxeSignal {
            0% { transform: scale(1); box-shadow: 0 0 30px rgba(255, 215, 0, 0.4); }
            50% { transform: scale(1.1); box-shadow: 0 0 60px rgba(255, 215, 0, 0.6); }
            100% { transform: scale(1); box-shadow: 0 0 30px rgba(255, 215, 0, 0.4); }
        }

        @media screen and (max-width: 768px) {
            .app-container { padding: 30px 20px 120px; }
            .diagnostic-card { padding: 30px; }
        }

        /* Nav Bottom Fix */
        .nav-bottom {
            z-index: 4000 !important;
        }
    </style>
<link rel="stylesheet" href="/assets/css/hover-interactions.css">
</head>
<body>
    <div class="app-container">
        <header class="header">
            <div style="display: flex; align-items: center; gap: 20px;">
                <button class="back-btn" onclick="window.history.back()">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
                        <line x1="19" y1="12" x2="5" y2="12"></line>
                        <polyline points="12 19 5 12 12 5"></polyline>
                    </svg>
                </button>
                <h1 style="letter-spacing: -1.5px;">Feedback Hub</h1>
            </div>
            <div id="streak-fire-container" style="display: flex; align-items: center; gap: 8px; background: rgba(255, 69, 0, 0.1); padding: 5px 12px; border-radius: 20px; border: 1px solid rgba(255, 69, 0, 0.2); cursor: default;" title="Learning Streak">
                <canvas id="streak-canvas" width="16" height="16" style="width: 24px; height: 24px; image-rendering: pixelated;"></canvas>
                <span id="streak-val-header" style="font-weight: 900; color: #FF4500; font-size: 14px;">0</span>
            </div>
        </header>

        <div class="diagnostic-card">
            <div class="form-group">
                <label>Feedback Type</label>
                <div style="position: relative;">
                    <select id="feedbackType">
                        <option value="bug">REPORT A BUG</option>
                        <option value="feature">SUGGEST A FEATURE</option>
                        <option value="rating" selected>EXPERIENCE FEEDBACK</option>
                        <option value="content">CONTENT ISSUE</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label>Tell us more</label>
                <textarea id="feedbackMsg" placeholder="Describe your experience or suggest an improvement..."></textarea>
                <div class="nexus-tag">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                    </svg>
                    NODE: STUDENT • V4.2.0
                </div>
            </div>

            <div class="form-group">
                <label>Diagnostic Rating</label>
                <div class="rating-matrix" id="ratingNode">
                    <span class="rating-node" data-rating="1">★</span>
                    <span class="rating-node" data-rating="2">★</span>
                    <span class="rating-node" data-rating="3">★</span>
                    <span class="rating-node" data-rating="4">★</span>
                    <span class="rating-node" data-rating="5">★</span>
                </div>
            </div>

            <button class="transmit-btn" id="submitBtn" onclick="transmitFeedback()">
                Submit Feedback
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
            </button>
        </div>
    </div>

    <!-- Signal Transmitted Overlay -->
    <div class="signal-overlay" id="successOverlay">
        <div class="signal-pulse">✓</div>
        <div style="font-size: 28px; font-weight: 900; color: #fff; margin-bottom: 15px;">FEEDBACK SENT</div>
        <p style="color: #666; font-weight: 700; max-width: 320px; line-height: 1.6; margin-bottom: 40px;">Your feedback has been received at the BEE Command Hub. Thanks for helping us improve!</p>
        <button class="transmit-btn" style="width: auto; padding: 18px 50px;" onclick="window.history.back()">
            RETURN TO PROFILE
        </button>
    </div>

    <nav class="nav-bottom">
        <a href="student-home.html" class="nav-item">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z" /></svg>
            <span>Home</span>
        </a>
        <a href="student-bank.html" class="nav-item">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path></svg>
            <span>Bank</span>
        </a>
        <a href="student-generate.html" class="nav-item">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" /></svg>
            <span>Practice</span>
        </a>
        <a href="../ai-chat.html" class="nav-item">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 1L15.09 7.26L22 8.27L17 13.14L18.18 20.02L12 16.77L5.82 20.02L7 14.14L2 9.27L8.91 7.26L12 1Z" /></svg>
            <span>AI</span>
        </a>
        <a href="student-profile.html" class="nav-item">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z" /></svg>
            <span>Profile</span>
        </a>
    </nav>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script type="module">
        import {
            apiCall,
            guardStudent,
            BP
        } from '../../assets/js/bee-core.js';

        // Run guard first
        if (!(await guardStudent())) {
            window.location.href = '../../index.html';
            throw new Error('Access denied');
        }

        // Star Rating Logic
        const nodes = document.querySelectorAll('.rating-node');
        let currentRating = 0;

        nodes.forEach(node => {
            node.addEventListener('click', () => {
                currentRating = parseInt(node.dataset.rating);
                updatePulse();
            });
        });

        function updatePulse() {
            nodes.forEach(node => {
                if(parseInt(node.dataset.rating) <= currentRating) {
                    node.classList.add('active');
                } else {
                    node.classList.remove('active');
                }
            });
        }

        window.transmitFeedback = async function() {
            const type = document.getElementById('feedbackType').value;
            const msg = document.getElementById('feedbackMsg').value.trim();
            
            if(!msg && currentRating === 0) {
                await Swal.fire({
                    icon: 'error',
                    title: 'EMPTY PAYLOAD',
                    text: 'Please provide a message or a rating before submitting.',
                    background: '#0a0a0a', color: '#fff',
                    confirmButtonColor: '#FFD700'
                });
                return;
            }

            const btn = document.getElementById('submitBtn');
            const originalHtml = btn.innerHTML;
            btn.innerHTML = 'TRANSMITTING...';
            btn.disabled = true;

            try {
                const result = await apiCall('/feedback', 'POST', {
                    feedbackType: type,
                    message: msg,
                    rating: currentRating
                });

                if (result.success) {
                    document.getElementById('successOverlay').style.display = 'flex';
                } else {
                    throw new Error(result.message || 'Submission failed.');
                }
            } catch (err) {
                console.error('Feedback Error:', err);
                await Swal.fire({ 
                    icon: 'error', 
                    title: 'SUBMISSION ERROR', 
                    text: err.message, 
                    background: '#0a0a0a', 
                    color: '#fff',
                    confirmButtonColor: '#FFD700'
                });
                btn.innerHTML = originalHtml;
                btn.disabled = false;
            }
        };

        // Load streak
        apiCall('/student/streak').then(res => {
            if (res && res.success) {
                const streakVal = document.getElementById('streak-val-header');
                if (streakVal) streakVal.textContent = res.data.currentStreak || 0;
                BP.initStreakFlame('streak-canvas');
            }
        });

        // Expose to window
        window.updatePulse = updatePulse;
    </script>
    <script src="/assets/js/ripple.js"></script>
</body>
</html>
