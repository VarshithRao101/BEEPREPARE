<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Draft Paper - BEEPREPARE</title>
    <link rel="stylesheet" href="../../assets/css/style.css">
    <style>
        /* Light Theme override for this page */
        body {
            background-color: var(--bg-dark) !important;
            color: var(--text-main) !important;
            overflow: hidden;
        }

        .editor-container {
            display: flex;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            position: relative;
        }

        .canvas-area {
            flex: 1;
            background: #f0f0f0;
            background-image:
                radial-gradient(circle at 10% 10%, rgba(0, 0, 0, 0.05) 0%, transparent 10%),
                linear-gradient(rgba(0, 0, 0, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 0, 0, 0.05) 1px, transparent 1px);
            background-size: 100% 100%, 20px 20px, 20px 20px;
            overflow-y: auto;
            position: relative;
            padding: 40px 20px 120px 20px;
            display: flex;
            justify-content: center;
        }

        .paper-sheet {
            background: #fff !important;
            color: #000 !important;
            width: 210mm;
            min-height: 297mm;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            padding: 20mm;
            box-sizing: border-box;
            font-family: 'Times New Roman', serif;
            position: relative;
            transform-origin: top center;
            transition: transform 0.2s ease;
        }

        .floating-toolbar {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(20, 20, 20, 0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 8px 12px;
            border-radius: 50px;
            display: flex;
            gap: 12px;
            align-items: center;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            z-index: 1000;
        }

        .tool-btn {
            background: rgba(255, 255, 255, 0.05);
            border: none;
            color: var(--adv-text);
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.2s;
        }

        .tool-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: translateY(-3px);
        }

        .tool-btn.primary {
            background: #fff;
            color: var(--adv-dark);
            width: auto;
            border-radius: 24px;
            padding: 0 24px;
            font-weight: 700;
            font-family: 'Inter', sans-serif;
        }

        .question-item {
            margin-bottom: 16px;
            position: relative;
            padding: 4px;
            border-radius: 4px;
        }

        .question-item:hover {
            background: rgba(255, 215, 0, 0.1);
        }

        .q-actions {
            position: absolute;
            right: -30px;
            top: 0;
            display: none;
            flex-direction: column;
            gap: 4px;
        }

        .question-item:hover .q-actions {
            display: flex;
        }

        .action-icon {
            width: 24px;
            height: 24px;
            background: #333;
            color: #fff;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 12px;
        }

        .layout-modal {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: rgba(25, 25, 25, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 24px;
            border-radius: 24px;
            width: 350px;
            color: #fff;
            opacity: 0;
            visibility: hidden;
            transition: 0.3s;
            z-index: 1100;
        }

        .layout-modal.active {
            opacity: 1;
            visibility: visible;
            transform: translateX(-50%) translateY(0);
        }

        .setting-group { margin-bottom: 12px; }
        .setting-group label { display: block; font-size: 10px; color: #888; text-transform: uppercase; margin-bottom: 4px; }
        .setting-group select, .setting-group input { 
            width: 100%; padding: 8px; border-radius: 8px; background: #333; color: #fff; border: 1px solid #444; font-size: 13px;
        }
    </style>
    <link rel="stylesheet" href="../../assets/css/student-theme.css">
</head>

<body>
    <!-- Top Nav -->
    <div style="position: fixed; top: 0; left: 0; width: 100%; height: 60px; z-index: 50; display: flex; align-items: center; justify-content: space-between; padding: 0 24px; pointer-events: none;">
        <div style="pointer-events: auto; cursor: pointer; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); padding: 8px 16px; border-radius: 20px; color: #fff; font-weight: 500; display: flex; align-items: center; gap: 8px;"
            onclick="window.location.href='student-generate.html'">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="19" y1="12" x2="5" y2="12"></line>
                <polyline points="12 19 5 12 12 5"></polyline>
            </svg>
            Discard Paper
        </div>
        <div id="streak-fire-container" style="pointer-events: auto; display: flex; align-items: center; gap: 8px; background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(4px); padding: 8px 15px; border-radius: 30px; border: 1px solid rgba(255, 69, 0, 0.2); cursor: default;" title="Learning Streak">
            <canvas id="streak-canvas" width="16" height="16" style="width: 20px; height: 20px; image-rendering: pixelated;"></canvas>
            <span id="streak-val-header" style="font-weight: 950; color: #FF4500; font-size: 14px;">0</span>
        </div>
    </div>

    <div class="editor-container">
        <div class="canvas-area">
            <div id="paper" class="paper-sheet" contenteditable="true">
                <!-- Data loaded via JS -->
            </div>
        </div>
    </div>

    <!-- Floating Action Bar -->
    <div class="floating-toolbar">
        <button class="tool-btn" title="Zoom Out" onclick="adjustZoom(-0.1)">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line><line x1="8" y1="11" x2="14" y2="11"></line></svg>
        </button>
        <button class="tool-btn" title="Zoom In" onclick="adjustZoom(0.1)">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line><line x1="11" y1="8" x2="11" y2="14"></line><line x1="8" y1="11" x2="14" y2="11"></line></svg>
        </button>
        <div style="width: 1px; height: 24px; background: rgba(255,255,255,0.2);"></div>
        <button class="tool-btn" title="Layout Settings" onclick="toggleLayoutModal()">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="3" y1="9" x2="21" y2="9"></line><line x1="9" y1="21" x2="9" y2="9"></line></svg>
        </button>
        <button class="tool-btn primary" onclick="downloadPDF()">Download Paper</button>
        <button class="tool-btn primary" onclick="window.printPaper()">Print Paper</button>
    </div>

    <!-- Layout Settings Modal -->
    <div id="layoutModal" class="layout-modal">
        <h3 style="margin: 0 0 15px 0; font-size: 14px; text-transform: uppercase; color: var(--primary);">Display Controls</h3>
        <div class="setting-group">
            <label>Font Family</label>
            <select id="fontFamilySelect" onchange="updatePaperStyle()">
                <option value="'Times New Roman', serif">Times New Roman</option>
                <option value="'Arial', sans-serif">Arial</option>
                <option value="'Inter', sans-serif">Inter</option>
            </select>
        </div>
        <div class="setting-group">
            <label>Font Size</label>
            <input type="range" id="fontSizeRange" min="10" max="18" value="14" oninput="updatePaperStyle()">
        </div>
        <div class="setting-group">
            <label>Page Padding (mm)</label>
            <input type="range" id="paddingRange" min="5" max="40" value="20" oninput="updatePaperStyle()">
        </div>
        <div style="margin-top: 15px;">
            <button onclick="toggleLayoutModal()" style="width: 100%; padding: 10px; background: var(--primary); color: #000; border: none; font-weight: 800; border-radius: 8px; cursor: pointer;">DONE</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script type="module">
        import { guardStudent, apiCall, BP } from '../../assets/js/bee-core.js';

        if (!guardStudent()) window.location.href = '../../index.html';

        let currentZoom = 1;
        const paper = document.getElementById('paper');
        const modal = document.getElementById('layoutModal');

        window.adjustZoom = (delta) => {
            currentZoom += delta;
            currentZoom = Math.min(Math.max(currentZoom, 0.5), 2);
            paper.style.transform = `scale(${currentZoom})`;
        };

        window.toggleLayoutModal = () => modal.classList.toggle('active');

        window.updatePaperStyle = () => {
            paper.style.fontFamily = document.getElementById('fontFamilySelect').value;
            paper.style.fontSize = `${document.getElementById('fontSizeRange').value}px`;
            paper.style.padding = `${document.getElementById('paddingRange').value}mm`;
        };

        window.downloadPDF = async () => {
            const opt = { 
                margin: 0, 
                filename: 'practice_paper.pdf', 
                image: { type: 'jpeg', quality: 0.98 }, 
                html2canvas: { scale: 2 }, 
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' } 
            };
            html2pdf().set(opt).from(paper).save();
            
            // Increment Streak Activity
            const res = await apiCall('/student/streak/activity', 'POST');
            if (res && res.success) {
                const streakVal = document.getElementById('streak-val-header');
                if (streakVal) streakVal.textContent = res.data.currentStreak || 0;
                BP.initStreakFlame('streak-canvas');
            }
        };



        window.printPaper = async () => {
            const opt = { 
                margin: 0, 
                filename: 'practice_paper.pdf', 
                image: { type: 'jpeg', quality: 0.98 }, 
                html2canvas: { scale: 2 }, 
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' } 
            };
            html2pdf().from(paper).toPdf().get('pdf').then(async function (pdf) {
                window.open(pdf.output('bloburl'), '_blank');
                
                // Increment Streak Activity
                const res = await apiCall('/student/streak/activity', 'POST');
                if (res && res.success) {
                    const streakVal = document.getElementById('streak-val-header');
                    if (streakVal) streakVal.textContent = res.data.currentStreak || 0;
                    BP.initStreakFlame('streak-canvas');
                }
            });
        };

        async function initPaper() {
            const html = localStorage.getItem('bp_paper_html');
            if (html) {
                paper.innerHTML = html;
                setupActions();
            } else {
                window.location.href = 'student-generate.html';
            }
        }

        function setupActions() {
            paper.querySelectorAll('.action-icon').forEach(btn => {
                btn.onclick = (e) => {
                    e.stopPropagation();
                    const qItem = btn.closest('.question-item');
                    if (qItem) qItem.remove();
                };
            });
        }

        initPaper();

        // Load streak
        apiCall('/student/streak').then(res => {
            if (res && res.success) {
                const streakVal = document.getElementById('streak-val-header');
                if (streakVal) streakVal.textContent = res.data.currentStreak || 0;
                BP.initStreakFlame('streak-canvas');
            }
        });
    </script>
</body>
</html>
