<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bank Access Verification - BEEPREPARE</title>
    <link rel="stylesheet" href="../../assets/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body {
            background: #050505;
            overflow-x: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Inter', sans-serif;
            margin: 0;
        }

        /* Standard Background Animation (inherited from global or redefined if needed for standalone) */
        .background-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            /* Fallback/Global style handles the actual SVG/Gradients */
        }

        .glow-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.4;
            animation: float 25s infinite ease-in-out;
            z-index: -1;
        }

        .orb-1 {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, #FFD700 0%, transparent 70%);
            top: -10%;
            left: -10%;
        }

        .orb-2 {
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, #4CAF50 0%, transparent 70%);
            bottom: -10%;
            right: -10%;
        }

        .auth-card {
            background: rgba(20, 20, 20, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 32px;
            padding: 48px 32px;
            max-width: 380px;
            width: 90%;
            text-align: center;
            box-shadow: 0 24px 48px rgba(0, 0, 0, 0.8);
            position: relative;
            z-index: 10;
            overflow: hidden;
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(40px) scale(0.95);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* Ambient Glow inside card */
        .auth-card::after {
            content: '';
            position: absolute;
            top: -100px;
            left: 50%;
            transform: translateX(-50%);
            width: 60%;
            height: 200px;
            background: radial-gradient(circle, rgba(255, 215, 0, 0.15) 0%, transparent 70%);
            z-index: -1;
            pointer-events: none;
        }

        .icon-header {
            width: 88px;
            height: 88px;
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.1), rgba(255, 165, 0, 0.05));
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            color: #FFD700;
            margin: 0 auto 32px auto;
            border: 1px solid rgba(255, 215, 0, 0.2);
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.1);
            position: relative;
            z-index: 1;
        }

        h2 {
            margin: 0 0 12px 0;
            color: #ffffff;
            font-size: 24px;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        p {
            margin: 0 0 40px 0;
            color: #a0a0a0;
            font-size: 15px;
            line-height: 1.6;
        }

        strong {
            color: #fff;
            font-weight: 600;
        }

        .otp-container {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-bottom: 40px;
        }

        .otp-box {
            width: 60px;
            height: 72px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            color: #fff;
            font-size: 28px;
            font-weight: 700;
            text-align: center;
            outline: none;
            transition: all 0.2s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        .otp-box:focus {
            border-color: #FFD700;
            background: rgba(255, 215, 0, 0.05);
            transform: translateY(-4px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
        }

        .unlock-btn {
            background: #FFD700;
            color: #000;
            font-weight: 800;
            border: none;
            width: 100%;
            padding: 18px;
            border-radius: 16px;
            font-size: 15px;
            cursor: pointer;
            transition: 0.3s;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            box-shadow: 0 4px 20px rgba(255, 215, 0, 0.15);
        }

        .unlock-btn:hover {
            transform: translateY(-2px);
            background: #ffdb33;
            box-shadow: 0 8px 30px rgba(255, 215, 0, 0.3);
        }

        .unlock-btn:active {
            transform: translateY(0);
        }

        .back-link {
            display: inline-block;
            margin-top: 28px;
            color: rgba(255, 255, 255, 0.4);
            font-size: 13px;
            text-decoration: none;
            cursor: pointer;
            font-weight: 500;
            padding: 8px 16px;
            border-radius: 20px;
            transition: 0.2s;
        }

        .back-link:hover {
            color: #fff;
            background: rgba(255, 255, 255, 0.05);
        }
    </style>
    <link rel="stylesheet" href="../../assets/css/student-theme.css">
    <link rel="stylesheet" href="../../assets/css/premium-student-ui.css">
</head>

<body>

    <div class="background-animation">
        <div class="glow-orb orb-1"></div>
        <div class="glow-orb orb-2"></div>
    </div>
    <div class="auth-card">
        <div class="icon-header">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
            </svg>
        </div>
        <h2>Unlock Question Bank</h2>
        <p>Enter the 4-digit access code provided by <strong>Mr. Sharma</strong> for <strong>Mathematics - Class
                10</strong></p>

        <div class="otp-container">
            <input type="text" class="otp-box" maxlength="1" oninput="step(this, 'o2')">
            <input type="text" class="otp-box" id="o2" maxlength="1" oninput="step(this, 'o3')">
            <input type="text" class="otp-box" id="o3" maxlength="1" oninput="step(this, 'o4')">
            <input type="text" class="otp-box" id="o4" maxlength="1">
        </div>

        <button class="unlock-btn" onclick="verify()">Verify & Unlock</button>

        <a href="student-profile.html" class="back-link">Cancel and return to Profile</a>
    </div>

    <script>
        function step(current, next) {
            if (current.value.length >= 1) {
                document.getElementById(next).focus();
            }
        }

        function verify() {
            const code = Array.from(document.querySelectorAll('.otp-box')).map(e => e.value).join('');
            if (code.length === 4) {
                Swal.fire({
                    icon: 'success',
                    title: 'Access Granted!',
                    text: 'Question Bank added to your library.',
                    background: '#1a1a1a',
                    color: '#fff',
                    confirmButtonColor: '#FFD700'
                }).then(() => {
                    // Clear pending status and redirect to active banks or home
                    localStorage.removeItem('pendingBankOTP');
                    // Ideally add to active banks list in storage
                    window.location.href = 'student-bank.html';
                });
            } else {
                Swal.fire({
                    icon: 'error',
                    title: 'Invalid Code',
                    background: '#1a1a1a',
                    color: '#fff',
                    confirmButtonColor: '#d33'
                });
            }
        }
    </script>

    <!-- EXTREME UI SCRIPTS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.8.0/vanilla-tilt.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Apply 3D Tilt
            VanillaTilt.init(document.querySelectorAll(".action-card, .subject-mini-card, .timeline-card, .chapter-box, .document-item, .result-card, .request-card, .auth-card, .d-profile-card, .adv-card"), {
                max: 8,
                speed: 400,
                glare: true,
                "max-glare": 0.15,
                scale: 1.02
            });

            // Apply Staggered HUD Load-in
            const elements = document.querySelectorAll(".action-card, .subject-mini-card, .timeline-item, .chapter-box, .document-item, .result-card, .request-card, .d-profile-stats, .d-xp-container");
            elements.forEach((el, index) => {
                el.classList.add('hud-element');
                el.style.animationDelay = `${index * 0.08}s`;
            });
        });
    </script>
</body>

</html>
