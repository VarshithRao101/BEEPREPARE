<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bank Access Verification - BEEPREPARE</title>
    <link rel="stylesheet" href="../../assets/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body {
            background: #050505;
            overflow-x: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Inter', sans-serif;
            margin: 0;
        }

        /* Standard Background Animation (inherited from global or redefined if needed for standalone) */
        .background-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            /* Fallback/Global style handles the actual SVG/Gradients */
        }

        .glow-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.4;
            animation: float 25s infinite ease-in-out;
            z-index: -1;
        }

        .orb-1 {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, #FFD700 0%, transparent 70%);
            top: -10%;
            left: -10%;
        }

        .orb-2 {
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, #4CAF50 0%, transparent 70%);
            bottom: -10%;
            right: -10%;
        }

        .auth-card {
            background: rgba(20, 20, 20, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 32px;
            padding: 48px 32px;
            max-width: 380px;
            width: 90%;
            text-align: center;
            box-shadow: 0 24px 48px rgba(0, 0, 0, 0.8);
            position: relative;
            z-index: 10;
            overflow: hidden;
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(40px) scale(0.95);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* Ambient Glow inside card */
        .auth-card::after {
            content: '';
            position: absolute;
            top: -100px;
            left: 50%;
            transform: translateX(-50%);
            width: 60%;
            height: 200px;
            background: radial-gradient(circle, rgba(255, 215, 0, 0.15) 0%, transparent 70%);
            z-index: -1;
            pointer-events: none;
        }

        .icon-header {
            width: 88px;
            height: 88px;
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.1), rgba(255, 165, 0, 0.05));
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            color: #FFD700;
            margin: 0 auto 32px auto;
            border: 1px solid rgba(255, 215, 0, 0.2);
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.1);
            position: relative;
            z-index: 1;
        }

        h2 {
            margin: 0 0 12px 0;
            color: #ffffff;
            font-size: 24px;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        p {
            margin: 0 0 40px 0;
            color: #a0a0a0;
            font-size: 15px;
            line-height: 1.6;
        }

        strong {
            color: #fff;
            font-weight: 600;
        }

        .otp-container {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-bottom: 40px;
        }

        .otp-box {
            width: 60px;
            height: 72px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            color: #fff;
            font-size: 28px;
            font-weight: 700;
            text-align: center;
            outline: none;
            transition: all 0.2s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        .otp-box:focus {
            border-color: #FFD700;
            background: rgba(255, 215, 0, 0.05);
            transform: translateY(-4px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
        }

        .unlock-btn {
            background: #FFD700;
            color: #000;
            font-weight: 800;
            border: none;
            width: 100%;
            padding: 18px;
            border-radius: 16px;
            font-size: 15px;
            cursor: pointer;
            transition: 0.3s;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            box-shadow: 0 4px 20px rgba(255, 215, 0, 0.15);
        }

        .unlock-btn:hover {
            transform: translateY(-2px);
            background: #ffdb33;
            box-shadow: 0 8px 30px rgba(255, 215, 0, 0.3);
        }

        .unlock-btn:active {
            transform: translateY(0);
        }

        .back-link {
            display: inline-block;
            margin-top: 28px;
            color: rgba(255, 255, 255, 0.4);
            font-size: 13px;
            text-decoration: none;
            cursor: pointer;
            font-weight: 500;
            padding: 8px 16px;
            border-radius: 20px;
            transition: 0.2s;
        }

        .back-link:hover {
            color: #fff;
            background: rgba(255, 255, 255, 0.05);
        }

        .meta-sub-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 16px;
            margin-bottom: 32px;
            display: flex;
            align-items: center;
            gap: 16px;
            text-align: left;
        }
        .meta-avatar {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            background: var(--primary);
            color: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 18px;
        }
        .meta-info h4 { margin: 0; font-size: 14px; color: #fff; }
        .meta-info p { margin: 0; font-size: 11px; color: #888; }
    </style>
    <link rel="stylesheet" href="../../assets/css/student-theme.css">
    <link rel="stylesheet" href="../../assets/css/premium-student-ui.css">
<link rel="stylesheet" href="/assets/css/hover-interactions.css">
</head>

<body>

    <div class="background-animation">
        <div class="glow-orb orb-1"></div>
        <div class="glow-orb orb-2"></div>
    </div>
    <div id="streak-fire-container" style="position: fixed; top: 20px; left: 20px; z-index: 100; display: flex; align-items: center; gap: 8px; background: rgba(20, 20, 20, 0.6); backdrop-filter: blur(10px); padding: 8px 15px; border-radius: 30px; border: 1px solid rgba(255, 69, 0, 0.2); cursor: default;" title="Learning Streak">
        <canvas id="streak-canvas" width="16" height="16" style="width: 20px; height: 20px; image-rendering: pixelated;"></canvas>
        <span id="streak-val-header" style="font-weight: 950; color: #FF4500; font-size: 14px;">0</span>
    </div>
    <div class="auth-card">
        <div class="icon-header">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
            </svg>
        </div>
        <h2>Unlock Question Bank</h2>
        <p style="margin-bottom: 24px;">Enter the 4-digit access code to unlock.</p>

        <div class="meta-sub-card">
            <div class="meta-avatar">MS</div>
            <div class="meta-info">
                <h4>Mathematics - Class 10</h4>
                <p>Teacher: Mr. Sharma</p>
            </div>
        </div>

        <div class="otp-container">
            <input type="text" class="otp-box digit-input" maxlength="1" autocomplete="off" inputmode="numeric" pattern="[0-9]*">
            <input type="text" class="otp-box digit-input" maxlength="1" autocomplete="off" inputmode="numeric" pattern="[0-9]*">
            <input type="text" class="otp-box digit-input" maxlength="1" autocomplete="off" inputmode="numeric" pattern="[0-9]*">
            <input type="text" class="otp-box digit-input" maxlength="1" autocomplete="off" inputmode="numeric" pattern="[0-9]*">
        </div>

        <button class="unlock-btn" onclick="verify()">Verify & Unlock</button>

        <a href="student-profile.html" class="back-link">Cancel and return to Profile</a>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
        import { getAuth } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js';
        import { 
          firebaseConfig, 
          apiCall, 
          guardStudent, 
          BP 
        } from '../../assets/js/bee-core.js';

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        const requestId = localStorage.getItem('bp_otp_request_id');

        async function loadRequestContext() {
            if (!requestId) {
                window.location.href = 'student-requests.html';
                return;
            }

            const result = await apiCall('/student/banks');
            if (result && result.success) {
                const req = result.data.find(b => b.requestId === requestId || b.bankId === requestId);
                if (req) {
                    document.querySelector('.meta-info h4').textContent = `${req.subject} - Class ${req.class}`;
                    document.querySelector('.meta-info p').textContent = `Teacher: ${req.teacherName}`;
                    document.querySelector('.meta-avatar').textContent = req.subject.substring(0,2).toUpperCase();
                }
            }
        }

        window.inputs = document.querySelectorAll('.digit-input');

        inputs.forEach((input, index) => {
            input.addEventListener('paste', (e) => {
                e.preventDefault();
                const pastedData = (e.clipboardData || window.clipboardData).getData('text').replace(/\D/g, '');
                if (!pastedData) return;
                let pasteIndex = 0;
                for (let i = index; i < inputs.length && pasteIndex < pastedData.length; i++) {
                    inputs[i].value = pastedData[pasteIndex];
                    pasteIndex++;
                    if (i < inputs.length - 1) inputs[i + 1].focus();
                }
            });

            input.addEventListener('input', (e) => {
                e.target.value = e.target.value.replace(/[^0-9]/g, '');
                if (e.target.value.length > 1) e.target.value = e.target.value.slice(0, 1);
                if (e.target.value.length === 1 && index < inputs.length - 1) inputs[index + 1].focus();
            });

            input.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && e.target.value === '' && index > 0) {
                    inputs[index - 1].focus();
                    inputs[index - 1].value = '';
                }
            });
        });

        window.verify = async function() {
            const otpCode = Array.from(inputs).map(b => b.value.trim()).join('');

            if (otpCode.length !== 4) {
                const card = document.querySelector('.auth-card');
                card.style.animation = 'none';
                void card.offsetWidth;
                card.style.animation = 'shake 0.4s';
                return;
            }

            const btn = document.querySelector('.unlock-btn');
            btn.disabled = true;
            btn.textContent = 'Verifying...';

            try {
                const result = await apiCall('/student/banks/verify-otp', 'POST', { requestId, otpCode });

                if (result && result.success) {
                    localStorage.removeItem('bp_pending_otp');
                    localStorage.removeItem('bp_otp_request_id');

                    Swal.fire({
                        icon: 'success',
                        title: 'Access Granted!',
                        text: `You now have access to ${result.data.subject} - ${result.data.class}`,
                        background: '#0a0a1a',
                        color: '#ffffff',
                        confirmButtonColor: '#FFD700'
                    }).then(() => {
                        window.location.href = 'student-bank.html';
                    });
                } else {
                    btn.disabled = false;
                    btn.textContent = 'Verify & Unlock';

                    const code = result?.error?.code;
                    if (code === 'WRONG_OTP') {
                        const remaining = result.data?.attemptsRemaining;
                        Swal.fire({
                            icon: 'error',
                            title: 'Wrong OTP',
                            text: remaining ? `${remaining} attempts remaining.` : 'Please try again.',
                            background: '#0a0a1a',
                            color: '#ffffff'
                        });
                        inputs.forEach(b => b.value = '');
                        inputs[0].focus();
                    } else if (code === 'OTP_EXPIRED') {
                        Swal.fire({ icon: 'warning', title: 'OTP Expired', text: 'Ask your teacher to approve again.', background: '#0a0a1a', color: '#ffffff' }).then(() => {
                            window.location.href = 'student-requests.html';
                        });
                    } else if (code === 'REQUEST_LOCKED') {
                        Swal.fire({ icon: 'error', title: 'Access Locked', text: 'Too many wrong attempts. Ask your teacher to re-approve.', background: '#0a0a1a', color: '#ffffff' }).then(() => {
                            window.location.href = 'student-requests.html';
                        });
                    } else {
                        Swal.fire({ icon: 'error', title: 'Verification Failed', text: result?.message || 'Invalid code.', background: '#0a0a1a', color: '#ffffff' });
                    }
                }
            } catch (err) {
                btn.disabled = false;
                btn.textContent = 'Verify & Unlock';
                console.error('OTP verify error:', err);
            }
        };

        window.addEventListener('load', async () => {
            if (!(await guardStudent())) return;
            loadRequestContext();

            // Load streak
            apiCall('/student/streak').then(res => {
                if (res && res.success) {
                    const streakVal = document.getElementById('streak-val-header');
                    if (streakVal) streakVal.textContent = res.data.currentStreak || 0;
                    BP.initStreakFlame('streak-canvas');
                }
            });
        });

    </script>
    <style>
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }
    </style>
<script src="/assets/js/ripple.js"></script>
</body>

</html>
<script src="/assets/js/ripple.js"></script>
</body>

</html>
