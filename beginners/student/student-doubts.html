<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Academic Lab - BEEPREPARE</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../assets/css/student-theme.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --primary: #FFD700;
            --bg-deep: #08080a;
            --sidebar-bg: rgba(8, 8, 10, 0.2);
            --hub-bg: rgba(10, 10, 12, 0.15);
            --msg-in: rgba(255, 255, 255, 0.05);
            --msg-out: linear-gradient(135deg, #FFD700 0%, #FFA500 100%);
        }

        html body {
            overflow: hidden;
            background: #000 url('/assets/images/admin-core-bg.png') no-repeat center center fixed !important;
            background-size: cover !important;
            font-family: 'Outfit', sans-serif;
            color: #fff;
            margin: 0;
        }

        .academic-lab {
            display: grid;
            grid-template-columns: 340px 1fr;
            height: 100vh;
            height: 100dvh;
            width: 100vw;
            transition: 0.3s;
        }

        /* ════════════════ 1. Bank Access Sidebar ════════════════ */
        .bank-sidebar {
            background: var(--sidebar-bg);
            border-right: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            z-index: 100;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        .sidebar-header {
            padding: 25px;
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .sidebar-header h2 { font-size: 18px; margin: 0; font-weight: 800; letter-spacing: 0.5px; color: #fff; }

        .search-node {
            padding: 15px 25px;
            border-bottom: 1px solid var(--glass-border);
        }

        .search-box {
            background: rgba(0, 0, 0, 0.4);
            border: 1.5px solid var(--glass-border);
            border-radius: 16px;
            padding: 14px 22px;
            display: flex;
            align-items: center;
            gap: 15px;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }
        .search-box:focus-within {
            border-color: var(--primary);
            background: rgba(0, 0, 0, 0.6);
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.15);
            transform: translateY(-2px);
        }
        .search-box input { 
            background: none; 
            border: none; 
            color: #fff; 
            font-size: 15px; 
            outline: none; 
            width: 100%; 
            font-family: inherit;
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        .bank-stream { flex: 1; overflow-y: auto; padding: 15px; }

        .bank-card {
            padding: 15px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.02);
            margin-bottom: 10px;
            cursor: pointer;
            transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            gap: 15px;
            border: 1px solid transparent;
            position: relative;
        }

        .bank-card:hover { transform: scale(1.02); background: rgba(255, 255, 255, 0.04); }
        .bank-card.active { background: rgba(255, 215, 0, 0.05); border-color: rgba(255, 215, 0, 0.2); }

        .bank-logo {
            width: 48px; height: 48px; border-radius: 15px;
            background: var(--glass); border: 1px solid var(--glass-border);
            display: flex; align-items: center; justify-content: center;
            font-weight: 800; color: var(--primary); font-size: 16px; flex-shrink: 0;
        }

        .bank-card.active .bank-logo { background: var(--primary); color: #000; }

        .bank-info { flex: 1; min-width: 0; }
        .bank-info h4 { margin: 0; font-size: 14px; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-weight: 700; }
        .bank-info p { margin: 3px 0 0; font-size: 11px; color: var(--text-muted); font-weight: 500; }

        .unread-badge { width: 8px; height: 8px; background: var(--primary); border-radius: 50%; box-shadow: 0 0 10px var(--primary); position: absolute; top: 15px; right: 15px; }

        /* ════════════════ 2. Interaction Hub ════════════════ */
        .interaction-hub {
            background: var(--hub-bg);
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }

        .empty-hub {
            flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
            text-align: center; padding: 40px;
        }

        .placeholder-icon {
            width: 80px; height: 80px; border-radius: 24px;
            background: rgba(255, 255, 255, 0.03);
            border: 1.5px solid rgba(255, 255, 255, 0.08);
            display: flex; align-items: center; justify-content: center;
            margin-bottom: 25px; color: var(--primary);
        }

        .hub-header {
            padding: 15px 25px;
            background: rgba(15, 15, 18, 0.8);
            backdrop-filter: blur(30px);
            border-bottom: 1px solid var(--glass-border);
            display: flex; align-items: center; gap: 15px;
            z-index: 10;
        }

        .btn-back {
            display: none; width: 40px; height: 40px; border-radius: 12px;
            background: var(--glass); border: 1px solid var(--glass-border);
            color: #fff; cursor: pointer; align-items: center; justify-content: center;
        }

        .mentor-node { display: flex; align-items: center; gap: 12px; }
        .mentor-id { width: 40px; height: 40px; border-radius: 50%; background: linear-gradient(135deg, #FFD700 0%, #FFA500 100%); color: #000; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 16px; }

        .chat-line { 
            flex: 1; 
            overflow-y: auto; 
            padding: 30px 20px; 
            display: flex; 
            flex-direction: column; 
            gap: 15px; 
            scroll-behavior: smooth;
        }

        .bubble {
            max-width: 75%; padding: 12px 18px; border-radius: 20px; font-size: 14px; line-height: 1.5;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1); position: relative;
            animation: messageScale 0.25s cubic-bezier(0.18, 0.89, 0.32, 1.28) forwards;
        }

        @keyframes messageScale { from { opacity: 0; transform: translateY(10px) scale(0.95); } to { opacity: 1; transform: translateY(0) scale(1); } }

        .bubble.student { 
            align-self: flex-end; 
            background: #FFD700; 
            color: #000; 
            border-bottom-right-radius: 4px; 
            font-weight: 700; 
            box-shadow: 0 4px 15px rgba(255, 215, 0, 0.2);
        }
        .bubble.teacher { 
            align-self: flex-start; 
            background: #1a1a24; 
            color: #fff; 
            border-bottom-left-radius: 4px; 
            border: 1px solid rgba(255, 255, 255, 0.15); 
            font-weight: 500;
        }

        .bubble-img-node {
            width: 240px; height: 160px; border-radius: 12px; margin-top: 8px;
            border: 1px solid rgba(255,255,255,0.1); cursor: pointer;
            object-fit: cover; transition: 0.3s; display: block;
        }
        .bubble-img-node:hover { transform: scale(1.03); border-color: var(--primary); }

        .interaction-console {
            padding: 20px;
            background: rgba(12, 12, 15, 0.98);
            border-top: 1px solid var(--glass-border);
            display: flex; gap: 12px; align-items: flex-end;
        }

        .composer {
            flex: 1; background: var(--glass); border: 1px solid var(--glass-border);
            border-radius: 18px; padding: 12px 18px; color: #fff; outline: none;
            min-height: 48px; max-height: 150px; resize: none; font-size: 14px;
            transition: 0.3s; font-family: inherit;
        }

        .btn-tool { width: 48px; height: 48px; border-radius: 14px; border: none; background: var(--glass); color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .btn-tool:hover { background: rgba(255, 255, 255, 0.08); }
        .btn-tool.prime { background: var(--primary); color: #000; }

        .lightbox-portal {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.95); z-index: 1000;
            display: none; align-items: center; justify-content: center;
            backdrop-filter: blur(10px); opacity: 0; transition: 0.3s;
        }
        .lightbox-portal.active { display: flex; opacity: 1; }
        .lightbox-content { max-width: 90%; max-height: 85%; border-radius: 15px; }

        /* Mobile Slide Navigation — BEE COMMAND Protocol */
        @media (max-width: 850px) {
            .academic-lab { 
                grid-template-columns: 100vw 100vw; 
                width: 200vw; 
                transition: transform 0.4s cubic-bezier(0.19, 1, 0.22, 1);
            }
            .academic-lab.chat-open { transform: translateX(-100vw); }
            
            .bank-sidebar { width: 100vw; height: 100dvh; }
            .interaction-hub { width: 100vw; height: 100dvh; }

            .btn-back { display: flex; }
            .hub-header { padding: 12px 15px; }
            .chat-line { padding: 15px; }
            .interaction-console { padding: 12px; margin-bottom: 5px; }
            .composer { font-size: 16px; min-height: 40px; } /* Prevent iOS zoom */
        }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 10px; }

        .skeleton-bank {
            height: 70px; background: rgba(255,255,255,0.02); border-radius: 20px; margin-bottom: 10px;
            animation: pulse-skeleton 1.5s infinite ease-in-out;
        }
        @keyframes pulse-skeleton { 0% { opacity: 0.3; } 50% { opacity: 0.6; } 100% { opacity: 0.3; } }

        .sync-progress-msg {
            font-size: 9px; 
            color: var(--primary); 
            font-weight: 900; 
            text-transform: uppercase;
            letter-spacing: 1.5px; 
            display: flex; 
            align-items: center; 
            gap: 6px; 
            margin-top: 8px;
            animation: pulse-sync 1.5s infinite;
        }
        @keyframes pulse-sync {
            0%, 100% { opacity: 0.5; transform: scale(0.98); }
            50% { opacity: 1; transform: scale(1); }
        }

        .btn-spinner {
            width: 20px;
            height: 20px;
            border: 3px solid rgba(0, 0, 0, 0.1);
            border-top-color: #000;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>

<body>
    <div class="academic-lab" id="lab-container">
        <!-- 1. Sidebar -->
        <aside class="bank-sidebar">
            <header class="sidebar-header">
                <div style="display: flex; align-items: center; gap: 10px;">
                    <h2>Laboratory Logs</h2>
                <div id="streak-fire-container" style="display: flex; align-items: center; gap: 8px; background: rgba(255, 69, 0, 0.1); padding: 5px 12px; border-radius: 20px; border: 1px solid rgba(255, 69, 0, 0.2); cursor: default;" title="Learning Streak">
                    <canvas id="streak-canvas" width="16" height="16" style="width: 24px; height: 24px; image-rendering: pixelated;"></canvas>
                    <span id="streak-val-header" style="font-weight: 900; color: #FF4500; font-size: 14px;">0</span>
                </div>
                </div>
                <div class="btn-tool" style="width: 36px; height: 36px;" onclick="window.location.href='student-home.html'">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
                </div>
            </header>
            
            <div class="search-node">
                <div class="search-box">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="2.5"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                    <input type="text" id="bank-filter" placeholder="Search laboratories..." onkeyup="filterBanks()">
                </div>
            </div>

            <div class="bank-stream" id="bank-list">
                <div class="skeleton-bank"></div>
                <div class="skeleton-bank"></div>
                <div class="skeleton-bank" style="opacity: 0.5;"></div>
            </div>
        </aside>

        <!-- 2. Hub -->
        <main class="interaction-hub">
            <div class="empty-hub" id="empty-hub">
                <div class="placeholder-icon">
                    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
                </div>
                <h3 style="font-size: 22px; color: #fff; font-weight: 800; margin-bottom: 12px;">Resolution Secure</h3>
                <p style="font-size: 13px; max-width: 280px; line-height: 1.6; opacity: 0.5; font-weight: 500;">Select an active academic repository node to commence real-time expert resolution.</p>
            </div>

            <div id="active-hub" style="display: none; flex-direction: column; height: 100%;">
                <header class="hub-header">
                    <button class="btn-back" onclick="document.getElementById('lab-container').classList.remove('chat-open')">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M15 18l-6-6 6-6"/></svg>
                    </button>
                    <div class="mentor-node">
                        <div class="mentor-id" id="hub-mentor-initials">BM</div>
                        <div>
                            <div id="hub-subject-name" style="font-weight: 800; font-size: 16px;">Subject Name</div>
                            <div id="hub-mentor-name" style="color: var(--primary); font-size: 10px; text-transform: uppercase; font-weight: 800; margin-top: 2px;">BEE Mentor</div>
                        </div>
                    </div>
                </header>

                <div class="chat-line" id="chat-stream"></div>

                <div class="upload-preview" id="hub-upload-cont" style="display:none; position:absolute; bottom:80px; left:20px; background:#111; padding:10px; border-radius:12px; border:1.5px solid var(--primary); z-index:100; box-shadow:0 10px 30px rgba(0,0,0,0.5);">
                    <img id="hub-preview-img" style="width: 80px; height: 80px; object-fit: cover; border-radius: 8px;">
                    <button onclick="clearPendingFile()" style="position: absolute; top: -10px; right: -10px; width: 24px; height: 24px; border-radius: 50%; background: #ff4d4d; border: 2px solid #111; color: #fff; font-weight: 900; cursor: pointer; display:flex; align-items:center; justify-content:center;">×</button>
                </div>

                <div class="interaction-console">
                    <button class="btn-tool" onclick="document.getElementById('hub-file').click()">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"></path></svg>
                    </button>
                    <input type="file" id="hub-file" hidden accept="image/*" onchange="previewFile(this)">
                    <textarea id="hub-input" class="composer" placeholder="Consulting mentor..." rows="1" oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px'"></textarea>
                    <button class="btn-tool prime" id="hub-send-btn" onclick="transmitMessage()">
                        <div class="btn-spinner" id="btn-spinner" style="display: none;"></div>
                        <svg id="btn-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="3.5"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>
                    </button>
                </div>
            </div>
        </main>
    </div>

    <div class="lightbox-portal" id="lightbox" onclick="closeLightbox()">
        <img class="lightbox-content" id="lightbox-img">
    </div>

    <script type="module">
        import { apiCall, guardStudent, BP } from '../../assets/js/bee-core.js';

        let currentBankId = null;
        let currentChatId = null;
        let allBanks = [];
        let allDoubts = [];
        let pollTimer = null;
        let pendingFileBase64 = null;

        const initLab = async () => {
            if (!(await guardStudent())) return;

            // Load streak
            apiCall('/student/streak').then(res => {
                if (res && res.success) {
                    const streakVal = document.getElementById('streak-val-header');
                    if (streakVal) streakVal.textContent = res.data.currentStreak || 0;
                    BP.initStreakFlame('streak-canvas');
                }
            });

            await refreshData();
        };

        const refreshData = async () => {
            try {
                const [banksRes, doubtsRes] = await Promise.all([
                    apiCall('/student/banks'),
                    apiCall('/student/doubts')
                ]);

                if (banksRes?.success) allBanks = banksRes.data.filter(b => b.status === 'active');
                if (doubtsRes?.success) allDoubts = doubtsRes.data.doubts || [];

                renderSidebar();
            } catch (e) {
                console.error('Data sync failure:', e);
            }
        };

        function renderSidebar() {
            const list = document.getElementById('bank-list');
            if (!list) return;
            
            if (allBanks.length === 0) {
                list.innerHTML = `<div style="padding:40px; text-align:center; color:var(--text-muted); font-size:11px; font-weight:700; text-transform:uppercase; line-height:1.6;">No approved banks found.<br><span style="color:var(--primary); font-size:10px;">Join banks to activate lab logs.</span></div>`;
                return;
            }

            list.innerHTML = allBanks.map(bank => {
                const doubt = allDoubts.find(d => d.bankId === bank.bankId);
                const isActive = currentBankId === bank.bankId;
                const initials = (bank.subject || 'S').substring(0, 2).toUpperCase();
                
                return `
                    <div class="bank-card ${isActive ? 'active' : ''}" 
                         onclick="openChat('${bank.bankId}', '${doubt ? doubt.doubtId : ''}', '${bank.subject}', '${bank.teacherName}')">
                        <div class="bank-logo">${initials}</div>
                        <div class="bank-info">
                            <h4>${bank.subject}</h4>
                            <p>${bank.teacherName}</p>
                            ${doubt ? `<div style="font-size: 11px; color: var(--text-muted); margin-top: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; opacity:0.8; font-weight:600;">${doubt.preview}</div>` : '<div style="font-size: 10px; color: var(--primary); margin-top: 5px; opacity:0.6; font-weight:800;">NEW LOG PENDING</div>'}
                        </div>
                        ${doubt?.unreadByStudent ? '<div class="unread-badge"></div>' : ''}
                    </div>
                `;
            }).join('');
        }

        window.openChat = async (bankId, doubtId, subject, mentor) => {
            currentBankId = bankId;
            currentChatId = doubtId || null;
            
            renderSidebar();
            document.getElementById('lab-container').classList.add('chat-open');
            document.getElementById('empty-hub').style.display = 'none';
            document.getElementById('active-hub').style.display = 'flex';
            document.getElementById('hub-subject-name').textContent = subject;
            document.getElementById('hub-mentor-name').textContent = mentor;
            document.getElementById('hub-mentor-initials').textContent = (mentor || 'B').substring(0, 2).toUpperCase();

            const stream = document.getElementById('chat-stream');
            stream.innerHTML = '<div style="padding:20px; text-align:center; color:var(--primary); font-size:10px; font-weight:800; opacity:0.5;">SYNCHRONIZING SECURE TUNNEL...</div>';

            if (pollTimer) clearInterval(pollTimer);
            
            await fetchMessages();
            pollTimer = setInterval(fetchMessages, 5000);
        };

        async function fetchMessages() {
            if (!currentChatId) {
                const stream = document.getElementById('chat-stream');
                stream.innerHTML = '<div style="height:100%; display:flex; flex-direction:column; align-items:center; justify-content:center; opacity:0.3;"><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="margin-bottom:15px;"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg><span style="font-size:11px; font-weight:800; letter-spacing:1px;">NO DATA PACKETS FOUND. START SYNC.</span></div>';
                return;
            }

            const res = await apiCall(`/student/doubts/${currentChatId}/messages`);
            if (res?.success) {
                renderMessages(res.data.messages);
            }
        }

        function renderMessages(messages) {
            const stream = document.getElementById('chat-stream');
            
            messages.forEach(m => {
                const msgId = `msg-${m._id || m.timestamp}`;
                if (document.getElementById(msgId)) return;

                const side = m.senderRole === 'student' ? 'student' : 'teacher';
                const time = new Date(m.timestamp).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
                
                const div = document.createElement('div');
                div.id = msgId;
                div.className = `bubble ${side}`;
                div.innerHTML = `
                    ${m.imageUrl ? `<img src="${m.imageUrl}" class="bubble-img-node" onclick="event.stopPropagation(); showLightbox('${m.imageUrl}')">` : ''}
                    <div style="word-break: break-word;">${m.content}</div>
                    <div style="font-size: 9px; opacity: 0.4; margin-top: 8px; text-align: ${side === 'student' ? 'right' : 'left'}; font-weight:800;">
                        ${m.isSending ? '⏳ SYNCING...' : time}
                    </div>
                `;
                stream.appendChild(div);
                stream.scrollTop = stream.scrollHeight;
            });
        }

        window.transmitMessage = async () => {
            const input = document.getElementById('hub-input');
            const msg = input.value.trim();
            if (!msg && !pendingFileBase64) return;

            const btn = document.getElementById('hub-send-btn');
            const stream = document.getElementById('chat-stream');
            
            // Add Optimistic UI
            const tempId = 'temp-' + Date.now();
            const tempBubble = document.createElement('div');
            tempBubble.className = 'bubble student';
            tempBubble.id = tempId;
            tempBubble.innerHTML = `
                ${pendingFileBase64 ? `<img src="${pendingFileBase64}" class="bubble-img-node">` : ''}
                <div style="word-break: break-word;">${msg}</div>
                <div class="sync-progress-msg" style="justify-content: flex-end;">⏳ SYNCING...</div>
            `;
            stream.appendChild(tempBubble);
            stream.scrollTop = stream.scrollHeight;

            const oldText = msg;
            const btnIcon = document.getElementById('btn-icon');
            const btnSpinner = document.getElementById('btn-spinner');
            
            input.value = '';
            input.style.height = 'auto';
            btn.disabled = true;
            btnIcon.style.display = 'none';
            btnSpinner.style.display = 'block';

            let syncStatus = tempBubble.querySelector('.sync-progress-msg');
            let statusStep = 0;
            const statusMsgs = ['⏳ ENCRYPTING...', '📡 UPLOADING...', '🧠 PROCESSING...', '🔗 ESTABLISHING...'];
            const progressTimer = setInterval(() => {
                syncStatus.innerHTML = `<span>${statusMsgs[statusStep % statusMsgs.length]}</span>`;
                statusStep++;
            }, 2000);

            try {
                const activeBank = allBanks.find(b => b.bankId === currentBankId);
                const res = await apiCall('/student/doubts', 'POST', {
                    bankId: currentBankId,
                    subject: activeBank?.subject,
                    questionText: msg,
                    imageUrl: pendingFileBase64
                });

                clearInterval(progressTimer);
                if (res?.success) {
                    if (!currentChatId) currentChatId = res.data.doubtId;
                    clearPendingFile();
                    await refreshData();
                    await fetchMessages();
                }
            } catch (e) {
                console.error(e);
                document.getElementById(tempId)?.remove();
                input.value = oldText;
                Swal.fire({ icon: 'error', title: 'UPSTREAM ERROR', text: 'Chat sequence failed. Input restored.', background: '#111114', color: '#fff' });
            } finally {
                btn.disabled = false;
                btnIcon.style.display = 'block';
                btnSpinner.style.display = 'none';
                document.getElementById(tempId)?.remove();
            }
        };

        const compressImage = (base64Str, maxWidth = 800, maxHeight = 800) => {
            return new Promise((resolve) => {
                const img = new Image();
                img.src = base64Str;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    let width = img.width;
                    let height = img.height;
                    if (width > height) {
                        if (width > maxWidth) {
                            height *= maxWidth / width;
                            width = maxWidth;
                        }
                    } else {
                        if (height > maxHeight) {
                            width *= maxHeight / height;
                            height = maxHeight;
                        }
                    }
                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    resolve(canvas.toDataURL('image/jpeg', 0.6));
                };
            });
        };

        window.previewFile = async (input) => {
            const file = input.files[0];
            if (!file) return;

            if (file.size > 2 * 1024 * 1024) {
                Swal.fire({ title: 'Large Packet', text: 'Compressing for faster academic sync...', icon: 'info', toast: true, position: 'top-end', showConfirmButton: false, timer: 3000, background: '#111', color: '#fff' });
            }

            const reader = new FileReader();
            reader.onload = async (e) => {
                pendingFileBase64 = await compressImage(e.target.result);
                document.getElementById('hub-preview-img').src = pendingFileBase64;
                document.getElementById('hub-upload-cont').style.display = 'block';
            };
            reader.readAsDataURL(file);
        };

        window.clearPendingFile = () => {
            pendingFileBase64 = null;
            const input = document.getElementById('hub-file');
            if (input) input.value = '';
            document.getElementById('hub-upload-cont').style.display = 'none';
        };

        window.closeChat = () => {
            document.getElementById('lab-container').classList.remove('chat-open');
            if (pollTimer) clearInterval(pollTimer);
        };

        window.showLightbox = (url) => {
            const lb = document.getElementById('lightbox');
            document.getElementById('lightbox-img').src = url;
            lb.classList.add('active');
        };

        window.closeLightbox = () => {
            document.getElementById('lightbox').classList.remove('active');
        };

        window.filterBanks = () => {
            const term = document.getElementById('bank-filter').value.toLowerCase();
            document.querySelectorAll('.bank-card').forEach(c => {
                c.style.display = c.textContent.toLowerCase().includes(term) ? 'flex' : 'none';
            });
        };

        document.getElementById('hub-input').addEventListener('keypress', e => { 
            if(e.key === 'Enter' && !e.shiftKey) { 
                e.preventDefault(); 
                transmitMessage(); 
            } 
        });

        window.addEventListener('load', initLab);
    </script>
</body>
</html>
