<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Circles | BEEPREPARE</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../assets/css/style.css">
    <style>
        :root {
            --primary: #FFD700;
            --primary-glow: rgba(255, 215, 0, 0.4);
            --bg-page: #000000;
            --card-bg: rgba(20, 20, 20, 0.6);
            --sidebar-bg: rgba(10, 10, 10, 0.8);
            --border-gold: rgba(255, 215, 0, 0.2);
            --text-main: #ffffff;
            --text-muted: #ababab;
            --glass-grad: linear-gradient(135deg, rgba(255, 255, 255, 0.05), rgba(255, 255, 255, 0.01));
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        
        body {
            background: #000 url('../../assets/images/abstract-bg.png') no-repeat center center fixed;
            background-size: cover;
            color: var(--text-main);
            height: 100vh;
            overflow: hidden;
            display: flex;
            position: relative;
        }

        body::before {
            content: '';
            position: absolute;
            inset: 0;
            background: none; /* Removed opacity entirely as requested */
            z-index: 0;
        }

        .main-layout {
            position: relative;
            z-index: 1;
            display: flex;
            width: 100%;
            height: 100vh;
        }

        /* Sidebar - List of Circles */
        .sidebar {
            width: 380px;
            background: var(--sidebar-bg);
            border-right: 1px solid var(--border-gold);
            display: flex;
            flex-direction: column;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            transition: 0.3s ease-out;
        }

        .sidebar-header {
            padding: 30px;
            border-bottom: 1px solid var(--border-gold);
        }
        
        .sidebar-header .top-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .back-btn-global {
            width: 35px;
            height: 35px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.05);
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: #fff;
            font-size: 18px;
            transition: 0.3s;
        }
        .back-btn-global:hover { background: var(--primary); color: #000; }

        .sidebar-header h2 {
            font-weight: 900;
            color: var(--primary);
            font-size: 24px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .user-meta-capsule {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(0,0,0,0.4);
            padding: 6px 12px;
            border-radius: 20px;
            border: 1px solid var(--border-gold);
            width: fit-content;
        }
        .user-id-text { font-size: 10px; font-weight: 900; letter-spacing: 1px; color: var(--primary); }

        .circle-stream {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .circle-stream::-webkit-scrollbar { width: 5px; }
        .circle-stream::-webkit-scrollbar-thumb { background: var(--border-gold); border-radius: 10px; }

        .circle-card {
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 18px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }
        .circle-card::before {
            content: '';
            position: absolute;
            left: 0; top: 0; bottom: 0; width: 0;
            background: var(--primary);
            transition: 0.3s;
        }
        .circle-card:hover { border-color: var(--primary); transform: translateX(5px); }
        .circle-card.active { border-color: var(--primary); background: rgba(255, 215, 0, 0.05); }
        .circle-card.active::before { width: 4px; }

        .circle-card .sub-tag {
            font-size: 9px;
            font-weight: 900;
            color: var(--primary);
            background: rgba(255, 215, 0, 0.1);
            padding: 2px 8px;
            border-radius: 4px;
            text-transform: uppercase;
            width: fit-content;
            margin-bottom: 8px;
        }
        .circle-card h3 { font-size: 16px; font-weight: 800; margin-bottom: 5px; letter-spacing: -0.2px; }
        .circle-card .meta { font-size: 11px; color: var(--text-muted); font-weight: 500; }

        .circle-indicator {
            position: absolute; top: 20px; right: 20px;
            width: 10px; height: 10px; border-radius: 50%;
            background: var(--primary);
            box-shadow: 0 0 10px var(--primary-glow);
            display: none;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.5); opacity: 0.5; }
            100% { transform: scale(1); opacity: 1; }
        }

        .sidebar-actions {
            padding: 20px;
            border-top: 1px solid var(--border-gold);
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .btn-action {
            padding: 14px;
            border-radius: 14px;
            font-size: 11px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: 0.3s;
            border: 1px solid transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn-gold { background: var(--primary); color: #000; }
        .btn-gold:hover { transform: translateY(-2px); box-shadow: 0 5px 15px var(--primary-glow); }
        .btn-outline { background: transparent; color: #fff; border-color: var(--border-gold); }
        .btn-outline:hover { background: rgba(255,255,255,0.05); }

        /* Main Workspace Area */
        .workspace {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .empty-portal {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 40px;
        }
        .portal-symbol { 
            width: 200px; 
            height: 200px; 
            margin-bottom: 30px; 
            filter: drop-shadow(0 0 30px var(--primary-glow)); 
        }
        .ring-shimmer {
            transform-origin: center;
            animation: rotateRing 4s linear infinite;
        }
        @keyframes rotateRing {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .empty-portal h1 { font-size: 32px; font-weight: 900; color: var(--primary); margin-bottom: 15px; }
        .empty-portal p { font-size: 15px; color: var(--text-muted); max-width: 400px; line-height: 1.6; }

        /* Active Chat Interface */
        .chat-interface {
            display: none;
            flex-direction: column;
            height: 100%;
            background: rgba(0,0,0,0.2);
        }

        .chat-header {
            padding: 24px 40px;
            border-bottom: 1px solid var(--border-gold);
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(10px);
        }
        .header-left { display: flex; align-items: center; gap: 20px; }
        
        .mobile-back-btn {
            display: none;
            width: 40px; height: 40px; border-radius: 12px;
            background: rgba(255,255,255,0.05);
            align-items: center; justify-content: center;
            color: var(--primary); border: 1px solid var(--border-gold);
            cursor: pointer;
        }

        .interface-title h2 { font-size: 22px; font-weight: 900; color: #fff; display: flex; align-items: center; gap: 12px; }
        .interface-title .meta-text { font-size: 11px; color: var(--text-muted); font-weight: 600; margin-top: 5px; }
        .interface-title .meta-text b { color: var(--primary); }

        .header-controls { display: flex; gap: 15px; align-items: center; }
        
        .invite-box {
            background: rgba(0,0,0,0.5);
            border: 1.5px dashed var(--border-gold);
            padding: 8px 16px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            transition: 0.3s;
        }
        .invite-box:hover { background: rgba(255, 215, 0, 0.05); border-color: var(--primary); }
        .invite-label { font-size: 9px; font-weight: 900; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }
        .invite-code { font-family: monospace; color: var(--primary); font-weight: 800; font-size: 14px; }

        .btn-manage {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border-gold);
            color: #fff;
            width: 45px;
            height: 45px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn-manage:hover { background: var(--primary); color: #000; }

        .message-stream {
            flex: 1;
            overflow-y: auto;
            padding: 40px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .message-stream::-webkit-scrollbar { width: 5px; }
        .message-stream::-webkit-scrollbar-thumb { background: rgba(255, 215, 0, 0.1); border-radius: 10px; }

        /* Message UI */
        .message { display: flex; gap: 15px; max-width: 80%; }
        .message-own { align-self: flex-end; flex-direction: row-reverse; }

        .message-avatar {
            width: 42px; height: 42px; border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            font-weight: 900; font-size: 14px; flex-shrink: 0;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border-gold);
            color: #fff;
            position: relative;
        }
        .message-avatar::after {
            content: ''; position: absolute; bottom: -2px; right: -2px;
            width: 10px; height: 10px; border-radius: 50%;
            background: #4CAF50; border: 2px solid #000;
        }
        .message-teacher .message-avatar { background: var(--primary); color: #000; border: none; }
        
        .message-body { display: flex; flex-direction: column; gap: 6px; }
        .message-meta { font-size: 11px; font-weight: 800; color: var(--text-muted); display: flex; align-items: center; gap: 10px; margin-bottom: 2px; }
        .message-own .message-meta { flex-direction: row-reverse; }
        
        .role-badge { font-size: 8px; padding: 2px 6px; border-radius: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
        .role-teacher { background: var(--primary); color: #000; }
        .role-student { background: #3b82f6; color: #fff; }

        .message-bubble {
            padding: 15px 22px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            color: #fff;
            font-size: 15px;
            line-height: 1.6;
            position: relative;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .message-own .message-bubble {
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.1), rgba(255, 215, 0, 0.02));
            border-color: var(--border-gold);
            border-top-right-radius: 4px;
        }
        .message:not(.message-own) .message-bubble { border-top-left-radius: 4px; }

        .message-pending { opacity: 0.7; }
        .message-pending .message-bubble { border: 1.5px dashed var(--border-gold); }

        .sync-progress-msg {
            font-size: 8px; 
            color: var(--primary); 
            font-weight: 950; 
            text-transform: uppercase;
            letter-spacing: 1.5px; 
            display: flex; 
            align-items: center; 
            gap: 5px; 
            margin-top: 6px;
            animation: pulse-sync 1.5s infinite;
        }
        @keyframes pulse-sync {
            0%, 100% { opacity: 0.5; transform: scale(0.98); }
            50% { opacity: 1; transform: scale(1); }
        }

        .btn-spinner {
            width: 24px;
            height: 24px;
            border: 3px solid rgba(0, 0, 0, 0.1);
            border-top-color: #000;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .chat-footer {
            padding: 30px 40px;
            background: rgba(10, 10, 10, 0.9);
            border-top: 1px solid var(--border-gold);
            display: flex;
            gap: 15px;
            align-items: center;
        }
        .chat-input {
            flex: 1;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid #333;
            border-radius: 16px;
            padding: 16px 20px;
            color: #fff;
            font-size: 15px;
            outline: none;
            transition: 0.3s;
        }
        .chat-input:focus { border-color: var(--primary); box-shadow: 0 0 15px rgba(255, 215, 0, 0.05); }

        .btn-send {
            background: var(--primary);
            color: #000;
            width: 55px;
            height: 55px;
            border-radius: 16px;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn-send:hover { transform: scale(1.05) rotate(10deg); }

        /* Modals */
        .modal-wrap {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            display: none; align-items: center; justify-content: center; z-index: 3000;
            backdrop-filter: blur(10px);
        }
        .modal-body {
            background: #111; border: 1.5px solid var(--border-gold);
            border-radius: 30px; padding: 40px; width: 90%; max-width: 480px;
            box-shadow: 0 20px 60px rgba(0,0,0,1);
            max-height: 80vh; overflow-y: auto;
        }
        .modal-body h2 { font-weight: 900; color: var(--primary); font-size: 24px; text-align: center; margin-bottom: 25px; }
        .modal-body input {
            width: 100%; padding: 16px 20px; background: rgba(0,0,0,0.5);
            border: 1px solid #333; border-radius: 16px; color: #fff;
            margin-bottom: 20px; font-size: 15px; outline: none;
        }
        .modal-body input:focus { border-color: var(--primary); }

        .interface-tabs { display: flex; gap: 30px; border-bottom: 1px solid var(--border-gold); margin-bottom: 20px; }
        .i-tab {
            padding: 10px 0; font-size: 12px; font-weight: 800; letter-spacing: 1.5px;
            color: var(--text-muted); cursor: pointer; position: relative;
            transition: 0.3s;
        }
        .i-tab.active { color: var(--primary); }
        .i-tab.active::after { content: ''; position: absolute; bottom: 0; left: 0; width: 100%; height: 3px; background: var(--primary); border-radius: 10px; }

        .member-unit {
            display: flex; align-items: center; justify-content: space-between;
            padding: 15px; background: rgba(255,255,255,0.02);
            border-radius: 12px; margin-bottom: 10px; border: 1px solid rgba(255,255,255,0.03);
        }
        .unit-info h4 { font-size: 14px; font-weight: 700; color: #fff; }
        .unit-info p { font-size: 10px; color: var(--text-muted); margin-top: 3px; }

        /* Responsive Mobile Grid */
        @media (max-width: 850px) {
            .sidebar {
                width: 100%;
                border-right: none;
                z-index: 1000;
            }
            .sidebar.hidden { display: none; }
            .workspace { width: 100%; }
            .workspace.hidden { display: none; }
            
            .portal-symbol { 
                width: 140px; 
                height: 140px; 
                margin-bottom: 20px; 
            }
            
            .empty-portal h1 { font-size: 24px; }
            .empty-portal p { font-size: 13px; padding: 0 20px; }

            .chat-header { padding: 15px 20px; }
            .message-stream { padding: 20px; }
            .chat-footer { padding: 20px; }
            .mobile-back-btn { display: flex; }
            
            .invite-box { 
                padding: 6px 10px;
                border-radius: 8px;
            }
            .invite-label { display: none; }
            .invite-code { font-size: 11px; }

            .interface-title h2 { font-size: 18px; }
            
            .modal-body { padding: 25px; width: 95%; }

            .sidebar-actions {
                padding: 15px;
                background: rgba(10, 10, 10, 0.95);
                position: sticky;
                bottom: 0;
                backdrop-filter: blur(10px);
            }

            .empty-portal .sidebar-actions {
                width: 100%;
                max-width: 300px;
                margin-top: 15px;
            }
        }
    </style>
<link rel="stylesheet" href="/assets/css/hover-interactions.css">
</head>
<body>

    <div class="main-layout">
        <!-- Sidebar -->
        <div class="sidebar" id="mainSidebar">
            <div class="sidebar-header">
                <div class="top-row">
                    <a href="student-home.html" class="back-btn-global">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
                    </a>
                    <h2>STUDY CIRCLES</h2>
                </div>
                <div class="user-meta-capsule">
                    <div style="width:6px; height:6px; border-radius:50%; background:#4CAF50;"></div>
                    <span class="user-id-text" id="myBeeId">BEE-ID-XXXX</span>
                </div>
            </div>

            <div class="circle-stream" id="circleList">
                <div style="text-align:center; padding:100px 20px; color:#333; font-size:11px; font-weight:800; letter-spacing:1px; text-transform:uppercase;">Loading Circles...</div>
            </div>

            <div class="sidebar-actions">
                <button class="btn-action btn-outline" onclick="openModal('join')">Join Circle</button>
                <button class="btn-action btn-gold" onclick="openModal('create')">New Circle</button>
            </div>
        </div>

        <!-- Workspace Section -->
        <div class="workspace" id="mainWorkspace">
            <!-- Empty State -->
            <div id="chatEmpty" class="empty-portal">
                <div class="portal-symbol">
                    <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                        <!-- Outer Shield Body -->
                        <circle cx="50" cy="50" r="48" fill="rgba(255,215,0,0.05)" stroke="var(--primary)" stroke-width="2" />
                        <!-- Inner Rings -->
                        <circle cx="50" cy="50" r="38" fill="none" stroke="var(--primary)" stroke-width="4" opacity="0.6" />
                        <circle cx="50" cy="50" r="28" fill="var(--primary)" opacity="0.1" />
                        <!-- Center Core -->
                        <circle cx="50" cy="50" r="18" fill="var(--primary)" />
                        <!-- The Star -->
                        <path d="M50 36 L54 46 L64 46 L56 52 L59 62 L50 56 L41 62 L44 52 L36 46 L46 46 Z" fill="#000" />
                        
                        <!-- Shimmering Orbit -->
                        <circle cx="50" cy="50" r="48" fill="none" stroke="url(#shimmerGrad)" stroke-width="2" class="ring-shimmer" />
                        
                        <defs>
                            <linearGradient id="shimmerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" stop-color="transparent" />
                                <stop offset="50%" stop-color="var(--primary)" />
                                <stop offset="100%" stop-color="transparent" />
                            </linearGradient>
                        </defs>
                    </svg>
                </div>
                <h1>Study Circles</h1>
                <p>Collaborate with fellow students and teachers in real-time. Pick a circle to start chatting.</p>
                
                <div class="sidebar-actions" style="margin-top:20px; width:340px; border:none; background:transparent;">
                     <button class="btn-action btn-outline" style="padding:18px;" onclick="openModal('join')">Join Circle</button>
                     <button class="btn-action btn-gold" style="padding:18px;" onclick="openModal('create')">Create Circle</button>
                </div>
            </div>

            <!-- Active Chat Interface -->
            <div id="chatActive" class="chat-interface">
                <div class="chat-header">
                    <div class="header-left">
                        <div class="mobile-back-btn" onclick="backToSidebar()">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
                        </div>
                        <div class="interface-title">
                            <h2 id="activeCircleName">Study Group</h2>
                            <div class="meta-text"><b id="activeSubject">Subject</b> • <span id="activeMemberCount">0</span> members • <span id="activeCircleCodeSmall" style="color:var(--primary); cursor:pointer;" onclick="copyInviteCode()">ID: ...</span></div>
                        </div>
                    </div>
                    <div class="header-controls">
                        <div class="invite-box" onclick="copyInviteCode()">
                            <div class="invite-label">Invite Code</div>
                            <div class="invite-code" id="activeCircleCode">CIR-XXXXXX</div>
                        </div>
                        <button class="btn-manage" id="manageMembersBtn" onclick="openModal('manage')">
                            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                        </button>
                    </div>
                </div>

                <div class="message-stream" id="messageList"></div>

                <div class="chat-footer">
                    <input type="text" class="chat-input" id="msgInput" placeholder="Type a message..." onkeydown="if(event.key==='Enter') sendMessage()">
                    <button class="btn-send" id="btn-send-circle" onclick="sendMessage()">
                        <div class="btn-spinner" id="btn-spinner" style="display: none;"></div>
                        <svg id="btn-icon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Modals -->
    <div class="modal-wrap" id="modalOverlay">
        <div class="modal-body">
            <h2 id="modalTitle">Circle Options</h2>
            <div id="modalContent"></div>
            <div class="sidebar-actions" style="border:none; padding:0; margin-top:20px;">
                <button class="btn-action btn-outline" onclick="closeModal()">Close</button>
                <button class="btn-action btn-gold" id="modalBtn">Save</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { apiCall, guardStudent, BP } from '../../assets/js/bee-core.js';

        if ((await guardStudent())) {
            let myCircles = [];
            let activeId = null;
            let lastMsgTime = null;
            let pollTimer = null;
            const myUid = localStorage.getItem(BP.UID);

            async function init() {
                const cachedId = localStorage.getItem('bp_bee_id');
                if (cachedId) document.getElementById('myBeeId').textContent = cachedId;

                const [profile, circlesRes] = await Promise.allSettled([
                    apiCall('/student/profile'),
                    apiCall('/circles/my')
                ]).then(results => results.map(r => r.status === 'fulfilled' ? r.value : null));

                if (profile && profile.success) {
                    document.getElementById('myBeeId').textContent = profile.data.beeId || 'BEE-ID-ERROR';
                    localStorage.setItem('bp_bee_id', profile.data.beeId);
                }

                if (circlesRes && circlesRes.success) {
                    myCircles = circlesRes.data;
                    renderSidebar();
                } else {
                    document.getElementById('circleList').innerHTML = `
                        <div style="text-align:center; padding:60px 20px;">
                            <div style="font-size:32px; margin-bottom:10px;">📡</div>
                            <div style="font-size:10px; font-weight:800; letter-spacing:1px; text-transform:uppercase; color:#ff4444;">Signal Interruption</div>
                            <p style="font-size:11px; color:#666; margin-top:10px;">We couldn't connect to the circle hub.</p>
                            <button class="btn-action btn-gold" style="margin-top:15px; padding:8px 15px; font-size:9px;" onclick="location.reload()">Retry Connection</button>
                        </div>
                    `;
                }
                
                // On mobile, if no circle is active, hide workspace initially
                if(window.innerWidth < 850 && !activeId) {
                    document.getElementById('mainSidebar').classList.remove('hidden');
                    document.getElementById('mainWorkspace').classList.add('hidden');
                }
            }

            async function refreshCircles() {
                try {
                    const res = await apiCall('/circles/my');
                    if (res && res.success) {
                        myCircles = res.data;
                        renderSidebar();
                    } else {
                        throw new Error(res?.message || 'Failed to sync circles');
                    }
                } catch (err) {
                    console.error('Circle sync error:', err);
                    const list = document.getElementById('circleList');
                    list.innerHTML = `
                        <div style="text-align:center; padding:60px 20px;">
                            <div style="font-size:32px; margin-bottom:10px;">📡</div>
                            <div style="font-size:10px; font-weight:800; letter-spacing:1px; text-transform:uppercase; color:#ff4444;">Signal Interruption</div>
                            <p style="font-size:11px; color:#666; margin-top:10px;">We couldn't connect to the circle hub.</p>
                            <button class="btn-action btn-gold" style="margin-top:15px; padding:8px 15px; font-size:9px;" onclick="location.reload()">Retry Connection</button>
                        </div>
                    `;
                }
            }

            function renderSidebar() {
                const list = document.getElementById('circleList');
                if (myCircles.length === 0) {
                    list.innerHTML = `
                        <div style="text-align:center; padding:60px 20px; opacity:0.3;">
                            <div style="font-size:32px; margin-bottom:10px;">📡</div>
                            <div style="font-size:10px; font-weight:800; letter-spacing:1px; text-transform:uppercase;">No Active Circles Linked</div>
                        </div>
                    `;
                    return;
                }

                list.innerHTML = myCircles.map(c => {
                    const isCreator = c.createdBy === myUid;
                    return `
                    <div class="circle-card ${activeId === c._id ? 'active' : ''}" onclick="selectCircle('${c._id}')">
                        <div class="sub-tag">${c.subject || 'Study'}</div>
                        <h3>${c.name}</h3>
                        <div class="meta">${c.memberCount || c.members?.length || 0} members</div>
                        ${isCreator ? `<div class="circle-indicator" id="badge-${c._id}" style="display:${(c.pendingCount || 0) > 0 ? 'block' : 'none'}">${c.pendingCount}</div>` : ''}
                    </div>
                `}).join('');
            }

            window.selectCircle = async (id) => {
                if (activeId === id) {
                    if(window.innerWidth < 850) {
                        document.getElementById('mainSidebar').classList.add('hidden');
                        document.getElementById('mainWorkspace').classList.remove('hidden');
                    }
                    return;
                }
                
                activeId = id;
                lastMsgTime = null;
                renderSidebar();

                const circle = myCircles.find(c => c._id === id);
                document.getElementById('chatEmpty').style.display = 'none';
                document.getElementById('chatActive').style.display = 'flex';
                document.getElementById('activeCircleName').textContent = circle.name;
                document.getElementById('activeSubject').textContent = circle.subject || 'All Subjects';
                document.getElementById('activeMemberCount').textContent = circle.memberCount || circle.members?.length || 0;
                document.getElementById('activeCircleCode').textContent = circle.circleCode;
                document.getElementById('activeCircleCodeSmall').textContent = `ID: ${circle.circleCode}`;

                document.getElementById('manageMembersBtn').style.display = 'flex';

                document.getElementById('messageList').innerHTML = '<div style="text-align:center; color:rgba(255,255,255,0.8); padding-top:100px; font-size:11px; font-weight:800; text-transform:uppercase; letter-spacing:2px;">Syncing Signal Hub...</div>';
                
                if(window.innerWidth < 850) {
                    document.getElementById('mainSidebar').classList.add('hidden');
                    document.getElementById('mainWorkspace').classList.remove('hidden');
                }

                await pollMessages();
                startPolling();
            };

            window.backToSidebar = () => {
                document.getElementById('mainSidebar').classList.remove('hidden');
                document.getElementById('mainWorkspace').classList.add('hidden');
            };

            window.sendMessage = async () => {
                const input = document.getElementById('msgInput');
                const content = input.value.trim();
                if (!content || !activeId) return;
                input.value = '';

                // Optimistic UI: Pre-render message
                const tempId = 'temp-' + Date.now();
                const tempMsg = {
                    _id: tempId,
                    senderId: myUid,
                    senderName: localStorage.getItem(BP.NAME) || 'You',
                    senderRole: 'student',
                    content: content,
                    isPending: true
                };
                appendMessage(tempMsg);
                scrollToBottom();

                const res = await apiCall(`/circles/${activeId}/messages`, 'POST', { content });
                if (res.success) {
                    // Replace temp message with real one
                    const tempEl = document.getElementById(`msg-${tempId}`);
                    if (tempEl) tempEl.remove();
                    
                    appendMessage(res.data);
                    lastMsgTime = res.data.createdAt;
                    scrollToBottom();
                } else if (res.error?.code === 'EXPLICIT_CONTENT') {
                    const tempEl = document.getElementById(`msg-${tempId}`);
                    if (tempEl) tempEl.remove();
                    
                    Swal.fire({
                        icon: 'warning',
                        title: 'BEE SHIELD ACTIVE',
                        text: res.message,
                        background: '#0a0a0a',
                        color: '#fff',
                        confirmButtonColor: '#FFD700'
                    });
                } else {
                    const tempEl = document.getElementById(`msg-${tempId}`);
                    if (tempEl) tempEl.style.opacity = '0.3'; // Indicate failure
                    BP.showPulse('Signal Transmission Failed');
                }

                btn.disabled = false;
                btnIcon.style.display = 'block';
                btnSpinner.style.display = 'none';
            }

            async function pollMessages() {
                if (!activeId) return;
                const endpoint = lastMsgTime ? `/circles/${activeId}/messages?after=${lastMsgTime}` : `/circles/${activeId}/messages`;
                const res = await apiCall(endpoint);
                
                // BACKEND FIX: Circle messages normally come as an array directly or inside res.data.messages
                if (res && res.success) {
                    const messages = Array.isArray(res.data) ? res.data : (res.data.messages || []);
                    if (messages.length > 0) {
                        if (!lastMsgTime) document.getElementById('messageList').innerHTML = '';
                        
                        messages.forEach(m => {
                            // Don't duplicate if already present (temp or real)
                            if (!document.getElementById(`msg-${m._id}`)) {
                                appendMessage(m);
                            }
                        });
                        
                        lastMsgTime = messages[messages.length - 1].createdAt;
                        scrollToBottom();
                    }
                    if (res.data.memberCount !== undefined) {
                        document.getElementById('activeMemberCount').textContent = res.data.memberCount;
                    }
                }
            }

            async function syncRequests() {
                if (!activeId) return [];
                const circle = myCircles.find(c => c._id === activeId);
                if (!circle || circle.createdBy !== myUid) return [];

                const res = await apiCall(`/circles/${activeId}/requests`);
                return res.success ? res.data : [];
            }

            window.handleReq = async (uId, action) => {
                const res = await apiCall(`/circles/${activeId}/${action}/${uId}`, 'POST');
                if (res.success) {
                    if(action === 'approve') await refreshCircles();
                    openModal('manage'); // Refresh modal view
                }
            };

            function appendMessage(m) {
                const list = document.getElementById('messageList');
                const isOwn = m.senderId === myUid;
                const circle = myCircles.find(c => c._id === activeId);
                const isCreator = circle?.createdBy === myUid;

                const div = document.createElement('div');
                div.id = `msg-${m._id}`;
                div.className = `message message-${m.senderRole} ${isOwn ? 'message-own' : ''} ${m.isPending ? 'message-pending' : ''}`;
                div.innerHTML = `
                    <div class="message-avatar">${m.senderName.substring(0,1).toUpperCase()}</div>
                    <div class="message-body">
                        <div class="message-meta">
                            <span>${m.senderName}</span>
                            <span class="role-badge role-${m.senderRole}">${m.senderRole}</span>
                            ${m.isPending ? '<div class="sync-progress-msg">⏳ SENDING...</div>' : ''}
                            ${isCreator && !m.isPending ? `<span style="color:#ff4444; margin-left:10px; cursor:pointer; font-size:10px; font-weight:900;" onclick="delMsg('${m._id}')">DELETE</span>` : ''}
                        </div>
                        <div class="message-bubble">${m.content}</div>
                    </div>
                `;
                list.appendChild(div);
            }

            function scrollToBottom() {
                const list = document.getElementById('messageList');
                list.scrollTop = list.scrollHeight;
            }

            function startPolling() {
                if (pollTimer) clearInterval(pollTimer);
                pollTimer = setInterval(async () => {
                    await pollMessages();
                    await refreshCircles();
                }, 10000);
            }

            window.copyInviteCode = () => {
                const code = document.getElementById('activeCircleCode').textContent;
                navigator.clipboard.writeText(code);
                BP.showPulse('Invite Code Copied!');
            };

            window.openModal = async (type) => {
                const overlay = document.getElementById('modalOverlay');
                const content = document.getElementById('modalContent');
                const btn = document.getElementById('modalBtn');
                overlay.style.display = 'flex';
                btn.style.display = 'flex';

                if (type === 'join') {
                    document.getElementById('modalTitle').textContent = 'Join Study Circle';
                    content.innerHTML = `
                        <p style="font-size:11px; color:var(--text-muted); margin-bottom:15px; text-transform:uppercase; font-weight:800; letter-spacing:1px;">Enter Circle Invite Code</p>
                        <input type="text" id="joinInp" placeholder="CIR-XXXXXX">
                    `;
                    btn.textContent = 'Join Circle';
                    btn.onclick = async () => {
                        const code = document.getElementById('joinInp').value.trim();
                        const res = await apiCall('/circles/join', 'POST', { circleCode: code });
                        if (res.success) {
                            closeModal();
                            alert(res.message);
                            await refreshCircles();
                        } else alert(res.message);
                    };
                } else if (type === 'create') {
                    document.getElementById('modalTitle').textContent = 'Create Circle';
                    content.innerHTML = `
                        <input type="text" id="cName" placeholder="Circle Name">
                        <input type="text" id="cSub" placeholder="Subject">
                    `;
                    btn.textContent = 'Create Circle';
                    btn.onclick = async () => {
                        const name = document.getElementById('cName').value.trim();
                        const subject = document.getElementById('cSub').value.trim();
                        const res = await apiCall('/circles/create', 'POST', { name, subject });
                        if (res.success) {
                            closeModal();
                            await refreshCircles();
                        } else alert(res.message);
                    };
                } else if (type === 'manage') {
                    document.getElementById('modalTitle').textContent = 'Circle Management';
                    btn.style.display = 'none';
                    const circle = myCircles.find(c => c._id === activeId);
                    const isCreator = circle.createdBy === myUid;
                    
                    let html = '<div class="interface-tabs"><div class="i-tab active" id="mTab" onclick="switchModalTab(\'m\')">Members</div>';
                    if(isCreator) html += '<div class="i-tab" id="rTab" onclick="switchModalTab(\'r\')">Requests</div>';
                    html += '<div class="i-tab" id="ruleTab" onclick="switchModalTab(\'rules\')">Rules</div>';
                    html += '</div>';

                    // Members List
                    html += '<div id="modal-members" class="tab-sec active">';
                    html += circle.members.map(m => `
                        <div class="member-unit">
                            <div class="unit-info">
                                <h4>${m.displayName}</h4>
                                <p>${m.role.toUpperCase()} • Joined ${new Date(m.joinedAt).toLocaleDateString()}</p>
                            </div>
                            <div style="display:flex; gap:10px; align-items:center;">
                                <span class="role-badge role-${m.role}">${m.role}</span>
                                ${isCreator && m.userId !== myUid ? `<button class="btn-action btn-outline" style="padding:5px 10px; color:#ff4444; border-color:#ff4444; font-size:9px;" onclick="kickMember('${m.userId}')">KICK</button>` : ''}
                            </div>
                        </div>
                    `).join('');
                    html += '</div>';

                    // Requests List
                    if(isCreator) {
                        const reqs = await syncRequests();
                        html += '<div id="modal-requests" class="tab-sec" style="display:none;">';
                        if(reqs.length === 0) html += '<p style="text-align:center; padding:20px; color:#555;">No pending requests</p>';
                        else {
                            html += reqs.map(r => `
                                <div class="member-unit" style="flex-direction:column; align-items:flex-start; gap:10px;">
                                    <div style="display:flex; justify-content:space-between; width:100%; align-items:center;">
                                        <div class="unit-info">
                                            <h4>${r.displayName}</h4>
                                            <p>${r.beeId || 'BEE-ID'}</p>
                                        </div>
                                        <div style="display:flex; gap:10px;">
                                            <button class="btn-action btn-gold" style="padding:6px 12px; font-size:9px;" onclick="handleReq('${r.userId}', 'approve')">Approve</button>
                                            <button class="btn-action btn-outline" style="padding:6px 12px; font-size:9px; background:#ff4444; border:none;" onclick="handleReq('${r.userId}', 'reject')">Reject</button>
                                        </div>
                                    </div>
                                </div>
                            `).join('');
                        }
                        html += '</div>';
                    }

                    // Rules Tab
                    html += `<div id="modal-rules" class="tab-sec" style="display:none;">
                        <p style="font-size:11px; color:var(--text-muted); margin-bottom:15px; text-transform:uppercase; font-weight:800; letter-spacing:1px;">Circle Code of Conduct</p>
                        ${isCreator ? 
                            `<textarea id="ruleInp" style="width:100%; height:120px; background:rgba(0,0,0,0.5); border:1.5px solid var(--border-gold); border-radius:16px; color:#fff; padding:15px; font-size:14px; outline:none; margin-bottom:15px;">${circle.rules || ''}</textarea>
                             <button class="btn-action btn-gold" style="width:100%;" onclick="saveRules()">Update Rules</button>` : 
                            `<div style="background:rgba(255,215,0,0.05); border:1px solid var(--border-gold); border-radius:16px; padding:20px; color:#fff; font-size:14px; line-height:1.6;">${circle.rules || 'No rules defined yet.'}</div>`
                        }
                    </div>`;

                    content.innerHTML = html;
                } else if (type === 'shield') {
                    document.getElementById('modalTitle').innerHTML = '<span style="color:#ff0000;">⚠️ BEE SHIELD ALERT</span>';
                    content.innerHTML = `
                        <div style="text-align:center; padding:20px;">
                            <div style="font-size:64px; margin-bottom:20px;">🚫</div>
                            <h3 style="color:#fff; margin-bottom:15px; font-weight:900;">SECURITY VIOLATION</h3>
                            <p style="color:var(--text-muted); font-size:14px; line-height:1.6; margin-bottom:25px;">Our automated systems detected explicit or abusive content in your message. This incident has been logged <b>automatically</b> to our server.</p>
                            <div style="background:rgba(255,0,0,0.1); border:1.5px solid #ff4444; border-radius:14px; padding:15px; color:#ff4444; font-weight:800; font-size:12px; text-transform:uppercase;">Account Suspension Status: PENDING MONITORING</div>
                        </div>
                    `;
                    btn.style.display = 'none';
                }
            };

            window.saveRules = async () => {
                const rules = document.getElementById('ruleInp').value.trim();
                const res = await apiCall(`/circles/${activeId}/rules`, 'POST', { rules });
                if (res.success) {
                    BP.showPulse('Rules Updated');
                    const circle = myCircles.find(c => c._id === activeId);
                    circle.rules = rules;
                    closeModal();
                }
            };

            window.kickMember = async (uId) => {
                if(!confirm('Are you sure you want to remove this member?')) return;
                const res = await apiCall(`/circles/${activeId}/kick/${uId}`, 'POST');
                if (res.success) {
                    BP.showPulse('Member Removed');
                    await refreshCircles();
                    openModal('manage');
                }
            };

            window.delMsg = async (mId) => {
                if(!confirm('Delete this message?')) return;
                const res = await apiCall(`/circles/${activeId}/messages/${mId}`, 'DELETE');
                if (res.success) {
                    document.getElementById(`msg-${mId}`)?.remove();
                    BP.showPulse('Message Deleted');
                }
            };

            window.switchModalTab = (t) => {
                document.querySelectorAll('.i-tab').forEach(el => el.classList.remove('active'));
                document.querySelectorAll('.tab-sec').forEach(el => el.style.display = 'none');
                if(t === 'm') {
                    document.getElementById('mTab').classList.add('active');
                    document.getElementById('modal-members').style.display = 'block';
                } else if (t === 'r') {
                    document.getElementById('rTab').classList.add('active');
                    document.getElementById('modal-requests').style.display = 'block';
                } else {
                    document.getElementById('ruleTab').classList.add('active');
                    document.getElementById('modal-rules').style.display = 'block';
                }
            }

            window.closeModal = () => document.getElementById('modalOverlay').style.display = 'none';

            init();
        }
    </script>
<script src="/assets/js/ripple.js"></script>
</body>
</html>
