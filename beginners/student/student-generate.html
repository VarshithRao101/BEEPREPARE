<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Practice Paper - BEEPREPARE</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../assets/css/student-theme.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        .section-divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 30px 0 15px 0;
        }

        .divider-line {
            height: 2px;
            flex: 1;
            background: linear-gradient(90deg, var(--border), transparent);
            border-radius: 2px;
        }

        .section-label {
            font-size: 11px;
            font-weight: 800;
            color: var(--primary);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .total-badge {
            background: linear-gradient(135deg, var(--primary), #ffa000);
            border-radius: 24px;
            padding: 25px;
            text-align: center;
            color: #000;
            box-shadow: 0 15px 30px rgba(255, 215, 0, 0.2);
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .chapter-row {
            display: flex;
            align-items: center;
            padding: 15px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 15px;
            margin-bottom: 10px;
            border: 1px solid transparent;
            cursor: pointer;
            transition: 0.3s;
        }

        .chapter-row.selected {
            border-color: var(--primary);
            background: rgba(255, 215, 0, 0.05);
        }

        .chk-visual {
            width: 20px;
            height: 20px;
            border: 2px solid var(--border);
            border-radius: 6px;
            margin-right: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: transparent;
        }

        .chapter-row.selected .chk-visual {
            background: var(--primary);
            border-color: var(--primary);
            color: #000;
        }

        .primary-action-btn {
            width: 100%;
            background: linear-gradient(135deg, var(--primary), #FFD700);
            border: none;
            padding: 22px;
            border-radius: 20px;
            color: #000;
            font-size: 16px;
            font-weight: 950;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            margin-top: 40px;
            box-shadow: 0 15px 35px rgba(255, 215, 0, 0.3);
            transition: 0.3s;
        }

        .primary-action-btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 60px rgba(255, 215, 0, 0.4);
        }

        .bp-card {
            padding: 25px;
            margin-bottom: 25px;
            border: 1px solid var(--border);
            border-radius: 20px;
            background: rgba(15, 15, 15, 0.4);
            position: relative;
        }

        .glass-select {
            width: 100%;
            background: rgba(20, 20, 20, 0.8);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 16px 20px;
            color: #fff;
            font-size: 14px;
            font-weight: 700;
            outline: none;
            cursor: pointer;
        }

        .counter-overlay {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(0, 0, 0, 0.4);
            padding: 8px 15px;
            border-radius: 10px;
            border: 1px solid var(--border);
        }

        .cnt-btn {
            background: none;
            border: none;
            color: var(--primary);
            font-size: 18px;
            font-weight: 900;
            cursor: pointer;
        }

        .gen-overlay {
            position: fixed;
            inset: 0;
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(25px);
            z-index: 10000;
        }

        .gen-overlay.active { display: flex; }

        @media (min-width: 769px) {
            .paper-layout {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 40px;
            }
        }
    </style>
    <link rel="stylesheet" href="/assets/css/hover-interactions.css">
</head>

<body>
    <div class="main-layout">
        <!-- Persistent Sidebar -->
        <aside class="pc-sidebar">
            <div class="sidebar-brand"><span style="color: var(--primary);">BEE</span>COMMAND</div>
            <nav class="sidebar-nav">
                <a href="student-home.html" class="sidebar-link">
                    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z" /></svg>
                    <span>Dashboard</span>
                </a>
                <a href="student-bank.html" class="sidebar-link">
                    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path></svg>
                    <span>Bank Inventory</span>
                </a>
                <a href="student-generate.html" class="sidebar-link active">
                    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" /></svg>
                    <span>Practice</span>
                </a>
                <a href="student-doubts.html" class="sidebar-link">
                    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" /></svg>
                    <span>My Doubts</span>
                    <div id="sidebar-doubt-signal" class="signal-dot" style="display: none;"></div>
                </a>
                <a href="../ai-chat.html" class="sidebar-link">
                    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 1 1-7.6-13.04 8.5 8.5 0 0 1 8.5 8.54c0 .24 0 .44-.05.7zM17.5 11a5.5 5.5 0 1 0-11 0 5.5 5.5 0 0 0 11 0z" /></svg>
                    <span>BEE AI Assistant</span>
                </a>
                <a href="student-profile.html" class="sidebar-link">
                    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z" /></svg>
                    <span>My Profile</span>
                </a>
            </nav>
        </aside>

        <main class="content-wrapper">
            <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
                <div>
                    <h2 style="font-size: 28px; font-weight: 800; color: #fff;">Practice Node</h2>
                    <p style="color: var(--text-muted); font-size: 14px; text-transform: uppercase; font-weight: 800; letter-spacing: 1px;">Blueprint Configuration</p>
                </div>
                <div style="display: flex; gap: 20px; align-items: center;">
                    <div id="streak-fire-container" style="display: flex; align-items: center; gap: 8px; background: rgba(255, 69, 0, 0.1); padding: 5px 12px; border-radius: 20px; border: 1px solid rgba(255, 69, 0, 0.2); cursor: default;" title="Learning Streak">
                        <canvas id="streak-canvas" width="16" height="16" style="width: 24px; height: 24px; image-rendering: pixelated;"></canvas>
                        <span id="streak-val-header" style="font-weight: 900; color: #FF4500; font-size: 14px;">0</span>
                    </div>
                    <div class="profile-icon" onclick="window.location.href='student-profile.html'">--</div>
                </div>
            </header>

            <div class="paper-layout">
                <div>
                    <div class="section-divider">
                        <span class="section-label">1. Scope Selection</span>
                        <div class="divider-line"></div>
                    </div>
                    
                    <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 15px; margin-bottom: 30px;">
                        <div class="bp-card" style="margin: 0; display: flex; align-items: center;">
                            <select id="bank-select" class="glass-select" style="background: none; border: none; padding: 0;">
                                <option value="">Select Target Matrix</option>
                            </select>
                        </div>
                        <div class="total-badge">
                            <div style="font-size: 28px; font-weight: 950;" id="total-marks">0</div>
                            <div style="font-size: 9px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px;">Total Marks</div>
                        </div>
                    </div>

                    <div class="section-divider">
                        <span class="section-label">2. Target Chapters</span>
                        <div class="divider-line"></div>
                    </div>
                    <div id="chapters-list">
                        <div style="color:var(--text-muted); font-size:12px; padding:40px; text-align:center; border: 1px dashed var(--border); border-radius: 20px;">Synchronize a matrix to load modules.</div>
                    </div>
                </div>

                <div>
                    <div class="section-divider">
                        <span class="section-label">3. Protocol Structure</span>
                        <div class="divider-line"></div>
                    </div>

                    <div id="blueprint-container"></div>

                    <button class="act-btn" style="width: 100%; margin-top: 15px; border-style: dashed; padding: 18px;" onclick="window.addSection()">
                        + APPEND CATEGORY
                    </button>

                    <button class="primary-action-btn" onclick="startGeneration()">
                        GENERATE PRACTICE MATRIX →
                    </button>
                </div>
            </div>
        </main>
    </div>

    <div class="gen-overlay" id="genOverlay">
        <div style="width: 80px; height: 80px; border: 4px solid var(--primary); border-top-color: transparent; border-radius: 50%; animation: spin 1s linear infinite;"></div>
        <div style="margin-top: 30px; font-weight: 900; color: var(--primary); letter-spacing: 4px; text-transform: uppercase;">Assembling Paper...</div>
    </div>

    <script type="module">
        import { 
          apiCall, 
          guardStudent, 
          initPage,
          BP 
        } from '../../assets/js/bee-core.js';

        let blueprint = [
            { id: 'mcq', type: 'MCQ', marks: 1, count: 5 },
            { id: 'short', type: 'Short', marks: 2, count: 5 }
        ];

        let availableChapters = [];
        let selectedChapters = [];

        window.addSection = () => {
            blueprint.push({ id: 'custom-' + Date.now(), type: 'Short', marks: 2, count: 5 });
            renderBlueprint();
        };

        window.removeSection = (idx) => {
            if (blueprint.length > 1) {
                blueprint.splice(idx, 1);
                renderBlueprint();
            }
        };

        window.updateQty = (idx, diff) => {
            blueprint[idx].count = Math.max(0, blueprint[idx].count + diff);
            renderBlueprint();
        };

        window.updateBlueprint = (idx, key, val) => {
            blueprint[idx][key] = (key === 'marks') ? parseInt(val) : val;
            renderBlueprint();
        };

        async function loadBanks() {
            const result = await apiCall('/student/banks');
            const bankSelect = document.getElementById('bank-select');
            if (result && result.success) {
                const active = result.data.filter(b => b.status === 'active');
                active.forEach(b => {
                    const opt = document.createElement('option');
                    opt.value = b.bankId;
                    opt.textContent = `${b.subject} - ${b.class}`;
                    bankSelect.appendChild(opt);
                });
                bankSelect.onchange = (e) => loadChapters(e.target.value);
            }
        }

        async function loadChapters(bankId) {
            if (!bankId) return;
            const res = await apiCall(`/student/banks/${bankId}/chapters`);
            if (res.success) {
                availableChapters = res.data.chapters;
                renderChapters();
            }
        }

        function renderChapters() {
            const list = document.getElementById('chapters-list');
            list.innerHTML = availableChapters.map(chap => {
                const sel = selectedChapters.includes(chap.chapterId);
                return `
                    <div class="chapter-row adv-card ${sel ? 'selected' : ''}" onclick="window.toggleChapter('${chap.chapterId}')">
                        <div class="chk-visual">${sel ? '✓' : ''}</div>
                        <div style="flex: 1;">
                            <div style="font-weight: 800; font-size: 14px; color: #fff;">${chap.chapterName}</div>
                            <div style="font-size: 11px; color: var(--text-muted); font-weight: 700;">${chap.questionCount || 0} Questions Available</div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        window.toggleChapter = (id) => {
            if (selectedChapters.includes(id)) selectedChapters = selectedChapters.filter(c => c !== id);
            else selectedChapters.push(id);
            renderChapters();
        };

        function renderBlueprint() {
            const container = document.getElementById('blueprint-container');
            container.innerHTML = blueprint.map((sec, idx) => `
                <div class="bp-card">
                    <div class="counter-overlay">
                        <button class="cnt-btn" onclick="window.updateQty(${idx}, -1)">−</button>
                        <span style="min-width: 20px; text-align: center; font-weight: 900; color: var(--primary);">${sec.count}</span>
                        <button class="cnt-btn" onclick="window.updateQty(${idx}, 1)">+</button>
                    </div>
                    <div style="display: flex; justify-content: space-between; margin-bottom: 20px;">
                        <span style="font-size: 11px; font-weight: 900; color: #fff; text-transform: uppercase;">Section ${idx + 1}</span>
                        <button onclick="window.removeSection(${idx})" style="background:none; border:none; color:#ff4d4d; font-weight:900; cursor:pointer;">REMOVE</button>
                    </div>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                        <select class="glass-select" onchange="window.updateBlueprint(${idx}, 'type', this.value)">
                            <option value="MCQ" ${sec.type === 'MCQ' ? 'selected' : ''}>MCQ</option>
                            <option value="Short" ${sec.type === 'Short' ? 'selected' : ''}>Short</option>
                            <option value="Long" ${sec.type === 'Long' ? 'selected' : ''}>Long</option>
                        </select>
                        <select class="glass-select" onchange="window.updateBlueprint(${idx}, 'marks', this.value)">
                            <option value="1" ${sec.marks == 1 ? 'selected' : ''}>1 Mark</option>
                            <option value="2" ${sec.marks == 2 ? 'selected' : ''}>2 Marks</option>
                            <option value="5" ${sec.marks == 5 ? 'selected' : ''}>5 Marks</option>
                        </select>
                    </div>
                </div>
            `).join('');
            let t = 0;
            blueprint.forEach(s => t += s.count * s.marks);
            document.getElementById('total-marks').innerText = t;
        }

        window.startGeneration = async function() {
            const bankId = document.getElementById('bank-select').value;
            if (!bankId || selectedChapters.length === 0) {
                return Swal.fire({ icon: 'warning', title: 'Incomplete Config', text: 'Select a matrix and at least one chapter.', background: '#0a0a1a', color: '#fff' });
            }

            document.getElementById('genOverlay').classList.add('active');
            const res = await apiCall('/student/tests/generate', 'POST', {
                bankId, selectedChapters, blueprint: blueprint.filter(s => s.count > 0)
            });

            if (res.success) {
                localStorage.setItem('bp_paper_html', res.data.paperHtml);
                localStorage.setItem('bp_session_id', res.data.sessionId);
                setTimeout(() => window.location.href = 'student-edit-paper.html', 1500);
            } else {
                document.getElementById('genOverlay').classList.remove('active');
                Swal.fire({ icon: 'error', title: 'Generation Failed', text: res.message, background: '#0a0a1a', color: '#fff' });
            }
        };

        async function init() {
            const name = localStorage.getItem(BP.NAME) || 'Student';
            const icon = document.querySelector('.profile-icon');
            if (icon) icon.textContent = name.substring(0, 2).toUpperCase();

            const streakRes = await apiCall('/student/streak');
            if (streakRes.success) {
                document.getElementById('streak-val-header').textContent = streakRes.data.currentStreak || 0;
                BP.initStreakFlame('streak-canvas');
            }
            loadBanks();
            renderBlueprint();
        }

        initPage(guardStudent, init);
    </script>
    <style>@keyframes spin { 100% { transform: rotate(360deg); } }</style>
    <script src="/assets/js/ripple.js"></script>
</body>

</html>
