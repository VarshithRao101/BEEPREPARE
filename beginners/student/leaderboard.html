<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wall of Fame - BEEPREPARE</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../assets/css/student-theme.css">
    <link rel="stylesheet" href="../../assets/css/premium-student-ui.css">
    <style>
        :root {
            --gold: #FFD700;
            --silver: #C0C0C0;
            --bronze: #CD7F32;
        }

        .content-wrapper {
            animation: fadeIn 0.8s ease-out;
        }

        .leaderboard-container {
            max-width: 1000px;
            margin: 0 auto;
        }

        /* Podium Section */
        .podium-section {
            display: grid;
            grid-template-columns: 1fr 1.2fr 1fr;
            align-items: flex-end;
            gap: 20px;
            margin-bottom: 50px;
            padding: 20px 0;
        }

        .podium-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 32px;
            padding: 30px 15px;
            text-align: center;
            position: relative;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            animation: slideUp 0.6s ease-out forwards;
            opacity: 0;
        }

        .podium-card:hover {
            transform: translateY(-10px) scale(1.02);
            background: rgba(255, 255, 255, 0.05);
            border-color: var(--primary);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .podium-card.rank-1 {
            order: 2;
            padding: 50px 20px;
            background: linear-gradient(145deg, rgba(255, 215, 0, 0.1), rgba(20, 20, 20, 0.4));
            border: 1px solid var(--gold);
            animation-delay: 0.2s;
        }

        .podium-card.rank-2 { order: 1; border-color: var(--silver); animation-delay: 0.1s; }
        .podium-card.rank-3 { order: 3; border-color: var(--bronze); animation-delay: 0.3s; }

        .podium-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 3px solid rgba(255, 255, 255, 0.1);
            margin: 0 auto 15px auto;
            object-fit: cover;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        .rank-1 .podium-avatar {
            width: 110px;
            height: 110px;
            border-color: var(--gold);
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.3);
        }

        .podium-badge {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            padding: 6px 18px;
            border-radius: 20px;
            font-weight: 900;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .podium-name {
            font-weight: 800;
            font-size: 18px;
            color: #fff;
            margin-bottom: 5px;
        }

        .podium-stat {
            font-weight: 900;
            color: var(--primary);
            font-size: 22px;
        }

        /* Rank List */
        .rank-list {
            background: rgba(15, 15, 15, 0.4);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }

        .rank-row {
            display: grid;
            grid-template-columns: 80px 60px 1fr 100px 120px;
            align-items: center;
            padding: 18px 25px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 20px;
            margin-bottom: 12px;
            transition: all 0.3s ease;
            border: 1px solid transparent;
        }

        .rank-row:hover {
            background: rgba(255, 255, 255, 0.05);
            transform: scale(1.01);
            border-color: rgba(255, 215, 0, 0.2);
        }

        .rank-num { font-weight: 900; font-size: 20px; color: var(--text-muted); }
        .rank-img { width: 42px; height: 42px; border-radius: 12px; object-fit: cover; border: 1px solid rgba(255, 255, 255, 0.1); }
        .rank-name { font-weight: 700; color: #fff; font-size: 16px; }
        .rank-class { font-size: 11px; color: var(--text-muted); font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }
        .rank-exp-val { font-weight: 900; color: var(--primary); text-align: right; font-size: 18px; }

        .stat-toggle {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 40px;
        }

        .toggle-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-muted);
            padding: 10px 25px;
            border-radius: 15px;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            font-size: 12px;
        }

        .toggle-btn.active {
            background: var(--primary);
            color: #000;
            border-color: var(--primary);
            box-shadow: 0 5px 15px rgba(255, 215, 0, 0.3);
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        @media (max-width: 768px) {
            .podium-section { grid-template-columns: 1fr; gap: 40px; }
            .podium-card.rank-1 { order: 1; transform: scale(1.05); }
            .podium-card.rank-2 { order: 2; }
            .podium-card.rank-3 { order: 3; }
            .rank-row { 
                grid-template-columns: 40px 45px 1fr 60px 70px; 
                padding: 12px 15px; 
                gap: 10px;
            }
            .rank-class { display: none; }
            .rank-num { font-size: 16px; }
            .rank-img { width: 35px; height: 35px; }
            .rank-name { font-size: 14px; }
            .rank-exp-val { font-size: 14px; }
            .streak-container { transform: scale(0.8); }
        }

        .snapshot-notice {
            text-align: center;
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 40px;
            font-weight: 800;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <div class="main-layout" style="display: block; padding: 40px 20px; max-width: 1200px; margin: 0 auto;">
        <main class="content-wrapper">
            <header style="margin-bottom: 40px; display: flex; justify-content: space-between; align-items: flex-end; flex-wrap: wrap; gap: 20px;">
                <div style="display: flex; align-items: center; gap: 20px;">
                    <button onclick="window.location.href='student-profile.html'" style="background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: var(--primary); padding: 12px 20px; border-radius: 15px; cursor: pointer; font-weight: 800; display: flex; align-items: center; gap: 10px; transition: 0.3s;" onmouseover="this.style.background='rgba(255,215,0,0.1)'" onmouseout="this.style.background='rgba(255,255,255,0.05)'">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
                        Back to Profile
                    </button>
                    <div>
                        <h2 style="background: linear-gradient(135deg, #fff, var(--primary)); -webkit-background-clip: text; background-clip: text; color: transparent; margin: 0; font-size: 38px; font-weight: 900;">Wall of Fame</h2>
                        <p style="color: var(--text-muted); font-size: 12px; font-weight: 800; text-transform: uppercase; letter-spacing: 3px; margin-top: 5px;">The Top 100 Global Academic Elites</p>
                    </div>
                </div>
            </header>

            <div class="leaderboard-container">
                <div class="stat-toggle">
                    <button class="toggle-btn active" onclick="switchType('daily')">Daily</button>
                    <button class="toggle-btn" onclick="switchType('monthly')">Monthly</button>
                    <button class="toggle-btn" onclick="switchType('yearly')">Yearly</button>
                </div>

                <div id="podium-container" class="podium-section">
                    <!-- Dynamic -->
                </div>

                <div class="rank-list" id="rank-list-container">
                    <!-- Dynamic -->
                </div>

                <p class="snapshot-notice" id="update-notice">RANKINGS UPDATED ONCE EVERY 24 HOURS</p>
            </div>
        </main>
    </div>


    <script type="module">
        import { apiCall, guardStudent, initPage, BP } from '../../assets/js/bee-core.js';

        let currentType = 'daily';

        async function loadLeaderboard() {
            const res = await apiCall(`/leaderboard/global?type=${currentType}`, 'GET');
            if (res && res.success) {
                renderLeaderboard(res.rankings);
                if (res.lastUpdated) {
                    const date = new Date(res.lastUpdated).toLocaleString();
                    document.getElementById('update-notice').innerText = `SYNCED ON: ${date} • UPDATES EVERY 24H`;
                }
            }
        }

        window.switchType = (type) => {
            currentType = type;
            document.querySelectorAll('.toggle-btn').forEach(btn => {
                btn.classList.toggle('active', btn.innerText.toLowerCase() === type);
            });
            loadLeaderboard();
        };

        function renderLeaderboard(rankings) {
            const podiumContainer = document.getElementById('podium-container');
            const listContainer = document.getElementById('rank-list-container');
            
            podiumContainer.innerHTML = '';
            listContainer.innerHTML = '';

            if (!rankings || rankings.length === 0) {
                listContainer.innerHTML = `<div style="padding:60px;text-align:center;color:var(--text-muted);">
                    <div style="font-size:40px; margin-bottom:20px;">🏆</div>
                    <p style="font-weight:800; color:#fff;">No Data Yet</p>
                    <p style="font-size:12px;">Rankings sync every 24 hours. Check back soon!</p>
                </div>`;
                return;
            }

            const top3 = rankings.slice(0, 3);
            const rest = rankings.slice(3);

            const colors = ['var(--gold)', 'var(--silver)', 'var(--bronze)'];
            const labels = ['Champion', 'Elite', 'Pro'];

            const displayOrder = [1, 0, 2];
            displayOrder.forEach(idx => {
                const r = top3[idx];
                if (!r) return;
                podiumContainer.insertAdjacentHTML('beforeend', `
                    <div class="podium-card rank-${idx + 1}">
                        <div class="podium-badge" style="background: ${colors[idx]}; color: #000;">#${idx + 1} ${labels[idx]}</div>
                        <img src="${r.photoUrl || '../../assets/images/default-avatar.png'}" class="podium-avatar" onerror="this.src='../../assets/images/default-avatar.png'">
                        <div class="podium-name">${r.displayName}</div>
                        <div class="podium-stat">${r.exp} <span style="font-size:10px; opacity:0.6">XP</span></div>
                        <div style="font-size:10px; color: var(--text-muted); font-weight:800; margin-top:5px; text-transform:uppercase;">${r.className || 'Academy Student'}</div>
                    </div>
                `);
            });

            rest.forEach(r => {
                const rowId = `streak-${r.userId}`;
                const row = `
                    <div class="rank-row">
                        <div class="rank-num">#${r.rank}</div>
                        <img src="${r.photoUrl || '../../assets/images/default-avatar.png'}" class="rank-img" onerror="this.src='../../assets/images/default-avatar.png'">
                        <div>
                            <div class="rank-name">${r.displayName}</div>
                            <div class="rank-class">${r.className || 'Student'}</div>
                        </div>
                        <div class="streak-container" style="text-align: center; display: flex; flex-direction: column; align-items: center;">
                            <canvas id="${rowId}" width="16" height="16" style="width: 24px; height: 24px; image-rendering: pixelated;"></canvas>
                            <div style="font-size:9px; color: #fff; font-weight:900; margin-top: -2px;">${r.streak}</div>
                        </div>
                        <div class="rank-exp-val">${r.exp} <span style="font-size:10px; opacity:0.5">XP</span></div>
                    </div>
                `;
                listContainer.insertAdjacentHTML('beforeend', row);
                // Draw static flame
                setTimeout(() => BP.drawStaticFlame(rowId), 0);
            });
        }

        initPage(guardStudent, loadLeaderboard);
    </script>
</body>
</html>
