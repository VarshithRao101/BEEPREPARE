<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wall of Fame - BEEPREPARE</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../assets/css/student-theme.css">
    <link rel="stylesheet" href="../../assets/css/premium-student-ui.css">
    <style>
        :root {
            --gold: #FFD700;
            --silver: #C0C0C0;
            --bronze: #CD7F32;
        }

        .leaderboard-container {
            max-width: 1000px;
            margin: 0 auto;
        }

        /* Toggle Buttons */
        .stat-toggle {
            display: flex;
            background: rgba(255, 255, 255, 0.05);
            padding: 5px;
            border-radius: 16px;
            border: 1px solid var(--border);
            width: fit-content;
            margin: 0 auto 40px auto;
        }

        .toggle-btn {
            padding: 10px 24px;
            border-radius: 12px;
            border: none;
            background: transparent;
            color: var(--text-muted);
            font-weight: 800;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: 0.3s;
        }

        .toggle-btn.active {
            background: var(--primary);
            color: #000;
            box-shadow: 0 4px 15px rgba(255, 215, 0, 0.3);
        }

        /* Podium Spotlight */
        .podium {
            display: grid;
            grid-template-columns: 1fr 1.2fr 1fr;
            align-items: flex-end;
            gap: 20px;
            margin-bottom: 50px;
        }

        .podium-item {
            text-align: center;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 30px 15px;
            position: relative;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .podium-item:hover {
            transform: translateY(-10px);
            border-color: var(--primary);
        }

        .podium-item.first {
            order: 2;
            padding: 50px 20px;
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.1), rgba(0,0,0,0));
            border-color: var(--gold);
        }

        .podium-item.second { order: 1; border-color: var(--silver); }
        .podium-item.third { order: 3; border-color: var(--bronze); }

        .podium-photo {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 3px solid var(--border);
            margin: 0 auto 15px auto;
            object-fit: cover;
            background: var(--surface);
        }

        .first .podium-photo { width: 100px; height: 100px; border-color: var(--gold); box-shadow: 0 0 30px rgba(255, 215, 0, 0.3); }

        .podium-name { font-weight: 800; font-size: 16px; margin-bottom: 5px; color: #fff; }
        .podium-exp { font-weight: 900; font-size: 20px; color: var(--primary); }
        .podium-rank-tag {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            padding: 5px 15px;
            border-radius: 10px;
            font-weight: 900;
            font-size: 12px;
            text-transform: uppercase;
        }

        /* List View */
        .rank-list {
            background: rgba(255, 255, 255, 0.02);
            border-radius: 24px;
            border: 1px solid var(--border);
            overflow: hidden;
        }

        .rank-row {
            display: grid;
            grid-template-columns: 80px 60px 1fr 100px 120px;
            align-items: center;
            padding: 15px 25px;
            border-bottom: 1px solid var(--border);
            transition: 0.2s;
        }

        .rank-row:last-child { border-bottom: none; }
        .rank-row:hover { background: rgba(255, 215, 0, 0.03); }

        .rank-num { font-weight: 900; font-size: 18px; color: var(--text-muted); }
        .rank-img { width: 36px; height: 36px; border-radius: 50%; object-fit: cover; border: 1px solid var(--border); }
        .rank-name { font-weight: 700; color: #fff; }
        .rank-class { font-size: 11px; color: var(--text-muted); font-weight: 800; text-transform: uppercase; }
        .rank-exp-val { font-weight: 900; color: var(--primary); text-align: right; }

        @media (max-width: 768px) {
            .podium { grid-template-columns: 1fr; }
            .podium-item { order: initial !important; }
            .rank-row { grid-template-columns: 50px 50px 1fr 80px; }
            .rank-class { display: none; }
        }

        .snapshot-notice {
            text-align: center;
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 30px;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <div class="main-layout">
        <!-- Sidebar and Nav remain same as student-home.html -->
        <aside class="pc-sidebar">
            <div class="sidebar-brand"><span style="color: var(--primary);">BEE</span>COMMAND</div>
            <nav class="sidebar-nav">
                <a href="student-home.html" class="sidebar-link">
                    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z" /></svg>
                    <span>Dashboard</span>
                </a>
                <a href="student-bank.html" class="sidebar-link">
                    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path></svg>
                    <span>Bank Inventory</span>
                </a>
                <a href="leaderboard.html" class="sidebar-link active">
                    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
                    <span>Wall of Fame</span>
                </a>
                <!-- Other links same as home -->
            </nav>
        </aside>

        <main class="content-wrapper">
            <header style="margin-bottom: 40px;">
                <h2 class="welcome-title-styled" style="background: linear-gradient(135deg, #fff, var(--primary)); -webkit-background-clip: text; background-clip: text; color: transparent; margin: 0; font-size: 36px; font-weight: 900;">Wall of Fame</h2>
                <p style="color: var(--text-muted); font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; margin-top: 5px;">Top 100 Global Academic Elites</p>
            </header>

            <div class="leaderboard-container">
                <!-- Toggle -->
                <div class="stat-toggle">
                    <button class="toggle-btn active" onclick="switchType('daily')">Daily</button>
                    <button class="toggle-btn" onclick="switchType('monthly')">Monthly</button>
                    <button class="toggle-btn" onclick="switchType('yearly')">Yearly</button>
                </div>

                <!-- Podium -->
                <div id="podium-container" class="podium">
                    <!-- Dynamic -->
                </div>

                <!-- List -->
                <div class="rank-list" id="rank-list-container">
                    <!-- Dynamic -->
                </div>

                <p class="snapshot-notice" id="update-notice">RANKINGS UPDATED ONCE EVERY 24 HOURS</p>
            </div>
        </main>
    </div>

    <!-- Bottom Nav -->
    <nav class="nav-bottom">
        <a href="student-home.html" class="nav-item">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z" /></svg>
            <span>Home</span>
        </a>
        <a href="leaderboard.html" class="nav-item active">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
            <span>Ranks</span>
        </a>
        <a href="../ai-chat.html" class="nav-item">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 1 1-7.6-13.04 8.5 8.5 0 0 1 8.5 8.54c0 .24 0 .44-.05.7zM17.5 11a5.5 5.5 0 1 0-11 0 5.5 5.5 0 0 0 11 0z" /></svg>
            <span>AI</span>
        </a>
    </nav>

    <script type="module">
        import { apiCall, guardStudent, initPage } from '../../assets/js/bee-core.js';

        let currentType = 'daily';

        async function loadLeaderboard() {
            const res = await apiCall(`/leaderboard/global?type=${currentType}`, 'GET');
            if (res && res.success) {
                renderLeaderboard(res.rankings);
                if (res.lastUpdated) {
                    const date = new Date(res.lastUpdated).toLocaleString();
                    document.getElementById('update-notice').innerText = `SYNCED ON: ${date} • UPDATES EVERY 24H`;
                }
            }
        }

        window.switchType = (type) => {
            currentType = type;
            document.querySelectorAll('.toggle-btn').forEach(btn => {
                btn.classList.toggle('active', btn.innerText.toLowerCase() === type);
            });
            loadLeaderboard();
        };

        function renderLeaderboard(rankings) {
            const podiumContainer = document.getElementById('podium-container');
            const listContainer = document.getElementById('rank-list-container');
            
            podiumContainer.innerHTML = '';
            listContainer.innerHTML = '';

            if (!rankings || rankings.length === 0) {
                listContainer.innerHTML = `<div style="padding:40px;text-align:center;color:var(--text-muted);">No rankings data for this period yet. Check back after the next 24h sync.</div>`;
                return;
            }

            // Top 3
            const top3 = rankings.slice(0, 3);
            const rest = rankings.slice(3);

            const rankLabels = ['first', 'second', 'third'];
            const rankNames = ['Champion', 'Elite', 'Pro'];
            const colors = ['var(--gold)', 'var(--silver)', 'var(--bronze)'];

            // We need to render 2nd, 1st, 3rd in that order for visual order 1,2,3
            const podiumOrder = [1, 0, 2]; // index in top3
            podiumOrder.forEach(idx => {
                const r = top3[idx];
                if (!r) return;
                const podiumHtml = `
                    <div class="podium-item ${rankLabels[idx]}">
                        <div class="podium-rank-tag" style="background: ${colors[idx]}; color: #000;">#${idx + 1} ${rankNames[idx]}</div>
                        <img src="${r.photoUrl || '../../assets/images/default-avatar.png'}" class="podium-photo" onerror="this.src='../../assets/images/default-avatar.png'">
                        <div class="podium-name">${r.displayName}</div>
                        <div class="podium-exp">${r.exp} <span style="font-size:10px; opacity:0.6">EXP</span></div>
                        <div style="font-size:10px; color: var(--text-muted); font-weight:800; margin-top:5px; text-transform:uppercase;">${r.className || 'Academy Student'}</div>
                    </div>
                `;
                podiumContainer.insertAdjacentHTML('beforeend', podiumHtml);
            });

            // List
            rest.forEach(r => {
                const row = `
                    <div class="rank-row">
                        <div class="rank-num">#${r.rank}</div>
                        <img src="${r.photoUrl || '../../assets/images/default-avatar.png'}" class="rank-img" onerror="this.src='../../assets/images/default-avatar.png'">
                        <div>
                            <div class="rank-name">${r.displayName}</div>
                            <div class="rank-class">${r.className || 'Student'}</div>
                        </div>
                        <div style="text-align: center;">
                            <div style="font-weight:900; color: #fff; font-size:14px;">${r.streak}</div>
                            <div style="font-size:8px; color: var(--primary); font-weight:800;">STREAK</div>
                        </div>
                        <div class="rank-exp-val">${r.exp} <span style="font-size:9px; opacity:0.5">XP</span></div>
                    </div>
                `;
                listContainer.insertAdjacentHTML('beforeend', row);
            });
        }

        initPage(guardStudent, loadLeaderboard);
    </script>
</body>
</html>
