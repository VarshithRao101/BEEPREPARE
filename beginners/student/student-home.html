<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Student Hub - BEEPREPARE</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../assets/css/premium-student-ui.css">
    <link rel="stylesheet" href="../../assets/css/loader.css">
    <style>
        :root {
            --primary: #FFD700;
            --accent: #FFA500;
            --bg-dark: #000000;
            --surface: rgba(15, 15, 15, 0.8);
            --border: rgba(255, 215, 0, 0.2);
            --text-main: #FFFFFF;
            --text-muted: #888888;
        }

        body {
            background-color: var(--bg-dark) !important;
            margin: 0 !important;
            font-family: 'Outfit', sans-serif;
            color: var(--text-main) !important;
            overflow-x: hidden;
        }

        .main-bg {
            position: fixed;
            inset: 0;
            background: url('../../assets/images/premium-bg.png') no-repeat center center;
            background-size: cover;
            z-index: -1;
            filter: brightness(0.3);
        }

        /* Signal Dot */
        .signal-dot {
            width: 8px;
            height: 8px;
            background: #ff4d4d;
            border-radius: 50%;
            position: absolute;
            top: -2px;
            right: -2px;
            box-shadow: 0 0 10px #ff4d4d;
            display: none;
            animation: pulse-red 2s infinite;
        }

        @keyframes pulse-red {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.5); opacity: 0.5; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* Dashboard specific layout */
        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 25px;
            width: 95%;
            max-width: 1300px;
            margin: 0 auto;
            padding: 20px 0;
        }

        .main-sections {
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .section-card {
            background: var(--surface);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 25px;
        }

        .section-title {
            font-size: 18px;
            font-weight: 800;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .subject-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 15px;
        }

        .subject-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 215, 0, 0.05);
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            transition: 0.3s;
            cursor: pointer;
        }

        .subject-card:hover {
            transform: translateY(-5px);
            background: rgba(255, 215, 0, 0.05);
            border-color: var(--primary);
        }

        .stat-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 20px;
        }

        .stat-box {
            background: rgba(255, 255, 255, 0.02);
            border-radius: 18px;
            padding: 15px;
            text-align: center;
        }

        /* Plain Quote Header */
        .quote-header-plain {
            background: linear-gradient(to bottom, rgba(255,215,0,0.05), transparent);
            padding: 40px 5%;
            text-align: center;
            border-bottom: 1px solid rgba(255,215,0,0.05);
        }

        .quote-text-plain {
            font-size: 20px;
            font-weight: 800;
            color: #fff;
            max-width: 800px;
            margin: 0 auto 10px;
            line-height: 1.4;
        }

        .quote-author-plain {
            font-size: 11px;
            font-weight: 900;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        @media (max-width: 1024px) {
            .dashboard-grid { grid-template-columns: 1fr; }
            .sidebar-sections { display: none; }
        }
    </style>
</head>

<body>
    <div class="main-bg"></div>

    <!-- Top Nav -->
    <nav style="padding: 20px 5%; display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.3); backdrop-filter: blur(10px); sticky; top:0; z-index:100;">
        <div style="display: flex; align-items: center; gap: 15px;">
            <span style="font-weight: 900; font-size: 24px; letter-spacing: -1px;"><span style="color: var(--primary);">BEE</span>PREPARE</span>
            <div style="height: 20px; width: 1px; background: rgba(255,255,255,0.1);"></div>
            <div style="display: flex; align-items: center; gap: 8px; background: rgba(255,215,0,0.1); padding: 5px 12px; border-radius: 12px; border: 1px solid rgba(255,215,0,0.2);">
                <canvas id="streak-canvas" width="16" height="16"></canvas>
                <span id="streak-val-header" style="font-weight: 900; font-size: 13px; color: var(--primary);">0</span>
            </div>
        </div>
        
        <div style="display: flex; align-items: center; gap: 20px;">
            <button onclick="window.location.href='student-bank.html'" class="btn-adv" style="padding: 8px 16px; font-size: 12px; border-radius: 10px;">+ New Bank</button>
            <div id="profile-icon-btn" onclick="window.location.href='student-profile.html'" style="width: 40px; height: 40px; border-radius: 12px; background: var(--primary); color: #000; display: flex; align-items: center; justify-content: center; font-weight: 900; cursor: pointer; position: relative;">
                S
                <div id="profile-signal" class="signal-dot"></div>
            </div>
        </div>
    </nav>

    <!-- Quote Section -->
    <div id="quote-plain-container" class="quote-header-plain" style="display: none;">
        <p id="quote-text-plain" class="quote-text-plain">"Loading inspiration..."</p>
        <p id="quote-author-plain" class="quote-author-plain">Be Prepare</p>
    </div>

    <main class="dashboard-grid">
        <!-- Main Content -->
        <div class="main-sections">
            <header style="margin-bottom: 10px;">
                <h1 style="font-size: 32px; font-weight: 900; margin-bottom: 5px;">Student Hub</h1>
                <p style="color: var(--text-muted); font-size: 14px; font-weight: 600;">Welcome back to your repository.</p>
            </header>

            <section class="section-card">
                <div class="section-title">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path></svg>
                    My Banks
                </div>
                <div id="subject-container" class="subject-grid">
                    <!-- Skeletons injected by JS -->
                    <div class="skeleton sk-card"></div>
                    <div class="skeleton sk-card"></div>
                </div>
            </section>

            <section class="section-card">
                <div class="section-title">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline></svg>
                    Recent Activity
                </div>
                <div id="activity-log-wrapper">
                    <div class="skeleton sk-line"></div>
                    <div class="skeleton sk-line short"></div>
                </div>
            </section>
        </div>

        <!-- Sidebar -->
        <div class="sidebar-sections" style="display: flex; flex-direction: column; gap: 25px;">
            <section class="section-card" style="padding: 20px;">
                <div style="font-weight: 800; font-size: 14px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 15px;">Doubt Hub</div>
                <div class="recent-doubts">
                    <div class="empty-state" style="text-align: center; padding: 20px; color: var(--text-muted); font-size: 12px; border: 1px dashed rgba(255,255,255,0.05); border-radius: 15px;">
                        No active doubts found.
                    </div>
                </div>
                <button onclick="window.location.href='student-doubts.html'" class="btn-adv" style="width: 100%; margin-top: 15px; padding: 12px; font-size: 11px; border-radius: 12px; background: rgba(255,255,255,0.03); border: 1px solid var(--border); color: #fff;">Open Doubt Center</button>
            </section>

            <section class="section-card" style="padding: 20px;">
                <div style="font-weight: 800; font-size: 14px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 15px;">Quick Links</div>
                <div style="display: flex; flex-direction: column; gap: 10px;">
                    <a href="student-notes.html" class="adv-card" style="padding: 15px; font-size: 13px; font-weight: 700; display: flex; align-items: center; gap: 12px; text-decoration: none; color: #fff; position: relative;">
                        📖 Class Notes
                        <div id="sidebar-notes-signal" class="signal-dot"></div>
                    </a>
                    <a href="student-profile.html" class="adv-card" style="padding: 15px; font-size: 13px; font-weight: 700; display: flex; align-items: center; gap: 12px; text-decoration: none; color: #fff;">
                        👤 Edit Profile
                    </a>
                </div>
            </section>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script type="module">
        import { apiCall, guardStudent, initPage, BP } from '../../assets/js/bee-core.js';

        function timeAgo(date) {
            const seconds = Math.floor((new Date() - new Date(date)) / 1000);
            let interval = seconds / 31536000;
            if (interval > 1) return Math.floor(interval) + " years ago";
            interval = seconds / 2592000;
            if (interval > 1) return Math.floor(interval) + " months ago";
            interval = seconds / 86400;
            if (interval > 1) return Math.floor(interval) + " days ago";
            interval = seconds / 3600;
            if (interval > 1) return Math.floor(interval) + " hours ago";
            interval = seconds / 60;
            if (interval > 1) return Math.floor(interval) + " minutes ago";
            return Math.floor(seconds) + " seconds ago";
        }

        async function loadDashboard(showOverlay = true) {
            const [result, doubtsResult] = await Promise.all([
                apiCall('/student/dashboard', 'GET', null, true, false, showOverlay).catch(()=>null),
                apiCall('/student/doubts', 'GET', null, true, false, showOverlay).catch(()=>null)
            ]);
            
            if (result && result.success) {
                const d = result.data;

                // Quote
                if (d.dailyQuote) {
                    const qText = document.getElementById('quote-text-plain');
                    const qAuthor = document.getElementById('quote-author-plain');
                    if (qText) {
                        qText.innerText = `"${d.dailyQuote.text}"`;
                        qAuthor.innerText = d.dailyQuote.author || 'Be Prepare';
                        document.getElementById('quote-plain-container').style.display = 'block';
                    }
                }

                // Streak
                const streakVal = document.getElementById('streak-val-header');
                if (streakVal) streakVal.textContent = d.streak?.current || 0;
                BP.initStreakFlame('streak-canvas');

                // Subjects
                const subjectContainer = document.getElementById('subject-container');
                if (subjectContainer) {
                    subjectContainer.innerHTML = '';
                    if (d.subjects && d.subjects.length > 0) {
                        d.subjects.forEach(sub => {
                            const card = document.createElement('div');
                            card.className = 'subject-card';
                            card.innerHTML = `
                                <div style="width:40px;height:40px;margin:0 auto 10px;background:rgba(255,215,0,0.1);border-radius:10px;display:flex;align-items:center;justify-content:center;">
                                    <img src="../../assets/images/subjects/${sub.subject.toLowerCase()}.svg" style="width:24px;height:24px;" onerror="this.src='../../assets/images/subjects/default.svg'">
                                </div>
                                <div style="font-weight:800;font-size:12px;">${sub.subject}</div>
                            `;
                            card.onclick = () => window.location.href = `student-bank.html?subject=${sub.subject}`;
                            subjectContainer.appendChild(card);
                        });
                    } else {
                        subjectContainer.innerHTML = `<p style="grid-column:span 2;text-align:center;color:var(--text-muted);font-size:12px;">No banks found.</p>`;
                    }
                }

                // Activity
                const logWrapper = document.getElementById('activity-log-wrapper');
                if (logWrapper && d.activityLog) {
                    logWrapper.innerHTML = '';
                    d.activityLog.slice(0, 5).reverse().forEach(log => {
                        const item = document.createElement('div');
                        item.style = "margin-bottom:15px; border-left: 2px solid var(--primary); padding-left: 15px;";
                        item.innerHTML = `
                            <div style="font-size:13px;font-weight:800;">${log.title}</div>
                            <div style="font-size:11px;color:var(--text-muted);">${log.description} • ${timeAgo(log.createdAt)}</div>
                        `;
                        logWrapper.appendChild(item);
                    });
                }

                // Doubts
                if (doubtsResult && doubtsResult.success) {
                    const doubts = doubtsResult.data.chats.slice(0, 3);
                    const container = document.querySelector('.recent-doubts');
                    if (container && doubts.length > 0) {
                        container.innerHTML = '';
                        doubts.forEach(doubt => {
                            const dCard = document.createElement('div');
                            dCard.className = 'adv-card';
                            dCard.style = "padding:12px;margin-bottom:10px;cursor:pointer;font-size:12px;";
                            dCard.innerHTML = `<strong>${doubt.subject}</strong>: ${doubt.questionPreview || 'Doubt Details...'}`;
                            dCard.onclick = () => window.location.href = 'student-doubts.html';
                            container.appendChild(dCard);
                        });
                    }
                }
            }
        }

        // Initialize IMMEDIATELY
        initPage(guardStudent, loadDashboard);
        setInterval(() => loadDashboard(false), 30000);
    </script>
    <script src="../../assets/js/ripple.js"></script>
</body>

</html>
