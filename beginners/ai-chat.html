<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BEEPREPARE AI - Your Intelligent Assistant</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="../assets/css/premium-student-ui.css">
    <style>
        :root {
            --sidebar-width: 280px;
            --glass-bg: rgba(25, 25, 25, 0.65);
            --glass-border: rgba(255, 255, 255, 0.08);
            --chat-user-bg: rgba(255, 255, 255, 0.05);
            --chat-ai-bg: rgba(255, 215, 0, 0.04);
        }

        body {
            background-color: transparent !important;
            overflow: hidden;
            display: flex;
            height: 100vh;
            color: #fff;
        }

        /* --- LAYOUT STRUCTURE --- */
        .app-layout {
            display: flex;
            width: 100%;
            height: 100%;
            position: relative;
        }

        /* --- SIDEBAR (CHAT HISTORY) --- */
        .sidebar {
            width: var(--sidebar-width);
            background: rgba(10, 10, 10, 0.85);
            backdrop-filter: blur(20px);
            border-right: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
            transition: transform 0.3s ease;
            z-index: 1000;
        }

        .sidebar-header {
            padding: 24px 16px;
        }

        .new-chat-btn {
            width: 100%;
            background: var(--primary);
            color: #000;
            border: none;
            padding: 12px;
            border-radius: 12px;
            font-weight: 800;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 4px 15px rgba(255, 215, 0, 0.2);
        }

        .new-chat-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 215, 0, 0.4);
        }

        .search-chats {
            margin-top: 16px;
            position: relative;
        }

        .search-input {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            padding: 10px 12px 10px 35px;
            color: #fff;
            font-size: 13px;
        }

        .history-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .history-item {
            padding: 12px;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.2s;
            margin-bottom: 4px;
            position: relative;
        }

        .history-item:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .history-item.active {
            background: rgba(255, 215, 0, 0.08);
            border: 1px solid rgba(255, 215, 0, 0.1);
        }

        .history-title {
            font-size: 13px;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 4px;
        }

        .history-preview {
            font-size: 11px;
            color: #888;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* --- MAIN CHAT AREA --- */
        .chat-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: transparent;
            position: relative;
            height: 100%;
        }

        /* --- TOP BAR --- */
        .chat-header {
            padding: 16px 24px;
            background: rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header-info h2 {
            font-size: 18px;
            font-weight: 800;
            color: var(--primary);
            letter-spacing: 1px;
            margin: 0;
        }

        .header-info p {
            font-size: 11px;
            color: #888;
            margin: 2px 0 0 0;
        }

        .header-actions {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .icon-btn {
            background: none;
            border: none;
            color: #fff;
            opacity: 0.6;
            cursor: pointer;
            transition: 0.2s;
            padding: 6px;
        }

        .icon-btn:hover {
            opacity: 1;
            color: var(--primary);
        }

        /* --- MESSAGES AREA --- */
        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 40px 20% 120px;
            display: flex;
            flex-direction: column;
            gap: 32px;
        }

        /* Empty State */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            text-align: center;
            animation: fadeIn 0.5s ease;
        }

        .empty-state h1 {
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 24px;
            color: #fff;
        }

        .suggestion-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            max-width: 500px;
            width: 100%;
        }

        .suggestion-chip {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            padding: 16px;
            border-radius: 16px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            text-align: left;
        }

        .suggestion-chip:hover {
            background: rgba(255, 215, 0, 0.08);
            border-color: rgba(255, 215, 0, 0.3);
            transform: translateY(-2px);
        }

        /* Message Bubbles */
        .message {
            display: flex;
            gap: 16px;
            width: 100%;
            animation: slideUp 0.3s ease-out;
            max-width: 800px;
            margin: 0 auto;
        }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .message.user {
            flex-direction: row-reverse;
        }

        .message-avatar {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 14px;
        }

        .message.ai .message-avatar {
            background: var(--primary);
            color: #000;
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.3);
        }

        .message.user .message-avatar {
            background: #444;
            color: #fff;
        }

        .bubble {
            padding: 16px 20px;
            border-radius: 20px;
            font-size: 15px;
            line-height: 1.6;
            max-width: 85%;
            position: relative;
        }

        .message.ai .bubble {
            background: rgba(40, 40, 40, 0.6);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-top-left-radius: 4px;
        }

        .message.user .bubble {
            background: rgba(255, 215, 0, 0.95);
            color: #000;
            font-weight: 600;
            border-top-right-radius: 4px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        /* Code/Answer Blocks */
        .answer-block {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            margin-top: 12px;
            overflow: hidden;
        }

        .answer-header {
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.05);
            font-size: 11px;
            font-weight: 800;
            color: #aaa;
            text-transform: uppercase;
            display: flex;
            justify-content: space-between;
        }

        .answer-content {
            padding: 16px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            overflow-x: auto;
        }

        /* --- INPUT AREA --- */
        .input-container {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 30px 20% 40px;
            background: linear-gradient(to top, #000 40%, transparent);
            z-index: 100;
        }

        .input-box-wrapper {
            background: rgba(30, 30, 30, 0.85);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 8px 12px;
            display: flex;
            align-items: flex-end;
            gap: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        }

        .textarea-ai {
            flex: 1;
            background: transparent;
            border: none;
            color: #fff;
            padding: 10px 4px;
            font-size: 15px;
            outline: none;
            resize: none;
            max-height: 200px;
            font-family: inherit;
        }

        .input-btns {
            display: flex;
            gap: 8px;
            margin-bottom: 4px;
        }

        .action-btn {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: none;
            color: #aaa;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
        }

        .action-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
        }

        .send-btn-circle {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--primary);
            color: #000;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.3s;
        }

        .send-btn-circle:hover {
            transform: scale(1.1) rotate(-10deg);
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.4);
        }

        /* Quick Action Toolbar */
        .quick-toolbar {
            display: flex;
            gap: 8px;
            margin-top: 12px;
            justify-content: center;
        }

        .tool-btn-sm {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
            color: #ccc;
            cursor: pointer;
            transition: 0.2s;
        }

        .tool-btn-sm:hover {
            background: rgba(255, 215, 0, 0.1);
            color: var(--primary);
            border-color: var(--primary);
        }

        /* --- MOBILE RESPONSIVENESS --- */
        @media (max-width: 768px) {
            .sidebar {
                position: absolute;
                left: 0;
                top: 0;
                bottom: 0;
                transform: translateX(-100%);
            }
            .sidebar.active {
                transform: translateX(0);
            }
            .messages-container {
                padding: 40px 16px 140px;
            }
            .input-container {
                padding: 20px 16px 30px;
            }
            .suggestion-grid {
                grid-template-columns: 1fr;
            }
        }

        /* Typing Indicator */
        .typing {
            display: flex;
            gap: 4px;
            padding: 8px 0;
        }
        .dot {
            width: 6px;
            height: 6px;
            background: var(--primary);
            border-radius: 50%;
            animation: bounce 1s infinite alternate;
        }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce { to { transform: translateY(-4px); opacity: 0.3; } }
    </style>
</head>

<body>
    <!-- Background Animation -->
    <div class="background-animation">
        <div class="glow-orb orb-1"></div>
        <div class="glow-orb orb-2"></div>
    </div>

    <div class="app-layout">
        <!-- Sidebar Shell -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <button class="new-chat-btn" onclick="startNewChat()">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
                        <line x1="12" y1="5" x2="12" y2="19"></line>
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                    </svg>
                    New Chat
                </button>
                <div class="search-chats">
                    <div style="position: absolute; left: 12px; top: 11px; color: #666;">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="11" cy="11" r="8"></circle>
                            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                        </svg>
                    </div>
                    <input type="text" class="search-input" placeholder="Search conversations...">
                </div>
            </div>
            
            <div class="history-list">
                <div class="history-item active">
                    <div class="history-title">Physics Quiz Assistance</div>
                    <div class="history-preview">Sure, I can explain Electromagnetism...</div>
                </div>
                <div class="history-item">
                    <div class="history-title">Math Formula Memory</div>
                    <div class="history-preview">Try this mnemonic for Calculus...</div>
                </div>
                <!-- More items added dynamically -->
            </div>
        </aside>

        <!-- Main Content Shell -->
        <main class="chat-main">
            <!-- Header -->
            <header class="chat-header">
                <div style="display: flex; align-items: center; gap: 16px;">
                    <button class="icon-btn" onclick="toggleSidebar()" id="menu-toggle">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="3" y1="12" x2="21" y2="12"></line>
                            <line x1="3" y1="6" x2="21" y2="6"></line>
                            <line x1="3" y1="18" x2="21" y2="18"></line>
                        </svg>
                    </button>
                    <div class="header-info">
                        <h2>BEEPREPARE AI</h2>
                        <p>Ask anything. Learn faster.</p>
                    </div>
                </div>
                
                <div class="header-actions">
                    <button class="icon-btn" onclick="clearChat()">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M3 6h18m-2 0v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                        </svg>
                    </button>
                    <div style="width: 1px; height: 20px; background: rgba(255,255,255,0.1);"></div>
                    <div class="message-avatar" style="background: rgba(255,255,255,0.1); border-radius: 50%; width: 32px; height: 32px; cursor: pointer;">
                        VR
                    </div>
                </div>
            </header>

            <!-- Chat Area -->
            <div class="messages-container" id="chat-window">
                <!-- Empty State Shown Initially -->
                <div class="empty-state" id="empty-state">
                    <h1>How can I help you today?</h1>
                    <div class="suggestion-grid">
                        <div class="suggestion-chip" onclick="useSuggest('Explain Chapter 4 of Physics')">
                            Explain this chapter
                        </div>
                        <div class="suggestion-chip" onclick="useSuggest('Generate important questions for Class 10 Maths')">
                            Generate test questions
                        </div>
                        <div class="suggestion-chip" onclick="useSuggest('Summarize these chemical reactions')">
                            Summarize my notes
                        </div>
                        <div class="suggestion-chip" onclick="useSuggest('Solve this quadratic equation step by step')">
                            Solve this problem
                        </div>
                    </div>
                </div>
                <!-- Messages will appear here -->
            </div>

            <!-- Input Area -->
            <div class="input-container">
                <div class="input-box-wrapper">
                    <div class="input-btns">
                        <button class="action-btn" title="Upload File" onclick="document.getElementById('file-input').click()">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                                <polyline points="17 8 12 3 7 8"></polyline>
                                <line x1="12" y1="3" x2="12" y2="15"></line>
                            </svg>
                        </button>
                        <input type="file" id="file-input" hidden>
                    </div>

                    <textarea id="chat-input" class="textarea-ai" placeholder="Ask anything..." rows="1" oninput="resizeTextarea()"></textarea>
                    
                    <div class="input-btns">
                        <button class="action-btn" title="Voice Input">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path>
                                <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
                                <line x1="12" y1="19" x2="12" y2="23"></line>
                                <line x1="8" y1="23" x2="16" y2="23"></line>
                            </svg>
                        </button>
                        <button class="send-btn-circle" onclick="sendMessage()">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
                                <line x1="22" y1="2" x2="11" y2="13"></line>
                                <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                            </svg>
                        </button>
                    </div>
                </div>

                <!-- Quick Action Bar -->
                <div class="quick-toolbar" id="chat-tools" style="display: none;">
                    <button class="tool-btn-sm">Explain like 5th class</button>
                    <button class="tool-btn-sm">Exam important points</button>
                    <button class="tool-btn-sm">Generate questions</button>
                </div>
            </div>
        </main>
    </div>

    <script>
        const chatInput = document.getElementById('chat-input');
        const chatWindow = document.getElementById('chat-window');
        const emptyState = document.getElementById('empty-state');
        const sidebar = document.getElementById('sidebar');
        const tools = document.getElementById('chat-tools');

        function resizeTextarea() {
            chatInput.style.height = 'auto';
            chatInput.style.height = chatInput.scrollHeight + 'px';
        }

        function toggleSidebar() {
            sidebar.classList.toggle('active');
        }

        function useSuggest(text) {
            chatInput.value = text;
            sendMessage();
        }

        function sendMessage() {
            const text = chatInput.value.trim();
            if (!text) return;

            // Hide empty state
            emptyState.style.display = 'none';
            tools.style.display = 'flex';

            // 1. Add User Message
            appendMessage('user', text);
            chatInput.value = '';
            chatInput.style.height = 'auto';

            // 2. Add Typing Indicator
            const typingId = showTyping();

            // 3. Simulated Response
            setTimeout(() => {
                removeTyping(typingId);
                const response = getMockResponse(text);
                appendMessage('ai', response);
            }, 1500);
        }

        function appendMessage(role, content) {
            const msg = document.createElement('div');
            msg.className = `message ${role}`;
            
            const avatar = role === 'user' ? 'VR' : 'B';
            
            msg.innerHTML = `
                <div class="message-avatar">${avatar}</div>
                <div class="bubble">${content}</div>
            `;
            
            chatWindow.appendChild(msg);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        function showTyping() {
            const id = 'typing-' + Date.now();
            const msg = document.createElement('div');
            msg.className = `message ai`;
            msg.id = id;
            msg.innerHTML = `
                <div class="message-avatar">B</div>
                <div class="bubble">
                    <div class="typing">
                        <div class="dot"></div>
                        <div class="dot"></div>
                        <div class="dot"></div>
                    </div>
                </div>
            `;
            chatWindow.appendChild(msg);
            chatWindow.scrollTop = chatWindow.scrollHeight;
            return id;
        }

        function removeTyping(id) {
            const el = document.getElementById(id);
            if (el) el.remove();
        }

        function getMockResponse(query) {
            if (query.toLowerCase().includes('physics')) {
                return `That's a great topic! In Physics Chapter 4 (Electromagnetism), the most important concept is Faraday's Law.
                <div class="answer-block">
                    <div class="answer-header">💡 Faraday's Law Breakdown</div>
                    <div class="answer-content">
                        Ε = -N(dΦ/dt)
                    </div>
                </div>
                Try to remember: <strong>"Many Nests Need Different Times"</strong> to memorize the Magnetic Flux change formula!`;
            }
            return "I've processed your request. Based on our current syllabus, focusing on this specific topic will help you in the upcoming practice tests. Would you like me to generate a 5-question quiz for this?";
        }

        function clearChat() {
            chatWindow.innerHTML = '';
            chatWindow.appendChild(emptyState);
            emptyState.style.display = 'flex';
            tools.style.display = 'none';
        }

        function startNewChat() {
            clearChat();
            if (window.innerWidth <= 768) toggleSidebar();
        }

        // Enter support
        chatInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });
    </script>
</body>

</html>
