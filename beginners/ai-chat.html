<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BEE AI Assistant - ChatGPT Edition</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="../assets/css/premium-student-ui.css">
    <style>
        body {
            background-color: transparent !important;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .main-chat-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100%;
            position: relative;
        }

        /* ChatGPT Style Window */
        .chat-window {
            flex: 1;
            overflow-y: auto;
            padding: 20px 16px 140px;
            display: flex;
            flex-direction: column;
            gap: 24px;
            scroll-behavior: smooth;
        }

        /* Message Structure */
        .message-row {
            display: flex;
            gap: 12px;
            width: 100%;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .ai-avatar, .user-avatar-initials {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 800;
        }

        .ai-avatar {
            background: var(--primary);
            color: #000;
            box-shadow: 0 0 10px rgba(255, 215, 0, 0.3);
        }

        .user-avatar-initials {
            background: #444;
            color: #fff;
        }

        .message-content {
            flex: 1;
            color: #ececf1;
            font-size: 15px;
            line-height: 1.6;
        }

        /* Structured Response Boxes */
        .solution-section {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 16px;
            margin-top: 12px;
        }

        .solution-title {
            color: var(--primary);
            font-weight: 800;
            font-size: 12px;
            text-transform: uppercase;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .diagram-box {
            background: #1a1a1a;
            border-radius: 8px;
            padding: 10px;
            margin: 12px 0;
            text-align: center;
            border: 1px dashed rgba(255, 215, 0, 0.3);
        }

        .mnemonic-box {
            background: rgba(255, 215, 0, 0.08);
            border-left: 4px solid var(--primary);
            padding: 12px;
            border-radius: 0 8px 8px 0;
            margin-top: 12px;
            font-style: italic;
            color: #fff;
        }

        /* Upload Preview */
        .upload-preview {
            max-width: 200px;
            border-radius: 8px;
            margin-top: 10px;
            border: 2px solid var(--primary);
        }

        /* ChatGPT Input Area */
        .input-wrapper {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 20px;
            background: linear-gradient(to top, #050505 50%, transparent 100%);
            z-index: 1000;
        }

        .input-bar {
            max-width: 800px;
            margin: 0 auto;
            position: relative;
            background: rgba(30, 30, 30, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            display: flex;
            align-items: flex-end;
            padding: 10px 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .chat-textarea {
            flex: 1;
            background: transparent;
            border: none;
            color: #fff;
            padding: 8px 12px;
            outline: none;
            font-size: 15px;
            resize: none;
            max-height: 200px;
            font-family: inherit;
        }

        .input-actions {
            display: flex;
            gap: 8px;
            margin-bottom: 2px;
        }

        .action-icon-btn {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            border: none;
            background: rgba(255, 255, 255, 0.05);
            color: #aaa;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .action-icon-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
        }

        .send-pill-btn {
            background: var(--primary);
            color: #000;
            width: 36px;
            height: 36px;
            border-radius: 10px;
            border: none;
            font-weight: 800;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .send-pill-btn:disabled {
            background: #333;
            color: #666;
            cursor: not-allowed;
        }

        /* Top Bar */
        .chat-top-bar {
            padding: 16px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
    </style>
</head>

<body>
    <div class="background-animation">
        <div class="glow-orb orb-1"></div>
        <div class="glow-orb orb-2"></div>
    </div>

    <div class="main-chat-wrapper">
        <!-- Top Nav -->
        <div class="chat-top-bar">
            <div style="display: flex; align-items: center; gap: 12px;">
                <button onclick="window.history.back()" style="background: none; border: none; color: #fff; cursor: pointer; padding: 5px;">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                        <line x1="19" y1="12" x2="5" y2="12"></line>
                        <polyline points="12 19 5 12 12 5"></polyline>
                    </svg>
                </button>
                <div style="font-weight: 800; color: var(--primary); font-size: 16px; letter-spacing: 1px;">BEE AI 4.0</div>
            </div>
            <div style="font-size: 11px; font-weight: 700; color: #666; background: rgba(255,255,255,0.05); padding: 4px 10px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.05);">TURBO MODE</div>
        </div>

        <!-- Chat History -->
        <div class="chat-window" id="chat-window">
            <!-- AI Welcome Message -->
            <div class="message-row">
                <div class="ai-avatar">B</div>
                <div class="message-content">
                    Hello! I'm BEE AI. You can ask me questions, upload images of your homework, or ask for diagrammatic solutions. How can I help you excel today?
                </div>
            </div>
        </div>

        <!-- Input Area -->
        <div class="input-wrapper">
            <div class="input-bar">
                <div class="input-actions">
                    <button class="action-icon-btn" title="Upload Question" onclick="document.getElementById('file-upload').click()">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                            <polyline points="17 8 12 3 7 8"></polyline>
                            <line x1="12" y1="3" x2="12" y2="15"></line>
                        </svg>
                    </button>
                    <input type="file" id="file-upload" hidden accept="image/*" onchange="handleFileUpload(this)">
                </div>

                <textarea class="chat-textarea" id="chat-input" placeholder="Paste question or ask anything..." rows="1" oninput="autoResize(this)"></textarea>
                
                <button class="send-pill-btn" id="send-btn" onclick="sendMessage()">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
                        <line x1="22" y1="2" x2="11" y2="13"></line>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                    </svg>
                </button>
            </div>
            <div style="text-align: center; color: #444; font-size: 10px; margin-top: 8px; font-weight: 700; letter-spacing: 0.5px;">BEE AI CAN MAKE MISTAKES. VERIFY WITH YOUR TEACHER.</div>
        </div>
    </div>

    <script>
        let uploadedImage = null;

        function autoResize(textarea) {
            textarea.style.height = 'auto';
            textarea.style.height = textarea.scrollHeight + 'px';
        }

        function handleFileUpload(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    uploadedImage = e.target.result;
                    // Show small notification or preview logic here
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        function sendMessage() {
            const input = document.getElementById('chat-input');
            const message = input.value.trim();
            if (!message && !uploadedImage) return;

            // 1. Add User Message
            addUserMessage(message, uploadedImage);
            
            // Clear input
            input.value = '';
            input.style.height = 'auto';
            const tempImg = uploadedImage;
            uploadedImage = null;

            // 2. Add AI Response (Simulated structure)
            setTimeout(() => {
                addAIStructuredResponse(message, tempImg);
            }, 1000);
        }

        function addUserMessage(text, img) {
            const container = document.getElementById('chat-window');
            let content = text ? `<div>${text}</div>` : "";
            if (img) content += `<img src="${img}" class="upload-preview">`;

            container.innerHTML += `
                <div class="message-row" style="justify-content: flex-end;">
                    <div class="message-content" style="text-align: right; background: rgba(255,255,255,0.05); padding: 12px; border-radius: 12px;">${content}</div>
                    <div class="user-avatar-initials">VR</div>
                </div>
            `;
            container.scrollTop = container.scrollHeight;
        }

        function addAIStructuredResponse(query, wasImage) {
            const container = document.getElementById('chat-window');
            
            const diagramSVG = `<svg width="100" height="60" viewBox="0 0 100 60"><circle cx="50" cy="30" r="20" stroke="#FFD700" stroke-width="2" fill="none"/><line x1="10" y1="10" x2="90" y2="50" stroke="#444" stroke-width="1"/></svg>`;

            container.innerHTML += `
                <div class="message-row">
                    <div class="ai-avatar">B</div>
                    <div class="message-content">
                        Based on your question about <strong>${query || "the uploaded image"}</strong>, here is the detailed breakdown:
                        
                        <div class="solution-section">
                            <div class="solution-title">🔍 DETAILED SOLUTION</div>
                            To solve this, we must first identify the core principles. By applying the formula <strong>F = m × a</strong>, we can calculate the force required...
                            
                            <div class="diagram-box">
                                <div style="font-size: 10px; color: #666; margin-bottom: 5px;">CONCEPTUAL DIAGRAM</div>
                                ${diagramSVG}
                                <div style="font-size: 9px; color: #aaa; margin-top: 5px;">Visualization of the Forces involved</div>
                            </div>
                            
                            Step-by-step: 
                            1. Define the variables.
                            2. Substitute into the equation.
                            3. Simplify to get the final answer.
                        </div>

                        <div class="mnemonic-box">
                            <strong>💡 EASY WAY TO REMEMBER:</strong><br>
                            Think of "Fma" as <strong>"Fast Men Accelerate"</strong> to remember Force = Mass × Acceleration!
                        </div>
                    </div>
                </div>
            `;
            container.scrollTop = container.scrollHeight;
        }

        // Key support
        document.getElementById('chat-input').addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });
    </script>
</body>

</html>
