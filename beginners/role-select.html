<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Identity Selection - BEEPREPARE</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #FFD700;
            --accent: #FFA500;
            --bg-dark: #000000;
            --surface: rgba(18, 18, 18, 0.85);
            --text-main: #FFFFFF;
            --text-muted: #AAAAAA;
            --border: rgba(255, 215, 0, 0.25);
        }

        body {
            background-color: var(--bg-dark) !important;
            margin: 0 !important;
            padding: 0 !important;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Outfit', sans-serif;
            color: var(--text-main) !important;
            overflow-x: hidden;
        }

        .main-bg {
            position: fixed;
            inset: 0;
            background: url('../assets/images/premium-bg.png') no-repeat center center;
            background-size: cover;
            z-index: -1;
            filter: brightness(0.4);
        }

        .app-container {
            width: 100%;
            max-width: 900px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            animation: fadeIn 1s ease-out;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .selection-header {
            text-align: center;
            margin-bottom: 35px;
        }

        .selection-header h1 {
            font-size: 32px;
            font-weight: 900;
            background: linear-gradient(135deg, #fff, #FFD700);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 8px;
        }

        .role-grid {
            display: flex;
            gap: 30px;
            width: 100%;
            justify-content: center;
            flex-wrap: wrap;
        }

        .selection-card {
            background: var(--surface);
            backdrop-filter: blur(25px);
            border: 1px solid var(--border);
            border-radius: 28px;
            padding: 30px 20px;
            width: 280px;
            cursor: pointer;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-align: center;
            position: relative;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        }

        .selection-card:hover {
            transform: translateY(-15px) scale(1.02);
            border-color: var(--primary);
            box-shadow: 0 40px 80px rgba(255, 215, 0, 0.15);
        }

        .selection-card.selected {
            background: rgba(255, 215, 0, 0.05);
            border-color: var(--primary);
            box-shadow: 0 0 40px rgba(255, 215, 0, 0.2);
        }

        .role-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 20px;
            object-fit: contain;
            filter: drop-shadow(0 10px 20px rgba(0, 0, 0, 0.5));
        }

        .role-name {
            font-size: 18px;
            font-weight: 900;
            letter-spacing: 1.5px;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .role-desc {
            font-size: 14px;
            color: var(--text-muted);
            line-height: 1.6;
        }

        .verify-section {
            width: 100%;
            max-width: 450px;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid var(--border);
            border-radius: 25px;
            padding: 30px;
            margin-top: 40px;
            display: none;
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .input-premium {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            padding: 15px 20px;
            border-radius: 12px;
            color: #fff;
            margin-top: 15px;
            font-weight: 600;
            text-transform: uppercase;
            outline: none;
            transition: 0.3s;
        }

        .input-premium:focus {
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.1);
        }

        .btn-finalize {
            width: 100%;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            border: none;
            padding: 20px;
            border-radius: 15px;
            color: #000;
            font-size: 16px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            margin-top: 30px;
            transition: 0.3s;
            opacity: 0.5;
            pointer-events: none;
        }

        .btn-finalize.active {
            opacity: 1;
            pointer-events: all;
            box-shadow: 0 15px 30px rgba(255, 215, 0, 0.3);
        }

        .btn-finalize:hover {
            transform: translateY(-5px);
        }

        /* Mobile Adjustments */
        @media (max-width: 768px) {
            .role-grid {
                flex-direction: row !important;
                justify-content: center;
                align-items: flex-start;
                gap: 15px;
            }
            .selection-card {
                width: calc(50% - 10px);
                max-width: 170px;
                padding: 20px 10px;
                border-radius: 20px;
            }
            .role-icon {
                width: 50px;
                height: 50px;
                margin-bottom: 12px;
            }
            .role-name {
                font-size: 14px;
                margin-bottom: 5px;
            }
            .role-desc {
                font-size: 10px;
                line-height: 1.2;
            }
            .selection-header h1 {
                font-size: 24px;
            }
        }
    </style>
</head>

<body>
    <div class="main-bg"></div>

    <div class="app-container">
        <div class="selection-header">
            <h1 class="text-gradient-gold">Define Your Identity</h1>
            <p style="color: var(--text-muted); font-size: 14px; letter-spacing: 1px; text-transform: uppercase;">Step 3 of 3: System Access Configuration</p>
        </div>

        <div class="role-grid">
            <!-- Student Option -->
            <div class="selection-card" onclick="selectRole(this, 'student')">
                <img src="../assets/images/student.png" alt="Student" class="role-icon">
                <div class="role-name">Student</div>
                <div class="role-desc">Access lecture notes, practice tests, and performance analytics.</div>
            </div>

            <!-- Teacher Option -->
            <div class="selection-card" onclick="selectRole(this, 'teacher')">
                <img src="../assets/images/teacher.png" alt="Teacher" class="role-icon">
                <div class="role-name">Teacher</div>
                <div class="role-desc">Manage class modules, create assessments, and track student progress.</div>
            </div>
        </div>

        <div id="verify-box" class="verify-section">
            <div style="text-align: center; margin-bottom: 20px;">
                <div style="font-size: 10px; color: var(--primary); font-weight: 900; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 5px;">Security Verification</div>
                <div style="font-size: 13px; color: #fff;">Confirm your selection by typing <span id="target-text" style="color: var(--primary); font-weight: 900;">STUDENT</span></div>
            </div>
            
            <input type="text" id="role-input" class="input-premium" placeholder="Type here..." oninput="checkVerification()">

            <div style="display: flex; gap: 10px; align-items: flex-start; margin-top: 20px;">
                <input type="checkbox" id="terms-check" style="margin-top: 4px; accent-color: var(--primary);" onclick="checkVerification()">
                <label for="terms-check" style="font-size: 11px; color: var(--text-muted); line-height: 1.4;">
                    I confirm this role and understand this identity cannot be changed later.
                </label>
            </div>

            <button id="final-btn" class="btn-finalize" onclick="confirmRole()">
                Initialize Profile →
            </button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
        import { getAuth } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js';
        import { 
          firebaseConfig, 
          apiCall, 
          BP 
        } from '../assets/js/bee-core.js';

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        let selectedRoleLocal = '';

        window.selectRole = function(card, role) {
            document.querySelectorAll('.selection-card').forEach(c => c.classList.remove('selected'));
            card.classList.add('selected');
            selectedRoleLocal = role;

            const box = document.getElementById('verify-box');
            box.style.display = 'block';
            document.getElementById('target-text').innerText = role.toUpperCase();
            document.getElementById('role-input').value = '';
            document.getElementById('terms-check').checked = false;
            checkVerification();
        }

        window.checkVerification = function() {
            const input = document.getElementById('role-input').value.toUpperCase();
            const checked = document.getElementById('terms-check').checked;
            const btn = document.getElementById('final-btn');

            if (input === selectedRoleLocal.toUpperCase() && checked) {
                btn.classList.add('active');
            } else {
                btn.classList.remove('active');
            }
        }

        async function confirmRole() {
          const btn = document.getElementById('final-btn');
          btn.disabled = true;
          btn.innerText = 'Initializing...';

          try {
            const result = await apiCall('/auth/set-role', 'POST', { role: selectedRoleLocal });

            if (result && result.success) {
              localStorage.setItem(BP.ROLE, selectedRoleLocal);
              localStorage.setItem(BP.ACTIVATED, 'true'); // Final safety mark
              
              // Success feedback with fallback
              if (window.Swal) {
                Swal.fire({
                  icon: 'success',
                  title: 'Identity Confirmed',
                  text: 'Welcome to BEEPREPARE',
                  timer: 2000,
                  showConfirmButton: false,
                  background: '#1a1a2e',
                  color: '#ffffff'
                });
                setTimeout(() => {
                  window.location.href = selectedRoleLocal === 'teacher' ? 'teacher/teacher-home.html' : 'student/student-home.html';
                }, 2000);
              } else {
                console.warn('SweetAlert blocked - forcing immediate redirect');
                window.location.href = selectedRoleLocal === 'teacher' ? 'teacher/teacher-home.html' : 'student/student-home.html';
              }

            } else {
              const code = result?.error?.code;

              if (code === 'ROLE_ALREADY_SET') {
                const role = localStorage.getItem(BP.ROLE) || result.data.role;
                window.location.href = role === 'teacher' ? 'teacher/teacher-home.html' : 'student/student-home.html';
              } else if (code === 'NOT_ACTIVATED') {
                // User somehow bypassed guard
                window.location.href = '../activation.html';
              } else {
                btn.disabled = false;
                btn.innerText = 'Initialize Profile →';
                if (window.Swal) {
                  Swal.fire({
                    icon: 'error',
                    title: 'Error',
                    text: result?.message || 'Something went wrong',
                    toast: true,
                    position: 'top-end',
                    showConfirmButton: false,
                    timer: 3000,
                    background: '#1a1a2e',
                    color: '#ffffff'
                  });
                } else {
                  alert(result?.message || 'Error occurred during role selection.');
                }
              }
            }
          } catch (err) {
            btn.disabled = false;
            btn.innerText = 'Initialize Profile →';
            console.error('Role set error:', err);
            window.location.href = selectedRoleLocal === 'teacher' ? 'teacher/teacher-home.html' : 'student/student-home.html';
          }
        }
        window.confirmRole = confirmRole;

        // Page guard
        window.addEventListener('load', () => {
          const uid = localStorage.getItem(BP.UID);
          if (!uid) {
            window.location.href = '../index.html';
            return;
          }
          if (localStorage.getItem(BP.ACTIVATED) !== 'true') {
            window.location.href = '../activation.html';
            return;
          }
          const role = localStorage.getItem(BP.ROLE);
          if (role === 'teacher') {
            window.location.href = 'teacher/teacher-home.html';
          } else if (role === 'student') {
            window.location.href = 'student/student-home.html';
          }
        });
    </script>
</body>

</html>
