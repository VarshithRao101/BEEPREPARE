<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Question - BEEPREPARE</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="../../assets/css/style.css">
    <link rel="stylesheet" href="../../assets/css/teacher-theme.css">
    <link rel="stylesheet" href="../../assets/css/premium-student-ui.css">
    
    <style>
        :root {
            --bg-base: #0a0a0a;
            --bg-card: #141414;
            --primary-yellow: #FFD700;
            --primary-yellow-glow: rgba(255, 215, 0, 0.4);
            --border-soft: rgba(255, 255, 255, 0.08);
            --text-main: #ffffff;
            --text-muted: #888888;
        }

        body {
            background-color: var(--bg-base);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
        }

        .app-container {
            max-width: 600px;
            margin: 0 auto;
            padding: 24px;
            padding-bottom: 120px;
        }

        /* Form Panel */
        .form-panel {
            background: var(--bg-card);
            border: 1px solid var(--border-soft);
            border-radius: 24px;
            padding: 24px;
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .field-group {
            margin-bottom: 24px;
        }

        .field-label {
            display: block;
            font-size: 13px;
            font-weight: 700;
            color: var(--text-muted);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .glass-input, .glass-select {
            width: 100%;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-soft);
            border-radius: 12px;
            padding: 16px;
            color: #fff;
            font-family: inherit;
            font-size: 15px;
            outline: none;
            transition: 0.2s;
        }

        .glass-input:focus, .glass-select:focus {
            border-color: var(--primary-yellow);
            background: rgba(255, 255, 255, 0.05);
            box-shadow: 0 0 0 4px rgba(255, 215, 0, 0.1);
        }

        .main-textarea {
            min-height: 160px;
            resize: vertical;
            line-height: 1.6;
        }

        /* Difficulty Selector */
        .difficulty-nav {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }

        .diff-opt {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-soft);
            border-radius: 12px;
            padding: 12px;
            text-align: center;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-muted);
            transition: 0.2s;
        }

        .diff-opt:hover {
            border-color: var(--primary-yellow);
        }

        .diff-opt.active[data-level="Easy"] { background: rgba(76, 175, 80, 0.1); border-color: #4CAF50; color: #4CAF50; }
        .diff-opt.active[data-level="Medium"] { background: rgba(255, 193, 7, 0.1); border-color: #FFC107; color: #FFC107; }
        .diff-opt.active[data-level="Hard"] { background: rgba(244, 67, 54, 0.1); border-color: #F44336; color: #F44336; }

        /* Chips / Tags */
        .chips-container {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .chip {
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-soft);
            border-radius: 30px;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-muted);
            cursor: pointer;
            transition: 0.2s;
        }

        .chip.active {
            background: var(--primary-yellow);
            color: #000;
            border-color: var(--primary-yellow);
        }

        /* MCQ Options */
        .mcq-options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 16px;
        }

        .opt-wrap {
            position: relative;
        }

        .opt-prefix {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 12px;
            font-weight: 800;
            color: var(--primary-yellow);
        }

        .opt-input {
            padding-left: 32px;
        }

        /* Save Button */
        .save-btn {
            margin-top: 32px;
            width: 100%;
            background: var(--primary-yellow);
            color: #000;
            border: none;
            padding: 20px;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 800;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .save-btn:hover {
            transform: translateY(-4px);
            box-shadow: 0 15px 40px rgba(255, 215, 0, 0.2);
        }

        .save-btn:active {
            transform: scale(0.95);
        }

        /* Utils */
        .char-count {
            float: right;
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 4px;
        }

        /* Orbs */
        .glow-orb {
            position: fixed;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            filter: blur(100px);
            z-index: -1;
            opacity: 0.1;
        }
        .orb-1 { top: -100px; right: -50px; background: var(--primary-yellow); }
    </style>
</head>

<body>
    <div class="background-animation">
        <div class="glow-orb orb-1"></div>
        <div class="glow-orb orb-2"></div>
    </div>

    <div class="app-container">
        <!-- Top Title -->
        <header style="display: flex; align-items: center; justify-content: center; margin-bottom: 32px; position: relative;">
            <div onclick="history.back()" style="position: absolute; left: 0; cursor: pointer;">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="19" y1="12" x2="5" y2="12"></line>
                    <polyline points="12 19 5 12 12 5"></polyline>
                </svg>
            </div>
            <h1 style="font-size: 18px; font-weight: 800; letter-spacing: 1px; color: var(--primary-yellow);">ADD QUESTION</h1>
        </header>

        <div class="form-panel">
            <!-- Question Text -->
            <div class="field-group">
                <label class="field-label">Question Text</label>
                <textarea id="inp-text" class="glass-input main-textarea" placeholder="e.g. Define the law of reflection with a neat diagram." oninput="updateCharCount(this)"></textarea>
                <div class="char-count" id="char-count">0 characters</div>
            </div>

            <!-- Type & Marks -->
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
                <div class="field-group">
                    <label class="field-label">Question Type</label>
                    <select id="inp-type" class="glass-select" onchange="toggleMCQ(this.value)">
                        <option value="Very Short">Very Short</option>
                        <option value="Short">Short</option>
                        <option value="Long">Long</option>
                        <option value="Essay">Essay</option>
                        <option value="MCQ">MCQ</option>
                    </select>
                </div>
                <div class="field-group">
                    <label class="field-label">Marks</label>
                    <select id="inp-marks" class="glass-select">
                        <option value="1">1 Mark</option>
                        <option value="2">2 Marks</option>
                        <option value="3">3 Marks</option>
                        <option value="4">4 Marks</option>
                        <option value="5">5 Marks</option>
                    </select>
                </div>
            </div>

            <!-- MCQ Section (Dynamic) -->
            <div id="mcq-section" style="display: none; margin-bottom: 24px;">
                <label class="field-label">MCQ Options</label>
                <div class="mcq-options">
                    <div class="opt-wrap">
                        <span class="opt-prefix">A</span>
                        <input type="text" class="glass-input opt-input" placeholder="Option A">
                    </div>
                    <div class="opt-wrap">
                        <span class="opt-prefix">B</span>
                        <input type="text" class="glass-input opt-input" placeholder="Option B">
                    </div>
                    <div class="opt-wrap">
                        <span class="opt-prefix">C</span>
                        <input type="text" class="glass-input opt-input" placeholder="Option C">
                    </div>
                    <div class="opt-wrap">
                        <span class="opt-prefix">D</span>
                        <input type="text" class="glass-input opt-input" placeholder="Option D">
                    </div>
                </div>
            </div>

            <!-- Chapter Select -->
            <div class="field-group">
                <label class="field-label">Chapter</label>
                <select id="inp-chapter" class="glass-select">
                    <option>Light: Reflection & Refraction</option>
                    <option>Electricity</option>
                    <option>Magnetic Effects</option>
                </select>
            </div>

            <!-- Difficulty -->
            <div class="field-group">
                <label class="field-label">Difficulty Level</label>
                <div class="difficulty-nav">
                    <div class="diff-opt active" data-level="Easy" onclick="setDiff(this)">Easy</div>
                    <div class="diff-opt" data-level="Medium" onclick="setDiff(this)">Medium</div>
                    <div class="diff-opt" data-level="Hard" onclick="setDiff(this)">Hard</div>
                </div>
            </div>

            <!-- Tags -->
            <div class="field-group">
                <label class="field-label">Exam Focus Tags</label>
                <div class="chips-container">
                    <div class="chip" onclick="this.classList.toggle('active')">Important</div>
                    <div class="chip" onclick="this.classList.toggle('active')">Repeated</div>
                    <div class="chip" onclick="this.classList.toggle('active')">Exam Focus</div>
                    <div class="chip" onclick="this.classList.toggle('active')">Formula Based</div>
                </div>
            </div>

            <!-- Action -->
            <button class="save-btn" onclick="saveQuestion()">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
                    <polyline points="20 6 9 17 4 12"></polyline>
                </svg>
                <span>Save Question</span>
            </button>
        </div>
    </div>

    <!-- Success Feedback Overlay -->
    <div id="success-overlay" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; flex-direction: column; align-items: center; justify-content: center; backdrop-filter: blur(10px);">
        <div style="width: 80px; height: 80px; background: var(--primary-yellow); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-bottom: 24px; animation: scaleUp 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="4">
                <polyline points="20 6 9 17 4 12"></polyline>
            </svg>
        </div>
        <h2 style="font-size: 24px; font-weight: 800;">Question Saved!</h2>
        <p style="color: var(--text-muted); margin-top: 8px;">Redirecting back to bank...</p>
    </div>

    <script>
        function updateCharCount(el) {
            document.getElementById('char-count').innerText = el.value.length + ' characters';
        }

        function toggleMCQ(val) {
            document.getElementById('mcq-section').style.display = (val === 'MCQ') ? 'block' : 'none';
        }

        function setDiff(el) {
            document.querySelectorAll('.diff-opt').forEach(opt => opt.classList.remove('active'));
            el.classList.add('active');
        }

        function saveQuestion() {
            // Validation
            const text = document.getElementById('inp-text').value;
            if(!text.trim()) {
                alert('Please enter question text');
                return;
            }

            // Show Success Overlay
            document.getElementById('success-overlay').style.display = 'flex';
            
            setTimeout(() => {
                window.location.href = 'question-bank.html';
            }, 1500);
        }
    </script>
</body>

</html>
