<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Question - BEEPREPARE</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../assets/css/teacher-theme.css">
    <style>
        .form-layout {
            max-width: 800px;
            margin: 0 auto;
        }

        .field-group {
            margin-bottom: 25px;
        }

        .field-label {
            display: block;
            font-size: 11px;
            font-weight: 800;
            color: var(--primary);
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .glass-input, .glass-select {
            width: 100%;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 15px 20px;
            color: #fff;
            font-size: 14px;
            outline: none;
        }

        .glass-input:focus, .glass-select:focus {
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.05);
        }

        .difficulty-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
        }

        .diff-btn {
            padding: 12px;
            border-radius: 12px;
            text-align: center;
            font-size: 12px;
            font-weight: 800;
            color: var(--text-muted);
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border);
            cursor: pointer;
        }

        .diff-btn.active { border-color: var(--primary); color: #000; background: var(--primary); }

        .tag-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .chip {
            padding: 8px 18px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 800;
            color: var(--text-muted);
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border);
            cursor: pointer;
        }

        .chip.active { background: rgba(255, 215, 0, 0.1); color: var(--primary); border-color: var(--primary); }
        .chip.active.important { background: rgba(255, 77, 77, 0.1) !important; color: #ff4d4d !important; border-color: #ff4d4d !important; }

        .mcq-options-container {
            display: none;
            margin-top: 20px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px dashed var(--border);
            border-radius: 15px;
        }

        .mcq-option-row {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 12px;
        }

        .mcq-option-row:last-child { margin-bottom: 0; }

        .mcq-label {
            width: 35px;
            height: 35px;
            background: rgba(255, 215, 0, 0.1);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            color: var(--primary);
            flex-shrink: 0;
        }

        .save-btn {
            width: 100%;
            padding: 20px;
            background: var(--primary);
            border: none;
            border-radius: 15px;
            color: #000;
            font-weight: 900;
            font-size: 16px;
            cursor: pointer;
            margin-top: 30px;
        }

        @media screen and (max-width: 768px) {
            .form-layout { padding-bottom: 50px; }
        }

        /* SUCCESS ANIMATION OVERLAY */
        .success-overlay {
            position: fixed;
            inset: 0;
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(20px);
            z-index: 9999;
            opacity: 0;
            transition: 0.5s;
        }

        .success-overlay.active { display: flex; opacity: 1; }

        .checkmark-wrapper {
            width: 150px;
            height: 150px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .checkmark-circle {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 4px solid rgba(255, 215, 0, 0.1);
        }

        .checkmark-circle::after {
            content: '';
            position: absolute;
            inset: -15px;
            border-radius: 50%;
            border: 2px solid var(--primary);
            animation: pulseGlow 1.5s infinite;
        }

        .checkmark {
            width: 100px;
            height: 100px;
            stroke-width: 6;
            stroke: var(--primary);
            stroke-miterlimit: 10;
            fill: none;
            stroke-linecap: round;
        }

        .checkmark-path {
            stroke-dasharray: 100;
            stroke-dashoffset: 100;
            animation: strokeAnim 0.8s cubic-bezier(0.65, 0, 0.45, 1) 0.5s forwards;
        }

        @keyframes strokeAnim { 100% { stroke-dashoffset: 0; } }
        @keyframes pulseGlow { 
            0% { transform: scale(1); opacity: 0.8; } 
            100% { transform: scale(1.4); opacity: 0; } 
        }

        .success-text {
            margin-top: 30px;
            font-size: 20px;
            font-weight: 900;
            color: var(--primary);
            letter-spacing: 3px;
            text-transform: uppercase;
            animation: fadeInUpAdv 0.5s both 1s;
        }
    </style>
</head>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script type="module">
        import { 
          apiCall, 
          guardTeacher, 
          BP 
        } from '../../assets/js/bee-core.js';

        const params = new URLSearchParams(window.location.search);
        const bankId = params.get('bankId');
        const chapterId = params.get('chapterId');
        const chapterName = params.get('chapterName');
        const subject = params.get('subject');
        const cls = params.get('class');

        let diagramBase64 = null;

        window.previewDiagram = async function(input) {
            const file = input.files[0];
            if (!file) return;

            if (file.size > 1.5 * 1024 * 1024) {
                Swal.fire({ title: 'Image Too Large', text: 'Compressing to meet the 1.5MB architecture limit...', icon: 'info', toast: true, position: 'top-end', showConfirmButton: false, timer: 3000, background: '#111', color: '#fff' });
            }

            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.src = e.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    let width = img.width;
                    let height = img.height;
                    const maxWidth = 800;
                    const maxHeight = 800;
                    
                    if (width > height) {
                        if (width > maxWidth) {
                            height *= maxWidth / width;
                            width = maxWidth;
                        }
                    } else {
                        if (height > maxHeight) {
                            width *= maxHeight / height;
                            height = maxHeight;
                        }
                    }
                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    diagramBase64 = canvas.toDataURL('image/jpeg', 0.7); // Compression
                    
                    document.getElementById('diagramPreview').src = diagramBase64;
                    document.getElementById('diagramPreviewContainer').style.display = 'block';
                };
            };
            reader.readAsDataURL(file);
        };

        window.clearDiagram = function() {
            diagramBase64 = null;
            document.getElementById('diagramUpload').value = '';
            document.getElementById('diagramPreviewContainer').style.display = 'none';
        };

        window.toggleType = function(val) {
            document.getElementById('mcqContainer').style.display = (val === 'MCQ') ? 'block' : 'none';
            document.getElementById('matchingContainer').style.display = (val === 'Simple Matching') ? 'block' : 'none';
            document.getElementById('matrixContainer').style.display = (val === 'Matrix Matching') ? 'block' : 'none';
            
            const showSubQs = ['Reading Passage', 'Case Study', 'Data Interpretation'].includes(val);
            document.getElementById('subQuestionsContainer').style.display = showSubQs ? 'block' : 'none';

            const noDiagramTypes = ['True or False', 'Fill in the Blanks', 'Simple Matching', 'Matrix Matching', 'Reading Passage', 'Case Study'];
            if (noDiagramTypes.includes(val)) {
                document.getElementById('diagramSection').style.display = 'none';
                clearDiagram();
            } else {
                document.getElementById('diagramSection').style.display = 'block';
            }

            const hintCont = document.getElementById('hintContainer');
            if (val === 'Fill in the Blanks') {
                document.getElementById('hintText').innerHTML = "You have to put the blanks accordingly by typing underscores (e.g. The capital of France is ___).";
                hintCont.style.display = 'flex';
            } else if (val === 'True or False') {
                document.getElementById('hintText').innerHTML = "The output will automatically format the question with a [ True / False ] option at the end.";
                hintCont.style.display = 'flex';
            } else {
                hintCont.style.display = 'none';
            }
        }

        window.addMatchingRow = function() {
            const container = document.getElementById('matchingRows');
            if (container.children.length >= 10) return;
            const div = document.createElement('div');
            div.className = 'matching-row';
            div.style = 'display: flex; gap: 10px; margin-bottom: 10px;';
            div.innerHTML = `<input type="text" class="glass-input match-left" placeholder="Left Column Item">
                             <input type="text" class="glass-input match-right" placeholder="Right Column Item">`;
            container.appendChild(div);
        }

        window.addMatrixItem = function(type) {
            const container = document.getElementById(`matrix${type}s`); // matrixRows or matrixCols
            if (container.children.length >= 10) return;
            const input = document.createElement('input');
            input.type = 'text';
            input.className = `glass-input matrix-${type.toLowerCase()}-input`;
            input.placeholder = `${type} Item`;
            input.style = 'margin-bottom: 10px;';
            container.appendChild(input);
        }

        window.addSubQuestion = function() {
            const container = document.getElementById('subQuestionsList');
            const idx = container.children.length + 1;
            const div = document.createElement('div');
            div.className = 'sub-q-row';
            div.style = 'display: flex; gap: 10px; margin-bottom: 10px; align-items: center;';
            div.innerHTML = `<span style="font-weight: bold; color: var(--primary);" class="sub-q-idx">${idx}.</span>
                             <input type="text" class="glass-input sub-q-text" placeholder="Sub-question text...">
                             <input type="number" class="glass-input sub-q-marks" placeholder="Marks" value="1" style="width: 80px;" min="1" max="10">`;
            container.appendChild(div);
        }

        window.selectDiff = function(el) {
            document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
        }

        window.toggleChip = function(el) {
            el.classList.toggle('active');
        }

        window.saveQuestion = async function() {
            // Collect all form values
            const questionText = document.getElementById('qText').value.trim();
            const questionType = document.querySelector('#complexitySelect').value;
            const marksStr = document.querySelector('#marksSelect').value;
            const marks = parseInt(marksStr);

            const diffBtn = document.querySelector('.diff-btn.active');
            let difficulty = diffBtn ? diffBtn.textContent.trim() : 'EASY';
            
            // Map to standard backend casing
            const diffMap = { 'EASY': 'Easy', 'MEDIUM': 'Medium', 'HARD': 'Hard' };
            difficulty = diffMap[difficulty] || difficulty;

            const activeTags = Array.from(document.querySelectorAll('.chip.active'))
                .map(c => c.textContent.trim());

            let mcqOptions = null;
            let pairs = [];
            let rows = [];
            let columns = [];
            let subQuestions = [];

            if (questionType === 'MCQ') {
                const optionInputs = document.querySelectorAll('#mcqContainer .glass-input');
                mcqOptions = {
                    A: optionInputs[0]?.value.trim(),
                    B: optionInputs[1]?.value.trim(),
                    C: optionInputs[2]?.value.trim(),
                    D: optionInputs[3]?.value.trim()
                };
            } else if (questionType === 'Simple Matching') {
                document.querySelectorAll('.matching-row').forEach(row => {
                    const l = row.querySelector('.match-left').value.trim();
                    const r = row.querySelector('.match-right').value.trim();
                    if (l || r) pairs.push({ left: l, right: r });
                });

                if (pairs.length === 0) {
                    Swal.fire({
                        icon: 'warning',
                        title: 'Empty Matching',
                        text: 'Please add at least one matching pair.',
                        toast: true,
                        position: 'top-end',
                        showConfirmButton: false,
                        timer: 3000,
                        background: '#1a1a2e',
                        color: '#ffffff'
                    });
                    return;
                }
            } else if (questionType === 'Matrix Matching') {
                document.querySelectorAll('.matrix-row-input').forEach(inp => {
                    if (inp.value.trim()) rows.push(inp.value.trim());
                });
                document.querySelectorAll('.matrix-col-input').forEach(inp => {
                    if (inp.value.trim()) columns.push(inp.value.trim());
                });
            } else if (['Reading Passage', 'Case Study', 'Data Interpretation'].includes(questionType)) {
                document.querySelectorAll('.sub-q-row').forEach(row => {
                    const t = row.querySelector('.sub-q-text').value.trim();
                    const m = parseInt(row.querySelector('.sub-q-marks').value) || 1;
                    if (t) subQuestions.push({ questionText: t, marks: m });
                });
            }

            // Validation
            if (!questionText || questionText.length < 10) {
                Swal.fire({
                    icon: 'warning',
                    title: 'Too Short',
                    text: 'Question must be at least 10 characters.',
                    toast: true,
                    position: 'top-end',
                    showConfirmButton: false,
                    timer: 3000,
                    background: '#1a1a2e',
                    color: '#ffffff'
                });
                return;
            }

            if (questionType === 'MCQ') {
                if (!mcqOptions.A || !mcqOptions.B || !mcqOptions.C || !mcqOptions.D) {
                    Swal.fire({
                        icon: 'warning',
                        title: 'Incomplete MCQ',
                        text: 'Please fill all 4 MCQ options.',
                        toast: true,
                        position: 'top-end',
                        showConfirmButton: false,
                        timer: 3000,
                        background: '#1a1a2e',
                        color: '#ffffff'
                    });
                    return;
                }
            }

            const saveBtn = document.querySelector('.save-btn');
            const originalText = saveBtn.textContent;
            saveBtn.textContent = '🚀 SYNCHRONIZING...';
            saveBtn.disabled = true;
            saveBtn.style.opacity = '0.7';
            saveBtn.style.cursor = 'wait';

            try {
                const result = await apiCall('/teacher/questions', 'POST', {
                    bankId,
                    chapterId,
                    chapterName,
                    questionText,
                    questionType,
                    marks,
                    difficulty,
                    tags: activeTags,
                    mcqOptions,
                    pairs,
                    rows,
                    columns,
                    subQuestions,
                    imageUrl: diagramBase64
                });

                if (result && result.success) {
                    const overlay = document.getElementById('successOverlay');
                    if (overlay) overlay.classList.add('active');
                    setTimeout(() => {
                        window.location.href = `question-bank.html?bankId=${bankId}`;
                    }, 2000);
                } else {
                    saveBtn.textContent = originalText;
                    saveBtn.disabled = false;
                    Swal.fire({
                        icon: 'error',
                        title: 'Save Failed',
                        text: result?.message || 'Could not save question.',
                        toast: true,
                        position: 'top-end',
                        showConfirmButton: false,
                        timer: 3000,
                        background: '#1a1a2e',
                        color: '#ffffff'
                    });
                }
            } catch (err) {
                saveBtn.textContent = originalText;
                saveBtn.disabled = false;
                console.error('Save question error:', err);
            }
        }

        // Initialize
        const name = localStorage.getItem(BP.NAME) || 'T';
        const profileIcon = document.querySelector('.profile-icon');
        if (profileIcon) {
            profileIcon.innerText = name[0].toUpperCase();
            profileIcon.classList.add('has-signal');
            if (!document.getElementById('profile-signal')) {
                const dot = document.createElement('div');
                dot.id = 'profile-signal';
                dot.className = 'signal-dot';
                profileIcon.appendChild(dot);
            }
        }
        if (!(await guardTeacher())) throw new Error('Unauthorized');
        BP.syncTeacherSignals();

        if (subject && cls && chapterName) {
            const subTitle = document.querySelector('header p');
            subTitle.innerHTML = `${subject} (Class ${cls}) • <span style="color: var(--primary)">${chapterName}</span>`;
        }
    </script>
</body>
</html>
