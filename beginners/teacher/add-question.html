<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Question - BEEPREPARE</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../assets/css/teacher-theme.css">
    <style>
        .form-layout {
            max-width: 800px;
            margin: 0 auto;
        }

        .field-group {
            margin-bottom: 25px;
        }

        .field-label {
            display: block;
            font-size: 11px;
            font-weight: 800;
            color: var(--primary);
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .glass-input, .glass-select {
            width: 100%;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 15px 20px;
            color: #fff;
            font-size: 14px;
            outline: none;
            transition: 0.3s;
        }

        .glass-input:focus, .glass-select:focus {
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.05);
        }

        .difficulty-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
        }

        .diff-btn {
            padding: 12px;
            border-radius: 12px;
            text-align: center;
            font-size: 12px;
            font-weight: 800;
            color: var(--text-muted);
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border);
            cursor: pointer;
            transition: 0.3s;
        }

        .diff-btn.active { border-color: var(--primary); color: #000; background: var(--primary); }

        .tag-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .chip {
            padding: 8px 18px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 800;
            color: var(--text-muted);
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border);
            cursor: pointer;
            transition: 0.3s;
        }

        .chip.active { background: rgba(255, 215, 0, 0.1); color: var(--primary); border-color: var(--primary); }
        .chip.active.important { background: rgba(255, 77, 77, 0.1) !important; color: #ff4d4d !important; border-color: #ff4d4d !important; }

        .mcq-options-container {
            display: none;
            margin-top: 20px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px dashed var(--border);
            border-radius: 15px;
        }

        .mcq-option-row {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 12px;
        }

        .mcq-option-row:last-child { margin-bottom: 0; }

        .mcq-label {
            width: 35px;
            height: 35px;
            background: rgba(255, 215, 0, 0.1);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            color: var(--primary);
            flex-shrink: 0;
        }

        .save-btn {
            width: 100%;
            padding: 20px;
            background: var(--primary);
            border: none;
            border-radius: 15px;
            color: #000;
            font-weight: 900;
            font-size: 16px;
            cursor: pointer;
            margin-top: 30px;
            transition: 0.3s;
        }

        .save-btn:hover { transform: translateY(-3px); box-shadow: 0 10px 25px rgba(255, 215, 0, 0.2); }

        @media screen and (max-width: 768px) {
            .form-layout { padding-bottom: 50px; }
        }

        /* SUCCESS ANIMATION OVERLAY */
        .success-overlay {
            position: fixed;
            inset: 0;
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(20px);
            z-index: 9999;
            opacity: 0;
            transition: 0.5s;
        }

        .success-overlay.active { display: flex; opacity: 1; }

        .checkmark-wrapper {
            width: 150px;
            height: 150px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .checkmark-circle {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 4px solid rgba(255, 215, 0, 0.1);
        }

        .checkmark-circle::after {
            content: '';
            position: absolute;
            inset: -15px;
            border-radius: 50%;
            border: 2px solid var(--primary);
            animation: pulseGlow 1.5s infinite;
        }

        .checkmark {
            width: 100px;
            height: 100px;
            stroke-width: 6;
            stroke: var(--primary);
            stroke-miterlimit: 10;
            fill: none;
            stroke-linecap: round;
        }

        .checkmark-path {
            stroke-dasharray: 100;
            stroke-dashoffset: 100;
            animation: strokeAnim 0.8s cubic-bezier(0.65, 0, 0.45, 1) 0.5s forwards;
        }

        @keyframes strokeAnim { 100% { stroke-dashoffset: 0; } }
        @keyframes pulseGlow { 
            0% { transform: scale(1); opacity: 0.8; } 
            100% { transform: scale(1.4); opacity: 0; } 
        }

        .success-text {
            margin-top: 30px;
            font-size: 20px;
            font-weight: 900;
            color: var(--primary);
            letter-spacing: 3px;
            text-transform: uppercase;
            animation: fadeInUpAdv 0.5s both 1s;
        }
    </style>
</head>

<body>
    <div class="main-layout">
        <!-- Sidebar -->
        <aside class="pc-sidebar">
            <div class="sidebar-brand">BEEPREPARE</div>
            <nav class="sidebar-nav">
                <a href="teacher-home.html" class="sidebar-link">
                    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z" /></svg>
                    <span>Dashboard</span>
                </a>
                <a href="question-bank.html" class="sidebar-link">
                    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M4 14h4v-4H4v4zm0 5h4v-4H4v4zM4 9h4V5H4v4zm5 5h12v-4H9v4zm0 5h12v-4H9v4zM9 5v4h12V5H9z" /></svg>
                    <span>Bank Inventory</span>
                </a>
                <a href="generate-paper.html" class="sidebar-link">
                    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z" /></svg>
                    <span>Generate Paper</span>
                </a>

                <a href="../ai-chat.html" class="sidebar-link">
                    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 1 1-7.6-13.04 8.5 8.5 0 0 1 8.5 8.54c0 .24 0 .44-.05.7zM17.5 11a5.5 5.5 0 1 0-11 0 5.5 5.5 0 0 0 11 0z" /></svg>
                    <span>BEE AI Assistant</span>
                </a>
                <a href="teacher-profile.html" class="sidebar-link">
                    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z" /></svg>
                    <span>My Profile</span>
                </a>
            </nav>
        </aside>

        <main class="content-wrapper">
            <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
                <div>
                    <h2 style="font-size: 28px; font-weight: 800; color: #fff;">Add New Question</h2>
                    <p style="color: var(--text-muted); font-size: 14px;">Define a single question node for your master bank.</p>
                </div>
                <div class="profile-icon" onclick="window.location.href='teacher-profile.html'">T</div>
            </header>

            <div class="form-layout adv-card" style="padding: 30px;">
                <div class="field-group">
                    <label class="field-label">Question Text</label>
                    <textarea class="glass-input" style="height: 120px; resize: none;" placeholder="Enter question text here..."></textarea>
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                    <div class="field-group">
                        <label class="field-label">Complexity Type</label>
                        <select class="glass-select" id="complexitySelect" onchange="toggleMCQ(this.value)">
                            <option value="Very Short">Very Short</option>
                            <option value="Short">Short</option>
                            <option value="Long">Long</option>
                            <option value="MCQ">MCQ</option>
                        </select>
                    </div>
                    <div class="field-group">
                        <label class="field-label">Credit Value (Marks)</label>
                        <select class="glass-select" id="marksSelect">
                            <option>1 Mark</option>
                            <option>2 Marks</option>
                            <option>3 Marks</option>
                            <option>4 Marks</option>
                            <option>5 Marks</option>
                            <option>6 Marks</option>
                            <option>7 Marks</option>
                            <option>8 Marks</option>
                            <option>9 Marks</option>
                            <option>10 Marks</option>
                        </select>
                    </div>
                </div>

                <div class="mcq-options-container" id="mcqContainer">
                    <label class="field-label" style="margin-bottom: 15px;">MCQ Options</label>
                    <div class="mcq-option-row">
                        <div class="mcq-label">A</div>
                        <input type="text" class="glass-input" placeholder="Option A content...">
                    </div>
                    <div class="mcq-option-row">
                        <div class="mcq-label">B</div>
                        <input type="text" class="glass-input" placeholder="Option B content...">
                    </div>
                    <div class="mcq-option-row">
                        <div class="mcq-label">C</div>
                        <input type="text" class="glass-input" placeholder="Option C content...">
                    </div>
                    <div class="mcq-option-row">
                        <div class="mcq-label">D</div>
                        <input type="text" class="glass-input" placeholder="Option D content...">
                    </div>
                    
                    <div class="field-group" style="margin-top: 20px;">
                        <label class="field-label">Correct Answer</label>
                        <select class="glass-select" id="q-correct-op">
                            <option value="A">Option A</option>
                            <option value="B">Option B</option>
                            <option value="C">Option C</option>
                            <option value="D">Option D</option>
                        </select>
                    </div>
                </div>

                <div class="field-group">
                    <label class="field-label">Difficulty Level</label>
                    <div class="difficulty-row">
                        <div class="diff-btn active" onclick="selectDiff(this)">EASY</div>
                        <div class="diff-btn" onclick="selectDiff(this)">MEDIUM</div>
                        <div class="diff-btn" onclick="selectDiff(this)">HARD</div>
                    </div>
                </div>

                <div class="field-group">
                    <label class="field-label">Question Tags</label>
                    <div class="tag-chips">
                        <div class="chip active important" onclick="toggleChip(this)">Important</div>
                        <div class="chip" onclick="toggleChip(this)">Repeated</div>
                        <div class="chip" onclick="toggleChip(this)">Formula</div>
                        <div class="chip" onclick="toggleChip(this)">Conceptual</div>
                    </div>
                </div>

                <button class="save-btn" onclick="saveQuestion()">SAVE TO MASTER BANK</button>
            </div>
        </main>
    </div>

    <!-- Mobile Nav -->
    <nav class="nav-bottom">
        <a href="teacher-home.html" class="nav-item">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z" /></svg>
            <span>Home</span>
        </a>
        <a href="question-bank.html" class="nav-item">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M4 14h4v-4H4v4zm0 5h4v-4H4v4zM4 9h4V5H4v4zm5 5h12v-4H9v4zm0 5h12v-4H9v4zM9 5v4h12V5H9z" /></svg>
            <span>Bank</span>
        </a>
        <a href="generate-paper.html" class="nav-item">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z" /></svg>
            <span>Paper</span>
        </a>
        <a href="../ai-chat.html" class="nav-item">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 1 1-7.6-13.04 8.5 8.5 0 0 1 8.5 8.54c0 .24 0 .44-.05.7zM17.5 11a5.5 5.5 0 1 0-11 0 5.5 5.5 0 0 0 11 0z" /></svg>
            <span>AI</span>
        </a>
        <a href="teacher-profile.html" class="nav-item">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z" /></svg>
            <span>Profile</span>
        </a>
    </nav>

    <!-- Success Animation -->
    <div class="success-overlay" id="successOverlay">
        <div class="checkmark-wrapper">
            <div class="checkmark-circle"></div>
            <svg class="checkmark" viewBox="0 0 52 52">
                <path class="checkmark-path" d="M14.1 27.2l7.1 7.2 16.7-16.8"/>
            </svg>
        </div>
        <div class="success-text">Question Saved Successfully</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script type="module">
        import { 
          apiCall, 
          guardTeacher, 
          BP 
        } from '../../assets/js/bee-core.js';

        const params = new URLSearchParams(window.location.search);
        const bankId = params.get('bankId');
        const chapterId = params.get('chapterId');
        const chapterName = params.get('chapterName');
        const subject = params.get('subject');
        const cls = params.get('class');

        window.toggleMCQ = function(val) {
            const container = document.getElementById('mcqContainer');
            container.style.display = (val === 'MCQ') ? 'block' : 'none';
        }

        window.selectDiff = function(el) {
            document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
        }

        window.toggleChip = function(el) {
            el.classList.toggle('active');
        }

        window.saveQuestion = async function() {
            // Collect all form values
            const questionText = document.querySelector('.glass-input').value.trim();
            const questionType = document.querySelector('#complexitySelect').value;
            const marksStr = document.querySelector('#marksSelect').value;
            const marks = parseInt(marksStr);

            const diffBtn = document.querySelector('.diff-btn.active');
            let difficulty = diffBtn ? diffBtn.textContent.trim() : 'EASY';
            
            // Map to standard backend casing
            const diffMap = { 'EASY': 'Easy', 'MEDIUM': 'Medium', 'HARD': 'Hard' };
            difficulty = diffMap[difficulty] || difficulty;

            const activeTags = Array.from(document.querySelectorAll('.chip.active'))
                .map(c => c.textContent.trim());

            let mcqOptions = null;
            if (questionType === 'MCQ') {
                const optionInputs = document.querySelectorAll('#mcqContainer .glass-input');
                mcqOptions = {
                    A: optionInputs[0]?.value.trim(),
                    B: optionInputs[1]?.value.trim(),
                    C: optionInputs[2]?.value.trim(),
                    D: optionInputs[3]?.value.trim()
                };
            }

            // Validation
            if (!questionText || questionText.length < 10) {
                Swal.fire({
                    icon: 'warning',
                    title: 'Too Short',
                    text: 'Question must be at least 10 characters.',
                    toast: true,
                    position: 'top-end',
                    showConfirmButton: false,
                    timer: 3000,
                    background: '#1a1a2e',
                    color: '#ffffff'
                });
                return;
            }

            if (questionType === 'MCQ') {
                if (!mcqOptions.A || !mcqOptions.B || !mcqOptions.C || !mcqOptions.D) {
                    Swal.fire({
                        icon: 'warning',
                        title: 'Incomplete MCQ',
                        text: 'Please fill all 4 MCQ options.',
                        toast: true,
                        position: 'top-end',
                        showConfirmButton: false,
                        timer: 3000,
                        background: '#1a1a2e',
                        color: '#ffffff'
                    });
                    return;
                }
            }

            const saveBtn = document.querySelector('.save-btn');
            const originalText = saveBtn.textContent;
            saveBtn.textContent = 'Saving...';
            saveBtn.disabled = true;

            try {
                const result = await apiCall('/teacher/questions', 'POST', {
                    bankId,
                    chapterId,
                    chapterName,
                    questionText,
                    questionType,
                    marks,
                    difficulty,
                    tags: activeTags,
                    mcqOptions,
                    correctOption: (questionType === 'MCQ') ? document.getElementById('q-correct-op').value : null,
                });

                if (result && result.success) {
                    const overlay = document.getElementById('successOverlay');
                    if (overlay) overlay.classList.add('active');
                    setTimeout(() => {
                        window.location.href = `question-bank.html?bankId=${bankId}`;
                    }, 2000);
                } else {
                    saveBtn.textContent = originalText;
                    saveBtn.disabled = false;
                    Swal.fire({
                        icon: 'error',
                        title: 'Save Failed',
                        text: result?.message || 'Could not save question.',
                        toast: true,
                        position: 'top-end',
                        showConfirmButton: false,
                        timer: 3000,
                        background: '#1a1a2e',
                        color: '#ffffff'
                    });
                }
            } catch (err) {
                saveBtn.textContent = originalText;
                saveBtn.disabled = false;
                console.error('Save question error:', err);
            }
        }

        window.addEventListener('load', () => {
            const name = localStorage.getItem(BP.NAME) || 'T';
            const profileIcon = document.querySelector('.profile-icon');
            if (profileIcon) {
                profileIcon.innerText = name[0].toUpperCase();
                profileIcon.classList.add('has-signal');
                if (!document.getElementById('profile-signal')) {
                    const dot = document.createElement('div');
                    dot.id = 'profile-signal';
                    dot.className = 'signal-dot';
                    profileIcon.appendChild(dot);
                }
            }
            if (!(await guardTeacher())) return;
            BP.syncTeacherSignals();

            if (subject && cls && chapterName) {
                const subTitle = document.querySelector('header p');
                subTitle.innerHTML = `${subject} (Class ${cls}) • <span style="color: var(--primary)">${chapterName}</span>`;
            }
        });
    </script>
</body>
</html>
