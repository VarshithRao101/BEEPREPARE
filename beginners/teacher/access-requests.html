<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Access Requests - BEEPREPARE</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../assets/css/teacher-theme.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        /* Page Header with Back Button */
        .page-header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 30px;
        }

        .back-btn {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.3s;
            flex-shrink: 0;
        }

        .back-btn:hover {
            background: rgba(255,215,0,0.08);
            border-color: var(--primary);
        }

        /* Search */
        .search-container {
            background: rgba(20, 20, 20, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 15px 25px;
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }
        .search-container input {
            background: transparent;
            border: none;
            color: #fff;
            width: 100%;
            outline: none;
            font-weight: 700;
            font-size: 15px;
            font-family: 'Outfit', sans-serif;
        }

        /* Tabs */
        .tabs-row {
            display: flex;
            gap: 12px;
            margin-bottom: 30px;
            overflow-x: auto;
            padding-bottom: 5px;
            scrollbar-width: none;
        }
        .tab-pill {
            padding: 12px 24px;
            border-radius: 14px;
            font-size: 12px;
            font-weight: 800;
            color: var(--text-muted);
            cursor: pointer;
            transition: 0.3s;
            background: rgba(255,255,255,0.02);
            border: 1px solid var(--border);
            white-space: nowrap;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .tab-pill.active {
            background: rgba(255,215,0,0.08);
            color: var(--primary);
            border-color: var(--primary);
            box-shadow: 0 0 20px rgba(255,215,0,0.1);
        }

        /* Bulk Bar */
        .bulk-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .bulk-count {
            font-size: 11px;
            font-weight: 800;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Request Card */
        .request-card {
            background: rgba(15,15,15,0.85);
            backdrop-filter: blur(30px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 28px;
            margin-bottom: 20px;
            position: relative;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            overflow: hidden;
        }
        .request-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 4px; height: 100%;
            background: var(--primary);
            opacity: 0;
            transition: 0.3s;
        }
        .request-card:hover {
            transform: translateY(-4px);
            border-color: rgba(255,215,0,0.25);
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
        }
        .request-card:hover::before { opacity: 1; }

        /* Grid on desktop */
        @media (min-width: 992px) {
            .req-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 24px; }
            .req-grid .request-card { margin-bottom: 0; }
        }

        .new-badge {
            position: absolute;
            top: 20px; right: 20px;
            background: var(--primary);
            color: #000;
            font-size: 10px;
            font-weight: 900;
            padding: 4px 10px;
            border-radius: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 0 12px rgba(255,215,0,0.35);
        }

        .student-header {
            display: flex;
            align-items: center;
            gap: 18px;
            margin-bottom: 8px;
        }

        .avatar {
            width: 54px;
            height: 54px;
            border-radius: 16px;
            background: linear-gradient(135deg, var(--primary), #FFA500);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            color: #000;
            font-size: 20px;
            box-shadow: 0 8px 15px rgba(255,215,0,0.2);
            flex-shrink: 0;
        }

        .student-meta {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 4px;
        }

        /* Action Buttons */
        .action-btns {
            display: flex;
            gap: 15px;
            margin-top: 24px;
            padding-top: 20px;
            border-top: 1px solid rgba(255,255,255,0.05);
        }
        .btn {
            flex: 1;
            padding: 14px;
            border-radius: 14px;
            font-weight: 900;
            font-size: 13px;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-family: 'Outfit', sans-serif;
        }
        .btn-approve {
            background: var(--primary);
            color: #000;
            border: none;
            box-shadow: 0 5px 15px rgba(255,215,0,0.2);
        }
        .btn-approve:hover { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(255,215,0,0.4); }
        .btn-reject {
            background: rgba(255,77,77,0.1);
            color: #ff4d4d;
            border: 1px solid rgba(255,77,77,0.25);
        }
        .btn-reject:hover { background: #ff4d4d; color: #fff; transform: translateY(-2px); }

        /* Status badge for resolved requests */
        .status-badge {
            margin-top: 16px;
            padding: 12px;
            border-radius: 12px;
            text-align: center;
            font-size: 11px;
            font-weight: 900;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .status-approved { background: rgba(76,175,80,0.1); color: #4CAF50; border: 1px solid rgba(76,175,80,0.2); }
        .status-rejected { background: rgba(255,77,77,0.1); color: #ff4d4d; border: 1px solid rgba(255,77,77,0.2); }

        /* Code reveal */
        .code-reveal {
            background: rgba(0,0,0,0.7);
            border: 2px dashed var(--primary);
            border-radius: 20px;
            padding: 28px;
            text-align: center;
            display: none;
            margin-top: 20px;
            animation: luxeEntry 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes luxeEntry {
            from { opacity: 0; transform: scale(0.9) translateY(10px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .protocol-key {
            font-size: 30px;
            font-weight: 900;
            color: var(--primary);
            letter-spacing: 8px;
            margin: 12px 0;
            font-family: monospace;
            text-shadow: 0 0 20px rgba(255,215,0,0.4);
        }

        .copy-key-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            color: #fff;
            padding: 10px 28px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 800;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-family: 'Outfit', sans-serif;
        }
        .copy-key-btn:hover { background: rgba(255,215,0,0.1); color: var(--primary); border-color: var(--primary); }

        /* Card Loader Overlay */
        .card-loader {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.88);
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 12px;
            z-index: 5;
            border-radius: 24px;
        }
        .loader-ring {
            width: 36px; height: 36px;
            border: 3px solid rgba(255,215,0,0.1);
            border-top: 3px solid var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Skeleton */
        .skeleton-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 24px;
            padding: 28px;
            margin-bottom: 20px;
            animation: shimmer 1.5s infinite;
        }
        @keyframes shimmer {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.7; }
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 80px 20px;
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        /* SweetAlert z-fix */
        .swal2-container { z-index: 99999 !important; }
    </style>
</head>

        <!-- Main Content -->

            <div class="page-header">

                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="19" y1="12" x2="5" y2="12"></line>
                        <polyline points="12 19 5 12 12 5"></polyline>
                    </svg>
                </div>
                <div>
                    <h2 style="font-size: 28px; font-weight: 800; color: #fff; margin: 0;">Access Requests</h2>
                    <p style="color: var(--text-muted); font-size: 14px; font-weight: 600; margin: 4px 0 0 0;">Authorize student node synchronization.</p>
                </div>
                <div class="profile-icon" id="profile-icon-btn" style="margin-left: auto;">T</div>
            </div>

            <!-- Search -->
            <div class="search-container">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="3">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
                <input type="text" id="search-input" placeholder="Search student name..." oninput="filterCards()">
            </div>

            <!-- Tabs -->
            <div class="tabs-row">
                <div class="tab-pill active" onclick="window.switchTab('pending', this)">Pending Pulse</div>
                <div class="tab-pill" onclick="window.switchTab('approved', this)">Authorized</div>
                <div class="tab-pill" onclick="window.switchTab('active', this)">Active Pulse</div>

            <!-- Bulk bar -->
            <div class="bulk-bar">

                    Approve All

            <!-- Request Grid -->
            <div class="req-grid" id="requests-list">

            <!-- Empty State -->

                    <line x1="12" y1="8" x2="12" y2="12"></line>

            <span>Profile</span>

    <script type="module">
        import { apiCall, guardTeacher, getIndexPath, BP } from '../../assets/js/bee-core.js';

        if (!guardTeacher()) {
            window.location.href = getIndexPath();
        }

        // Set profile icon initials
        const name = localStorage.getItem(BP.NAME) || 'T';
        const profileBtn = document.getElementById('profile-icon-btn');
        if (profileBtn) {
            profileBtn.innerText = name[0].toUpperCase();
            profileBtn.onclick = () => window.location.href = 'teacher-profile.html';
        }

        let currentRequests = [];
        let filterStatus = 'pending';

        const AVATAR_COLORS = [
            'linear-gradient(135deg, var(--primary), #FFA500)',
            'linear-gradient(135deg, #4da6ff, #0066cc)',
            'linear-gradient(135deg, #ff4d4d, #cc0000)',
            'linear-gradient(135deg, #66bb6a, #2e7d32)',
            'linear-gradient(135deg, #ab47bc, #6a1b9a)',
            'linear-gradient(135deg, #26c6da, #00838f)',
        ];
        function getAvatarColor(str = '') {
            let h = 0; for (let c of str) h += c.charCodeAt(0);
            return AVATAR_COLORS[h % AVATAR_COLORS.length];
        }

        async function loadRequests() {
            showSkeletons();
            const result = await apiCall(`/teacher/requests?status=${filterStatus}`);
            currentRequests = (result?.success && result.data?.requests) ? result.data.requests : [];
            renderRequests(currentRequests);
        }

        function showSkeletons() {
            document.getElementById('requests-list').innerHTML = `
                <div class="skeleton-card" style="height: 160px;"></div>
                <div class="skeleton-card" style="height: 140px;"></div>
            `;
            document.getElementById('empty-msg').style.display = 'none';
            document.getElementById('count-label').innerText = 'Scanning request pulse...';
            document.getElementById('approve-all-btn').style.display = 'none';
        }

        function renderRequests(list) {
            const container = document.getElementById('requests-list');
            const emptyMsg = document.getElementById('empty-msg');
            const countLabel = document.getElementById('count-label');
            const approveAllBtn = document.getElementById('approve-all-btn');
            container.innerHTML = '';

            if (!list || list.length === 0) {
                emptyMsg.style.display = 'flex';
                countLabel.innerText = '0 Requests';
                approveAllBtn.style.display = 'none';
                return;
            }

            emptyMsg.style.display = 'none';
            countLabel.innerText = `${list.length} Request${list.length !== 1 ? 's' : ''} Found`;
            approveAllBtn.style.display = (filterStatus === 'pending' && list.length > 1) ? 'flex' : 'none';

            list.forEach(req => {
                // Extract subject/class from populated bank object or flat fields
                const subject = req.subject || req.bank?.subject || '—';
                const klass   = req.class  || req.bank?.class   || '';
                const ts      = req.requestedAt || req.createdAt;

                const initials = (req.studentName || 'S').split(' ').map(n => n[0]).join('').toUpperCase().slice(0, 2);
                const color = getAvatarColor(req.studentName);
                const isNew = ts && (Date.now() - new Date(ts).getTime()) < 3600000;
                const card = document.createElement('div');
                card.className = 'request-card';
                card.id = `req-${req.requestId}`;
                card.dataset.name = (req.studentName || '').toLowerCase();

                card.innerHTML = `
                    <div class="card-loader" id="loader-${req.requestId}">
                        <div class="loader-ring"></div>
                        <div style="font-size: 10px; font-weight: 800; color: var(--primary); letter-spacing: 2px;">AUTHORIZING NODE...</div>
                    </div>

                    ${isNew && filterStatus === 'pending' ? '<div class="new-badge">Priority Alpha</div>' : ''}

                    <div class="student-header">
                        <div class="avatar" style="background: ${color};">${initials}</div>
                        <div>
                            <div style="font-weight: 900; font-size: 18px; letter-spacing: -0.5px;">${req.studentName || 'Unknown'}</div>
                            <div style="color: var(--primary); font-size: 12px; font-weight: 800; text-transform: uppercase; margin-top: 3px;">
                                ${subject} • Grade ${klass.replace('Class ', '')}
                            </div>
                            <div class="student-meta">${ts ? new Date(ts).toLocaleString() : ''}</div>
                        </div>
                    </div>

                    ${filterStatus === 'pending' ? `
                        <div class="action-btns" id="actions-${req.requestId}">
                            <button class="btn btn-reject" onclick="window.rejectRequest('${req.requestId}')">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                                Deny
                            </button>
                            <button class="btn btn-approve" onclick="window.approveRequest('${req.requestId}')">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"></polyline></svg>
                                Authorize
                            </button>
                        </div>
                    ` : `
                        <div>
                            <div class="status-badge status-${req.status}">
                                ${req.status.toUpperCase()} — ${req.approvedAt || req.rejectedAt ? new Date(req.approvedAt || req.rejectedAt).toLocaleDateString() : ''}
                            </div>
                            ${req.status === 'approved' ? `
                            <div style="margin-top:12px;">
                                <button class="btn btn-approve" style="width:100%; font-size:11px; padding:10px;" onclick="window.regenerateOTP('${req.requestId}')">
                                    🔄 Regenerate OTP
                                </button>
                            </div>` : ''}
                        </div>
                    `}

                    <div class="code-reveal" id="code-${req.requestId}">
                        <div style="font-size: 11px; font-weight: 800; color: var(--text-muted); letter-spacing: 1.5px; text-transform: uppercase;">TRNT Protocol Key</div>
                        <div class="protocol-key" id="otp-${req.requestId}">---- ----</div>
                        <button class="copy-key-btn" onclick="window.copyCode('${req.requestId}')">Copy Sync Key</button>
                        <div style="font-size: 10px; color: #444; margin-top: 10px;">Share this code with the student to grant access. Valid for 24 hrs.</div>
                    </div>
                `;

                container.appendChild(card);
            });
        }

        window.approveRequest = async function(requestId) {
            const loader = document.getElementById(`loader-${requestId}`);
            if (loader) loader.style.display = 'flex';

            const result = await apiCall(`/teacher/requests/${requestId}/approve`, 'POST');
            if (result?.success) {
                // Backend returns plainOTP — display it in the code reveal box
                const otpToShow = result.data?.plainOTP || result.data?.otp || '----';
                document.getElementById(`otp-${requestId}`).innerText = otpToShow;
                const actions = document.getElementById(`actions-${requestId}`);
                const codeEl = document.getElementById(`code-${requestId}`);
                if (actions) actions.style.display = 'none';
                if (codeEl) codeEl.style.display = 'block';
                if (loader) loader.style.display = 'none';
                Swal.fire({
                    icon: 'success',
                    title: '🔑 OTP Generated!',
                    html: `<div style="font-family:monospace;font-size:32px;font-weight:900;color:#FFD700;letter-spacing:8px;margin:12px 0;">${otpToShow}</div><div style="font-size:13px;color:#aaa;">Share this 4-digit code with the student.<br>It is shown only once.</div>`,
                    background: '#080808',
                    color: '#fff',
                    confirmButtonText: 'Got it!',
                    confirmButtonColor: '#FFD700'
                });
            } else {
                if (loader) loader.style.display = 'none';
                Swal.fire({ icon: 'error', title: 'Auth Error', text: result?.message || 'Transmission failed.', background: '#080808', color: '#fff' });
            }
        };

        window.regenerateOTP = async function(requestId) {
            const confirmed = await Swal.fire({
                title: 'Regenerate OTP?',
                text: 'A new OTP will be generated and the old one will stop working.',
                icon: 'question',
                showCancelButton: true,
                confirmButtonColor: 'var(--primary)',
                cancelButtonColor: '#333',
                confirmButtonText: 'Yes, Regenerate',
                background: '#080808', color: '#fff'
            });
            if (!confirmed.isConfirmed) return;
            await window.approveRequest(requestId);
        };

        window.rejectRequest = async function(requestId) {
            const confirmed = await Swal.fire({
                title: 'Deny Authorization?',
                text: 'This node will be removed from the pending queue.',
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#ff4d4d',
                cancelButtonColor: '#333',
                confirmButtonText: 'YES, DENY',
                background: '#080808', color: '#fff'
            });
            if (!confirmed.isConfirmed) return;

            const loader = document.getElementById(`loader-${requestId}`);
            if (loader) loader.style.display = 'flex';

            const result = await apiCall(`/teacher/requests/${requestId}/reject`, 'POST');
            if (result?.success) {
                const card = document.getElementById(`req-${requestId}`);
                if (card) {
                    card.style.transition = '0.4s ease';
                    card.style.transform = 'scale(0.9)';
                    card.style.opacity = '0';
                    setTimeout(() => { card.remove(); updateCount(); }, 400);
                }
            } else {
                if (loader) loader.style.display = 'none';
                Swal.fire({ icon: 'error', title: 'Error', text: result?.message || 'Failed to reject.', background: '#080808', color: '#fff' });
            }
        };

        window.approveAll = async function() {
            const confirmed = await Swal.fire({
                title: 'Authorize All?',
                text: 'This will approve all pending requests.',
                icon: 'question',
                showCancelButton: true,
                confirmButtonColor: 'var(--primary)',
                cancelButtonColor: '#333',
                confirmButtonText: 'Authorize All',
                background: '#080808', color: '#fff'
            });
            if (!confirmed.isConfirmed) return;
            for (const req of currentRequests) {
                await window.approveRequest(req.requestId);
            }
        };

        window.copyCode = function(requestId) {
            const text = document.getElementById(`otp-${requestId}`)?.innerText;
            if (!text) return;
            navigator.clipboard.writeText(text).then(() => {
                Swal.fire({ icon: 'success', title: 'Copied!', toast: true, position: 'top-end', showConfirmButton: false, timer: 1500, background: '#080808', color: '#fff' });
            });
        };

        window.filterCards = function() {
            const q = document.getElementById('search-input').value.toLowerCase();
            document.querySelectorAll('.request-card').forEach(card => {
                card.style.display = card.dataset.name?.includes(q) ? '' : 'none';
            });
            updateCount();
        };

        function updateCount() {
            const visible = [...document.querySelectorAll('.request-card')].filter(c => c.style.display !== 'none').length;
            document.getElementById('count-label').innerText = `${visible} Request${visible !== 1 ? 's' : ''} Found`;
            document.getElementById('empty-msg').style.display = visible === 0 ? 'flex' : 'none';
        }

        window.switchTab = function(status, el) {
            filterStatus = status;
            document.querySelectorAll('.tab-pill').forEach(t => t.classList.remove('active'));
            if (el) el.classList.add('active');
            document.getElementById('search-input').value = '';
            loadRequests();
        };

        document.addEventListener('DOMContentLoaded', loadRequests);
    </script>
</body>

</html>
