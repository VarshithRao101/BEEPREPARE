<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diagnostic Signal Hub - BEE COMMAND CENTER</title>
    <link rel="stylesheet" href="../../assets/css/style.css">
    <link rel="stylesheet" href="../../assets/css/teacher-theme.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --obsidian: #080808;
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            background: #050505 !important;
            color: #fff;
            font-family: 'Outfit', sans-serif;
            margin: 0;
            overflow-x: hidden;
            display: flex;
            min-height: 100vh;
        }

        .app-container {
            padding: 40px 24px 120px;
            max-width: 600px;
            margin: 0 auto;
            width: 100%;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 45px;
        }

        .back-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            width: 48px;
            height: 48px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            color: var(--primary);
        }

        .back-btn:hover {
            background: rgba(255, 215, 0, 0.1);
            transform: translateX(-4px);
            border-color: var(--primary);
        }

        h1 {
            font-size: 32px;
            font-weight: 900;
            margin: 0;
            letter-spacing: -1px;
        }

        .diagnostic-card {
            background: rgba(15, 15, 15, 0.8);
            backdrop-filter: blur(40px);
            border: 1px solid var(--border);
            border-radius: 30px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.6);
        }

        .form-group {
            margin-bottom: 30px;
        }

        label {
            display: block;
            font-size: 11px;
            font-weight: 900;
            color: var(--primary);
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        select {
            width: 100%;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 18px;
            color: #fff;
            font-size: 15px;
            font-weight: 700;
            appearance: none;
            cursor: pointer;
            outline: none;
            transition: 0.3s;
        }

        select:focus {
            border-color: var(--primary);
            background: rgba(255, 215, 0, 0.05);
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.1);
        }

        textarea {
            width: 100%;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 18px;
            color: #fff;
            font-size: 15px;
            font-weight: 600;
            min-height: 150px;
            resize: none;
            outline: none;
            transition: 0.3s;
            font-family: inherit;
        }

        textarea:focus {
            border-color: var(--primary);
            background: rgba(255, 215, 0, 0.05);
        }

        .rating-matrix {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 10px;
        }

        .rating-node {
            font-size: 36px;
            color: rgba(255, 255, 255, 0.1);
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            filter: grayscale(1);
        }

        .rating-node.active {
            color: var(--primary);
            filter: grayscale(0);
            transform: scale(1.2);
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.4);
        }

        .vault-upload-trigger {
            border: 2px dashed rgba(255, 215, 0, 0.1);
            border-radius: 18px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
            background: rgba(0,0,0,0.2);
        }

        .vault-upload-trigger:hover {
            border-color: var(--primary);
            background: rgba(255, 215, 0, 0.05);
        }

        .transmit-btn {
            width: 100%;
            background: var(--primary);
            color: #000;
            border: none;
            border-radius: 20px;
            padding: 22px;
            font-size: 16px;
            font-weight: 900;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            margin-top: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.2);
        }

        .transmit-btn:hover {
            transform: translateY(-4px);
            box-shadow: 0 15px 40px rgba(255, 215, 0, 0.4);
        }

        .nexus-tag {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: rgba(255, 215, 0, 0.08);
            padding: 8px 16px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 800;
            color: var(--primary);
            margin-top: 15px;
            border: 1px solid rgba(255, 215, 0, 0.2);
        }

        /* Signal Transmitted Overlay */
        .signal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            z-index: 5000;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 40px;
        }

        .signal-pulse {
            width: 100px;
            height: 100px;
            background: var(--primary);
            color: #000;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            margin-bottom: 30px;
            box-shadow: 0 0 50px rgba(255, 215, 0, 0.5);
            animation: luxeSignal 1.5s infinite;
        }

        @keyframes luxeSignal {
            0% { transform: scale(1); box-shadow: 0 0 30px rgba(255, 215, 0, 0.4); }
            50% { transform: scale(1.1); box-shadow: 0 0 60px rgba(255, 215, 0, 0.6); }
            100% { transform: scale(1); box-shadow: 0 0 30px rgba(255, 215, 0, 0.4); }
        }

        @media screen and (max-width: 768px) {
            .app-container { padding: 30px 20px 120px; }
            .diagnostic-card { padding: 30px; }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <header class="header">
            <button class="back-btn" onclick="window.history.back()">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
                    <line x1="19" y1="12" x2="5" y2="12"></line>
                    <polyline points="12 19 5 12 12 5"></polyline>
                </svg>
            </button>
            <h1 style="letter-spacing: -1.5px;">Diagnostic Hub</h1>
        </header>

        <div class="diagnostic-card">
            <div class="form-group">
                <label>Signal Type</label>
                <div style="position: relative;">
                    <select id="signalType">
                        <option value="bug">🐞 ARCHITECTURAL BUG</option>
                        <option value="feature">💡 CORE FEATURE REQUEST</option>
                        <option value="star" selected>⭐ EXPERIENCE FEEDBACK</option>
                        <option value="content">🧠 CURRICULUM DISCREPANCY</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label>Signal Data Payload</label>
                <textarea id="signalMsg" placeholder="Transmit your observations or architectural insights..."></textarea>
                <div class="nexus-tag">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                    </svg>
                    NODE: TEACHER • V4.2.0
                </div>
            </div>

            <div class="form-group">
                <label>Diagnostic Rating</label>
                <div class="rating-matrix" id="ratingNode">
                    <span class="rating-node" data-rating="1">★</span>
                    <span class="rating-node" data-rating="2">★</span>
                    <span class="rating-node" data-rating="3">★</span>
                    <span class="rating-node" data-rating="4">★</span>
                    <span class="rating-node" data-rating="5">★</span>
                </div>
            </div>

            <div class="form-group">
                <label>Evidence Vault (Optional)</label>
                <div class="vault-upload-trigger" onclick="document.getElementById('filePayload').click()">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="rgba(255,215,0,0.4)" stroke-width="2.5" style="margin-bottom: 10px;"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
                    <div style="font-size: 12px; font-weight: 800; color: #888;">UPLOAD SCHEMATIC DATA</div>
                    <input type="file" id="filePayload" style="display: none;">
                </div>
            </div>

            <button class="transmit-btn" onclick="transmitSignal()">
                Transmit Signal
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
            </button>
        </div>
    </div>

    <!-- Signal Transmitted Overlay -->
    <div class="signal-overlay" id="signalOverlay">
        <div class="signal-pulse">✓</div>
        <div style="font-size: 28px; font-weight: 900; color: #fff; margin-bottom: 15px;">SIGNAL TRANSMITTED</div>
        <p style="color: #666; font-weight: 700; max-width: 320px; line-height: 1.6; margin-bottom: 40px;">Your diagnostic payload has been received at the BEE Command Hub. Analyzing observations...</p>
        <button class="transmit-btn" style="width: auto; padding: 18px 50px;" onclick="window.history.back()">
            RETURN TO COMMAND
        </button>
    </div>

    <script type="module">
        import {
            apiCall,
            getFreshToken,
            guardTeacher,
            getIndexPath,
            BP,
            API_BASE
        } from '../../assets/js/bee-core.js';

        import { getAuth, signOut }
            from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js';

        // Run guard first
        if (!guardTeacher()) {
            window.location.href = getIndexPath();
            throw new Error('Access denied');
        }

        // Star Rating Analysis
        const nodes = document.querySelectorAll('.rating-node');
        let currentRating = 0;

        nodes.forEach(node => {
            node.addEventListener('click', () => {
                currentRating = parseInt(node.dataset.rating);
                updatePulse();
            });
        });

        function updatePulse() {
            nodes.forEach(node => {
                if(parseInt(node.dataset.rating) <= currentRating) {
                    node.classList.add('active');
                } else {
                    node.classList.remove('active');
                }
            });
        }

        // Vault Upload Sync
        document.getElementById('filePayload').onchange = (e) => {
            if(e.target.files.length > 0) {
                const file = e.target.files[0];
                if (file.size > 5 * 1024 * 1024) {
                    Swal.fire({ icon: 'error', title: 'PAYLOAD OVERLOAD', text: 'File must be under 5MB.', background: '#080808', color: '#fff' });
                    e.target.value = '';
                    return;
                }
                const label = document.querySelector('.vault-upload-trigger div');
                label.innerText = 'VAULTED: ' + file.name.toUpperCase();
                label.style.color = 'var(--primary)';
            }
        };

        // Transmit Signal Sequence
        window.transmitSignal = async function() {
            const type = document.getElementById('signalType').value;
            const msg = document.getElementById('signalMsg').value.trim();
            const fileInput = document.getElementById('filePayload');
            
            if(!msg && currentRating === 0) {
                Swal.fire({
                    icon: 'error',
                    title: 'EMPTY PAYLOAD',
                    text: 'Please input observations or a diagnostic rating before transmission.',
                    background: '#080808', color: '#fff'
                });
                return;
            }

            const btn = document.querySelector('.transmit-btn');
            const originalHtml = btn.innerHTML;
            btn.innerHTML = 'TRANSMITTING...';
            btn.disabled = true;

            try {
                const formData = new FormData();
                formData.append('type', type);
                formData.append('message', msg);
                formData.append('rating', currentRating);
                if (fileInput.files[0]) {
                    formData.append('file', fileInput.files[0]);
                }

                const token = await getFreshToken();
                const response = await fetch(`${API_BASE}/teacher/feedback`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}` },
                    body: formData
                });

                const result = await response.json();
                if (result.success) {
                    document.getElementById('signalOverlay').style.display = 'flex';
                } else {
                    throw new Error(result.message || 'Transmission failed.');
                }
            } catch (err) {
                Swal.fire({ icon: 'error', title: 'TRANSMISSION ERROR', text: err.message, background: '#080808', color: '#fff' });
                btn.innerHTML = originalHtml;
                btn.disabled = false;
            }
        };

        // Expose to window for inline onclicks
        window.updatePulse = updatePulse;
    </script>
</body>
</html>
