    <style>
        .timeline {
            position: relative;
            padding-left: 40px;
            margin-top: 30px;
        }

        .timeline::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 2px;
            background: linear-gradient(180deg, var(--primary), transparent);
            border-radius: 2px;
        }

        .timeline-item {
            position: relative;
            margin-bottom: 40px;
        }

        .timeline-dot {
            width: 14px;
            height: 14px;
            background: var(--primary);
            border: 3px solid #000;
            border-radius: 50%;
            position: absolute;
            left: -47px;
            top: 5px;
            box-shadow: 0 0 15px var(--primary);
        }

        .timeline-dot.success { background: #00E676; box-shadow: 0 0 15px #00E676; }
        .timeline-dot.error { background: #ff4d4d; box-shadow: 0 0 15px #ff4d4d; }

        .timeline-card {
            padding: 25px;
            transition: 0.3s;
        }

        .t-title { font-weight: 800; font-size: 17px; margin-bottom: 8px; }
        .t-desc { font-size: 14px; color: var(--text-muted); line-height: 1.6; }
        .t-time { font-size: 10px; font-weight: 900; color: var(--primary); margin-top: 15px; text-transform: uppercase; letter-spacing: 1px; }

        .clear-btn {
            background: rgba(255, 77, 77, 0.05);
            border: 1px solid rgba(255, 77, 77, 0.2);
            color: #ff4d4d;
            padding: 12px 25px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 800;
            cursor: pointer;
            transition: 0.3s;
        }
        .clear-btn:hover { background: rgba(255, 77, 77, 0.1); border-color: #ff4d4d; }
    </style>
<link rel="stylesheet" href="/assets/css/hover-interactions.css">
</head>

    <script src="../../assets/js/notifications.js"></script>
    <script type="module">
        import {
            apiCall,
            guardTeacher,
            BP
        } from '../../assets/js/bee-core.js';

        if (!(await guardTeacher())) throw new Error('denied');

        async function loadActivity() {
            const container = document.getElementById('activity-container');
            container.innerHTML = '<div style="padding: 50px; text-align: center;"><div class="loading-ring" style="margin: 0 auto; width: 40px; height: 40px; border-top-color: var(--primary);"></div></div>';

            // Sync Header Stats
            const dashRes = await apiCall('/teacher/dashboard');
            if (dashRes && dashRes.success) {

                const name = localStorage.getItem(BP.NAME) || 'T';
                document.querySelector('.profile-icon').textContent = name[0].toUpperCase();
            }

            const result = await apiCall('/teacher/activity');
            
            if (result && result.success) {
                const activities = result.data;
                renderActivities(activities);
            } else {
                container.innerHTML = '<div style="color: var(--text-muted); padding: 50px; text-align: center;">Failed to load activity logs.</div>';
            }
        }

        function renderActivities(activities) {
            const container = document.getElementById('activity-container');

            if (!activities || activities.length === 0) {
                container.innerHTML = '<div style="color: var(--text-muted); padding: 50px; text-align: center;">No activity recorded yet.</div>';
                return;
            }

            let html = '<div class="timeline">';
            activities.forEach((item) => {
                const typeClass = item.type === 'error' ? 'error' : (item.type === 'success' ? 'success' : 'info');
                html += `
                    <div class="timeline-item">
                        <div class="timeline-dot ${typeClass}"></div>
                        <div class="timeline-card adv-card" style="padding: 25px;">
                            <div class="t-title">${item.action || item.type?.toUpperCase()}</div>
                            <div class="t-desc">${item.description || item.details || ''}</div>
                            <div class="t-time">${new Date(item.timestamp || item.createdAt).toLocaleString()}</div>
                        </div>
                    </div>
                `;
            });
            html += '</div>';
            container.innerHTML = html;
        }

        window.clearHistory = async function() {
            if (confirm('Are you sure you want to clear your activity history? This action cannot be undone.')) {
                const result = await apiCall('/teacher/activity', 'DELETE');
                if (result && result.success) {
                    loadActivity();
                } else {
                    alert('Failed to clear history');
                }
            }
        };

        // Initialize
        loadActivity();
    </script>
<script src="/assets/js/ripple.js"></script>
