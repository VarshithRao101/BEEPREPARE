<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../assets/css/teacher-theme.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script>pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';</script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root {
            --primary-glow: rgba(255, 215, 0, 0.15);
            --card-bg: rgba(15, 15, 15, 0.7);
        }

        body {
            background: #050505;
            color: #fff;
            overflow-x: hidden;
        }

        .section-divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 35px 0 15px 0;
        }

        .divider-line {
            height: 2px;
            flex: 1;
            background: linear-gradient(90deg, var(--border), transparent);
            border-radius: 2px;
        }

        .section-label {
            font-size: 11px;
            font-weight: 800;
            color: var(--primary);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* Selection Architecture */
        .selection-panel {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 25px;
            backdrop-filter: blur(20px);
        }

        .tabs-group {
            margin-bottom: 15px;
        }

        .tabs-group:last-child {
            margin-bottom: 0;
        }

        .tab-list {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding-bottom: 5px;
            scrollbar-width: none;
        }

        .tab-list::-webkit-scrollbar {
            display: none;
        }

        .tab-pill {
            padding: 10px 18px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 800;
            color: var(--text-muted);
            cursor: pointer;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .tab-pill.active {
            background: rgba(255, 215, 0, 0.1);
            color: var(--primary);
            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.1);
        }

        /* Chapter Node */
        .chapter-node {
            background: rgba(15, 15, 15, 0.6);
            backdrop-filter: blur(30px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 25px;
            margin-bottom: 20px;
            position: relative;
            overflow: hidden;
            animation: slideIn 0.5s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(15px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .chapter-title {
            font-size: 18px;
            font-weight: 900;
            color: #fff;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            letter-spacing: -0.5px;
        }

        .chapter-indicator {
            width: 5px;
            height: 24px;
            background: var(--primary);
            border-radius: 3px;
            box-shadow: 0 0 10px rgba(255, 215, 0, 0.4);
        }

        /* Notebook Grid */
        .notebook-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 15px;
        }

        .notebook-card {
            background: rgba(25, 25, 25, 0.4);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 20px;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            flex-direction: column;
            gap: 15px;
            position: relative;
            cursor: pointer;
        }

        /* Responsive Mobile Architecture */
        @media (max-width: 480px) {
            .notebook-grid {
                grid-template-columns: 1fr 1fr;
                gap: 10px;
            }

            .notebook-card {
                padding: 12px;
                gap: 8px;
                border-radius: 12px;
            }

            .chapter-node {
                padding: 15px;
            }

            .note-icon-box {
                width: 32px;
                height: 32px;
                border-radius: 8px;
            }

            .note-icon-box svg {
                width: 14px;
                height: 14px;
            }

            .card-type {
                font-size: 7px;
            }

            .note-header {
                gap: 8px;
            }

            .note-header div div:first-child {
                font-size: 11px !important;
            }

            .note-header div div:last-child {
                font-size: 7px !important;
            }

            .vault-upload-zone {
                padding: 10px;
            }

            .vault-upload-zone svg {
                width: 20px;
                height: 20px;
            }

            .vault-upload-zone div {
                font-size: 7px !important;
            }
        }


        .notebook-card:hover {
            transform: translateY(-5px);
            border-color: var(--primary);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.5);
            background: rgba(255, 215, 0, 0.02);
        }

        .card-type {
            font-size: 9px;
            font-weight: 950;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .note-header {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .note-icon-box {
            width: 48px;
            height: 48px;
            background: rgba(255, 215, 0, 0.08);
            border: 1px solid rgba(255, 215, 0, 0.2);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary);
            transition: 0.3s;
        }

        .notebook-card:hover .note-icon-box {
            background: var(--primary);
            color: #000;
            transform: scale(1.05) rotate(3deg);
        }

        .vault-upload-zone {
            border: 2px dashed rgba(255, 215, 0, 0.15);
            background: rgba(0, 0, 0, 0.3);
            padding: 15px;
            border-radius: 14px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            transition: 0.3s;
        }

        .vault-upload-zone svg {
            width: 28px;
            height: 28px;
        }

        .notebook-card:hover .vault-upload-zone {
            border-color: var(--primary);
            background: rgba(255, 215, 0, 0.05);
        }

        /* Documentation & Action */
        .document-item {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 10px;
        }

        .doc-actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .act-btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 8px;
            color: #ddd;
            font-size: 10px;
            font-weight: 800;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            cursor: pointer;
            transition: 0.2s;
            text-transform: uppercase;
        }

        .act-btn:hover {
            background: var(--primary);
            color: #000;
            border-color: var(--primary);
            box-shadow: 0 5px 15px rgba(255, 215, 0, 0.3);
        }

        /* --- PDF ANNOTATION ENGINE --- */
        .pdf-editor-modal {
            position: fixed;
            inset: 0;
            background: #080808;
            z-index: 10000;
            display: none;
            flex-direction: column;
        }

        .pdf-editor-modal.active {
            display: flex;
            animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp {
            from {
                transform: translateY(100%);
            }

            to {
                transform: translateY(0);
            }
        }

        .editor-header {
            padding: 15px 30px;
            background: #111;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .tool-group {
            display: flex;
            gap: 10px;
        }

        .tool-icon {
            padding: 10px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.05);
            color: #888;
            cursor: pointer;
            transition: 0.3s;
        }

        .tool-icon.active {
            background: var(--primary);
            color: #000;
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.3);
        }

        .editor-workspace {
            flex: 1;
            display: flex;
            overflow: hidden;
        }

        .canvas-container {
            flex: 1;
            background: #050505;
            overflow: auto;
            position: relative;
            cursor: grab;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding: 40px;
        }

        #layered-canvas-hub {
            position: relative;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            background: #fff;
        }

        #pdfLayer {
            position: absolute;
            inset: 0;
            z-index: 1;
            pointer-events: none;
        }

        #drawLayer {
            position: absolute;
            inset: 0;
            z-index: 2;
        }

        .empty-state {
            text-align: center;
            padding: 100px 20px;
            color: #666;
        }
    </style>
</head>

    <script type="module">
        import {
            apiCall,
            getFreshToken,
            guardTeacher,
            getIndexPath,
            BP,
            API_BASE
        } from "../../assets/js/bee-core.js";

        if (!guardTeacher()) {
            window.location.href = getIndexPath();
        }

        let allBanks = [];
        let selectedClass = "";
        let selectedSubject = "";
        let selectedBankId = "";
        let currentTargetNode = "";

        const architectUpload = document.getElementById("architect-upload");

        async function initNotes() {
            try {
                const result = await apiCall("/teacher/dashboard");
                if (result && result.success) {
                    allBanks = result.data.subjects || [];
                    renderClassTabs();
                }
            } catch (err) {
                console.error("Init Error:", err);
            }
        }

        function renderClassTabs() {
            const container = document.getElementById("class-tabs");
            const classes = [...new Set(allBanks.map(b => b.class))].sort((a, b) => b - a);

            if (classes.length === 0) {
                container.innerHTML = `<div class="tab-pill">No Classes Found</div>`;
                return;
            }

            container.innerHTML = classes.map((c, i) => `
                <div class="tab-pill ${i === 0 ? "active" : ""}" data-class="${c}">Class ${c}</div>
            `).join("");

            // Add Event Listeners
            container.querySelectorAll(".tab-pill").forEach(pill => {
                pill.onclick = () => selectClass(pill.dataset.class);
            });

            selectClass(classes[0]);
        }

        function selectClass(cls) {
            selectedClass = cls;
            document.querySelectorAll("#class-tabs .tab-pill").forEach(p => {
                p.classList.toggle("active", p.dataset.class === cls);
            });
            const subjects = [...new Set(allBanks.filter(b => b.class === cls).map(b => b.subject))];
            renderSubjectTabs(subjects);
        }

        function renderSubjectTabs(subjects) {
            const container = document.getElementById("subject-tabs");

            if (subjects.length === 0) {
                container.innerHTML = `<div class="tab-pill">No Subjects</div>`;
                return;
            }

            container.innerHTML = subjects.map((s, i) => `
                <div class="tab-pill ${i === 0 ? "active" : ""}" data-subject="${s}">${s}</div>
            `).join("");

            // Add Event Listeners
            container.querySelectorAll(".tab-pill").forEach(pill => {
                pill.onclick = () => selectSubject(pill.dataset.subject);
            });

            selectSubject(subjects[0]);
        }

        function selectSubject(sub) {
            if (!sub) return;
            selectedSubject = sub;

            // Visual Update
            document.querySelectorAll("#subject-tabs .tab-pill").forEach(p => {
                p.classList.toggle("active", p.dataset.subject === sub);
            });

            // Find matching data bank (case-insensitive)
            const bank = allBanks.find(b =>
                b.class.toString() === selectedClass.toString() &&
                b.subject.toLowerCase() === sub.toLowerCase()
            );

            if (bank && bank.bankId) {
                selectedBankId = bank.bankId;
                loadChapters(bank.bankId);
            } else {
                console.warn("No Bank record found for:", selectedClass, sub);
                const container = document.getElementById("chapters-container");
                container.innerHTML = `<div class="empty-state">No syllabus blueprint found for Class ${selectedClass} ${sub}. Create it in Bank Inventory first.</div>`;
            }
        }

        async function loadChapters(bankId) {
            const container = document.getElementById("chapters-container");
            container.innerHTML = `<div class="empty-state">SYNCING REPOSITORY...</div>`;
            try {
                const result = await apiCall("/teacher/notes/" + bankId);
                if (result && result.success) {
                    renderChapters(result.data.chapters);
                } else {
                    container.innerHTML = `<div class="empty-state">Vault bridge failed to sync.</div>`;
                }
            } catch (err) {
                container.innerHTML = `<div class="empty-state">Network fault in Notebook Hub.</div>`;
            }
        }

        function renderChapters(chapters) {
            const container = document.getElementById("chapters-container");
            if (!chapters || chapters.length === 0) {
                container.innerHTML = `<div class="empty-state">No syllabus nodes defined.</div>`;
                return;
            }
            container.innerHTML = chapters.map(chap => `
                <div class="chapter-node">
                    <div class="chapter-title"><div class="chapter-indicator"></div> ${chap.chapterName}</div>
                    <div class="notebook-grid">
                        ${renderNoteCard(chap, "complete", "Master Blueprint", "DETAILED NOTES")}
                        ${renderNoteCard(chap, "flash", "Short Memo", "QUICK REVISION")}
                    </div>
                </div>
            `).join("");
        }

        const pdfModal = document.querySelector(".pdf-editor-modal");
        const pdfLayer = document.getElementById("pdfLayer");
        const drawLayer = document.getElementById("drawLayer");
        let pdfDoc = null;
        let pageNum = 1;
        let scale = 1.5;

        // Configure Worker
        if (window.pdfjsLib) {
            pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.11.338/pdf.worker.min.js';
        }

        window.openPdfViewer = async (url, title) => {
            console.log("Opening PDF:", url);
            pdfModal.classList.add("active");
            document.querySelector(".editor-header h3")?.remove();
            const h3 = document.createElement("h3");
            h3.style = "font-size: 14px; font-weight: 800; color: #fff;";
            h3.innerText = title || "Document Viewer";
            document.querySelector(".editor-header").prepend(h3);

            const downloadBtn = document.getElementById("header-download-btn");
            if (downloadBtn) {
                downloadBtn.onclick = () => window.downloadNote(url, title);
            }

            const externalBtn = document.getElementById("header-external-btn");
            if (externalBtn) {
                externalBtn.onclick = () => window.open(url, "_blank");
            }

            Swal.fire({
                title: "Loading Virtual Node...",
                text: "Syncing with Cloudinary Vault",
                allowOutsideClick: false,
                didOpen: () => { Swal.showLoading(); },
                background: "#080808", color: "#fff"
            });

            try {
                // Fetch the PDF using pdf.js
                const loadingTask = pdfjsLib.getDocument(url);
                pdfDoc = await loadingTask.promise;
                Swal.close();
                renderPage(1);
            } catch (err) {
                console.error("PDF Load Error:", err);
                Swal.fire({
                    icon: "error",
                    title: "Access Denied (401)",
                    text: "Cloudinary vault rejected the request. Try downloading or re-uploading the file.",
                    background: "#080808", color: "#fff"
                });
                pdfModal.classList.remove("active");
            }
        };

        async function renderPage(num) {
            const page = await pdfDoc.getPage(num);
            const viewport = page.getViewport({ scale });

            pdfLayer.width = viewport.width;
            pdfLayer.height = viewport.height;
            drawLayer.width = viewport.width;
            drawLayer.height = viewport.height;

            const renderContext = {
                canvasContext: pdfLayer.getContext("2d"),
                viewport: viewport
            };
            await page.render(renderContext).promise;

            // Sync layered canvas size
            const hub = document.getElementById("layered-canvas-hub");
            hub.style.width = viewport.width + "px";
            hub.style.height = viewport.height + "px";
        }

        window.closePdfViewer = () => {
            pdfModal.classList.remove("active");
            pdfDoc = null;
        };

        window.downloadNote = async function (noteId) {
            const token = await getFreshToken();
            if (!token) {
                Swal.fire({ icon: 'error', title: 'SESSION EXPIRED', text: 'Please sign in again.', background: "#111", color: "#fff" });
                return;
            }
            // USE SECURE REDIRECT (Reliable Protocol)
            window.location.href = `${API_BASE}/teacher/notes/${noteId}/download?token=${encodeURIComponent(token)}`;
        };

        window.externalView = (url) => {
            window.open(url, "_blank");
        };

        function renderNoteCard(chap, type, title, subtitle) {
            const note = chap.notes.find(n => n.noteType === type);
            const cardId = "card-" + Math.random().toString(36).substr(2, 9);

            setTimeout(() => {
                const zone = document.getElementById(cardId);
                if (zone) {
                    zone.onclick = () => {
                        if (note) {
                            window.downloadNote(note.noteId, note.fileName);
                        } else {
                            triggerVaultUpload(chap.chapterId, type, chap.chapterName);
                        }
                    };
                }
                const wipeBtn = document.getElementById("wipe-" + cardId);
                if (wipeBtn) {
                    wipeBtn.onclick = (e) => {
                        e.stopPropagation();
                        deleteNote(note.noteId);
                    };
                }
                // View button logic: opens the premium viewer
                const viewBtn = zone?.querySelector(".act-btn:not(#wipe-" + cardId + ")");
                if (viewBtn) {
                    viewBtn.onclick = (e) => {
                        e.stopPropagation();
                        window.openPdfViewer(note.fileUrl, note.fileName);
                    }
                }
            }, 0);

            return `
                <div class="notebook-card" id="${cardId}">
                    <div class="card-type">
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
                            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                        </svg>
                        ${type === "complete" ? "COMPREHENSIVE NODE" : "FLASH NODE"}
                    </div>
                    <div class="note-header">
                        <div class="note-icon-box">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                                ${type === "complete" ? `<circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline>` : `<path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"></path>`}
                            </svg>
                        </div>
                        <div>
                            <div style="font-weight: 900; font-size: 14px; color: #fff;">${title}</div>
                            <div style="font-size: 9px; font-weight: 700; color: var(--text-muted); opacity: 0.7;">${subtitle}</div>
                        </div>
                    </div>
                    ${note ? `
                        <div class="document-item">
                            <div style="font-size: 10px; font-weight: 850; color: #fff; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">${note.fileName}</div>
                            <div class="doc-actions">
                                <button class="act-btn">VIEW</button>
                                <button class="act-btn" id="wipe-${cardId}" style="color: #ff4444; border-color: rgba(255,68,68,0.2);">WIPE</button>
                            </div>
                            <button class="act-btn" style="width: 100%;" onclick="event.stopPropagation(); window.downloadNote('${note.noteId}', '${note.fileName}')">
                                <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
                                DOWNLOAD
                            </button>
                        </div>
                    ` : `
                        <div class="vault-upload-zone">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" style="color: var(--primary);">
                                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                                <polyline points="17 8 12 3 7 8"></polyline>
                                <line x1="12" y1="3" x2="12" y2="15"></line>
                            </svg>
                            <div style="font-size: 9px; font-weight: 900; color: var(--primary);">VAULT ${type.toUpperCase()}</div>
                        </div>
                    `}
                </div>
            `;
        }

        function triggerVaultUpload(chapId, noteType, chapName) {
            currentTargetNode = chapId + ":" + noteType + ":" + chapName;
            architectUpload.click();
        }

        architectUpload.onchange = async function (e) {
            if (e.target.files.length > 0) {
                const file = e.target.files[0];
                
                // Enforce 7MB protocol (User Requirement)
                if (file.size > 7 * 1024 * 1024) {
                    Swal.fire({
                        icon: "warning",
                        title: "VAULT OVERFLOW",
                        text: "Architectural PDFs must be under 7MB for optimized synchronization.",
                        background: "#0a0a1a",
                        color: "#fff"
                    });
                    this.value = "";
                    return;
                }

                const [chapId, noteType, chapName] = currentTargetNode.split(":");
                await uploadNote(file, chapId, noteType, chapName);
            }
        };

        async function uploadNote(file, chapId, noteType, chapName) {
            Swal.fire({
                title: "UPLOADING...",
                text: "Uploading to Cloudinary Vault",
                allowOutsideClick: false,
                didOpen: () => { Swal.showLoading(); },
                background: "#0a0a1a", color: "#fff"
            });
            try {
                const formData = new FormData();
                formData.append("file", file);
                formData.append("bankId", selectedBankId);
                formData.append("chapterId", chapId);
                formData.append("chapterName", chapName);
                formData.append("noteType", noteType);

                const token = await getFreshToken();
                const response = await fetch(`${API_BASE}/teacher/notes/upload`, {
                    method: 'POST',
                    headers: { 'Authorization': 'Bearer ' + token },
                    body: formData
                });
                const result = await response.json();

                if (result && result.success) {
                    Swal.fire({ icon: "success", title: "UPLOAD SUCCESS", text: "File synced to Cloudinary Vault!", timer: 1500, showConfirmButton: false, background: "#0a0a1a", color: "#fff" });
                    loadChapters(selectedBankId);
                } else {
                    throw new Error(result.message || 'Upload failed');
                }
            } catch (err) {
                console.error("Upload Error:", err);
                Swal.fire({ 
                    icon: "error", 
                    title: "VAULT SYNC FAILURE", 
                    text: err.message || "Upload failed. Please try a smaller file or try again in a moment.", 
                    background: "#0a0a1a", 
                    color: "#fff" 
                });
            }
        }

        async function deleteNote(noteId) {
            const confirm = await Swal.fire({
                title: "PURGE NODE?",
                text: "This metadata will be permanently deleted.",
                icon: "warning",
                showCancelButton: true,
                confirmButtonText: "PURGE",
                background: "#0a0a1a", color: "#fff",
                confirmButtonColor: "#ff4444"
            });
            if (confirm.isConfirmed) {
                try {
                    await apiCall("/teacher/notes/" + noteId, "DELETE");
                } catch(e) {
                    console.warn("Delete API returned an error, assuming file removed anyway.");
                }
                Swal.fire({ icon: "success", title: "DELETED", text: "File removed from library.", timer: 1500, showConfirmButton: false, background: "#0a0a1a", color: "#fff" });
                loadChapters(selectedBankId);
            }
        }

        document.addEventListener("DOMContentLoaded", initNotes);
    </script>
</body>

</html>
