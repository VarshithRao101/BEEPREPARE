<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resolution Hub - BEEPREPARE</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../assets/css/teacher-theme.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --primary: #FFD700;
            --bg-deep: #08080a;
            --sidebar-bg: #0c0c0f;
            --hub-bg: #0e0e12;
            --msg-in: rgba(255, 255, 255, 0.05);
            --msg-out: linear-gradient(135deg, #FFD700 0%, #FFA500 100%);
        }

        body {
            overflow: hidden;
            background: var(--bg-deep);
            font-family: 'Outfit', sans-serif;
            color: #fff;
            margin: 0;
        }

        .resolution-hub {
            display: grid;
            grid-template-columns: 360px 1fr;
            height: 100vh;
            width: 100vw;
            transition: 0.3s;
        }

        /* ════════════════ 1. Scholar Logs Sidebar ════════════════ */
        .logs-sidebar {
            background: var(--sidebar-bg);
            border-right: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            z-index: 100;
        }

        .sidebar-header {
            padding: 25px;
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .sidebar-header h2 { font-size: 18px; margin: 0; font-weight: 800; letter-spacing: 0.5px; }

        .search-node {
            padding: 15px 25px;
            border-bottom: 1px solid var(--glass-border);
        }

        .search-box {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 10px 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .search-box input { background: none; border: none; color: #fff; font-size: 13px; outline: none; width: 100%; font-family: inherit; }

        .log-stream { flex: 1; overflow-y: auto; padding: 15px; }

        .log-card {
            padding: 16px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.02);
            margin-bottom: 12px;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 15px;
            border: 1.5px solid transparent;
            position: relative;
        }

        .log-card:hover { background: rgba(255, 255, 255, 0.04); transform: translateY(-2px); }
        .log-card.active { background: rgba(255, 215, 0, 0.05); border-color: rgba(255, 215, 0, 0.2); }

        .student-avatar {
            width: 48px; height: 48px; border-radius: 15px;
            background: var(--glass); border: 1px solid var(--glass-border);
            display: flex; align-items: center; justify-content: center;
            font-weight: 900; color: var(--primary); font-size: 16px;
        }

        .log-card.active .student-avatar { background: var(--primary); color: #000; }

        .log-info { flex: 1; min-width: 0; }
        .log-info h4 { margin: 0; font-size: 14px; color: #fff; font-weight: 800; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .log-info p { margin: 3px 0 0; font-size: 11px; color: var(--text-muted); font-weight: 600; text-transform: uppercase; }

        .unread-indicator { width: 8px; height: 8px; background: #ff4d4d; border-radius: 50%; box-shadow: 0 0 10px #ff4d4d; position: absolute; top: 15px; right: 15px; }

        /* ════════════════ 2. Active Interaction Hub ════════════════ */
        .interaction-hub {
            background: var(--hub-bg);
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        .empty-hub {
            flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
            text-align: center; padding: 40px; opacity: 0.8;
        }

        .hub-icon {
            width: 80px; height: 80px; border-radius: 24px;
            background: rgba(255, 255, 255, 0.03); border: 1.5px solid rgba(255, 255, 255, 0.08);
            display: flex; align-items: center; justify-content: center;
            margin-bottom: 25px; color: var(--primary);
        }

        .hub-header {
            padding: 15px 25px;
            background: rgba(15, 15, 18, 0.8);
            backdrop-filter: blur(30px);
            border-bottom: 1px solid var(--glass-border);
            display: flex; align-items: center; gap: 15px;
            z-index: 10;
        }

        .btn-return {
            display: none; width: 40px; height: 40px; border-radius: 12px;
            background: var(--glass); border: 1px solid var(--glass-border);
            color: #fff; cursor: pointer; align-items: center; justify-content: center;
        }

        .scholar-anchor { display: flex; align-items: center; gap: 12px; }
        .anchor-id { width: 40px; height: 40px; border-radius: 50%; background: linear-gradient(135deg, #FFD700 0%, #FFA500 100%); color: #000; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 16px; }

        .chat-canvas { 
            flex: 1; 
            overflow-y: auto; 
            padding: 30px 20px; 
            display: flex; 
            flex-direction: column; 
            gap: 15px; 
            scroll-behavior: smooth;
        }

        .bubble {
            max-width: 75%; padding: 12px 18px; border-radius: 20px; font-size: 14px; line-height: 1.5;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1); position: relative;
            animation: slideUp 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.28) forwards;
        }

        @keyframes slideUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        .bubble.student { align-self: flex-start; background: var(--msg-in); color: #fff; border-bottom-left-radius: 4px; border: 1px solid var(--glass-border); }
        .bubble.teacher { align-self: flex-end; background: var(--msg-out); color: #000; border-bottom-right-radius: 4px; font-weight: 600; }

        .bubble-img {
            max-width: 150px; border-radius: 12px; margin-top: 10px;
            border: 1px solid rgba(255,255,255,0.1); cursor: pointer;
            transition: 0.3s; display: block;
        }
        .bubble-img:hover { transform: scale(1.03); border-color: var(--primary); }

        .response-console {
            padding: 20px;
            background: rgba(12, 12, 15, 0.98);
            border-top: 1px solid var(--glass-border);
            display: flex; gap: 12px; align-items: flex-end;
        }

        .composer {
            flex: 1; background: var(--glass); border: 1px solid var(--glass-border);
            border-radius: 18px; padding: 12px 18px; color: #fff; outline: none;
            min-height: 48px; max-height: 150px; resize: none; font-size: 14px;
            transition: 0.3s; font-family: inherit;
        }

        .btn-action { width: 48px; height: 48px; border-radius: 14px; border: none; background: var(--glass); color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .btn-action:hover { background: rgba(255, 255, 255, 0.08); }
        .btn-action.prime { background: var(--primary); color: #000; }

        .lightbox-portal {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.95); z-index: 1000;
            display: none; align-items: center; justify-content: center;
            backdrop-filter: blur(10px);
        }
        .lightbox-portal.active { display: flex; }
        .lightbox-content { max-width: 90%; max-height: 85%; border-radius: 15px; }

        @media (max-width: 768px) {
            .resolution-hub { grid-template-columns: 100% 100%; width: 200%; }
            .resolution-hub.chat-active { transform: translateX(-50%); }
            .btn-return { display: flex; }
        }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.05); border-radius: 10px; }
    </style>
</head>

<body>
    <div class="resolution-hub" id="hub-container">
        <!-- 1. Scholar Logs -->
        <aside class="logs-sidebar">
            <header class="sidebar-header">
                <h2>Scholar Queries</h2>
                <div class="btn-action" style="width: 36px; height: 36px;" onclick="window.location.href='teacher-home.html'">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
                </div>
            </header>
            
            <div class="search-node">
                <div class="search-box">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="2.5"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                    <input type="text" id="log-filter" placeholder="Search scholars..." onkeyup="filterLogs()">
                </div>
            </div>

            <div class="log-stream" id="log-list">
                <div style="padding: 40px; text-align: center; color: var(--text-muted); font-size: 11px; font-weight: 800; letter-spacing: 1.5px; text-transform: uppercase;">Syncing Hub...</div>
            </div>
        </aside>

        <!-- 2. Active Interaction Hub -->
        <main class="interaction-hub">
            <div class="empty-hub" id="empty-hub">
                <div class="hub-icon">
                    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 1 1-7.6-13.04 8.5 8.5 0 0 1 8.5 8.54c0 .24 0 .44-.05.7z"></path></svg>
                </div>
                <h3 style="font-size: 20px; font-weight: 800; margin-bottom: 12px;">Expert Bridge Secure</h3>
                <p style="font-size: 13px; max-width: 250px; line-height: 1.6; opacity: 0.5; font-weight: 600;">Authenticate a scholar terminal from the sidebar to begin expert guidance.</p>
            </div>

            <div id="active-hub" style="display: none; flex-direction: column; height: 100%;">
                <header class="hub-header">
                    <button class="btn-return" onclick="document.getElementById('hub-container').classList.remove('chat-active')">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M15 18l-6-6 6-6"/></svg>
                    </button>
                    <div class="scholar-anchor">
                        <div class="anchor-id" id="hub-student-initials">S</div>
                        <div>
                            <div id="hub-student-name" style="font-weight: 800; font-size: 16px;">Scholar Master</div>
                            <div id="hub-context-text" style="color: var(--primary); font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; margin-top: 2px;">Context Loading...</div>
                        </div>
                    </div>
                </header>

                <div class="chat-canvas" id="msg-stream"></div>

                <div class="interaction-console">
                    <textarea id="hub-response" class="composer" placeholder="Provide expert clarity..." rows="1" oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px'"></textarea>
                    <button class="btn-action prime" id="hub-send-btn" onclick="sendExpertResponse()">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="#000" stroke="none"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
                    </button>
                </div>
            </div>
        </main>
    </div>

    <div class="lightbox-portal" id="lightbox" onclick="this.classList.remove('active')">
        <img class="lightbox-content" id="lightbox-img">
    </div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
        import { getFirestore, collection, onSnapshot, query, orderBy, doc, addDoc, updateDoc, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';
        import { firebaseConfig, apiCall, guardTeacher, BP } from '../../assets/js/bee-core.js';

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let currentChatId = null;
        let allLogs = [];
        let unsubscribe = null;

        const initHub = async () => {
            if (!guardTeacher()) return;
            try {
                await fetchLogs();
                renderSidebar();
            } catch (e) {
                console.error('Hub sync error:', e);
                document.getElementById('log-list').innerHTML = `<div style="padding:20px; color:#ff4d4d; font-size:11px; font-weight:900; text-align:center;">SYNC DEFERRED.</div>`;
            }
        };

        const fetchLogs = async () => {
            const res = await apiCall('/teacher/doubts');
            if (res && res.success) {
                allLogs = res.data.chats || [];
            }
        };

        function renderSidebar() {
            const list = document.getElementById('log-list');
            if (!list) return;
            if (allLogs.length === 0) {
                list.innerHTML = `<div style="padding:40px; text-align:center; color:rgba(255,255,255,0.2); font-size:11px; font-weight:800; text-transform:uppercase; letter-spacing:1px; line-height:1.6;">No active queries.<br><span style="color:var(--primary); font-size:10px;">Awaiting scholar interaction.</span></div>`;
                return;
            }
            list.innerHTML = allLogs.map(l => {
                const isActive = currentChatId === l.chatId;
                const initials = (l.studentName || 'S').substring(0, 2).toUpperCase();
                return `
                    <div class="log-card ${isActive ? 'active' : ''}" onclick="openResolution('${l.chatId}', '${l.studentName}', '${l.subject}', '${l.class}')">
                        <div class="student-avatar">${initials}</div>
                        <div class="log-info">
                            <h4>${l.studentName}</h4>
                            <p>${l.subject} • ${l.class}</p>
                            <div style="font-size: 11px; color: var(--text-muted); opacity:0.6; margin-top: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-weight:500;">
                                ${l.lastMessage || 'Awaiting input...'}
                            </div>
                        </div>
                        ${l.unreadByTeacher ? '<div class="unread-indicator"></div>' : ''}
                    </div>
                `;
            }).join('');
        }

        window.openResolution = (chatId, studentName, subject, className) => {
            currentChatId = chatId;
            renderSidebar();

            document.getElementById('hub-container').classList.add('chat-active');
            document.getElementById('empty-hub').style.display = 'none';
            document.getElementById('active-hub').style.display = 'flex';
            document.getElementById('hub-student-name').textContent = studentName;
            document.getElementById('hub-context-text').textContent = `${subject} • ${className}`;
            document.getElementById('hub-student-initials').textContent = (studentName || 'S').substring(0, 2).toUpperCase();

            apiCall(`/teacher/doubts/${chatId}/read`, 'POST').catch(() => {});

            if (unsubscribe) unsubscribe();
            const q = query(collection(db, 'chats', chatId, 'messages'), orderBy('timestamp', 'asc'));
            unsubscribe = onSnapshot(q, (snap) => {
                const stream = document.getElementById('msg-stream');
                stream.innerHTML = snap.docs.map(doc => {
                    const m = doc.data();
                    const side = m.senderRole === 'student' ? 'student' : 'teacher';
                    return `
                        <div class="bubble ${side}">
                            ${m.imageUrl ? `<img src="${m.imageUrl}" class="bubble-img" onclick="showLightbox('${m.imageUrl}')">` : ''}
                            <div style="word-break: break-word;">${m.content}</div>
                            <div style="font-size: 9px; opacity: 0.3; margin-top: 8px; text-align: ${side === 'teacher' ? 'right' : 'left'}; font-weight:800;">
                                ${m.timestamp?.toDate ? m.timestamp.toDate().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) : 'SYNCING...'}
                            </div>
                        </div>
                    `;
                }).join('');
                setTimeout(() => stream.scrollTop = stream.scrollHeight, 100);
            });
        };

        window.showLightbox = (url) => {
            const lb = document.getElementById('lightbox');
            const img = document.getElementById('lightbox-img');
            img.src = url;
            lb.classList.add('active');
        };

        window.sendExpertResponse = async () => {
            const input = document.getElementById('hub-response');
            const data = input.value.trim();
            if (!data || !currentChatId) return;

            const btn = document.getElementById('hub-send-btn');
            btn.disabled = true;
            input.value = '';
            input.style.height = 'auto';

            try {
                const chatRef = doc(db, 'chats', currentChatId);
                const msgRef = collection(chatRef, 'messages');

                await addDoc(msgRef, {
                    senderId: localStorage.getItem(BP.UID),
                    senderRole: 'teacher',
                    content: data,
                    timestamp: serverTimestamp()
                });

                await updateDoc(chatRef, {
                    lastMessage: data,
                    lastMessageRole: 'teacher',
                    unreadByStudent: true,
                    unreadByTeacher: false,
                    updatedAt: serverTimestamp()
                });

                await fetchLogs();
                renderSidebar();
            } catch (e) {
                console.error(e);
                Swal.fire({ icon: 'error', title: 'SYNCHRONIZATION ERROR', text: 'Packet delivery failed.', background: '#111114', color: '#fff' });
            } finally {
                btn.disabled = false;
            }
        };

        window.filterLogs = () => {
            const term = document.getElementById('log-filter').value.toLowerCase();
            const cards = document.querySelectorAll('.log-card');
            cards.forEach(c => {
                const text = c.textContent.toLowerCase();
                c.style.display = text.includes(term) ? 'flex' : 'none';
            });
        };

        document.getElementById('hub-response').addEventListener('keypress', e => { 
            if(e.key === 'Enter' && !e.shiftKey) { 
                e.preventDefault(); 
                sendExpertResponse(); 
            } 
        });

        initHub();
    </script>
</body>
</html>
