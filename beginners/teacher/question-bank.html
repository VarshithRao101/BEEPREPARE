<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Question Bank - BEEPREPARE</title>
    <link rel="stylesheet" href="../../assets/css/style.css">
    <style>
        /* Doubts Indicator */
        .doubt-badge-nav {
            position: absolute;
            top: 2px;
            right: 50%;
            transform: translateX(20px);
            background: #ff4d4d;
            color: white;
            border-radius: 50%;
            width: 14px;
            height: 14px;
            font-size: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            border: 2px solid #141414;
        }
        /* Modern Reset & Base */
        .app-container {
            padding-bottom: 90px;
        }

        /* Section Dividers */
        .section-divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 24px 0 16px 0;
        }

        .divider-line {
            height: 2px;
            flex: 1;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 2px;
        }

        .section-label {
            font-size: 13px;
            font-weight: 700;
            color: var(--text-muted);
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* Selection Cards */
        .grid-3 {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }

        .grid-2 {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        .select-card {
            background: linear-gradient(145deg, rgba(30, 30, 30, 0.4), rgba(20, 20, 20, 0.6));
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 16px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .select-card:hover {
            transform: translateY(-3px);
            background: rgba(40, 40, 40, 0.8);
            border-color: rgba(255, 255, 255, 0.15);
        }

        .select-card.active {
            background: rgba(255, 215, 0, 0.1);
            border-color: var(--adv-yellow);
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.1);
        }

        .select-card.active::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background: var(--primary);
        }

        .card-icon {
            width: 50px;
            height: 50px;
            margin: 0 auto 12px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0.9;
            transition: 0.2s;
        }

        .select-card.active .card-icon {
            opacity: 1;
            transform: scale(1.05);
        }

        .card-title {
            font-size: 14px;
            font-weight: 600;
            color: #ccc;
        }

        .select-card.active .card-title {
            color: var(--adv-text);
        }

        /* Context Box styles */
        .context-box {
            background: rgba(20, 20, 20, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 24px;
            margin-top: 24px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-label {
            display: block;
            margin-bottom: 10px;
            font-size: 13px;
            color: var(--text-muted);
            font-weight: 600;
        }

        .glass-field {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            padding: 16px;
            color: var(--adv-text);
            font-size: 15px;
            outline: none;
            transition: 0.2s;
        }

        .glass-field:focus {
            border-color: var(--adv-yellow);
            background: rgba(0, 0, 0, 0.2);
            box-shadow: 0 0 0 2px rgba(255, 215, 0, 0.15);
        }

        /* Action Button */
        .primary-action-btn {
            background: var(--primary);
            color: var(--adv-dark);
            width: 100%;
            padding: 18px;
            border-radius: 14px;
            font-weight: 700;
            font-size: 16px;
            border: none;
            margin-top: 32px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: 0.2s;
            box-shadow: 0 4px 15px rgba(255, 215, 0, 0.2);
        }

        .primary-action-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(255, 215, 0, 0.3);
        }

        .primary-action-btn:active {
            transform: scale(0.98);
        }
    </style>
    <link rel="stylesheet" href="../../assets/css/teacher-theme.css">
    <!-- PREMIUM ANIMATION STYLES -->
    <link rel="stylesheet" href="../../assets/css/premium-student-ui.css">
</head>

<body>
    <div class="background-animation">
        <div class="glow-orb orb-1"></div>
        <div class="glow-orb orb-3"></div>
    </div>

    <div class="app-container">

        <!-- Top Header (Now Inside Container) -->
        <div class="top-header"
            style="display: flex; align-items: center; justify-content: center; position: relative; margin-bottom: 24px;">
            <div class="header-title text-gold-glow"
                style="color: var(--adv-yellow); font-weight: 700; font-size: 18px; letter-spacing: 1px;">BEEPREPARE
            </div>
            <div class="profile-icon"
                style="background: white; color: black; font-weight: 700; width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; position: absolute; right: 0;">
                T</div>
        </div>
        <!-- Subheader -->
        <div style="text-align: center; margin-bottom: 30px;">
            <div style="font-size: 20px; font-weight: 700; color: var(--adv-text); margin-bottom: 4px;">Question Bank
            </div>
            <p style="color: var(--text-muted); font-size: 13px;">Manage and curate your questions</p>
        </div>

        <!-- Class Selection -->
        <div class="section-divider">
            <span class="section-label">1. Select Class</span>
            <div class="divider-line"></div>
        </div>

        <div class="grid-3">
            <div class="select-card" onclick="selectItem(this, 'class-group')">
                <div class="card-icon">8</div>
                <div class="card-title">Class 8</div>
            </div>
            <div class="select-card" onclick="selectItem(this, 'class-group')">
                <div class="card-icon">9</div>
                <div class="card-title">Class 9</div>
            </div>
            <div class="select-card active" onclick="selectItem(this, 'class-group')">
                <div class="card-icon">10</div>
                <div class="card-title">Class 10</div>
            </div>
        </div>

        <!-- Subject Selection -->
        <div class="section-divider">
            <span class="section-label">2. Select Subject</span>
            <div class="divider-line"></div>
        </div>

        <div class="grid-2">
            <div class="select-card active" onclick="selectItem(this, 'subject-group')">
                <div class="card-icon">
                    <img src="../../assets/images/subjects/physics.svg" alt="Physics"
                        style="width: 100%; height: 100%; object-fit: contain;">
                </div>
                <div class="card-title">Physics</div>
            </div>
            <div class="select-card" onclick="selectItem(this, 'subject-group')">
                <div class="card-icon">
                    <img src="../../assets/images/subjects/chemistry.svg" alt="Chemistry"
                        style="width: 100%; height: 100%; object-fit: contain;">
                </div>
                <div class="card-title">Chemistry</div>
            </div>
            <div class="select-card" onclick="selectItem(this, 'subject-group')">
                <div class="card-icon">
                    <img src="../../assets/images/subjects/mathematics.svg" alt="Maths"
                        style="width: 100%; height: 100%; object-fit: contain;">
                </div>
                <div class="card-title">Maths</div>
            </div>
            <div class="select-card" onclick="selectItem(this, 'subject-group')">
                <div class="card-icon">
                    <img src="../../assets/images/subjects/biology.svg" alt="Biology"
                        style="width: 100%; height: 100%; object-fit: contain;">
                </div>
                <div class="card-title">Biology</div>
            </div>
            <div class="select-card" onclick="selectItem(this, 'subject-group')">
                <div class="card-icon">
                    <img src="../../assets/images/subjects/english.svg" alt="English"
                        style="width: 100%; height: 100%; object-fit: contain;">
                </div>
                <div class="card-title">English</div>
            </div>
            <div class="select-card" onclick="selectItem(this, 'subject-group')">
                <div class="card-icon">
                    <img src="../../assets/images/subjects/social.svg" alt="Social"
                        style="width: 100%; height: 100%; object-fit: contain;">
                </div>
                <div class="card-title">Social Studies</div>
            </div>
        </div>

        <!-- Detailed Context -->
        <div class="context-box">
            <div class="input-group">
                <label class="input-label">CHAPTER SELECTION</label>
                <div style="position: relative;">
                    <select class="glass-field" style="appearance: none; cursor: pointer;">
                        <option>Light: Reflection & Refraction</option>
                        <option>Electricity</option>
                        <option>Magnetic Effects</option>
                    </select>
                    <div
                        style="position: absolute; right: 16px; top: 50%; transform: translateY(-50%); pointer-events: none; color: #888;">
                        ▼</div>
                </div>
            </div>

            <div class="input-group" style="margin-bottom: 0;">
                <label class="input-label">SPECIFIC TOPIC (OPTIONAL)</label>
                <input type="text" class="glass-field" placeholder="e.g. Lens Formula">
            </div>
        </div>

        <!-- Main Action -->
        <button class="primary-action-btn" onclick="window.location.href='add-question.html'">
            <span>Proceed to Add Question</span>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="2.5"
                stroke-linecap="round" stroke-linejoin="round">
                <line x1="5" y1="12" x2="19" y2="12"></line>
                <polyline points="12 5 19 12 12 19"></polyline>
            </svg>
        </button>

    </div>

    <nav class="nav-bottom">
        <a href="teacher-home.html" class="nav-item">
            <svg viewBox="0 0 24 24" fill="currentColor">
                <path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z" />
            </svg>
            <span>Home</span>
        </a>
        <a href="question-bank.html" class="nav-item active">
            <svg viewBox="0 0 24 24" fill="currentColor">
                <path
                    d="M20 6h-8l-2-2H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zm0 12H4V8h16v10z" />
            </svg>
            <span>Bank</span>
        </a>
        <a href="../ai-chat.html" class="nav-item ai-nav">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 3l1.8 4.2a2 2 0 0 0 1 1L19 10l-4.2 1.8a2 2 0 0 0-1 1L12 17l-1.8-4.2a2 2 0 0 0-1-1L5 10l4.2-1.8a2 2 0 0 0 1-1L12 3z"></path>
                <path d="M18 3l.6 1.4a1 1 0 0 0 .5.5L20.5 5.5l-1.4.6a1 1 0 0 0-.5.5L18 8l-.6-1.4a1 1 0 0 0-.5-.5L15.5 5.5l1.4-.6a1 1 0 0 0 .5-.5L18 3z"></path>
                <path d="M6 16l.6 1.4a1 1 0 0 0 .5.5L8.5 18.5l-1.4.6a1 1 0 0 0-.5.5L6 21l-.6-1.4a1 1 0 0 0-.5-.5L3.5 18.5l1.4-.6a1 1 0 0 0 .5-.5L6 16z"></path>
            </svg>
            <span>BEE AI</span>
        </a>
        <a href="generate-paper.html" class="nav-item">
            <svg viewBox="0 0 24 24" fill="currentColor">
                <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2" />
            </svg>
            <span>Generate</span>
        </a>
        <a href="teacher-profile.html" class="nav-item">
            <svg viewBox="0 0 24 24" fill="currentColor">
                <path
                    d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z" />
            </svg>
            <span>Profile</span>
        </a>
    </nav>

    <script>
        function selectItem(el, group) {
            // Find parent container to scope search
            // For simple grid siblings
            let siblings = el.parentElement.children;
            for (let sib of siblings) {
                if (sib.classList.contains('select-card')) {
                    sib.classList.remove('active');
                }
            }
            el.classList.add('active');
        }
    </script>

    <!-- EXTREME UI SCRIPTS (Animations Only) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.8.0/vanilla-tilt.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Apply 3D Tilt to Teacher Cards
            const tiltElements = document.querySelectorAll(".subject-card, .class-card, .timeline-card, .req-card, .bank-card, .history-card, .profile-card, .stat-box, .file-item");
            if (tiltElements.length > 0) {
                try {
                    VanillaTilt.init(tiltElements, {
                        max: 8,
                        speed: 400,
                        glare: true,
                        "max-glare": 0.15,
                        scale: 1.02
                    });
                } catch (e) { }
            }

            // Apply Staggered HUD Load-in
            const hudElements = document.querySelectorAll(".subject-card, .class-card, .timeline-item, .req-card, .bank-card, .history-card, .profile-card, .stat-box, .file-item");
            hudElements.forEach((el, index) => {
                el.classList.add('hud-element');
                el.style.animationDelay = `${index * 0.08}s`;
            });
        });
    </script>
</body>

</html>
