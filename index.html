<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BEEPREPARE - Central Hub</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="./assets/css/premium-student-ui.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #FFD700;
            --bg-dark: #000000;
            --surface: #121212;
            --text-main: #FFFFFF;
            --text-muted: #AAAAAA;
            --border: rgba(255, 215, 0, 0.3);
            --gradient-gold: linear-gradient(135deg, #FFD700, #FFA500);
        }

        body {
            background-color: var(--bg-dark) !important;
            font-family: 'Outfit', sans-serif;
            color: var(--text-main) !important;
            margin: 0 !important;
            padding: 0 !important;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .main-bg {
            position: fixed;
            inset: 0;
            background: url('assets/images/premium-bg.png') no-repeat center center;
            background-size: cover;
            z-index: -1;
            filter: brightness(0.5);
        }

        .auth-container {
            width: 100%;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .glass-auth-card {
            background: rgba(18, 18, 18, 0.85);
            backdrop-filter: blur(25px);
            border: 1px solid var(--border);
            border-radius: 40px;
            padding: 50px 40px;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.8);
            text-align: center;
            width: 100%;
            max-width: 420px;
            position: relative;
            transform: translateY(20px);
            opacity: 0;
            animation: slideUp 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes slideUp {
            to { opacity: 1; transform: translateY(0); }
        }

        .logo-hexa {
            width: 70px;
            height: 70px;
            margin: 0 auto 30px;
            background: rgba(255, 215, 0, 0.1);
            border: 2px solid var(--primary);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.2);
            transition: 0.3s;
        }

        .auth-title {
            font-size: 42px;
            font-weight: 900;
            background: linear-gradient(180deg, #fff 0%, #FFD700 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin: 0 0 8px 0;
            letter-spacing: -1px;
        }

        .auth-subtitle {
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 45px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .google-auth-btn {
            background: #fff;
            color: #000;
            border: none;
            width: 100%;
            padding: 18px;
            border-radius: 18px;
            font-size: 16px;
            font-weight: 800;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .google-auth-btn:hover {
            transform: translateY(-5px) scale(1.02);
            background: #FFD700;
            box-shadow: 0 20px 40px rgba(255, 215, 0, 0.2);
        }

        .trust-banner {
            margin-top: 45px;
            display: flex;
            justify-content: center;
            gap: 30px;
            opacity: 0.6;
            color: #fff;
        }

        .trust-item {
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .terms-text {
            font-size: 10px;
            color: var(--text-muted);
            margin-top: 40px;
            line-height: 1.6;
        }

        /* Mobile Adjustments */
        @media (max-width: 480px) {
            .glass-auth-card {
                padding: 40px 25px;
                border-radius: 30px;
            }
            .auth-title {
                font-size: 36px;
            }
        }
    </style>
</head>

<body>
    <div class="main-bg"></div>

    <div class="auth-container">
        <div class="glass-auth-card">
            <div class="logo-hexa">
                <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#FFD700" stroke-width="2.5">
                    <path d="M12 2L20.66 7V17L12 22L3.34 17V7L12 2Z"></path>
                    <circle cx="12" cy="12" r="3" fill="#FFD700"></circle>
                </svg>
            </div>

            <h1 class="auth-title">BEEPREPARE</h1>
            <div class="auth-subtitle">Elevating Excellence</div>

            <button id="googleSignInBtn" class="google-auth-btn">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google" width="22">
                <span id="btnText">Continue with Google</span>
            </button>

            <div class="trust-banner">
                <div class="trust-item">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                        <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                    </svg>
                    ENCRYPTED
                </div>
                <div class="trust-item">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
                    </svg>
                    SECURED
                </div>
            </div>

            <div class="terms-text">
                Institutional Security Protocol Active.<br>
                Official Academic Resource Node.
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js';
        import { 
          firebaseConfig, 
          apiCall, 
          getFreshToken, 
          BP 
        } from './assets/js/bee-core.js';

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        async function handleGoogleLogin() {
          const btn = document.getElementById('googleSignInBtn');
          const btnText = document.getElementById('btnText');
          
          btn.disabled = true;
          btnText.innerText = "Signing in...";
          btn.style.opacity = "0.7";
          btn.style.cursor = "not-allowed";

          try {
            const provider = new GoogleAuthProvider();
            const result = await signInWithPopup(auth, provider);
            const user = result.user;
            const idToken = await user.getIdToken(true);

            // Step 3: Call backend
            const response = await apiCall(
              '/auth/google-login',
              'POST',
              { idToken },
              false // no auth header needed for this call
            );

            if (!response || !response.success) {
              throw new Error(response?.message || 'Login failed');
            }

            // Step 4: Save to localStorage
            const u = response.data.user;
            localStorage.setItem(BP.TOKEN, idToken);
            localStorage.setItem(BP.UID, u.googleUid);
            localStorage.setItem(BP.NAME, u.displayName);
            localStorage.setItem(BP.EMAIL, u.email);
            localStorage.setItem(BP.PHOTO, u.photoUrl || '');
            localStorage.setItem(BP.ROLE, u.role || '');
            // CRITICAL — always set from server not cache:
            localStorage.setItem(BP.ACTIVATED,
              u.isActivated ? 'true' : 'false');
            localStorage.setItem(BP.PLAN,
              u.planType || 'free');

            // Step 5: Redirect based on backend response
            const redirect = response.data.redirectTo;
            if (redirect === 'activation') {
              window.location.href = 'activation.html';
            } else if (redirect === 'role-select') {
              window.location.href = 'beginners/role-select.html';
            } else if (redirect === 'teacher-home') {
              window.location.href = 'beginners/teacher/teacher-home.html';
            } else if (redirect === 'student-home') {
              window.location.href = 'beginners/student/student-home.html';
            }

          } catch (err) {
            console.error('Login error:', err);
            
            btn.disabled = false;
            btnText.innerText = "Continue with Google";
            btn.style.opacity = "1";
            btn.style.cursor = "pointer";

            Swal.fire({
              icon: 'error',
              title: 'Sign In Failed',
              text: err.message || 'Please try again.',
              toast: true,
              position: 'top-end',
              showConfirmButton: false,
              timer: 3000,
              background: '#1a1a2e',
              color: '#ffffff'
            });
          }
        }

        document.getElementById('googleSignInBtn').addEventListener('click', handleGoogleLogin);

        // Auto redirect only if Firebase auth confirms we have a user
        async function handleAutoRedirect() {
          const auth = getAuth();
          
          // Wait for auth to initialize
          await new Promise(resolve => {
            const unsubscribe = onAuthStateChanged(auth, (user) => {
              unsubscribe();
              resolve(user);
            });
            setTimeout(resolve, 1500); // 1.5s max wait for auth
          });

          const user = auth.currentUser;
          const role = localStorage.getItem(BP.ROLE);
          const activated = localStorage.getItem(BP.ACTIVATED);

          if (user && activated === 'true' && role === 'teacher') {
            window.location.replace('beginners/teacher/teacher-home.html');
          } else if (user && activated === 'true' && role === 'student') {
            window.location.replace('beginners/student/student-home.html');
          }
        }

        window.addEventListener('load', handleAutoRedirect);
    </script>
</body>

</html>
