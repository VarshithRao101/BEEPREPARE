        .auth-container {

            align-items: center;

        .glass-auth-card {

            padding: 50px 40px;

            transform: translateY(20px);
            opacity: 0;
            animation: slideUp 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;

        @keyframes slideUp {
            to { opacity: 1; transform: translateY(0); }
        }

        .logo-hexa {
            width: 120px;
            height: 120px;
            margin: 0 auto 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .logo-hexa img {
            width: 120px;
            height: 120px;
            object-fit: contain;
            filter: drop-shadow(0 0 30px rgba(255, 215, 0, 0.6));
            animation: beePulse 3s ease-in-out infinite;
        }

        @keyframes beePulse {
            0%, 100% { transform: translateY(0) scale(1); filter: drop-shadow(0 0 25px rgba(255, 215, 0, 0.5)); }
            50% { transform: translateY(-8px) scale(1.04); filter: drop-shadow(0 0 45px rgba(255, 215, 0, 0.9)); }

        .auth-title {
            font-size: 42px;
            font-weight: 900;
            margin: 0 0 12px 0;
            letter-spacing: -1px;

        .auth-subtitle {
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 45px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .google-auth-btn {
            background: #fff;
            color: #000;
            border: none;
            width: 100%;
            padding: 18px;
            border-radius: 18px;
            font-size: 16px;
            font-weight: 800;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .google-auth-btn:hover {
            transform: translateY(-5px) scale(1.02);
            background: #FFD700;
            box-shadow: 0 20px 40px rgba(255, 215, 0, 0.2);
        }

        .trust-banner {
            margin-top: 45px;

        .terms-text {

                border-radius: 30px;
            }

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
        import { 
          getAuth, 
          signInWithPopup, 
          signInWithRedirect, 
          getRedirectResult, 
          GoogleAuthProvider, 
          onAuthStateChanged 
        } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js';
        import { 
          firebaseConfig, 
          apiCall, 
          getFreshToken, 
          BP 
        } from '/assets/js/bee-core.js';

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        function showLoginError(message) {
          const isBlocked = message.toLowerCase().includes('suspended') || message.toLowerCase().includes('blocked');
          
          if (isBlocked && window.Swal) {
            Swal.fire({
              background: '#0a0a0a',
              color: '#fff',
              html: `
                <div style="padding: 20px; text-align: center; font-family: 'Outfit', sans-serif;">
                  <div style="width: 80px; height: 80px; background: rgba(255, 68, 68, 0.1); border: 2px solid #ff4444; border-radius: 20px; display: flex; align-items: center; justify-content: center; margin: 0 auto 25px; box-shadow: 0 0 30px rgba(255, 68, 68, 0.2);">
                    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#ff4444" stroke-width="2.5">
                      <circle cx="12" cy="12" r="10"></circle>
                      <line x1="4.93" y1="4.93" x2="19.07" y2="19.07"></line>
                    </svg>
                  </div>
                  <h2 style="font-weight: 900; font-size: 24px; margin-bottom: 10px; color: #fff;">ACCOUNT_RESTRICTED</h2>
                  <p style="color: #888; font-size: 15px; line-height: 1.6; margin-bottom: 30px;">
                    Your access to the BEEPREPARE node has been suspended by the security protocol. 
                    Please contact our technical assistance team for account restoration.
                  </p>
                  <div style="display: flex; gap: 12px;">
                    <button id="swalContactBtn" style="flex: 1; padding: 15px; background: #FFD700; color: #000; border: none; border-radius: 12px; font-weight: 900; font-size: 13px; cursor: pointer; text-transform: uppercase;">CONTACT SUPPORT</button>
                    <button onclick="Swal.close()" style="flex: 1; padding: 15px; background: rgba(255,255,255,0.05); color: #888; border: 1px solid #333; border-radius: 12px; font-weight: 700; font-size: 13px; cursor: pointer;">DISMISS</button>
                  </div>
                </div>
              `,
              showConfirmButton: false,
              didOpen: () => {
                document.getElementById('swalContactBtn').onclick = () => {
                   Swal.fire({
                     title: 'Technical Assistance',
                     html: `
                        <div style="text-align: left; color: #fff; font-size: 14px;">
                           <div style="margin-bottom: 15px; padding: 10px; background: rgba(255,215,0,0.05); border: 1px solid rgba(255,215,0,0.1); border-radius: 10px;">
                              <div style="color: #FFD700; font-weight: 900; font-size: 10px; text-transform: uppercase;">Primary Line</div>
                              <div style="font-weight: 700; font-size: 16px;">9059068384</div>
                           </div>
                           <div style="padding: 10px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); border-radius: 10px;">
                              <div style="color: #888; font-weight: 900; font-size: 10px; text-transform: uppercase;">Official Email</div>
                              <div style="font-weight: 700; font-size: 14px;">beesociety101@gmail.com</div>
                           </div>
                        </div>
                     `,
                     background: '#0a0a0a',
                     color: '#fff',
                     confirmButtonColor: '#FFD700',
                     confirmButtonText: 'UNDERSTOOD'
                   });
                };
              }
            });
            return;
          }

          const errEl = document.getElementById('login-error')
                     || document.createElement('div');
          errEl.id = 'login-error';
          errEl.style.cssText = 'color:#ff4444;text-align:center;margin-top:12px;font-size:14px;font-weight:600;';
          errEl.textContent = message;
          const btn = document.getElementById('googleSignInBtn');
          if (btn && !document.getElementById('login-error')) {
            btn.parentNode.insertBefore(errEl, btn.nextSibling);
          }
        }

        async function handleAuthResult(result) {
          const user = result.user;
          const idToken = await user.getIdToken(true);

          const response = await apiCall(
            '/auth/google-login',
            'POST',
            { idToken },
            false   // ← needsAuth=false, so 401 handler won't fire for login
          );

          if (!response || !response.success) {
            sessionStorage.removeItem('_loginInProgress');
            throw new Error(response?.message || 'Login failed');
          }

          const u = response.data.user;
          localStorage.setItem(BP.TOKEN, idToken);
          localStorage.setItem(BP.UID, u.googleUid);
          localStorage.setItem(BP.NAME, u.displayName);
          localStorage.setItem(BP.EMAIL, u.email);
          localStorage.setItem(BP.PHOTO, u.photoUrl || '');
          localStorage.setItem(BP.ROLE, u.role || '');
          localStorage.setItem(BP.ACTIVATED, u.isActivated ? 'true' : 'false');
          localStorage.setItem(BP.PLAN, u.planType || 'free');

          sessionStorage.removeItem('_loginInProgress');

          const redirect = response.data.redirectTo;
          if (redirect === 'activation') {
            window.location.href = 'activation.html';
          } else if (redirect === 'role-select') {
            window.location.href = 'beginners/role-select.html';
          } else if (redirect === 'teacher-home') {
            window.location.href = 'beginners/teacher/teacher-home.html';
          } else if (redirect === 'student-home') {
            window.location.href = 'beginners/student/student-home.html';
          }
        }

        async function handleGoogleLogin() {
          const btn = document.getElementById('googleSignInBtn');
          const btnText = document.getElementById('btnText');
          
          btn.disabled = true;
          btnText.innerText = "Signing in...";
          btn.style.opacity = "0.7";

          const provider = new GoogleAuthProvider();
          provider.setCustomParameters({ prompt: 'select_account' });

          try {
            sessionStorage.setItem('_loginInProgress', '1');
            // Standardizing on Popup for all devices to avoid Redirect state loss on mobile
            const result = await signInWithPopup(auth, provider);
            await handleAuthResult(result);
          } catch (err) {
            console.error('Login error:', err);
            btn.disabled = false;
            btnText.innerText = "Continue with Google";
            btn.style.opacity = "1";
            showLoginError(err.message || 'Please try again.');
          }
        }

        async function checkRedirectResult() {
          if (sessionStorage.getItem('_loginRedirectPending')) {
            BP.showLoader();
            try {
              const result = await getRedirectResult(auth);
              if (result && result.user) {
                sessionStorage.removeItem('_loginRedirectPending');
                await handleAuthResult(result);
              }
            } catch (err) {
              console.error('[Redirect result error]', err);
              showLoginError('Sign in failed. Please try again.');
            } finally {
              BP.hideLoader();
              sessionStorage.removeItem('_loginRedirectPending');
            }
          }
        }

        document.getElementById('googleSignInBtn').addEventListener('click', handleGoogleLogin);
        checkRedirectResult();

        async function handleAutoRedirect() {
          // 0. If login is in progress, do nothing
          if (sessionStorage.getItem('_loginInProgress') === 'true') return;
          // 1. Loop Protection — if we just came from a redirect, don't auto-redirect back
          const lastRedirect = parseInt(sessionStorage.getItem('_lastRedirectAt') || '0');
          if (Date.now() - lastRedirect < 3000) {
            console.warn('[AUTO] Loop protection active. Staying on login page.');
            return;
          }

          const auth = getAuth();
          const unsubscribe = onAuthStateChanged(auth, async (user) => {
            if (unsubscribe) unsubscribe();

            const role      = localStorage.getItem(BP.ROLE);
            const activated = localStorage.getItem(BP.ACTIVATED);
            const hasToken  = !!localStorage.getItem(BP.TOKEN);

            // No user in Firebase — clear everything and stay on login
            if (!user) {
              if (hasToken) {
                console.warn('[AUTO] No Firebase user. Clearing stale session.');
                localStorage.removeItem(BP.TOKEN);
                localStorage.removeItem(BP.ACTIVATED);
                localStorage.removeItem(BP.ROLE);
                sessionStorage.clear();
              }
              return;
            }

            // User exists in Firebase — but VERIFY with server before redirecting
            if (user && activated === 'true' && role && hasToken) {
              try {
                // Use unified apiCall for verification (handles maintenance, block, etc)
                const data = await apiCall('/auth/verify-session', 'GET', null, true, false, false);

                if (data?.success) {
                  console.log('[AUTO] Session confirmed, redirecting to', role);
                  if (role === 'teacher') {
                    window.location.replace('/beginners/teacher/teacher-home.html');
                  } else if (role === 'student') {
                    window.location.replace('/beginners/student/student-home.html');
                  }
                } else {
                  console.warn('[AUTO] Server rejected session. Clearing.');
                  localStorage.removeItem(BP.TOKEN);
                  localStorage.removeItem(BP.ACTIVATED);
                  localStorage.removeItem(BP.ROLE);
                  sessionStorage.clear();
                  await auth.signOut();
                }
              } catch (err) {
                console.warn('[AUTO] Could not verify session, staying on login.', err.message);
              }
            }
          });
          
          setTimeout(() => { if (unsubscribe) unsubscribe(); }, 2000);
        }

        window.addEventListener('load', handleAutoRedirect);
    </script>
