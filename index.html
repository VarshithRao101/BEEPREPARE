<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BEEPREPARE - Central Hub</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="./assets/css/premium-student-ui.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #FFFFFF !important;
            font-family: 'Outfit', sans-serif;
            color: #000000 !important;
            margin: 0 !important;
            padding: 0 !important;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            width: 100vw !important;
        }

        /* Background Orbs */
        .background-animation {
            position: fixed;
            inset: 0;
            overflow: hidden;
            z-index: -1;
        }

        .glow-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.15;
            animation: orbFloat 20s infinite alternate;
        }

        .orb-1 {
            width: 600px;
            height: 600px;
            background: #FFD700;
            top: -100px;
            left: -100px;
        }

        .orb-2 {
            width: 500px;
            height: 500px;
            background: #FFA500;
            bottom: -100px;
            right: -100px;
            animation-duration: 25s;
        }

        @keyframes orbFloat {
            0% {
                transform: translate(0, 0) scale(1);
            }

            100% {
                transform: translate(100px, 50px) scale(1.1);
            }
        }

        /* Cyber Grid (Light Theme) */
        .cyber-grid {
            position: absolute;
            inset: -50%;
            background-image:
                linear-gradient(rgba(0, 0, 0, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 0, 0, 0.05) 1px, transparent 1px);
            background-size: 50px 50px;
            transform: perspective(500px) rotateX(60deg) translateY(-100px) translateZ(-200px);
            animation: gridMove 20s linear infinite;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes gridMove {
            0% {
                transform: perspective(500px) rotateX(60deg) translateY(0) translateZ(-200px);
            }

            100% {
                transform: perspective(500px) rotateX(60deg) translateY(50px) translateZ(-200px);
            }
        }

        .auth-container {
            position: relative;
            z-index: 10;
            width: 90%;
            max-width: 380px;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .glass-auth-card {
            background: linear-gradient(145deg, rgba(20, 20, 20, 0.98), rgba(10, 10, 10, 1));
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 40px;
            padding: 48px 40px;
            box-shadow: 
                0 30px 60px rgba(0, 0, 0, 0.5), 
                inset 0 1px 1px rgba(255, 255, 255, 0.05);
            text-align: center;
            width: 420px;
            max-width: 100%;
            position: relative;
            overflow: hidden;
        }

        /* Neon Corner Accents */
        .glass-auth-card::before,
        .glass-auth-card::after {
            content: '';
            position: absolute;
            width: 100px;
            height: 100px;
            border-radius: 50%;
            filter: blur(50px);
            z-index: -1;
            opacity: 0.2;
        }

        .glass-auth-card::before {
            top: -30px;
            right: -30px;
            background: var(--primary);
        }

        .glass-auth-card::after {
            bottom: -30px;
            left: -30px;
            background: #FFA500;
        }

        .logo-hexa {
            width: 60px;
            height: 60px;
            margin: 0 auto 24px;
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.1), rgba(255, 215, 0, 0.02));
            border: 1px solid rgba(255, 215, 0, 0.4);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.2);
            transform: rotate(45deg);
            animation: pulseLogo 3s infinite alternate;
        }

        .logo-hexa svg {
            transform: rotate(-45deg);
        }

        @keyframes pulseLogo {
            to {
                box-shadow: 0 0 50px rgba(255, 215, 0, 0.5);
                border-color: #FFD700;
                transform: rotate(45deg) scale(1.05);
            }
        }

        .auth-title {
            font-size: 36px;
            font-weight: 900;
            background: linear-gradient(180deg, #fff 0%, #aaa 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin: 0 0 12px 0;
            letter-spacing: -1px;
        }

        .auth-subtitle {
            color: rgba(255, 255, 255, 0.5);
            font-size: 14px;
            margin-bottom: 40px;
            font-weight: 500;
        }

        .google-auth-btn {
            background: #fff;
            color: #000;
            border: none;
            width: 100%;
            padding: 18px;
            border-radius: 16px;
            font-size: 15px;
            font-weight: 800;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            transition: 0.3s;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
            font-family: 'Outfit', sans-serif;
        }

        .google-auth-btn:hover {
            transform: translateY(-2px);
            background: #f8f8f8;
            box-shadow: 0 15px 30px rgba(255, 255, 255, 0.1);
        }

        /* Trust Signals */
        .trust-banner {
            margin-top: 40px;
            display: flex;
            justify-content: center;
            gap: 24px;
            opacity: 0.4;
            filter: grayscale(1);
            transition: 0.3s;
        }

        .trust-banner:hover {
            opacity: 0.8;
            filter: none;
        }

        .trust-item {
            color: #FFFFFF; /* Added for high-contrast white */
        }

        .terms-text {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.2);
            margin-top: 32px;
        }
    </style>
</head>

<body>
    <div class="background-animation"></div>

    <div class="auth-container">
        <div class="glass-auth-card">
            <div class="logo-container">
                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#FFD700" stroke-width="2">
                    <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" />
                </svg>
            </div>

            <h1 class="auth-title">BEEPREPARE</h1>
            <div class="auth-subtitle">Elevating Student Excellence</div>

            <button class="google-auth-btn" onclick="window.location.href='activation.html'">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google" width="22">
                <span>Continue with Google</span>
            </button>

            <div class="trust-banner">
                <div class="trust-item">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2.5">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                        <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                    </svg>
                    AES-256
                </div>
                <div class="trust-item">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2.5">
                        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
                    </svg>
                    SECURE HUB
                </div>
            </div>

            <div class="terms-text" style="opacity: 0.3; font-size: 9px; margin-top: 32px;">
                Institutional Security Protocol Active.<br>
                Certified Academic Resource Node.
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Static card - No VanillaTilt init

            // Slide up animation
            const el = document.querySelector('.glass-auth-card');
            el.style.opacity = '0';
            el.style.transform = 'translateY(40px)';
            setTimeout(() => {
                el.style.transition = 'all 1s cubic-bezier(0.16, 1, 0.3, 1)';
                el.style.opacity = '1';
                el.style.transform = 'translateY(0)';
            }, 100);
        });
    </script>
</body>

</html>
