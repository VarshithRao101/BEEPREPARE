<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terminal Activation - BEEPREPARE</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="./assets/css/premium-student-ui.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #FFD700;
            --accent: #FFA500;
            --bg-dark: #000000;
            --surface: #121212;
            --text-main: #FFFFFF;
            --text-muted: #AAAAAA;
            --border: rgba(255, 215, 0, 0.3);
        }

        body {
            background-color: var(--bg-dark) !important;
            color: var(--text-main) !important;
            font-family: 'Outfit', sans-serif;
            margin: 0 !important;
            padding: 0 !important;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
        }

        .main-bg {
            position: fixed;
            inset: 0;
            background: url('assets/images/premium-bg.png') no-repeat center center;
            background-size: cover;
            z-index: -1;
            filter: brightness(0.4) grayscale(0.2);
        }

        .activation-card {
            width: 90%;
            max-width: 460px;
            padding: 40px;
            background: rgba(18, 18, 18, 0.85);
            backdrop-filter: blur(25px);
            border: 1px solid var(--border);
            border-radius: 32px;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.8);
            position: relative;
            z-index: 10;
            text-align: center;
            animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card-header h1 {
            font-size: 32px;
            font-weight: 900;
            margin: 0;
            background: linear-gradient(135deg, #fff, #FFD700);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -1px;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 6px 14px;
            background: rgba(255, 215, 0, 0.1);
            border: 1px solid var(--border);
            border-radius: 20px;
            font-size: 10px;
            font-weight: 800;
            color: var(--primary);
            text-transform: uppercase;
            margin-bottom: 25px;
        }

        .status-dot {
            width: 6px;
            height: 6px;
            background: var(--primary);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--primary);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: .5; transform: scale(1.5); }
        }

        .bee-flying {
            width: 100px;
            filter: drop-shadow(0 15px 25px rgba(0, 0, 0, 0.5));
            animation: beeMove 3s ease-in-out infinite;
            margin: 20px 0;
        }

        @keyframes beeMove {
            0%, 100% { transform: translateY(0) rotate(-2deg); }
            50% { transform: translateY(-10px) rotate(2deg); }
        }

        .input-group {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin: 30px 0;
        }

        .prefix {
            font-size: 14px;
            font-weight: 900;
            color: var(--primary);
            background: rgba(255, 215, 0, 0.1);
            width: 55px;
            height: 55px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            border: 1px solid var(--border);
        }

        .key-segment {
            width: 75px;
            height: 55px;
            background: rgba(0, 0, 0, 0.5) !important;
            border: 1px solid var(--border) !important;
            border-radius: 12px !important;
            color: #fff !important;
            text-align: center;
            font-size: 18px;
            font-weight: 700;
            text-transform: uppercase;
            outline: none;
            transition: 0.3s;
            letter-spacing: 2px;
        }

        .key-segment:focus {
            border-color: var(--primary) !important;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.2) !important;
            transform: translateY(-2px);
        }

        .action-button {
            width: 100%;
            height: 60px;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            border: none;
            border-radius: 18px;
            color: #000;
            font-size: 16px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 15px 30px rgba(255, 215, 0, 0.2);
        }

        .action-button:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(255, 215, 0, 0.4);
        }

        .abort-link {
            color: var(--text-muted);
            font-size: 12px;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 25px;
            display: inline-block;
            transition: 0.3s;
        }

        .abort-link:hover {
            color: var(--primary);
        }

        /* Success Overlay */
        .success-overlay {
            position: fixed;
            inset: 0;
            background: var(--bg-dark);
            z-index: 200;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            opacity: 0;
            pointer-events: none;
            transition: 0.5s ease;
        }

        .success-overlay.active {
            opacity: 1;
            pointer-events: all;
        }

        .loading-ring {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: 3px solid rgba(255, 215, 0, 0.1);
            border-top-color: var(--primary);
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        @media (max-width: 480px) {
            .activation-card {
                padding: 30px 15px;
            }
            .key-segment {
                width: 60px;
                height: 48px;
                font-size: 14px;
                letter-spacing: 1px;
            }
            .prefix {
                width: 45px;
                height: 48px;
                font-size: 12px;
            }
            .input-group {
                gap: 6px;
            }
        }
    </style>
</head>

<body>
    <div class="main-bg"></div>

    <div class="activation-card">
        <div class="card-header">
            <div class="status-badge">
                <div class="status-dot"></div>
                System Uplink Active
            </div>
            <h1>Activation</h1>
            <p style="color: var(--text-muted); font-size: 13px; margin-top: 10px;">Enter your 12-character license key to sync node.</p>
        </div>

        <img src="assets/custom-bee.png" alt="BEE Mascot" class="bee-flying">

        <div class="activation-body">
            <div class="input-group" style="gap: 15px; justify-content: center;">
                <div class="prefix">BEE</div>
                <span style="color: var(--primary); font-weight: 900; font-size: 20px;">-</span>
                <input type="text" class="key-input key-segment" maxlength="4" placeholder="••••" style="width: 80px;">
                <span style="color: var(--primary); font-weight: 900; font-size: 20px;">-</span>
                <input type="text" class="key-input key-segment" maxlength="4" placeholder="••••" style="width: 80px;">
                <span style="color: var(--primary); font-weight: 900; font-size: 20px;">-</span>
                <input type="text" class="key-input key-segment" maxlength="4" placeholder="••••" style="width: 80px;">
            </div>

            <button id="activateBtn" class="action-button activate-btn" onclick="activateKey()">
                Authenticate Terminal
            </button>

            <div style="margin-top: 30px;">
                <a href="beginners/student/payment.html" style="color: var(--primary); font-size: 12px; font-weight: 700; text-decoration: none; text-transform: uppercase;">
                    Get Lifetime License Key !!
                </a>
                <br>
                <a href="javascript:void(0)" onclick="abortActivation()" class="abort-link">Terminate Uplink</a>
            </div>
        </div>
    </div>

    <div class="success-overlay" id="successOverlay">
        <div class="loading-ring"></div>
        <div style="color: var(--primary); letter-spacing: 2px; font-size: 12px; text-transform: uppercase;">Establishing Neural Link...</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
        import { getAuth, signOut } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js';
        import { 
          firebaseConfig, 
          apiCall, 
          getFreshToken, 
          BP 
        } from './assets/js/bee-core.js';

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        const userBoxes = document.querySelectorAll('.key-input');
        const btn = document.querySelector('.activate-btn');
        const overlay = document.getElementById('successOverlay');

        userBoxes.forEach((input, index) => {
            input.addEventListener('input', (e) => {
                e.target.value = e.target.value.replace(/[^A-Za-z0-9]/g, '');
                // Auto-tab to next box when current box reaches 4 chars
                if (e.target.value.length === 4 && index < userBoxes.length - 1) {
                    userBoxes[index + 1].focus();
                }
            });

            input.addEventListener('keydown', (e) => {
                // Return to previous box on backspace if current is empty
                if (e.key === 'Backspace' && e.target.value.length === 0 && index > 0) {
                    userBoxes[index - 1].focus();
                }
            });

            input.addEventListener('paste', (e) => {
                e.preventDefault();
                const paste = (e.clipboardData || window.clipboardData).getData('text')
                    .replace(/[^A-Za-z0-9]/g, '');
                
                // If it starts with BEE, remove it
                let cleanPaste = paste.startsWith('BEE') ? paste.slice(3) : paste;
                
                // Distribute characters across the 3 boxes
                for (let i = 0; i < 3; i++) {
                    const chunk = cleanPaste.slice(i * 4, (i + 1) * 4);
                    if (userBoxes[i]) userBoxes[i].value = chunk;
                }
                
                // Focus the last filled or next empty box
                const lastIdx = Math.min(Math.floor(cleanPaste.length / 4), userBoxes.length - 1);
                userBoxes[lastIdx].focus();
            });
        });

        let isChecking = false;

        async function activateKey() {
          // FIX 4: Prevent redundant activation
          if (localStorage.getItem(BP.ACTIVATED) === 'true') {
            window.location.href = 'beginners/role-select.html';
            return;
          }

          if (isChecking) return;
          
          const values = Array.from(userBoxes).map(b => b.value.trim());
          
          if (values.some(v => v.length < 4)) {
            // Shake animation
            const group = document.querySelector('.input-group');
            group.style.animation = 'none';
            group.offsetHeight; /* trigger reflow */
            group.style.animation = 'shake 0.5s cubic-bezier(.36,.07,.19,.97) both';
            
            Swal.fire({
              icon: 'warning',
              title: 'Incomplete Key',
              text: 'Each segment must contain 4 characters',
              toast: true,
              position: 'top-end',
              showConfirmButton: false,
              timer: 3000,
              background: '#1a1a2e',
              color: '#ffffff'
            });
            return;
          }

          const fullKey = `BEE-${values[0]}-${values[1]}-${values[2]}`;

          isChecking = true;
          btn.disabled = true;
          btn.innerText = 'Authenticating...';
          overlay.classList.add('active');

          try {
            const result = await apiCall('/license/verify', 'POST', { licenseKey: fullKey });

            if (result && result.success) {
              localStorage.setItem(BP.ACTIVATED, 'true');
              localStorage.setItem(BP.PLAN, result.data.planType);
              localStorage.setItem(BP.SUBJECT_LIMIT, result.data.subjectLimit);

              setTimeout(() => {
                window.location.href = 'beginners/role-select.html';
              }, 1500);

            } else {
              overlay.classList.remove('active');
              
              const code = result?.error?.code;
              let msg = 'Invalid key. Please try again.';

              if (code === 'KEY_NOT_FOUND') msg = 'License key not found.';
              else if (code === 'ALREADY_USED') msg = 'This key has already been used.';
              else if (code === 'KEY_EXPIRED') msg = 'This license key has expired.';
              else if (code === 'INVALID_FORMAT') msg = 'Invalid key format.';

              const group = document.querySelector('.input-group');
              group.style.animation = 'none';
              group.offsetHeight;
              group.style.animation = 'shake 0.5s cubic-bezier(.36,.07,.19,.97) both';

              Swal.fire({
                icon: 'error',
                title: 'Activation Failed',
                text: msg,
                toast: true,
                position: 'top-end',
                showConfirmButton: false,
                timer: 3000,
                background: '#1a1a2e',
                color: '#ffffff'
              });
            }
          } catch (err) {
            overlay.classList.remove('active');
            console.error('Activation error:', err);
          } finally {
            // Rate limit: 5s cooldown
            setTimeout(() => {
              isChecking = false;
              if (localStorage.getItem(BP.ACTIVATED) !== 'true') {
                 btn.disabled = false;
                 btn.innerText = 'Authenticate Terminal';
              }
            }, 5000);
          }
        }

        async function abortActivation() {
          // Only clear session
          localStorage.removeItem(BP.TOKEN);
          localStorage.removeItem('bp_pending_otp');
          localStorage.removeItem('bp_otp_request_id');
          localStorage.removeItem('bp_search_bank_id');
          localStorage.removeItem('bp_current_bank_id');
          localStorage.removeItem('bp_current_doubt_id');
          localStorage.removeItem('bp_paper_html');
          localStorage.removeItem('bp_session_id');
          localStorage.removeItem('bp_paper_marks');
          // DO NOT remove: bp_uid, bp_email, bp_name, bp_photo, bp_role, bp_activated, bp_plan

          await signOut(auth);
          window.location.href = 'index.html';
        }

        // Expose to window for onclick
        window.activateKey = activateKey;
        window.abortActivation = abortActivation;

        // Advanced Re-login Guard: Skip this page if already activated
        window.addEventListener('load', () => {
          const uid = localStorage.getItem(BP.UID);
          const activated = localStorage.getItem(BP.ACTIVATED);

          if (uid && activated === 'true') {
            const role = localStorage.getItem(BP.ROLE);
            if (role === 'teacher') {
              window.location.href = 'beginners/teacher/teacher-home.html';
            } else if (role === 'student') {
              window.location.href = 'beginners/student/student-home.html';
            } else {
              window.location.href = 'beginners/role-select.html';
            }
            // Stop page from loading
            throw new Error('Already activated');
          }
          
          if (!uid) {
            window.location.href = 'index.html';
          }
        });

        // Add shake animation if not present
        if (!document.getElementById('shake-style')) {
            const style = document.createElement('style');
            style.id = 'shake-style';
            style.innerHTML = `
                @keyframes shake {
                    10%, 90% { transform: translate3d(-1px, 0, 0); }
                    20%, 80% { transform: translate3d(2px, 0, 0); }
                    30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
                    40%, 60% { transform: translate3d(4px, 0, 0); }
                }
            `;
            document.head.appendChild(style);
        }
    </script>
</body>

</html>
