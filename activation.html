<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terminal Activation - BEEPREPARE</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="./assets/css/premium-student-ui.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #FFD700;
            --accent: #FFA500;
            --bg-page: #000000;
            --surface: rgba(10, 10, 10, 0.7);
            --text-main: #ffffff;
            --text-muted: #bbbbbb;
            --border-yellow: #FFD700;
        }

        body {
            background-image: url('assets/images/premium-bg.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: var(--text-main) !important;
            font-family: 'Outfit', sans-serif;
            margin: 0 !important;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            z-index: -1;
        }

        .main-bg { display: none; }

        .activation-card {
            width: 90%;
            max-width: 480px;
            padding: 50px;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 2px solid var(--primary);
            border-radius: 40px;
            box-shadow: 
                0 50px 100px rgba(0, 0, 0, 0.8), 
                0 0 40px rgba(255, 215, 0, 0.1);
            position: relative;
            z-index: 10;
            text-align: center;
            animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1);
            margin-top: 60px;
            margin-bottom: 40px;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card-header h1 {
            font-size: 38px;
            font-weight: 900;
            margin: 0;
            background: linear-gradient(135deg, #fff, #FFD700);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -1px;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: rgba(255, 215, 0, 0.1);
            border: 1px solid rgba(255, 215, 0, 0.3);
            border-radius: 20px;
            font-size: 11px;
            font-weight: 800;
            color: var(--primary);
            text-transform: uppercase;
            margin-bottom: 25px;
            letter-spacing: 1px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: var(--primary);
            border-radius: 50%;
            box-shadow: 0 0 15px var(--primary);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: .5; transform: scale(1.4); }
        }

        .bee-flying {
            width: 220px;
            filter: drop-shadow(0 0 40px rgba(255, 215, 0, 0.5));
            animation: beeMove 3s ease-in-out infinite;
            margin: 20px 0;
        }

        @keyframes beeMove {
            0%, 100% { transform: translateY(0) rotate(-3deg); }
            50% { transform: translateY(-15px) rotate(3deg); }
        }

        .auth-node-wrapper {
            position: relative;
            padding: 0;
        }

        .input-group {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin: 30px 0;
        }

        .prefix {
            font-size: 14px;
            font-weight: 900;
            color: var(--primary);
            background: rgba(255, 215, 0, 0.1);
            width: 55px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 16px;
            border: 1px solid rgba(255, 215, 0, 0.3);
        }

        .key-segment {
            width: 85px;
            height: 60px;
            background: rgba(255, 255, 255, 0.05) !important;
            border: 1px solid rgba(255, 215, 0, 0.3) !important;
            border-radius: 16px !important;
            color: #fff !important;
            text-align: center;
            font-size: 24px;
            font-weight: 800;
            text-transform: uppercase;
            outline: none;
            transition: 0.3s;
            letter-spacing: 2px;
        }

        .key-segment:focus {
            border-color: var(--primary) !important;
            background: rgba(255, 215, 0, 0.1) !important;
            box-shadow: 0 0 25px rgba(255, 215, 0, 0.4) !important;
            transform: translateY(-3px);
        }

        .action-button {
            width: 100%;
            height: 65px;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            border: none;
            border-radius: 20px;
            color: #000;
            font-size: 16px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            cursor: pointer;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 15px 30px rgba(255, 215, 0, 0.2);
        }

        .action-button:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(255, 215, 0, 0.5);
            filter: brightness(1.1);
        }

        .abort-link {
            color: var(--text-muted);
            font-size: 13px;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 25px;
            display: inline-block;
            transition: 0.3s;
            font-weight: 700;
        }

        .abort-link:hover {
            color: var(--primary);
            text-shadow: 0 0 10px var(--primary);
        }

        .secondary-actions {
            margin-top: 35px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .glass-btn {
            display: block;
            width: 100%;
            padding: 15px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 215, 0, 0.1);
            border-radius: 16px;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
            backdrop-filter: blur(10px);
        }

        .glass-btn:hover {
            background: rgba(255, 215, 0, 0.08);
            border-color: var(--primary);
            color: var(--primary);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }

        .status-btn {
            color: var(--primary);
            background: rgba(255, 215, 0, 0.05);
            border-color: rgba(255, 215, 0, 0.3);
        }

        /* Success Overlay */
        .success-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.9);
            z-index: 200;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            opacity: 0;
            pointer-events: none;
            transition: 0.5s ease;
        }

        .success-overlay.active {
            opacity: 1;
            pointer-events: all;
        }

        .loading-ring {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            border: 4px solid rgba(255, 215, 0, 0.1);
            border-top-color: var(--primary);
            animation: spin 1s linear infinite;
            margin-bottom: 25px;
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.2);
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        @media (max-width: 480px) {
            .activation-card {
                padding: 40px 20px;
                border-radius: 30px;
            }
            .key-segment {
                width: 70px;
                height: 55px;
                font-size: 18px;
            }
            .prefix {
                width: 50px;
                height: 55px;
                font-size: 13px;
            }
            .card-header h1 { font-size: 30px; }
            .bee-flying { width: 90px; }
        }
    </style>
<link rel="stylesheet" href="/assets/css/hover-interactions.css">
</head>

<body>
<body>
    <div class="activation-card" style="margin-top: 15vh;">
        <div class="auth-node-wrapper">
            <div class="card-header">
                <div class="status-badge">
                    <div class="status-dot"></div>
                    System Uplink Active
                </div>
                <h1>Terminal Activation</h1>
                <p style="color: var(--text-muted); font-size: 14px; margin-top: 10px; font-weight: 500;">Connect your identity to the BEE Network.</p>
            </div>

            <div style="display: flex; justify-content: center; margin: 30px 0;">
                <div style="position: relative;">
                    <img src="assets/custom-bee.png" class="bee-flying" alt="BEE Logo">
                    <div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 40px; height: 40px; background: var(--primary); filter: blur(35px); opacity: 0.3; border-radius: 50%;"></div>
                </div>
            </div>

            <div class="activation-body">
                <div class="input-group">
                    <div class="prefix">BEE</div>
                    <span style="color: var(--primary); font-weight: 900; font-size: 24px;">-</span>
                    <input type="text" class="key-input key-segment" maxlength="4" placeholder="••••">
                    <span style="color: var(--primary); font-weight: 900; font-size: 24px;">-</span>
                    <input type="text" class="key-input key-segment" maxlength="4" placeholder="••••">
                    <span style="color: var(--primary); font-weight: 900; font-size: 24px;">-</span>
                    <input type="text" class="key-input key-segment" maxlength="4" placeholder="••••">
                </div>

                <div style="margin-bottom: 30px; text-align: left; padding: 20px; background: rgba(255,255,255,0.03); border-radius: 20px; border: 1px solid rgba(255,255,255,0.05);">
                    <div style="display: flex; gap: 15px; margin-bottom: 15px;">
                        <span style="background: var(--primary); color: #000; width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 900; flex-shrink: 0;">1</span>
                        <p style="margin: 0; font-size: 12px; color: #fff; line-height: 1.4;">Enter your 12-digit alphanumeric key precisely.</p>
                    </div>
                    <div style="display: flex; gap: 15px;">
                        <span style="background: var(--primary); color: #000; width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 900; flex-shrink: 0;">2</span>
                        <p style="margin: 0; font-size: 12px; color: #fff; line-height: 1.4;">Verification takes <b style="color: var(--primary);">2-5 seconds</b>. Once synced, your dashboard will unlock.</p>
                    </div>
                </div>

                <button id="activateBtn" class="action-button activate-btn" onclick="activateKey()">
                    Authenticate Terminal
                </button>

                <div style="margin-top: 25px; display: flex; flex-direction: column; gap: 15px; align-items: center;">
                    <a href="beginners/student/payment.html?type=activation" style="color: var(--primary); text-decoration: none; font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px;">Where do I find a key?</a>
                    <a href="beginners/payment-status.html" style="color: rgba(255,215,0,0.5); text-decoration: none; font-size: 11px; font-weight: 600; text-transform: uppercase;">Check Purchase Status</a>
                    <a href="#" onclick="signOutUser()" style="color: #ff4444; text-decoration: none; font-size: 10px; font-weight: 800; margin-top: 10px; opacity: 0.6; letter-spacing: 1px;">✕ TERMINATE SESSION</a>
                </div>
            </div>
        </div>
    </div>


    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
        import { getAuth, signOut } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js';
        import { 
          firebaseConfig, 
          apiCall, 
          getFreshToken, 
          BP 
        } from './assets/js/bee-core.js';

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        const userBoxes = document.querySelectorAll('.key-input');
        const btn = document.querySelector('.activate-btn');

        userBoxes.forEach((input, index) => {
            input.addEventListener('input', (e) => {
                e.target.value = e.target.value.replace(/[^A-Za-z0-9]/g, '');
                // Auto-tab to next box when current box reaches 4 chars
                if (e.target.value.length === 4 && index < userBoxes.length - 1) {
                    userBoxes[index + 1].focus();
                }
            });

            input.addEventListener('keydown', (e) => {
                // Return to previous box on backspace if current is empty
                if (e.key === 'Backspace' && e.target.value.length === 0 && index > 0) {
                    userBoxes[index - 1].focus();
                }
            });

            input.addEventListener('paste', (e) => {
                e.preventDefault();
                const paste = (e.clipboardData || window.clipboardData).getData('text')
                    .replace(/[^A-Za-z0-9]/g, '');
                
                // If it starts with BEE, remove it
                let cleanPaste = paste.startsWith('BEE') ? paste.slice(3) : paste;
                
                // Distribute characters across the 3 boxes
                for (let i = 0; i < 3; i++) {
                    const chunk = cleanPaste.slice(i * 4, (i + 1) * 4);
                    if (userBoxes[i]) userBoxes[i].value = chunk;
                }
                
                // Focus the last filled or next empty box
                const lastIdx = Math.min(Math.floor(cleanPaste.length / 4), userBoxes.length - 1);
                userBoxes[lastIdx].focus();
            });
        });

        let isChecking = false;

        window.signOutUser = async () => {
            const { value: confirmed } = await Swal.fire({
                title: 'Terminate Session?',
                text: 'You will need to sign in again with your Google account.',
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#ff4444',
                confirmButtonText: 'Yes, Sign Out'
            });
            if (confirmed) {
                await auth.signOut();
                localStorage.clear();
                window.location.href = 'index.html';
            }
        };

        async function activateKey() {
          if (localStorage.getItem(BP.ACTIVATED) === 'true') {
            window.location.href = 'beginners/role-select.html';
            return;
          }
          if (isChecking) return;

          const values = Array.from(userBoxes).map(b => b.value.trim().toUpperCase());
          
          if (values.some(v => v.length < 4)) {
            // Shake animation
            const group = document.querySelector('.input-group');
            group.style.animation = 'none';
            group.offsetHeight; /* trigger reflow */
            group.style.animation = 'shake 0.5s cubic-bezier(.36,.07,.19,.97) both';
            
            Swal.fire({
              icon: 'warning',
              title: 'Incomplete Key',
              text: 'Each segment must contain 4 characters',
              toast: true,
              position: 'top-end',
              showConfirmButton: false,
              timer: 3000,
              background: '#1a1a2e',
              color: '#ffffff'
            });
            return;
          }

          const fullKey = `BEE-${values[0]}-${values[1]}-${values[2]}`;

          isChecking = true;
          btn.disabled = true;
          btn.innerText = 'Authenticating...';

          try {
            const result = await apiCall('/license/verify', 'POST', { licenseKey: fullKey });

            if (result && result.success) {
              localStorage.setItem(BP.ACTIVATED, 'true');
              localStorage.setItem(BP.PLAN, result.data.planType);
              localStorage.setItem(BP.SUBJECT_LIMIT, result.data.subjectLimit);

              setTimeout(() => {
                window.location.href = 'beginners/role-select.html';
              }, 1500);

            } else {
              const code = result?.error?.code;
              let msg = 'Invalid key. Please try again.';

              if (code === 'KEY_NOT_FOUND') msg = 'License key not found.';
              else if (code === 'ALREADY_USED') msg = 'This key has already been used.';
              else if (code === 'KEY_EXPIRED') msg = 'This license key has expired.';
              else if (code === 'INVALID_FORMAT') msg = 'Invalid key format.';

              const group = document.querySelector('.input-group');
              group.style.animation = 'none';
              group.offsetHeight;
              group.style.animation = 'shake 0.5s cubic-bezier(.36,.07,.19,.97) both';

              Swal.fire({
                icon: 'error',
                title: 'Activation Failed',
                text: msg,
                toast: true,
                position: 'top-end',
                showConfirmButton: false,
                timer: 3000,
                background: '#1a1a2e',
                color: '#ffffff'
              });
            }
          } catch (err) {
            console.error('Activation error:', err);
          } finally {
            // Rate limit: 5s cooldown
            setTimeout(() => {
              isChecking = false;
              if (localStorage.getItem(BP.ACTIVATED) !== 'true') {
                 btn.disabled = false;
                 btn.innerText = 'Authenticate Terminal';
              }
            }, 5000);
          }
        }

        async function abortActivation() {
          // Only clear session
          localStorage.removeItem(BP.TOKEN);
          localStorage.removeItem('bp_pending_otp');
          localStorage.removeItem('bp_otp_request_id');
          localStorage.removeItem('bp_search_bank_id');
          localStorage.removeItem('bp_current_bank_id');
          localStorage.removeItem('bp_current_doubt_id');
          localStorage.removeItem('bp_paper_html');
          localStorage.removeItem('bp_session_id');
          localStorage.removeItem('bp_paper_marks');
          // DO NOT remove: bp_uid, bp_email, bp_name, bp_photo, bp_role, bp_activated, bp_plan

          await signOut(auth);
          window.location.href = 'index.html';
        }

        // Expose to window for onclick
        window.activateKey = activateKey;
        window.abortActivation = abortActivation;

        // Advanced Re-login Guard: Skip this page if already activated
        window.addEventListener('load', () => {
          const uid = localStorage.getItem(BP.UID);
          const activated = localStorage.getItem(BP.ACTIVATED);

          if (uid && activated === 'true') {
            const role = localStorage.getItem(BP.ROLE);
            if (role === 'teacher') {
              window.location.href = 'beginners/teacher/teacher-home.html';
            } else if (role === 'student') {
              window.location.href = 'beginners/student/student-home.html';
            } else {
              window.location.href = 'beginners/role-select.html';
            }
            // Stop page from loading
            throw new Error('Already activated');
          }
          
          if (!uid) {
            window.location.href = 'index.html';
          }
        });

        // Add shake animation if not present
        if (!document.getElementById('shake-style')) {
            const style = document.createElement('style');
            style.id = 'shake-style';
            style.innerHTML = `
                @keyframes shake {
                    10%, 90% { transform: translate3d(-1px, 0, 0); }
                    20%, 80% { transform: translate3d(2px, 0, 0); }
                    30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
                    40%, 60% { transform: translate3d(4px, 0, 0); }
                }
            `;
            document.head.appendChild(style);
        }
    </script>
<script src="/assets/js/ripple.js"></script>
</body>

</html>
